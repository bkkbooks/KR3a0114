body:
  text: 榕村語録卷十八大學士李光地撰宋六子一滄洲精舍中祠七賢周子二程子張子邵子司馬氏延平獨延平稱師即稱謂間亦不茍後稱六人則去延平後稱五賢竝去司馬當時伊川與邵子終不相合明道亦說邵子于學全不識問以邵子之虛明精究何以謂之全不識曰程子論其學微雜黃老之意便是不識邵子若不得朱子表章恐亦要減色問論理學司馬自不如延平何以六人去延平曰想是以其氣魄小聖人的派胸中是滚熱的逢著人便要成就延平口呐有所得默默自已進修人無知者他亦不求人知惟其實有所得脉絡不差故感召得一箇朱子來康節從遊者便少明道責其不授徒曰人都不來學明道曰堯夫故是悠悠佛家有經師有法師有禪師經師是深通佛經與人講解法師是戒律精嚴身體力行禪師是不立文字參悟正覺儒門亦似有此三派鄭賈諸公經師也東漢諸賢壁立萬仞法師也陸子靜王陽明禪師也程朱便是三乘全修所以成無上正果太極圖說西銘定性書好學論四篇相連看去太極圖最下兩圈與太極一樣圓滿此理未曽暢發却得西銘一滚說出西銘事天功夫實際即是定性書中大公順應二義然必細分知行始密又得好學論發之四篇相足聖學備矣清植數可圖理不可圖也而周子以圓圈圖之凡四方三尖六角匾長之形同其尺寸實之以物皆不能滿惟圓則滿充實無缺及至隂陽之中小圈五行之下小圈皆即上大圈如水中之月即天上之月本無有二此下又將氣化形化作二圓圈與太極等直是大手段人告以身從父母生即性亦從父母賦須當守身盡性以為孝人都信得及若告以天地為吾大父母必笑為迂遠矣惟使他由父母而推之于父母之父母纍進而直上溯至厥初生民非天地之氣化而何西銘即是此二圈圖說故曰乾稱父坤稱母不謂之祖妣者祖妣年遠為鬼鬼者歸也歸則不及撫摩恩勤矣乾坤却百千萬年難老之父母故曰日監在兹及爾出往及爾游衍至周子雖言君子修之未嘗言如何修也試思天地開一大世界日月升沉山川融結却是為何無非為生人之地即萬物皆陪客如果樹然枝幹花葉雖然無數其歸只是要結實天地生人非是要你美衣豐食驅役萬類暴殄天物也要你贊助天地耳西銘自知化窮神直說到厚生玉成所謂窮理盡性以至於命工夫皆備又定之以中正仁義而主靜何以定何以靜亦未明言却得明道定性書闡之所謂定者動亦定靜亦定然廓然大公者仁之所以為體物來順應者義之所以為用體在於大公即所謂主靜也但工夫節次尚未詳密又得伊川好學論補之其曰真而靜靜即主靜之靜真即無極之真之真實本太極圖說以立言至下文明諸心知所養然後力行以求至指出知行二字而塗轍具矣四書合而首尾完備代造化而為言非偶然也程子不請教邵子的數學邵子亦不請教程子的道學其所講論都不見這是公案可疑者到朱子大開城府你有一㸃好處我便收來我有一㸃好處便思公之于衆洞然無可疑者伊川難講話想是明道還肯說故邵子云伯淳之言條暢邵子生平不敢有外道語儒者到底不敢推出他去二程有幾假說隂陽天地甚精的想亦互有資益處只是前人傳藥不傳火火候不肯就傳二程十五六嵗便欲學聖人朱子草來嵗學仙學佛遍參歷扣其立志之髙才氣之大自是第一等然幸得濓溪延平把他㸃化得低下來便腳踏實地卒有成就不爾一向髙濶去便狂狂之不已便至於妄孔子大聖只曰述而不作信而好古於老彭且曰竊比何其德盛禮恭耶王陽明儘有氣可惜同時無人能㸃化他故終入邪魔至死之前一年尚作詩云影響尚疑朱仲晦支離羞作鄭康成何其妄也一齊抹倒古人獨立天壤間便不是聖人氣象派頭程子說吾學有所受朱子言必稱延平陸子靜便從來不說師法何人似從孔孟以後千餘年不傳之祕至子靜出而忽自已得之即此便見差路以上總論朱子作濓溪祠堂記直以道統歸之而以程子為見知于學庸兩序及孟子篇末則但提程氏而不及周子無不允當觀明道贊堯夫異於橫渠贊橫渠又異於濓溪銖兩不差便知其淵源有自昔受學於周茂叔吾學有所受二語源流何等分明自記伊川於明道墓表既以之接孟氏之傳於橫渠則曰自孟子後只有原道一篇西銘則原道之宗祖也又曰自孟子後儒者都無他見識或疑程子所以尊濓溪者反橫渠之不如然其所以表章西銘而不及太極原有深指朱子言之悉矣其評論語次雖未聞以孟氏以後之統歸之然孔顔之樂乃程子自言授受之要非其實到仲尼顔子樂處豈能開端指示使學者尋之哉夫得孔顔之心而不得孔孟之道未之有也濓溪之心得者深明道橫渠之友教者廣亦猶顔子潛德於孔子之門孟子修業於戰國之世故推尊之論各有攸當未可執一以疑其二也如後世多稱孔孟未聞有以是掩顔子者推是可以論伊洛淵源之際矣自記人能將太極圖說通書句句明白看四書五經都有入處太極圖直發千古所未發從來人不敢圖理而周子圖之天下惟圓者方滿凡圓物中間積實便飽滿如其大而方之便少又三角之更少此上圈之妙天下道理俱包在太極內十分滿足也若動靜不相生則有息時而太極亦破雖分動靜而中圈自若此第二圈之妙至下二圈一是氣化一是形化人只知到父母生身當全而受全而歸不知一步步推上去其初生者為誰非氣化而何既為氣而生則乾坤非吾大父母而何亦當全受全歸論父母之生即天地之氣化此必讀書明理者方知之若其初之為氣化雖愚人而知之也西銘却好發明下兩圈之理周是順流下來張是逆推上去某嘗說幾部書相接得妙張子不知有太極圖做一篇西銘恰好接太極圖大禹未必知有易經作一篇洪範恰好接易經周公做一部周禮恰好是洪範衍義向疑太極圖不如先天之自然其為圈為白黑為左右交系皆似出於人為今思之始知其妙妙在最上一圈與下二圈中間隂陽五行却是過脉大抵天地位便生草木後生禽獸最後生人人生而天地結種矣正如木之根而幹幹而枝枝而葉葉而華華而實至所結之實與所由生的種子一般而木之事畢矣此圖下圈與上圈無絲毫缺缺無絲毫參差一樣圓滿見人與天地之性一也問說太極畢竟又說無極何也曰易有太極原不須說無極因老莊諸人將太極說似形像未分精氣渾然之時之謂未免落有朕兆故加無極二字以明不有朕兆也這是因時立言看下言無極之真不更言太極可見太極即無極非有二也五行之生也各一其性似把太極剖作五片其實箇箇具足圓滿請以孝為太極喜怒哀樂為五行觀之如親有得而吾喜則孝心全體在喜不必夾以怒哀而後為全也親有疾而吾憂則孝心全體在憂不必雜少喜樂而後為全也無餘缺無彼此皆以此意求之如生意是太極春溫夏熱秋肅冬寒無非生也不但春溫時生意全在即夏熱秋肅生意亦全在熱內全在肅內至于嚴冬生意或幾乎息矣其實冬不冷春來如何能發生如人夜間不睡明日都無精神是睡似不辦事實乃辦事之根天下無性外之物即虎狼之父子蜂蟻之君臣雎鳩之夫婦他固不能相通然既有那一件太極便都全在那一件向來都將理字訓太極還有說不去的惟以性字訓則皆通矣太極圖說言生水火木金土五氣順布四時行焉似說倒了五行在四時裏面故火炎于夏水旺于冬木生于春金盛于秋如周子說却像五氣四時是有了五行後才有的大抵賢人的話便說得極好比之聖人到底差得些子孔子說五行曰天秉陽垂日星地秉隂竅于山川播五行于四時和而後月生焉是以三五而盈三五而闕日月星辰雖皆是懸象物事然實以日星為紀所以日近得來便暑遠了去便寒四時俱看星舍惟山氣起去便成雲澤氣起去便成雨却是地下的事月雖是懸象其實一半隂一半陽厯家說九天惟月天最近炎夏時節日光當頭晒透下來所以暑隆冬時節日遠了只剩他一箇氷冷的在上面所以寒邵子以夏屬日冬屬月朱子說他不是實却是如此至風雨以月為驗萬物孕育亦俱以月為節孔子言其三五而盈以從陽也三五而闕以從隂也故曰和而後月生焉清植太極圖說是從繫傳首章運化出來然有一處可疑開首動而生陽靜而生隂隂陽是指著甚麼若是指天地則動極而靜靜極而動兩句難說繫傳只從天尊地卑說起方漸次說向摩蕩上去便無弊問圖說極精然看來不如繫傳尚有數處五氣順布四時行焉二句既不如禮運播五行于四時語意圓渾而雷霆風雨日月寒暑一切天所藉以生生之功用亦未曽數說得盡至化生萬物緊頂男女來便像只從二氣交感說起又不如乾知大始坤作成物乾以易知坤以簡能是從理上說起即推本主靜一層論理固是然生出後人許多論議亦不如繫傳易簡二字只坦白放在那裏便不用更說主靜了曰然清植巖問與日月合其明似是智如何是禮曰日月是外明的火是外明的三千三百都是燦著于外的水是內明的智是藏在內的鬼神是幽暗的與天地合其德四句朱子將第一句配太極二句配隂陽三句配五行四句配男女但夫子如何知道有太極圖說不如配仁義禮智有根如今舉成語以實之天地之大德曰生故曰仁禮者嚮明而治故曰禮義者宜也時也得其序舒慘合宜故曰義鬼神善必先知之不善必先知之又曰幽則有鬼神故曰智太極圖說所引立天之道立地之道是應動靜變合五行四時等句引立人之道是應男女善惡中正仁義等句又引原始反終二句却與上意不相粘合蓋隂陽剛柔不外仁義人之道即天地之道原見在人道之始反見在人道之終便知死生之說即西銘存順沒寧之意至此方是全受全歸不為虛生浪死死生信是大事夫子所云朝聞道夕死可矣是大要緊處必說到此才成全箇人寧字最妙只是心中帖然吾事都畢通書四十章字字純粹雖無一語闢佛老求其一語似佛老者亦不可得程朱說性命許多話似還不如通書誠上章為盡聖人盡性而性者自然之實理故曰聖人之本既云聖人以在人言不以在天言誠之源言在人之實理所從出如天命之謂性大哉乾元是乾始一㸃至潔淨無所為之心萬物資之以始者這就是誠之源云萬物則自聖賢庸愚以至昆蟲草木皆得此理無有彼此厚薄之異如天下雨一般何嘗于江河多些于溝渠蹄涔少些于清流處清些于臭穢處濁些都是一樣乾元只是生理至云乾道則有隂陽矣有隂陽便有變化錯綜交互無所不有各正性命正不對邪猶云成也到此如江河自然得雨多溝渠蹄涔自然以次少清流覺得清穢處覺得濁然無論大小清濁皆有此雨極惡人亦斷不了此理所謂純粹至善也繼之者善繼字妙說豫偏屬天說受偏屬人惟繼字恰是天人之間相授受處如父以家業付子而子方承受之時無不善者及搬到各家便不同所謂成之者性也所以繫傳緊承上文言仁者見之謂之仁知者見之謂之知百姓日用而不知以此說各正性命最明白如此講與性相近習相遠一樣語氣不必又說義理之性與氣質之性矣天道之元亨即此誠之通天道之利貞即此誠之復上言人性此言天命朱子以陽繼隂隂繼陽為言則通與誠之源復復與誠斯立復矣大哉易也是說此理備于易非取交易變易之義性命之源是雙收上文語氣與太極圖說結句一樣堯舜性之湯武反之反即復也性復兩字從孟子來或安而行之擇善而固執之安執兩字從中庸來自記理性命一章說得極髙却有實理厥彰厥微朱子言彰底微底非靈皆不能明某意微字是此節眼目即物上見理次節眼目在中字即偏處見全末節眼目在一字即萬中見一清植聖人之精畫卦以示聖人之藴因卦以發程邵都說不得如此簡當上句先天也下句後天也其精理不可見則畫卦以示顯之于象皆可見矣既有卦則天地間事物之理因卦都發出來精字藴字示字發字畫字以字無一不穩當恰好易何止五經之源其天地鬼神之奧乎五經所言盡乎道矣天地鬼神之奧豈能外之何止二字略有語病清植春秋正王道明大法孔子為後世王者而修也淺淺說得甚明白亂臣賊子都是死人雖誅他他亦不知所以懼生者于後也大法即在王道中道尚寬法更嚴切以上周子橫渠說明道可比顔子鄒志完稱曰使斯人得志可使萬物得所范淳夫曰不遷怒不二過惟伯淳能之即至强梁如荆公惟明道與辨論他便受亦以忠信許之使濓溪明道朱子得用于世以視武侯其細密敏慎虛公俱可信得過且自然更純某以定性書繼西銘後就其文章觀之渾渾淪淪似無下手處其實包得許多物事廓然大公物來順應凡中和忠恕誠明敬義都是此假話頭敬以直內義以方外便是下手處朱子解只順文義詮釋倒是他自已語録內有一條說得親切只是不曽分剖得知行明白故某又以伊川顔子好學論繼之其言知之明則信之篤信之篤則行之果行之果則守之固守之固則居之安動容周旋中禮而邪僻之心無自生仍歸到敬上直是有源有委明道作定性書才二十多嵗未必擬議經書出語自然吻合所云天地之常以其心普萬物而無心聖人之常以其情順萬事而無情便與乾始能以美利利天下不言所利一般人心一有所私便待親厚的好些待不親厚的不好些圖甚麼便用情無所圖便不用情如何能普濟萬物打通人我惟乾始一團好生之心乾乾淨淨一無所為故能醖釀流溢隨物賦形自然公普到得天下皆受其利他亦不言所利其初原無所為後來自無可言此乾始之心在人即不忍人之心也不獨聖人有是心人皆有之孟子最形容得親切見孺子入井便生惻隱自家孺子如此即人家孺子甚至仇家孺子亦皆如此此要救孺子之心若是為納交要譽及惡其聲便有相與者與沒相與者不同人見處與沒人見處又不同救之後畢竟要自暴其德惟無此意所以只覺得必要如此自已那一假不忍之心才過得去他無可言者天地之常以其心即乾始也普萬物即以美利利天下也而無心即不言所利也聖人之常以其情即乾始也順萬事即以美利利天下也而無情即不言所利也他天資髙直見得到此想亦能行得到此夫子不怨天不尤人下學而上達知我者其天乎即此心也古之學者為己不為名不為利暗然無色淡然無味寂然無聲泊然無臭學者如是聖人如是上天之載亦如是看來好學論稍遜于定性書以不曽指出敬以直內一層工夫也篇中只言致知力行所云正其心養其性只是撮總語大抵言知行不若言敬義工夫較備上蔡記明道語某學雖有所受天理二字却是某拈出來朱子改云天理二字是某體貼出來體貼字便像是程子創造此二字樂記中已有只好說拈出因程子受學濓溪太極通書中却未見此二字故曰拈出天理人欲這樣字非洙泗不能如此粘合得妙理屬天欲却從人而有精當無比伊川太方嚴須是三代方用得他朱子和平寬大留心人才一長必録如陳同甫粗疏之極而始終交好東坡恨伊川在自已盡力詆毁伊川如無聞也者終身一字不及東坡此東坡所以傷心也大槩洛蜀分黨固起于門人而積釁多開于小處蘇家父子入都一時盛名王荆公藐之曰不過戰國之文所以蘇氏嗔嫌到底新法猶是波瀾也忠信是直內修辭立誠乃是方外之事明道却帶直內說來者誠即是忠信內存實心必從實事上體當而誠乃立也故云惟立誠才有可居之處自記問程子言器亦道道亦器何謂也曰此條以誠字為主以天字為客忠信進德即是對越上天何者天之所以為天誠而已矣其體謂之易其理謂之道而其用即謂之神神不在道之外也子思言性道教孟子又就中發出浩然之氣氣亦不在性道之外也故中庸言鬼神充塞如此而歸之于誠則神氣與道之妙合也顯矣徹上徹下總一實理而已豈有他物哉夫誠也性也命也形而上之道也天也神也氣也形而下之器也然亦辨道器之分不得不如此立言耳實則道器渾融何處分别君子而能存誠則道在是矣道在則異世而同神何有於古今殊形而同體何有於物我忠信乾乾天且不違蓋為此爾程子又曰毋不敬可以對越上帝又曰誠則無不敬未能誠則必敬而後誠然則事天以存誠為本而存誠以居敬為先自記問生之為性本告子之言程子乃述之而曰性即氣氣即性何也曰性與生俱生故其字從心從生非生則不名性生者氣也而性在焉是性即氣氣即性也辭同而意異不可以辭害意問又言人生氣禀理有善惡然不是性中元有此兩物相對而生何也曰言既生之謂性則人生所禀之氣當有善惡然善惡差殊非性也氣也性即理理則善而已矣氣禀用事而理之具於是者或過不及焉善之反為惡非其初相對而有也上節合性與氣言之此節離性與氣言之也理有善惡理字行文虛字問又言善固性也惡亦不可不謂之性蓋生之謂性人生而靜以上不容說才說性時便已不是性何也曰此申第一節言善固性也惡雖反焉而悖於性然亦不可不謂之性者蓋性者以有生而名人生之前屬乎天命自不容說才說性時便兼氣質論也問凡人說性只是說繼之者善孟子言人性善是也何也曰此申第二節繼者流行繼續之意繼之者善謂天命流行無有不善即元亨利貞之德太極之緼是也其理在人則為仁義禮智雖不離乎氣禀而有不雜氣禀者存故謂今之言性乃指其原于天命純粹至善者言之孟子所謂性善蓋主此耳問又以水流就下為喻而曰不可以濁者不謂水何也曰又申第一節猶水流而就下句與孟子以水之下喻性之善不同蓋是行文虛句言天命流行而賦於物正如水之流行而趨于下也命之理無不善及賦于物則有善有惡水之流無不清及趨於下則有清有濁清濁皆不可不謂之水則善惡亦皆不可不謂之性明矣問又言水之清則性之善之謂不是善與惡在性中兩物相對何也曰此亦以水喻申第二節蓋澄治之功至則水復其本清學問勤則性復其本善水之清濁非從源而有善與惡之在性本豈相對而生哉問又言自天命以至于教我無加損何也曰命之於天循之則為道修之則為教聖人盡其性以至盡人性盡物性則道教備矣然豈能有所加損于性哉無他性善故也朱子文集中有解釋此條注語類中與門人講說尤詳然所分假落似未甚清又以繼之者善為就人情動處言之蓋因下句引孟子之言故轉生此解然伊川固謂孟子言性是極本窮源之性則以合諸大傳繼善之㫖又何疑焉朱子又謂先以水之下喻性復以水之清喻性為譬喻叢雜亦似非立言本意自記問程子言學者須先識仁識得此理以誠敬存之不須防檢不須窮索何謂也曰此條要緊在識字存字識則愈存故不須防檢存則愈識故不須窮索反身則識矣誠則存矣訂頑備言此體即萬物皆備之存也以此意存之則識而存之也上言訂頑乃仁之體學者其體此意令有諸己體亦識也有亦存也識又先于存故能體則不患不能守也然此所言皆是庶幾于中心安仁之事學利以下則防檢窮索又烏可已自記問程子言學者不必遠求近取諸身只明人理敬而已矣便是約處何也曰此條合易爻孟子及所答橫渠定性書與平日涵養致知之說而一以貫之蓋明人理則用行敬則體立近思約守不待遠求易之直內方外即其事也雖言賢人之事然敬即間邪存誠忠信進德之功義即言行謹信修辭存義之業乾之龍德亦若是耳豈有他途哉其有他途者穿鑿以害理繫纍以害心也豈獨聖人雖天與人亦只一理浩然之氣至大至剛以直天地正氣即吾氣也持志集義直養無害則天人一矣茍為私心所蔽則不直不方而浩然者欿然何其小也無不敬則內直思無邪則外方斯二者傳心之要也定性書廓然大公而戒自私之纍物來順應而惡用智之鑿即此意然未直指用力之方此揭敬義為言入德之途可謂明矣首末先言明理愼思而後言敬者識得此理然後能敬存敬則天理益明二者相為首尾自記主一非寂守此心而已隨其所在而主夫一焉坐立言行無非是也無適言不去而之他申主一之義耳自記問程子言心是所主處仁是就事言何也曰事猶理也心是身之主仁是心之理不曰理而曰事者仁合內外兼體用故以事言之欲其易曉問者聞仁就事言故疑是心之用程子又正之謂就事見仁則可謂仁者心之用則不可仁者心之所以為心一而二二而一者也偏言則一事專言則包四者故但言心則專言之仁也中包四端猶身之有四體也故言四體具於身四端具於心則可言四體身之用四端心之用則不可惟其且之是以用之而已問穀種之喻曰以心為穀種以仁為陽氣則失之遠矣或人蓋未喻程子之意而終以用處求仁也然以穀種喻心則固已得之但未明性情之分耳茍知發處是情所以發處是性性是仁發處是惻隱則性情之分明而心在其中矣此條剖析心性情與仁極為精切自記堯夫問今年雷起甚處伊川云起處起言從動之端起也蓋語得要領與明道加倍之對同故堯夫皆為之驚愕自記伊川於明堂禮成不往哭溫公亦以明堂大禮溫公分為臣子耳非直為慶弔不同日也自記在中之義言不著于喜怒哀樂而在其中間也中道在事此中字在心字義雖同而用不同者體用之分也季明因在中之義未明故復問其意程子但以不字易未字而便以為中蓋即無所倚著之謂然終不明言使深思而得之耳季明因程子言不發是中故疑中無形體所以名道然中和皆以人心之德言之則中雖無體而已有象矣所謂未發時氣象是也程子既言中有形象則異於泯然無迹者故季明復以有無聞見為問然雖未有聞見而聞見之理自在以此揆之則未有喜怒哀樂而喜怒哀樂之理自在明矣季明因謂既以未發為中則是惟未發之時可名中耳程子言中之道貫於動靜何時而不中蓋雖和亦中也未發之中乃時中之根本故程子因問又發此義季明言固是動靜皆中然觀于未發之前氣象自别接事時則心著于事未必有此氣象矣殊不知動靜時也靜時無著力處亦無容觀處有著力之意有觀之之心其分皆屬已發而非未發矣故觀中者觀之未發之前不如觀之已發之際之為善程子既正季明求靜之失又見其下一觀字知其於動靜之界尚未甚明故還以靜時如何問之季明謂靜時固無物然自有知覺然則知覺者即其所用以觀氣象者也程子言既有知覺則屬動而非靜矣如復卦一陽始生雖朕兆于中未發露於外畢竟不可謂之靜乃動之端也天地之心動乃可見中之氣象未發於何觀哉問者既聞程子之言故謂靜時氣象既須於動處觀之則靜中功夫莫亦須於動處求之否程子前既有存養于靜時之說矣於動上求靜之義則未嘗及故亟然其說而以為此假工夫最難也釋氏所謂定却物者也求靜于靜也聖人所謂止因物付物者也求靜於動也付物則理得而心安却物者强遣而己物之善惡自在善之惡之之心自存名為無纍而所謂物者隱然凝滯於冥漠之中非真靜也艮之為止者蓋天地生物理既完足各正性命則寂然不動而有以為發生之端故曰終萬物始萬物者莫盛乎艮人心應物能使事事物物各當其理則亦寂然不動而無偏倚留滯之處欲其不靜得乎程子嘗言不專一則不能直遂不翕聚則不能發散蓋動根于靜也此條所言則又靜根於動動靜相循如環無端儒者傳心之妙盡於此矣朱子養觀記備言此意然似以復艮兩卦分未發已發故其言曰方其未發必有事焉是乃所謂靜中之知覺復之所以見天地之心也及其已發隨事觀省是乃所謂動上求靜艮之所以止其所也細詳程子答問其舉復卦為言正以復見天地心之為動明既有知覺之非靜耳明靜時未有知覺則未發之中不可觀不可求耳明未發之中不可觀不可求則但當存涵養之意而於已發之際觀之求之耳故言復卦為靜極而動艮卦為動極而靜則可言復卦為靜中之動艮卦為動中之靜則於程子之言有毫釐之差矣就中庸首章論之養其未發之中正艮之所以止其背也導其方發之和正復之所以見其心也且所謂靜中有動者惺覺之體似與復見心之意異所謂動中有靜者付物之妙似與艮止背之意異蓋惺覺又在見心之前止背又在付物之後艮靜復動其大分不可亂也或者聞程子言中有形象又言靜無知覺故以未發之前動靜之分請程子決之程子答以靜而有物則雖知覺未形而義理渾具端倪未露而氣象全呈矣前言平日涵養便是至此乃指出敬字也其言敬以主一本兼動靜因季明之問故就思慮應事言之亦動上求靜之意或因程子言靜非知覺然雖無見聞而見聞之理在故復問物之過乎前者見與不見程子言若是祭祀之時或不聞見耳若平日豈有不聞見者蓋聞見與視聽不同未有心於視之聽之雖聞見不害其為未發也問者更端言主敬之時雖有見聞莫不當留此又失於有心求靜之過而非所以言敬故程子正之言豈不曰非禮勿視非禮勿聽乎惟非禮者則勿之豈可槩弗見弗聞乎敬通動靜者也自記在人之性即所以為人之理則在天之理即天所以為天之性性也理也一而不二故原其所自來則粹然至善而不雜矣當其寂而無感之先氣未用事所謂人生而靜天之性也亦何不善之有惟發不中節然後有惡是善其本然惡其後至故曰謂之惡者本非惡但或過或不及便如此自記孟子言人之有不善非才之罪程子又以為有不善者才也其說若相反而實相備且因是以知氣質之說既自孟子發之蓋所謂才者即氣禀也孟子未嘗不言氣禀但以為不足以牿人性之善使其有已百已千之功則自不至于倍蓰無算之域惟不能盡其才而以為未嘗有才者多故謂天之降才爾殊耳豈才之罪哉蓋不歸咎於氣質也今講家以才為性之用如所云良能者故謂孟子言理不言氣其說未備則失孟子矣且孟子所言性善謂人性也人受天地之中五行之秀以生故其性獨善此便是兼氣而言非指天命醇粹人物同得之初也故曰異于禽獸幾希又曰犬牛之性猶人之性與既謂之人則聖人與我同類者我與聖人非如犬馬之與我不同類也故人類之中才質雖有髙下不足以牿吾性明矣故曰性善也程子兄弟往往以孟子言性皆指天命之初又以孔子言相近為氣質孟子言性善為極本窮源皆啓後學之疑豈知相近之即所謂善乎夫禽獸與人絶遠而人與人則相近堯舜與途人相近則性誠善矣豈必窮極本源論之哉如果窮極其本則萬物之一源凡有血氣皆與無妄何又曰異於幾布而違之不遠是懼且曰犬牛曰犬馬推而遠之惟恐相混焉程子又曰才禀於氣乃用孟子才字而開氣禀之說其曰自堯舜至途人一也即孟子堯舜與人同之說二子豈不知堯舜之異途人哉亦言其同類而相近耳既以相近為善則孔孟言性之未嘗有異也其㫖彌顯矣自記問程子云有主則實又云有主則虛所謂主者是性為主是心為主曰性為主清植程子遺書極為天地中一條言地是渾體隨人所處無適非中若以為有一定之中則其邉際必有所窮以測景之法推之去中國一萬五千里應已得地形盡處何以天地之運彼此無殊故知地之體勢髙下相因隨處為中無有定在此條深得周公遺意自記程子遺書中日之形似輪似餅一條言地無適非中則無適非日所照蓋日陽精非形也如是形則似輪似餅其大有限其光亦有限矣且果行於地平三萬里之上則非中土而處於極東極西者取日既遠朝暮必有不照之時而又安得有此理乎因引莊子語以明日為精氣而非形又引佛家語以明舊說之是舊說即周髀也周髀謂地如覆盆天如蓋笠日月繞其傍而行此與佛經之說正同北極之下地如覆盆䧛陀四頽即佛所謂須彌山也程子言今厯家謂日只在地平升降出沒不如舊說言周回繞中心者之為善蓋周回環繞則東之夜即西之晝南之子即北之午無所適而不為精矣後又申言之惟其是精而非形所以到處有光精神常新無有微盛如火光所燃其能熱物皆然也精之所在而氣隨之若人之志一動氣故生物之理居可知也自記程子遺書極須為天地之中一條首半言兩極因人視而有低昻實則南北隱現隨地遷變後半言寒暑之氣亦當隨地遷變而有冬夏反易之理蓋極星雖為天地之中然天地間四方上下之遠近無不適均而相直者相直則循環不窮矣厯法所言極星髙下各就其地所見言耳然有南極見而北極隱者可知天地之中未可以所見定也天地道里既不可窮然測景有三萬里之說則是南北東西皆一萬五千里也而中國迤西萬五千里之遠於此測日仍在三萬里中耳天地之中果可以一處定乎此以東西言之則南北可知矣下又言寒暑只因向背日耳不緣地也髙下謂南北既寒暑因乎南北則氣候在在推移各以日之向背遠近而已漸推漸遠至於赤道之南則氣候須正與中國相反雖未實諸聞見然總之有冬有夏而已確有其理也自記問遺書言氣行滿天地之中然氣須有精處故其見如輪如餅譬之鋪一溜柴薪從頭燃著火到處其光皆一般氣充塞無所不到若這上頭得箇意思便知得生物之理此一假如何曰滿天地間都是氣而日為陽氣之精到處有光出於地上地上有光沒於地下地下有光如火之著于柴薪非有一物推之始行也氣塞滿天地陽精到處氣即隨之而聚便生物所謂日無適而不為精至確之論也遺書言有無則多有字言無無則多無字有無與動靜同冬至前天地閉可謂靜矣而日月星辰亦自運行而不息謂天無動可乎但人不識有無動靜耳此一假亦說得好說有這箇無多一個有字說無這箇無多一箇無字無即靜也靜不是空滅原都有在那裏一提起便都在以形器而言何嘗無有無當其思慮時便是有思慮不起便是無試問無時果竟無乎任甚麼生平事原都記在那裏老子開口便言有無其所謂無即吾儒所謂未發也伊川謂靜中須有物極精雖然未發豈得謂之無喜怒哀樂乎天地晝夜古今死生即是此理一箇樣無一些差以上程子榕村語録卷十八

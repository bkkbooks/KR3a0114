body:
  text: 榕村語録卷二大學士李光地撰上論一論語想是門弟子如語録一般記在那裏後來有一高手鍊成文理這樣妙下字無一不渾學而一篇首在於孝弟忠信以立其本而後親師取友講學集益然不可為外物所移奪故以不求安飽處貧富及不患人知終焉首章為此篇之綱蓋先之以學則凡篇中所謂孝弟忠信重威及傳習學文之類皆是也次之以友凡篇中所謂親仁無友不如己以至就有道而正之類皆是也終之以不慍則篇末之不求安飽無諂無驕樂且好禮以至不患人之不已知皆是也學問始終大節目只此三事而已自記時習只是講習之事然並知行在其中者古人學校四術禮樂詩書詩書便用歌詠頌讀玩索道理禮樂則已有許多切身之事如禮之威儀樂之節奏斯須不莊不敬如禮何斯須不和不樂如樂何故程子時復思繹上蔡坐尸立齋之義朱子兼取之自記雖樂於及人不見是而無悶似將兩節一正一反説某意朋字與人字不同如夫子之友教四方而不合於世無害其為朋來而人不知也自記以朋來為取益人不知為無位是講説差處自記説春也一團生意樂夏也暢茂條達不慍秋冬也收斂藏固非枯稿也生意都包在內又是發生之基聖賢開口不離此理溫良春夏也恭儉秋冬也讓則流行其中太和元氣也溫而厲春夏也威而不猛秋冬也恭而安太和元氣也事親孝事兄弟則忠可移於君順可移於長故必無犯上作亂之事而有以為仁之本前後只是一意不必云上節是資質下節是功夫也自記巧言令色鮮矣仁下靣數章有許多忠信話頭皆從此引起自記或疑三省不足以盡日用之事然為人謀交友事師雖只三事而忠信所以進德講習所以居業則為學之事備矣人於父兄尊長親戚之間不忠不信者少惟泛為人謀則有不忠者泛與友交則有不信者又人情於未知未能之事則知汲汲求之既得傳授便多不復溫習三事蓋就所虧欠處提醒要將為人謀與朋友交及傳字重讀便分明自記道千乘之國章道理便與末章尊五美屏四惡者相貫但此章以敬信為本而及教養後章則先言養教而推本於誠敬也節用愛人便是惠而不費使民以時便是勞而不怨信便是欲而不貪欲仁而得仁又焉貪者誠也敬便是泰而不驕威而不猛使民不以時如不戒視成慢令致期之類皆是自記不孝則不能弟不弟則不能謹信不謹信則不能泛愛不愛衆則亦不能親仁不親仁則又無以學文也然孝又須弟弟又須謹信謹信又須泛愛泛愛又須親仁力行數者之暇又須學文餘力是就逐日功程説或謂此與四教文行不同固是略有大小學之别然文正所以考行二者相為終始自記學則不固學字便是上二章所謂學者人若不端厚深穩則不能莊敬嚴威雖有所學既不著己又不關心必不能得之堅固也此居敬為學問之本也主忠信則毫無外飾豈肯臨深為高護過而飾非乎此存誠為躬行之本也然誠敬又自相為表裏非敬則誠亦虛非誠則敬亦偽聖人為學者言之則須從矜持收斂處起制於外所以養其中也自記重威章前輩有立四柱説者外須威重內須忠信取友須勝已知過必重改此一説也費宏程文則以威重而後學可固學之道如何在主忠信在擇友在改過此又一説也又有重主忠信者言必先威重以固學而後忠信可主也主忠信而後擇友改過以進其德此張南軒説也某則謂威重節是主敬以為窮理之要下三節為一段是存誠以為力行之本人必此心提起肅然凝然方做得博文格物工夫不然心之不存隨得隨失終無成就人必內有誠心而後友可擇過可改不然行事都沒根腳擇甚麼友改甚麼過上一段是反説口氣下是正説口氣上一段正説猶言威則重而後學可固下言忠信主而後友可擇過可改所謂終日乾乾又必懲忿窒欲遷善改過而後至學便是讀書即指詩書六藝之文也此字不可拋空大槩聖人説話都包得住如德之不修學之不講聞義不能徙不善不能改都説全了此章若説威重忠信友賢改過是四項為學意便不見此却是敬為講學之基誠為修身之本這樣看便與德之不修章同孟子説學問之道無他求其放心而已矣以至論居仁由義舍生取義都只存得本然之良心便了略説得快些孔子却要人先把心好了才講得學問不然饒你學問博洽功業氣節俱是無本的所以説必有忠信如丘者焉不如丘之好學也主忠信無友不如己者過則勿憚改主忠信徙義崇德也德之不修學之不講云云皆是此意溫如春良如夏恭如秋儉如冬讓則如元氣之流行於四時也不特善為説辭可謂善言德行者矣自記程子説敬字不可與和字分最妙不和不足以為敬也詩言文王雍雍肅肅又言溫恭朝夕又言溫溫恭人子溫而厲人最不可靣上有冷氣子貢善言德行故曰夫子溫良恭儉讓一語而四氣俱備讓者禮之實蓋五行之土也溫又貫於良恭儉之中如元之統亨利貞也不溫而良為坦率不溫而恭為色莊不溫而儉為鄙陋錯認敬字為作意嚴肅便有許多病痛而不自知其患最大三年無改章注説精矣然可謂孝單就無改説一説父在則志可得而觀故當觀父之志父沒則行可得而考故當觀父之行其志行之善者固當繼而述之矣即有未盡善者亦未忍遽然改之繼述之道既盡思慕之心無窮此所以為孝自記禮之用章重在和字蓋知禮而和則是得禮之意而其和也不流矣知和而和不能深知禮意而有見於和故或時出於禮之外而不可行自記周末蓋有厭繁文而趨流蕩者未必不自拘牽瑣細者啓之此與學朱子之學者激為姚江之徒無異陸象山極惡有子禮之用一章説話便可窺見其心病處自記因不失其親似為仕進者説蓋所因緣以進身者故下應以宗字孟子所謂觀近臣以其所為主觀逺臣以其所主是也又如春秋時家臣若冉求仕於季氏者亦是信原期於可復而非義則不可復也恭原欲逺恥辱而非禮則或招恥辱也因之則必主之而失其親則不可宗也末三字俱應首一字自記就有道而正焉觀就字則知有朋自遠方來來字之義蓋禮聞來學不聞往教古之道也自記無諂之反是諂無驕之反是驕皆是大病若樂之反是憂好禮之反是侈未到諂驕田地自記患不知人若照尹氏兼是非邪正説不惟與不患人之不已知句難相呼應亦止説得明一邊若説不患人不知我的好處却患我不知人的好處並可以兼得誠一邊以上學而篇詩三百章依朱子説則當以無字與毋通禁止辭也言詩之為教歸於使人禁止其邪思故雖有三百之多而魯頌一言可以蔽其指也然謂作詩之人自無邪思者亦不為無理蓋詩為夫子所刪則黜棄者多矣其存者必其醇者也雖有鄭衛淫泆之詩較之全編殆不能什之一則從其多者而謂之思無邪也可矣就鄭衛之中亦有未必淫詩而朱子姑意之者風雨青矜之類是也其詞意顯然不可掩覆如桑中洧外乃為淫詞無疑聖人所以存而不刪正以見一國之俗化如此而其間尚有特立獨行之人不以風雨輟其音不以如雲亂其志則民彛之不泯可見而欲矯世行義者可以興此聖人之意也彼謂夫子放鄭聲則不宜録此者似已然朱子謂樂教與詩教不同放其聲者樂也存其篇者詩也聲入於耳感於心則不可以無放若夫考其俗以究治亂之本極其弊以察是非之心篇可不存乎是故鄭人之詩思無邪者僅耳而其皎然有志操者則以淫俗而愈彰故曰舉世渾濁貞士乃見鄭衛之存淫詩乃與思無邪之義相反而相明蓋變例也道之以政齊之以刑是從下半截做起不但無德為之根亦無禮教之施一切任其文法而已道之以德齊之以禮則從源頭做來其躬行心得處固有過化存神之妙而其以禮為治則所以納天下於君子之域者盡矣雖曰不廢政刑然政即是禮中之約束條具刑則糾其悖於禮者耳故至齊之以禮處更無餘義不必又曰政刑以輔之也自記有政故民可茍免任刑故民無恥心感於德則有恥循於禮則進善自記免從政來非政但無恥而已無恥却從刑來大槩人受過刑便多破臉易於無忌憚下有恥却根德格却根禮志學章虛齋文提出天字大有識見不獨知天命是聖學大關鍵要想其志學時所志云何士希賢賢希聖聖希天最確我輩何嘗無志大槩以古名人自期所希者賢也程朱便鋭然學聖人至聖人地步更高所希甚麼却是希天但看從心所欲不踰矩有何人能如此惟天為然萬古千秋形形色色一絲不亂可知聖人之志直是志與天同不惑不單在事物上不惑似孟子所云盡其心者知其性也知命似孟子所云知其性則知天矣又透上一層見得吾之性即天之命耳順與不耳順只爭思與不思入耳便都融通然猶不是動容周旋中禮地位直到從心所欲方是盛德之至天命便是矩知之者知命也不踰之者至命也自記問耳順是如何曰神周於形有麻木之病者搯他都不覺無病之人摘一根毛亦知痛此神之周流也七十從心所欲不踰距以我們庸衆分量如何推測得聖人分際然亦不可不體貼一番非知之艱行之惟艱學者固是如此想上聖大賢亦是如此我們有讀那句書見得狠親切到得措之言行要倣佛如書上所説便不能聖人雖是目足並到畢竟目快些要得知行合一形神相應如乾坤合德實是難事顔子不遷不二無情欲之纍屢空而樂無境遇之纍自然該與道為一矣然還説雖欲從之末由也已即如有所立卓爾不但是大段有所見是一事一物皆卓然見得箇至當不易的道理在眼前及至臨事還不能恰如其所見的分量就使做到九分九釐那一釐不是便是踰矩或過火些過猶不及仍是踰距從心不踰如前人解若放意大膽皆合天則此豈似聖人語不踰原是剛剛的能不過乎矩而已然至此才是形神相應天人合一道器一貫理氣渾融知到行即到目到足便到也不過也不不及恰恰如此矩在事物上説從字即讀本字向雖心要如此其如不從何今從我心之所欲庶幾不過乎規矩此從字與雖欲從之從字又不同顔子是欲有所從所以末由夫子是從其所欲所以不踰欲從從欲字靣倒轉境界遂殊聖賢説道理都在日用事物上説不説虛空話如告顔子以克己復禮顔子若不請其目後人必説是在心裏克乃顔子再請夫子却説在視聽言動上克如對子張問行説言忠信行篤敬若無此兩句後靣參前倚衡便不知説的是甚麼難道果有箇忠信篤敬參前倚衡不過是言行間須臾不可離忠信篤敬耳今人説卓爾亦錯空空底眼中見得箇物事及到跟前又不見了如此還是恍惚不曾實實見得顔子是工夫已到實有所見及至言行仍難到恰好田地如平時已知遽忘其怒而觀理之是非至於怒時詞色氣象稍不能自然都是踰矩如陳司敗問昭公知禮昭公原知禮又是君孔子便曰知禮及聞巫馬期之言便説丘也幸茍有過人必知之四靣八方道理都完足不曾到聖人地位便不能如此不是别有竒特也從心所欲者形神相應乾坤合德也顔子未到聖人想只在此一息自記從心所欲是身體能從心之所欲形能應神形神合一所謂動容周旋中禮者盛德之至也顔子雖欲從之末由也已緊與此對此地位實在難説須求箇實在著落方好如有所立卓爾竟是立則見其參於前在輿則見其倚於衡工夫煉到有形有像如道家竟有嬰兒結成胎了只是不能合而為一分明見得該如此言説出口來已差了些分明見得該如此行見之於事又差了些聖人則所見如此言行便如此形與神合便是天德説來像箇遊光掠影便不是生事葬祭事親之始終至於武伯守身之道也子遊教之以敬子夏教之以愛四條包得一部孝經然身體髮膚不敢毁傷則敬愛有根而事之以禮皆自此而推之言雖各因其才而理則通乎上下盡此則為孝子為仁人矣助我起豫此足以發者也不違則不足以發矣退省其私亦足以發亦字有根發發明吾道也自記君子不器重在體上説用無不周是推出來的話言君子不落在器上總在德性上用工夫你要求他專長不得此是正意到後來無事不會却是餘意如把餘意作正意竟似説多器備器不是不器矣朱子文集必有所證驗而後實必有所禆助而後安二語為殆字下注腳自記問攻乎異端不知孔子時有何異端曰那時異端頗多所以刪書斷自唐虞凡洪荒幽渺之説芟除箇盡只禮樂詩書春秋周易留在天地間皆斯須不可離至卑而不可踰者雖一以人事為主而陰陽鬼神無所不該此乃代天地而為言非聖人自為之也夫子曰索隱行怪吾弗為之其意可見後來孟子又間先聖之道透底言之至周程張朱闡發一番幾如大路然後儒尚復説差所以審問愼思明辨闕一不可人不服多是被錯的一邊人故曰舉直錯諸枉多著一諸字見所舉如此而所錯乃如彼則不特舉者服即錯者亦無不服矣經書中助字無虛下者清植以上為政篇足則吾能徴向來俱作找足之句是感慨語氣然玩味吾能徴三字似便謂我自能證吾言不藉把宋也盡已之為忠獨於事君用之者事君之人以衆多故而不盡其心者多也况有利害禍福之在其後則益不盡其心矣或人問意不是為仲救解蓋未知夫子小仲之意安在故反覆求其説耳儉乎疑夫子或以吝嗇小仲也知禮乎又疑夫子或以拘謹小仲也後來講知禮乎便把禮字當繁縟靡麗之稱以為是儉字反靣全不回頭一顧章旨自記問始作翕如八音備否曰八音不能備有四五音便是古樂有四節每節有三終大抵每終皆有翕純皎繹不必三終四節既而始具也翕如純如皎如繹如只宜在氣象上説初從何調起而各聲相從如家主在上合家聽命翕聚之至是謂翕如就翕如之中彼此相應無所參差乖異是謂純如雖純如和也非同也宫自為宫商自為商不相凌亂是謂皎如然非彼此不聨屬也有一氣相生之妙是謂繹如升歌笙入間歌合樂皆有此翕純橫説是一套事皎繹竪説是一套事樂以人聲為重歌是也次之人氣管笙是也鼗起管笙堂下之樂玉磬起升歌堂上之樂鼓所以節樂編鐘編磬諸樂皆稟令焉柷圉亦起止所用問管何處用曰天子諸侯下管卿大夫以下便用笙管是堂下用但不知亦三終否無所考矣問盡美是説功盡善是説德曰注亦是約略如此其實功也不同征誅與揖讓自然爭差古人都是實事不似如今唱戲作偽武王陳於商郊俟天休命上帝臨汝無二爾心自是聖人本領一戎衣天下大定垂拱而天下治何嘗不盡美到底有發揚駿厲之氣與羣后德讓自别韶本是舞名故左傳季札觀樂言舞韶簫大夏大濩大武皆舞也魯國不傳聲音止存舞故夫子至齊始聞韶音盡美章不可專説聲音須兼聲容説征誅揖讓時會使然舜豈能必定揖讓武豈志於征誅哉門人嘗舉此為問朱子亦云吾著此語即謂時運也若拘泥説便呆象前輩作文多説成謂舜盡美矣又盡善也謂武盡美矣未盡善也這是説樂不是説人從樂想見其人便好從人説到樂便隔一層又子謂二字是記者槩括其辭不是子曰韶盡美矣又盡善也云云舜有臣五人章五臣十亂並舉而末忽出文王一段與此正是一意聖人言語直與天地一般以上八佾篇富與貴章兩箇不以其道得之某意皆是説由貧賤而得富貴上句若是本來富貴何云得之下句若説作不以其道得貧賤覺得語氣迂回些問適莫解曰且如無可無不可惟義是從説問主謝説為是麼曰看聖人是一串説下宋儒因佛老有打作兩截學問故如此説如克己復禮宋儒因有克己而不復禮一等人故云克己了又要復禮覺得夫子亦只一串説下看下四目只云非禮勿視聽言動勿者克己也未嘗又説復禮工夫問想是夫子時未有克己而不復禮一種學問故不説兩層曰夫子亦似知有此弊故説得如此周密曰克己又曰復禮論語著語妙不患無位患所以立像有所以立而位自致不患莫已知求為可知像有可知自然有知者豈不似有意求位求知其實人果能有所以立及可知之實自然不把位與知放在心裏且引你到那田地自有見處問曾子平常工夫非忠恕乎曰自然是恕多曰無忠做恕不出曰曾子隨事精察力行自是誠心如此然如朱子早年以為人生焉有未發時都是已發又見程子性不容説之語以為人真性藏在動靜云為之先是終身不發的此處本無功可用所以不知涵養只在日用事物上求其合理故急躁刻苦之意多而深潛從容之意少後來始見得程子不是如此説日用間豈有語而無默豈有動而無靜語時動時是已發默時靜時即是未發此處却有工夫敬以直內是也朱子前靣用功豈不本之於心却偏在用一邊想曾子當先亦是如此問一貫為忠恕無疑但文行忠信主忠信其恕乎忠恕違道不遠夫子終日教人豈至此方特呼曾子而告之且曾子不知體之一是不知忠也忠之不立則孝弟諸務豈作偽而行邪曰曾子隨事精察力行都是零碎工夫故夫子為提起頭領要看注中一理渾然四字聖人之心渾是一團天理而泛應曲當用各不同直是廓然大公物來順應曾子若平素不曾在忠恕上用功如何會知道夫子之道即忠恕忠恕即所得力之處其因呼而拈出者蓋一向知其為隨事之體至是始知其體之一耳觀夫子鄉黨一篇雖凡事都有成格然何一不本於心想曾子既聞一貫此後便心上工夫多了所謂持志主敬涵養存誠是也大約未聞一貫之先似強恕而行一貫是反身而誠一以貫之一即誠也子貢多學而識原不曾錯夫子好古敏求信而好古多聞多見何嘗不多學而識但多學而識而一以貫之耳問夫子告曾子子貢還是為他學問已將造到源頭指點他還是為他用工路頭差撥正他曰二意皆有故注中一云隨事精察而力行之但未知其體之一耳又云積學功至而亦將有得欲其知所本也問一既是誠如曾子隨事精察而力行之豈無誠意者曰自然是有誠意但未知大本大源之所在學問中原有此境界但看如今學者亦有終日用功講習躬行實踐豈必是假偽然大本大源上實不曽見得奈何所以中庸一書是道學的傳尊德性而道問學致廣大而盡精微極高明而道中庸溫故而知新敦厚以崇禮敬義夾持既要存心又要致知惟孔子是如此做到頭幾諫章注引記文諫若不入起敬起孝悅則復諫則又敬不違者正是不違父母之心俟其悅而不犯其怒耳非謂不違其幾諫之志也又引與其得罪於鄉黨州閭寧熟諫父母怒不悅而撻之流血不敢疾怨起敬起孝則勞云者正是不避熟諫之勞非專以受撻之苦為勞也從來講家將諫意入在不違句內而以勞専為受責似失注意且於不違勞字勉強自記德不孤必有鄰謂之鄰則數亦不多鳴鶴在陰幽隱之地也其子和之則非不同類也若翰音登於天則泛濫矣以上里仁篇聞一知十聞一知二當日子貢似在聰明才智上説朱子却用伊川評正蒙語斷之曰明睿所照推測而知一是從心裏照出來一是從眼前窺向去一如人在高處立下邊皆見一如在平處立對靣看見隔兩層便看不見焉得剛與焉得儉是一樣口氣言棖是欲不是剛緣他或好名或負氣外靣振刷得與剛相似故下此駁語至程子推説有欲則無剛是言外意就如器小章推説到不儉不知禮便是器小季路問事鬼神章推説事鬼神之道不外事人死之理不外於生都是言外意問山節藻棁照注説於事似濶明季黃氏將居蔡及山節藻棁二端俱作僭禮立論何如曰如此等便使朱子説錯何關大義明季人多緣此一二處便狂呼衆生最是習氣饒使是僭亦是其藏龜之室僭為山節藻棁耳未必文仲之居皆山節藻棁也注中原不害為以僭立論至因山字藻字謂文仲借此為龜遊息乃是俗儒謬解注中無是也清植狂簡兩字都有好處都有病處以狂為成章以簡為不知所裁者不穩自記匿怨而友其人病根在匿怨二字非欲人之修怨而直不友其人也如上章夷齊不念舊惡便是不匿怨處不與惡人言望望然去之便是不匿怨而友其人處此數章自微生高以後皆重在著誠去偽故繼以無憾無伐無施而以忠信卒章皆此意也自記聖賢相隔分量以為有廣狹者固非而以有待無待言之尤謬只在三無字三之字上分别自覺有憾之意而能到無憾處自覺有伐施之根而到無伐施處便是賢人地位無私之至純乎天理盡人之性盡物之性而無所容心焉則非聖人不能與於此矣以此意看程朱之説才得明白自記十室之邑節注中生知對好學言不對忠信言夫子固生知又未嘗不好學不單靠忠信以上公冶長篇榕村語録卷二

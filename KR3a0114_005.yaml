body:
  text: 榕村語録卷五大學士李光地撰上孟程朱與孟子相去分際可見不如孟子所見透而熟孟子之去孔子從氣象上分别自有間若道理上覔取竟無從見其差别問孟子比顔子何如曰孟子云姑舍是此如二程雖受學茂叔至敘道統却不及茂叔在聖賢豈有矜傲之私而言乃云爾此意殊可尋思顔子雖不見其著述施為但如視聽言動皆禮便到不踰矩動容周旋中禮田地他便直任不辭是何等力量夫子誘以文禮他便欲罷不能直是天行健不曰文禮之事已畢而曰吾才既竭立言亦大妙至雖欲從之末由也已此是何等境界孟子他日又云禹稷顔回同道其推挹可想矣聖賢學問如雞子一時不出殼到底是雞蛋惟孔子從心所欲不踰矩自己覺得快活顔子未達一間想尚未有此一日也孟子雖自任舍我其誰只是言當今之世故曰惡是何言也又曰乃所願則學孔子也煞是不敢自信只是他才識大如論不動心便令佛學粉碎蓋彼之不動是頑空是死的其中無有吾儒之不動是寂然不動感而遂通天下之故是活的其中無所不有稿字妙極長則長矣奈已枯何直從源頭絶頂處剖開指明洞中要害萬古一炬也友云孟子直見得此輩之害大而深故闢告子遂以斷佛教之根孔子未嘗顯黜伯功孟子獨云仲尼之徒無道桓文之事者又欲斷功利之根其功直與天壤不敝人都疑孟子欲王齊梁是要叛周看孟子言語得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不為是何等嚴毅由孟子之論見得天為民立君原以治安百姓非為君一家欲其富貴久長世世子孫享受也故湯武革命受命於天絶無不是處孟子直是從天立論得最上一層道理孔子議論却又低下一層為人道立萬世極更覺精密穩當故以服事為至德以武為未盡善看文王一面孜孜為民却一面於啇家可扶持處便扶持他與孔子意思一般問文王若處武王時不知如何曰只怕規模不同力量更大德器更純處得來更覺無迹些天下之朝覲訟獄謳歌羣然歸周不必觀兵商郊自致混一亦未可知大凡一件事著兩人做即心術做法一樣而各人身分所至其氣勢規模便自不同必不可強孟子竟是不曾見易平生深於詩書春秋禮經便不熟只是才大學問直溯源頭掘井見泉橫説竪説頭頭是道孔子文字尚是經體開後世文字𣲖却是孟子孔子文字無雖然轉法應用雖然處都用是故後世文字之妙至韓而極尚不如孟子韓文如百寶砌成到自然地位孟子則元氣流行無復雕琢擬議之意雞豚狗彘只供老者固是為自家養的不忍輕殺亦是體天之道處天所貴者種類便少牛馬只産一子所以太牢不輕用次之狗彘便産得多些亦不能繁所以無故不殺犬豕次之雞鴨卵生便可數十然猶有數至魚蝦之屬所産不可數計所以説魚鱉不可勝食即少者都得食矣可見聖人之制一一皆是凖之天道謹庠序之教一切都修舉申之以孝弟之義是提醒他夲心若看下句與上句一般何須重説頒白者不負戴於道路不是單説自家的父兄是説王化流行行路者皆修弟子之職孟子説見牛未見羊意理甚精凡事皆當如此如有一金在此見一友在急難中且將此濟他若算計萬一明日更有急難之友何以濟之便連當下這一金亦不用豈不耽閣萬一再有人來恰好又有則再濟之實在沒有只得罷了不可將未見面事盤算到頭也鋭峯和尚云當下該這樣便這樣不必算計昨日不這樣明日又不這樣連今日亦不必這樣却是都落空了要前後際斷孟子説交際亦是此意禦人於國門之外是顯然的自然要誅諸侯之取民是隱暗的且待教之不改而後誅都妙盡情理問不動心是立否曰在立與不惑之間孟子不動之心是活的不似告子是死的告子乃佛之至精者孟子亦闢佛之至精者告子謂儒者讀書窮理在言語文字上做工夫與心不相干其心不光明又借忠孝亷節一股氣來幫助如飲酒禦寒一樣到底不是夲來熱氣故曰不得於言勿求於心不得於心勿求於氣其論乃佛之正脈不知仁義禮智皆根於心既要誠又要明始能復心之夲體故中庸一面言至誠一面言禮儀威儀兩邊俱到心體始能完全告子所以如此者病根在不知義根於心而以義為外故也精透非常雖程朱闢佛亦説到此猶不如孟子單刀直入言簡而盡也當日蘇秦張儀孟子絶不屑挂口就是楊墨亦粗淺孟子只將其無父無君指破了人亦容易明白到告子直在身心性命上闢一邪路所以孟子費許多苦心與他反覆辨論告子勿求於心是不窮理非不持志也告子之意以為人不認得心多把言認作心而求心於言把氣認作心而求心於氣故必離二者而後識心如所謂語言道斷心行路絶者云爾自記不得於心四句今人説得告子是個呆漢了告子是要明心見性的人欲使此心空空靈靈所以不得於言便以為此是言語邊事何與於心勿求於心則心地空了不得於心便以為此正當於心中用工夫何與於氣勿求於氣則心又空了此正是近世和尚家所謂參禪入定打坐觀心者豈是冥頑的人然究歸此心空虛無用其弊必至是耳問不得於言猶言不安於心否曰是大概告子此四句是佛氏最精處不得於言勿求於心猶云如有不得於言勿認作心心自有所以為明者不在語言文字也他只要此心光明如一盞燈滿屋照耀不消逐物求見故佛家以此心為須彌柱萬古不動萬古光明問他亦有參禪悟道之説曰他參禪却不在那句話上參出道理不過將此心逼歸一處便生明耳他嫌語言支離又有時説參尋嫌氣魄無用又有時説氣力總是遁詞知其所窮在京邸時見陸稼書與人云持其志是知言無暴其氣是養氣某對其人云此誤起於陶周望文末比云蓋志不持則夲原一乖而內外遂以兩失故知告子勿求於心之説妄也不待辨也氣無暴則存主愈湛而夲末可以相資故知告子勿求於氣之説亦妄也豈誠可乎既以持志對勿求於心作反結宜乎疑持志為知言一邊事矣豈知求是尋究之義持是操守之義兩字不可同其人云然則持其志三字何根曰根在不得於心心字上來告子謂人不得於心則持守其心而已要此動蕩發揮之氣何用孟子言人固當持守其心然又離此動蕩發揮之氣不得安可暴而棄之在孟子口中原渾然只見志氣之不相離而養氣即為持志之功耳至程朱析理微密謂持志之道在敬養氣之道在集義辨論反覆見於或問甚詳雖孟子當日未必遽如此區别然敬義是學問大關節所謂學者各以其意求之則並行不悖是也復撿或問示之稼書聞之遂大以為然自記之鋭問不得於言勿求於心孟子何以置之不論曰孟子初説不可就罷了直到後面論知言處才説生於其心云云即是破此無暴其氣時講多錯大抵以置氣不管為暴不是暴字夲義暴如暴殄天物之暴謂浮動妄費也蹶趨即暴氣之一端無暴一層在養氣之前先不浮動而後可集義以養之與養氣相對看一是不要妄費一是要生息他如言語先耍禁其躁妄而後求其事理通逹心氣和平也凡事皆如此暴氣不是指告子凡人動氣時志逐之而不能自主者多矣如人家子弟不能管教任他亂撞又如騎馬不能駕馭任他奔騰一般今人説無暴謂如手容恭足容重之類理非不是但不親切此處且虛説只是説志固要緊氣亦不可不照管故下志一氣一都是説不好一邊且未説到養他的工夫今人説持其志無暴其氣謂志固不可不持氣亦是好物事不可不養不知無暴才是養氣的頭且莫説他好氣原足以纍志如責罰人此人所犯何罪吾志先定稱情行罰是持志却有臨時動氣以致過當者此時氣發却不管當初所持之志如何此豈不是氣一動志所以既要持其志又要無暴其氣此處却是説氣不好因此所以不可不養未養之氣不可暴養成了反大有用此是兩層説話如馬然未調良時有蹄齧之患既調良時足以任重致遠如兵然未訓鍊時連主將多壓制不住及訓鍊好了衝鋒破敵反大有助告子説心是心言是言氣是氣孟子説言亦是心氣亦是心無精粗無內外莫非此心莫非此理氣以粗者言之為北宫黝孟施舍之氣若精則配道義為浩然之氣上下與天地同流人都説浩然之氣能塞天地配道義王姚江獨云與天地不相似道義不相合者非浩然也便與孟子開口説難言也再言其為氣也口氣神合蓋是指浩然之氣如此非是説浩然之氣其妙如此也要歸是以理為主自記死灰是勿求諸心稿木是勿求諸氣知周萬物是知言動容周旋中禮是養氣自記告子便是佛家大教頭任後來多少闢佛之論總不及養氣一章不得於言四句是告子之學切要處至今佛家還是這個丹頭他説不得於言此何與於心勿以此而求之於心不得於心正當於心上打疊又不可求之於氣蓋落於語言文字便支離纒繞於知解之中落於綱常名教便依託假附於氣魄之內吾心夲自明何用語言文字吾心夲自定何用綱常名教孟子直搜其根曰外義惟以義為外故將語言文字綱常名教都以為外來假合的物事盡欲破除問無暴即是善養否曰不是善養便是集義無暴不過不要暴耳問暴即是勿求否曰亦不是暴是妄用此氣御之無法勿求是竟不用問先生言如子弟不管教即是暴豈不是勿求曰此如將之有兵暴氣者如役之不以其道撫之不得其情恩不足以結其心威不足以制其命以致他不用命告子是主將孤立散遣徒衆不用一卒故其勢窮蹙暴氣義襲却不是告子病今人都強𣲖在告子身上無事而正而忘而助長恰是告子勿求之説開了養氣章朱子亦只解得七分從來闢禪學中其要害搜其根底機鋒相對者無如此篇人因粗看注中冥然悍然二句以告子為一物無所見一步不能行底人果爾何敢與孟子分席爭長孟子又何須為之纍牘置辨耶不得於言四句乃是告子丹頭要看得精細彼以儒者之語言文字都是外面知解原非夲然心中所有吾心自有昭昭靈靈者要見夲來面目不消認知解為心又以儒者立氣節厲亷恥依附名教至富貴不淫貧賤不移威武不屈都屬外面粗氣魄吾心到得定時方且離四大空五藴撒手遊行尚何富貴貧賤威武之可言故於心有不安處只當加功於心不必求助於外面氣魄上二句即禪家明心之説下二句即禪家空心之説一是破儒家的語言文字一是破儒家的忠孝亷節他見得孟子學問路頭錯處在此此處看得粗便看得孟子闢之之言亦不精矣不得於心却不由於氣氣無義理故也不得於言必須求於心言即義理所在故也故孟子言以二者相較其可不可微有重輕然其實氣亦烏可勿求如欲訪一友便足力生忘路之遠近若心不欲往便筋疲力倦氣與心豈不相關者如此看來心與氣正是相資相助如何可以置之所謂義襲而取乃是如今人借一公事憤激壯往一般告子以孟子的氣魄正是這樣故孟子言其為氣也如此其為氣也如此是乃集義而生者非是義襲而取者如言我記的書是讀得多遍自然精熟者非是偶然強記而得之者是孟子自白語緊對告子意見不是教人不可義襲也是非二字如此才明何以見得非義襲而取你看行有不慊於心則餒矣告子以氣可襲取總緣以義為外之故若知義之在內則知氣可集而生不可襲而取矣我故曰告子未嘗知義以其外之也一路搜根至此直抉出告子病痛源頭至緊至切處若如今解却似義襲句不過是帶出如順手敲擊一下而已何關痛癢至下節注以為養氣之節度亦似未然看來此節乃是他不動心底工夫欲心不動必以集義為事不可驟期其不動心但當勿忘其所有事循序有常不可欲速而助之長助長雖似長得較易而不知其苖已稿矣告子先孟子不動心而適成為死而無用之心孟子之不動雖若稍遲却為生生不窮之心者以此稿字對針不動心豫助苖長緊對先我不動心佛氏之心清淨寂滅了無用處吾儒之心寂然不動感而遂通天下之故至天地位萬物育總是一團生意闢佛之精透無過於此如今人以集義所生為孟子義襲而取為告子又以告子為正而助長的而以無事而忘為另一種人金正希想到告子外義決不襲義勿求氣決不取氣乃云告子雖不義襲而取其實與這樣人同歸是義襲而取乃吾儒告子之外别有這一種人與如今所説無事而忘的人一般豈知此兩節口氣在是字非字必字勿字因異端説孟子是義襲而取故孟子自白是氣也乃集義自然而生的不是託義之名迹掩襲而取的行不合於義便不慊於心則氣餒義豈在外者乎必有事焉亦不是説養氣節度是説不動心之道告子勿求於氣如何肯在氣上用著正助忘與助長是一個人不是兩個人告子在心上用功似不可説他無事然不以集義為事便是無事他用功於心曷曾一刻忘然却念了集義了四句皆對告子以為無益而舍之如今人説以苖為無益而舍之文理説不去蓋云以耘苖為無益也非徒無益言非徒無益於苗也問告子勿求於氣正謂氣是義襲而取的於心無涉所以勿求孟子義襲而取句正是對針勿求於氣曰然問知言工夫包在集義內所以知言不用詳説曰糊塗人如何集義問心裏不明白亦難説慊心曰然異端操持此心曷嘗不是根夲工夫只是少了一邊也吾儒戒愼恐懼是根夲工夫却不曾少却學問一邊所以某説中庸下半部是破異端最切緊處至誠是説根夲至聖便説禮儀威儀尊德性又要道問學是集義所生者非義襲而取之也是字非字必有事焉而勿正心勿忘勿助長必字勿字俱是緊對告子辨折口氣緣告子心疑儒者為義襲故孟子辨之謂吾之養氣是如此不是如此緣告子外義而先我不動心是有助長之病故孟子折之謂人之事心當如此不當如此然則告子固未嘗集義亦並未嘗義襲何則彼既外義則賤義而不復以義攖心故也其所以助長而能不動其心者是從強制其心中來不從義襲中來義襲者襲氣也告子既勿求氣矣而又安肯襲之故謂助長為另指一般人則可若謂即指告子也者則其所以助之之病與上節襲義不同明矣必有事焉亦只宜泛説心學集義養氣四字俱在必有事焉四字內見若指定是養氣節度則告子非有事於氣者又豈肯助之長文意亦礙矣自記集義節人都説成必集義以生之勿襲義而取之以襲義而取為是告子不知告子勿求於氣又以義為外豈肯襲義又安肯取氣此是告子不認義為內見孟子事事必求合義便謂此是用在外之義襲取在外之氣孟子辨之言吾是如此非如彼與告子絶無相干後來陸子靜亦以襲義詬朱子朱子辨之曰孟子夲文原是義襲所襲者是氣如今所言却是襲義了今人又以集為事事而集襲為襲取一義不知大旨都不在此告子以義為外即使百行萬事盡都是義亦是義襲而取亦是無與於心其病處却在義字不在襲字若是襲義却有何病如人義存於心或因讀書觸發方動出來不可謂非由中之義至行有不慊於心却因義襲而取説錯了遂以為襲義則不慊於心不慊於心則氣餒此意與義外絶不相對遂令下文告子一轉皆無著落此正是明義之在內言所行一不合義便不慊於心而氣餒豈得以義為外乎告子始終以義為外我平日以告子為不知義正坐此耳清植義內義外是二家心學不同之根因外義故并言與氣而外之而但守其空虛無用之心此告子論性與此章之言相為表裏處也外義則不集義而無以養氣且外義則不窮理而無以知言皆是一串病痛自記義襲而取注中言一事偶合於義似未穩假如忠臣孝子平常未嘗有學問工夫忽然感激而成忠孝此一事便配道義非襲取也養氣章是從來所無必有事焉數語説得更親切天地氣化事物生息理皆如此必有事焉在那裏只是做勿正且莫要管效驗如何心勿忘只是心在這裏勿助長莫因效驗不來便助長譬喻更妙就如苖日夜滋息到成熟時自然結果此是孟子説出火候差一息亦強不來只要不斷該文火用文火該武火用武火工夫既到他倐然會變化必有事焉而勿正心勿忘勿助凡事皆當如此如做一事必定晝夜以此為事不可著急不可間斷又不可硬幫上去天地不教人憾便不是天地堯舜若不猶病便不是堯舜天地只見得不足所以不已至誠只見得不足所以無息助長就是他忘了佛家立地要成聖果却是為何便是求住手聖人只是日有孳孳斃而後已故曰悠也久也又曰純亦不已如今都説舍之而不耘不過是不用工無益而已還有苖在揠而助長則苖受其害而稿矣語氣重在助長上其實不然正而助長即因無事而忘也告子便是要一無所事心齋坐忘惟其如此所以要心不動便是正先我不動心先字便見他助長無事即是清淨寂滅忘即是一切放下乃是病根以宋人譬極妙宋人看得糞培水灌都是將外邊物事強相滋益何如就他夲身用功即刻便長正對告子稿字尤妙長則長矣却是稿了你看千餘年來可有一個和尚能把天下治理一番否他的心全不活動所以枯而無用養氣章鄙見與時講頗異者三告子兩個勿求求字要活看蓋謂不得於言即是言邊事耳不可誤認作心不得於心即是心裏事不可誤認作氣其辨心夲至精故有所謂似是之非彌近理而大亂正也若如時講其説大假粗淺不煩孟子深辨矣是集義所生兩句是别白吾浩然之氣乃是集義於中生的不是行義於外襲取底緣告子們是外義外氣之人中懷此疑故破之觀是非兩字可見若如時講却不是闢告子又須闢一項人矣必有事節便與外義集義緊相關正是説做不動心工夫處集義養氣而心自然不動便是勿忘勿助外義而強制其心便是忘助助長之病在心不在氣如時講云助氣長則告子非是欲養氣者此喻又是為一等人發藥不中告子膏肓矣自記四者之病以漸而深詖辭之蔽如於正路上有偏側却未入别徑淫辭之陷則出入於旁蹊岐路之中矣然於正道猶出入也邪辭之離則舍康莊遵險隘去而不返遁辭之窮則迷入荆棘泥淖困於無所止息而逃者矣自記詖淫邪遁蔽陷離窮四項要認得確如走路然詖是正道上歪些淫是漫到小路上去邪便另入曲巷别為一路遁是無路可走蔽是見不明緣不明所以走得歪了陷便見得那一路上有些趣走過那一邊去離是居然見得那一路好反説正路不是窮便覺得行不去茫無所見不知所歸王陽明就是這樣他夲講正路學問初間歪向那邊去漸漸攙入些佛家話漸漸竟説那一路好到後來説不去便撒謊著朱子晚年定論亦窮矣至於窮便又繞到這邊來回護遮掩所謂窮則變也孟子書下的字眼無不確當所以為經智故不厭不厭而智大矣仁故不倦不倦而仁廣矣自記養氣章向來説得逐節逐句文義近來通章都看得有照應向來説養氣便似與知言無涉説知言便似與養氣無涉後半論冉閔夷尹等節不過是推尊孔子自結出學問從來處近看得此章知言要緊大旨與集大成章相表裏知言是智之事養氣是聖之事前面不得於心勿求於氣可不得於言勿求於心不可便已定一篇之案曾子節已提出夫子兩縮字即直養直便是義集義必由於精義便是知言養氣工夫全由知言勿求於氣可者心是氣之夲只求之心還可勿求於言不可者理乂是心之夲所以不求之心斷然不可告子未嘗知義知義即知言也必有事焉而勿忘即精義集義之事也如今只説詖淫邪遁一節是説知言並不曽説知言工夫其實下面公孫丑問善言德行德即貼生於其心行即貼害於其事孟子説孔子學不厭教不倦知言工夫不能外此夷尹之治亂進退聖之事居多故曰皆古聖人孔子之仕止久速便是智聖之事兼故曰願學孔子得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不為養氣事也聖之事也故曰是則同見其禮而知其政聞其樂而知其德由百世之後等百世之王莫之能違是説夫子如此知言事也智之事也故曰自生民以來未有夫子此章脈絡聫貫處甚妙人皆有不忍人之心人字宜著眼不然便只是不忍之心何為加一人字禽獸草木從此心推出雖皆愛之必竟人是同類尤見親切故下引孺子入井亦在人上説禽獸之形多偏故其性亦不全凡孟子言人性情處人字皆須重讀故曰異於禽獸者幾希下部富歲章論足口耳目相似便是此章有四體義疏也禹拜昌言亦所謂舍已從人取諸人以為善也而舜有大焉者其根全在善與人同四字蓋忘其孰為人孰為我也此中分際甚微惟孟子能辨别得出自記取於人以為善是與人為善者也一些不錯大聖有大聖的與人為善就是平常人亦有平常人的與人為善某少時見人一篇好文字或有一二處好或有一二句好便舍不得反覆閲之到得他忘了某尚記得他便狂喜立時化去許多矜誇好勝之氣夫子稱舜好問好察隱惡揚善執兩用中孟子説舜自耕稼陶漁以至為帝無非取於人者聞一善言見一善行若決江河可見舜總是如此然皆由於明若不知道是善如何取人所以好問好察等項總貫在大智內觀坐而言不應隱几而臥及尹士聞之曰士誠小人也此等處知七篇非孟子自作問退而有去志又曰豈舍王哉何也曰見得不足與行王道故要去看得還有指望所以不舍忠臣孝子之心皆如此如父母有病看得是不能起然有一分指望自還在那裏盡人事是一定的朱子解孟子多以孟子不甚留心典故遂依樣解去如夏曰校殷曰序周曰庠以庠字為鄉學名考之於經則周時校序甚多不獨有庠也記云家有孰黨有庠術有序術即州也以子産不毁鄉校觀之則鄉有校孰在家小甚不足數五百家為黨則人家稍多五黨為州更大於黨五州為鄉又大於州蓋教化之興自上而下而漸密自大而小而漸多夏之時國學之外又立學於鄉而校名殷則並州亦有序矣其鄉之有校可知至周雖黨亦有庠則州有序鄉有校更可知非夏殷周各有一名而不相兼也庠則去家不逺修子弟之職為宜州則主於志正體直比禮比樂以將上薦故習之也鄉則一切教法俱備以將升之國學與元子適子卿大夫之子為伍故也立太學以教於國設庠序以化於邑董子雖言之而莫行也故在漢代辟雍太學之制博士弟子員之設僅於京師而已自後天下州邑亦徒廟事孔子而無學宋之中世始詔天下有州者皆得立學而縣之學士滿二百人者始得為之少則不能中律今荒州僻縣無不設之學矣意三代相承亦如此孟子夏校殷序周庠之言必有所據自記問勞之來之數句通作教人説似復若以勞來對柔惡一種人説匡直對剛惡一種人説輔翼對得中一種人説如洪範所列沈潛高明平康正直三項如何曰不須如此此數句隨便教人皆離不得即如教小學生先要使他歡喜去讀書不要使他拘囚困苦這是勞之來之他如何能一律馴謹萬一有走作只得夾持起來便是匡之直之已經上路自己走不通時要幫助他所謂輔之翼之下二句却是火候節奏不要急切慢慢的俟他工夫自到所謂使自得之一向懈怠去又不是須時常提醒警動使他振作便是又從而振德之道家所云文武火使自得是用慢火振德是用大火平常解勞之來之五句都説勞來匡直皆所以輔之翼之而使自得之至又從而振德之一句另説非是其人之志於善者則勞之來之其人之岐於惡者則匡之直之其人之有志於善而力量不及者則輔之翼之其人用工而火候未到者急促無用反致有害到要從容和緩俟其自得之自得句甚似易文言於學聚問辨之下再著寬居一句亦有工夫不是説上幾項皆欲其自得之也使字力氣不要裝在上幾個之字內聖人於此精神都在裏面運用工夫久了恐懈怠又深微處更難雖聖賢亦耍提撕警覺再加猛勇精進所以説又從而振德之就是我們自己工夫亦有這幾樣既知用工有人勞之來之便更鼓舞或有不是處不能自覺須有人匡之直之方好改過到得力量困憊須有人輔之翼之到得入不進上不去却須寬緩令其自得火候差一分憑你勉強亦是無用參同契所謂中間要文火也到得成功時更須猛鋭大略亦是一樣謂之無名謂之不與則似乎無所用其心者故反駁一語云豈無所用其心哉直所憂者大自然足以致無為之理若耕則無所事焉耳自記掘地而注海者決九川距四海也由是泛濫中國之水皆由地中行而為江淮河漢所謂濬畎澮距川也驅蛇龍者先除水害也由是交於中國之鳥獸皆與險阻俱消伯益所以繼禹而若豫上下草木鳥獸也治水則先下而後上去害則先重而後輕自記知我者是樂道堯舜之道者也罪我者是亂臣賊子禁其欲而不得肆者也講家但以疑假南面之權為罪我却不緊對亂賊一般人説如此則夫子自道及孟子稱述有何意味蓋夫子之意以為我此書當見知於後之君子但不免得罪亂賊耳孟子述之亦是重在此意故下云作春秋而亂臣賊子懼也注引文定春秋序最明自記王守溪周公兼夷狄一假文佳處尤在用意深厚是聖人使人物各得其所氣象不是以兼驅為武功之競也如兼夷狄兼其害百姓者也人以為敲動下句百姓耳要知周公於夷狄猛獸不是盡兼之驅之如彼遁於要荒屏於山林何煩兼驅之有惟其猾夏逼人有害我百姓者則不容已於兼驅也此義明而窮武禽荒者不得以周公藉口矣自記丁丑墨皆言欲正人心須息邪説不但倒却題語且未有不從人心發明匡正而邪説可息者詖行淫辭亦是如此但要正人心以息邪説又須就邪説痛與剖駁然後人心之蔽者可開此所以不能巳於辨也自記榕村語録卷五

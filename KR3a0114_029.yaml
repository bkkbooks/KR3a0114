body:
  text: 榕村語録卷二十九大學士李光地撰詩文一古文詩想皆起自臯陶臯陶謨是自作一篇文字明良之歌亦自皋陶始韓文公一肚皮好道理恰宜於文發之杜工部一肚皮好性情恰宜於詩發之所以各登峯造極詩文各人都有壓卷韓文如原道佛骨表與孟尚書書之類杜詩如北征詠懷壯遊之類山谷元章書後代並稱而兩人各相詆訾山谷服東坡文與書而謂其詩不古然所自為亦未見其能古也元章以山谷書撑手拄腳其詩亦然大約是雕刻字句故致如此要到意足氣足才好栁文尚不能到此倫云王荆公亦有此病曰荆公東坡還不可以此論又當論其意荆公取意澀東坡取意溜澀與溜皆有病惟理足意足而氣亦足澀不得溜不得多一些不得少一些不得斯為至矣班馬之文曹杜之詩是也文章與氣運相關一毫不爽唐憲宗有幾年太平便有韓栁李習之諸人宋真仁間便生歐曾王蘇明代之治只推成𢎞而時文之好無過此時者至萬厯壬辰後便氣調促急又其後則鬼怪百出矣某嘗有一譬春夏秋冬氣候之小者也治亂興亡氣運之大者也蟲鳥草木至微細矣然春氣一到禽鳥便能懷我好音聲皆和悅秋氣一到蛩吟蟲響凄凉哀厲至草木之榮落尤顯而易見者况人為萬物之靈豈反不與氣運相關所以一畨太平文章天然自變如戰國文字都是一團詐僞不知何以至漢便出賈董馬班至唐詩之變六朝宋文之變五代皆然若周程之道學韓栁之文李杜之詩皆是中興時起力量甚大總之其人在廟堂者即關氣運至孤另的便不相干如晚秋之菊寒冬之松柏不關氣候是其物性如大亂之時忽然生一聖賢乃天以此度下一個種子恐怕斷了的意思如今人學詩文動說歐公白傅二公的詩體文體學不得天才學問都比不得他只是學他平調他都是讀破萬卷書就是音節之間如何能到得他地位詩文須常做當其做時何嘗不得意過幾時又覺得不好便是進益然得意一層亦不可少發憤忘食樂以忘憂若只發憤而無樂亦太辛苦一番發憤一番樂循環不已便㑹到極處詩文從生做到熟從熟又做到生後來讀去覺得像不順便是有工夫詩文鄙俚固不好太文又不像文字之始都是古人說話有意要文便不是詩文用雪白字隨便字都不妨總要切合切合便有情景有情景便有生氣詩中字又不是以全然貼實為切合不甚貼而卻合方妙須求自得於心不是要人呌好看文章如看堪輿山川有一段秀氣便要發人文章有一段秀氣便有成就此却在牝牡驪黃之外昌黎居潮子厚居永栁皆有政績然昌黎在潮詩文依然肅穆平寬子厚永栁諸作便不免辛酸悽苦其後昌黎饗用不窮而桞竟卒於貶所可悟文章氣象之間關人祿命清植詩文派頭斷絶久了如今且莫評論他是唐是宋且字字核實說這人是這箇人稱情稱事不過分量才好論他風骨之髙學問之深不然無從論起不是不要風骨學問如一般銅器必竟有幾片朱砂翡翠瘢㸃方可耐人摩挲只是詩文之本不在此且此事要推到志向上去韓栁歐陽諸人都有自命不凡的意思有此一段才有些光景氣魄以上總論道德經好用三字句竟似後世道士聲口可厭之甚論語中用三字句如又何怨又焉貪言中倫行中慮身中清廢中權皆妙全然不覺大抵文章到洙泗真是雅之至孟子雖是絶調畢竟帶機鋒先君云孟子前文章不曽用雖然二字果然以前語氣厚至孟子則轉折分明矣先儒以禮記為漢人文字恐未必盡然禮記尚無雖然字尚是大學中庸文體朱子生性至剛而作古文詩辭却不能超然於風氣之外想文章道德巍然千古都是命於帝庭雖上智大賢氣亦偏鍾於所長看來文章亦是孔子絶頂不似戰國風氣亦不似周公之舊却另一種雪白文字不要一字幫貼自然道理完足聖賢經書叠句都有層次謂錯舉者非也即我輩文字亦必排比先後淺深况聖賢乎其看不出層次者只是心粗耳禮記或有後人作者便當分别觀之韓文連下句處多有意所謂六經之風絶而復新古大家文力大於身所見髙無起不收無呼不應即有一股放空如天外别峯亦必有緣故選文惟從漢起最乾淨近選多把左國都收入却不妥大抵三代以上文當另作一類讀之索性以漢為斷只是昌國報惠王信陵上魏王二書割捨不得想來有一法將此二篇收入史記選內便無遺憾矣仲舒三策皆面對文字非才大學富道理精熟安能一筆寫出而字字醇確匡衡文亦好但朱子言其似策段不是胸中流出細看果有些像朱子評論古人不差銖黍古人自當讀漢文亦是彼時風氣厚自然風調不同即三國李興代劉𢎞祭武侯文陳夀上諸葛文集表後世惟韓栁王幾幾能之然亦須極得意作至武侯正議栁王不能也諌絶孫權雖蘇張無此辨幾句便盡情勢曹子建才大其文都像一口氣噴出韓文要追復三代轉有斧鑿之意司馬子長便一氣吐出子長孟堅乃文家不祧之祖潘勖為曹操加九錫文此武侯所謂奉進歡兜滔天之辭也有友故為􅀈韆之論極口贊佳却是亂道即如曹操所與羣下教甚古篇中亦未必無實話却選他不得試看伊周何嘗不退位豈慮有他選詩文若無此决斷便可不選不論其人與理而徒取其詞則不勝選矣惟史書又是一例欲以見善惡興敗之由故槩載之曹操自叙令文字甚好詩亦有佳者但幾番徘徊卒置之他比不得桞子厚王荆公二人只是錯誤執拗耳非亂臣賊子也曹丕詩文竟是婦人軟得不成話論古人當有分别如王維鄭䖍雖杜工部朋友厚道為之表暴其實皆已被祿山所汚若太白却不同永王璘是唐之宗支彼時明皇已走宗社無主永王有恢復之志與叛逆豈可同日而語武侯不知所讀何書識見作用規模氣象都是三代聖賢光景即其文字絶不似東漢出師表正議諫絶孫權書才幾句說事理是如何透曹子建氣魄甚大但比之武侯便是文人之文不脫華藻武侯出師表自肺腑流出即以文章論亦居最頂惟韓子最頂文字方能到他地位如佛骨表與孟尚書書是也此等皆當另一格視之韓子學那樣文字便過之進學解好似客難解嘲諸作書張中丞傳後好似史遷惟原道是學大學中庸却不及要亦精矣如栁子厚王荆公必不能為出師表文字三蘇惟東坡天姿髙推服出師表老泉子由皆譏貶武侯去之尚逺故也問武侯答李嚴書言雖十命可受自來無十命之事即此一言便可想見其未出草廬時確然有天子不得臣之志又可見使其功業有成如伊尹之復政告歸固所優為曰然清植韓文公口中不提起江都武侯故知其單留心於文字朱子於武侯外便稱陸宣公昌黎出宣公之門等閒並不道及想嫌其文排悶也宣公在軍中恁樣處置得停當才大心細其奏議語語俱是實理實事學問又海涵地負只是排體不高古耳文人中如陸宣公韓文公儘有實用知古却又通今看宣公奏議雖根本於經書而處置都合機宜韓公論淮西黃家賊及復讐禘祫等議皆確中事理問王荆公文字看得出他能壞天下否曰看得出他作文字見有人與他意思相同者即便毁稿此便是大病我有此說方不敢自信有人相同正可為證佐為何削去某分原道段落自以為獨見及見張長史亦如此分更喜所見之不謬也古文近頗知其作法但不暇做工夫問如何曰其本自然要以經書道理為主文字却不要規摹那一家教人看得似那一家便非其至短者要有意思長者要有裁剪栁州與楊誨之說車書凡數千言字字琢鍊又是一氣流出連虛字要換他一箇亦不得即寒溫語皆妙大都韓栁動筆即一兩行都是留意無茍作者到後信筆寫來無不入妙又字眼亦要緊當取材於兩漢若字眼不古雅文字便減色古文內著不得工麗對句古詩對句太多亦六朝始然唐初尚襲其餘習至工部始洗脫得唐人書佛經真跡筆筆著力曰古今人差處就在此若不用力雖千行萬字總無足取試將韓栁文字於極不要緊處拈出一句看來總有斤兩可見其字字經意今人連篇纍牘隨手寫可謂不誠無物錫因論古物與今物别處只是茍且與不茍且梅先生曰古人諸物都是從內裡邉做出來的栁子敘事學史漢便是史漢韓子不肯學史漢髙於史漢張中丞傳後敘亦倣伯夷等傳體而詞調風格毫不步趨段太尉逸事狀居然是孟堅極得意文字栁集中載與退之詩文甚多退之豈無酬答今不復見殆自削其稿耳子厚臨歿托夢得為求退之作志及退之許諾夢得喜不自勝至迎其柩而告慰之子厚固知其作志必不假借然傳於千載無疑也退之與劉書稱子厚文雄深雅健似司馬子長夢得言之今韓集亦無此原性起兩句極精程子曰心如穀種其生之理為性其陽氣之發則情也故性字從心從生言生理之與生俱生者也情字從心從青如草木之萌芽初發感於物而生者也自記原性本甚精其不足處不在認錯孟子性善之㫖只在末後少兩三行文字把其所以為性者五發揮明白不二過論末一段語都有條理不是亂填原性言仁義禮智信原道只言仁義以仁義包五常也二篇著作之先後可見自記原道通篇排釋老而首論老氏之失極是髙處蓋佛書多是華人附益大率原於老子之指而淫於莊列之幻詞故後漢書新唐詩皆探本老氏論之自記古人文字難看原道連程朱亦看不透程子謂從博愛說起沒有頭腦不知他已有原性了若復從性上說起非原道也喜怒哀樂之未發只是大本發而皆中節乃是達道原道自當從發處說朱子說他引大學漏了格物致知為不知學不知他引此正對佛教所以下面斷一語今也欲治其心而外天下國家引到格致便與佛不對針欲治其心而外天下國家一語甚精洞中其弊汝楫云原毁不過是題目有箇原字門人便編做一處其實韓子未嘗以此與性道並原也曰原鬼亦是感觸而作故云適丁民之有是時也元都是門人彚在一處的有謂原道開口一句便不穩當仁自是心之德愛之理如何曰博愛之謂仁某答之曰仁是性他原性已講過了這是原道原性是說天命之謂性原道是說率性之謂道故云博愛與行而宜之相對今日翻韓文果是才大如復讐禘祫黃家賊平淮西事宜與栁中丞論兵佛骨表與孟尚書書之類洗刷得一箇閒字沒有事理直說箇透馬班尚是漢文此則洙泗之派也惟武侯雖不學文而所傳數篇皆然愈讀愈有味因他人品髙胸中有許多真意思真見解氣又完全直寫出來便自不同凡詩文書翰之類若務為名家積纍工夫自然可到若要登峯造極直須第一流人龍噓氣成雲一首寄托至深取類至廣精而言之則如道義之生氣德行之發為事業文章皆是也大而言之則如君臣之遇合朋友之應求聖人之風興起於百世之下皆是也自記作文章熟後雖無意寫出必有結搆有呼應如韓子讀儀禮一篇首兩句是反起一篇意中間說無用於今而聖人之制度不可泯沒是照應第二句意而結完之後言掇其大要竒辭奧㫖以備覽觀而已是照應第一句意而結完之末歎恨不得生及其時則兩意俱結也自記每疑韓公說唐初羣臣材識不逺然當時有太史令傅奕可謂特立排佛者韓子何以無取及觀奕傳則其垂訓也惟重老氏以列於名教之首末乃毆佛得其一而昧其二矣宜乎韓公之所輕也自記觀韓子論禮典兵刑處豈可以文學之科限之其老練精核逺侔武侯近比宣公自記宋人論程伊川曰三代以下凡事必求其是者伊川一人而已伊川之門上蔡謝氏則以求是二字為窮理之要韓子以求是論文此其所以獨出於諸家歟自記孔子之道德不可贊也故韓子作處州廟碑贊其祀典之盛以推夫所謂生民未有者極為得體栁子厚作廟碑亦曰茍贊其道如譽天地之大褒日月之明非愚則惑不可犯也皆深得後學敬愼之意自記平淮西碑自九年至十二年惟首尾見年月中間許多事而年月悉不書一則諱淹時之久一則略諸將之無功也自記維時河北方跋扈不朝董邵南不得志於有司而適斯土是何意哉故韓子微言諷之獨弔望諸君者望諸君失意出奔終身不敢謀人之奴𨽻也與送李端公命意大略相似自記觀答侯生書則韓公真善注解書者惜乎其論語注未就而不傳也今有傳者蓋僞作耳自記韓文言物不得其平則鳴其意以為有動於中則鳴耳而以為不得其平殊不確其下有五臣䕫等如何說不得其平又說䕫不能以文詞鳴以韶鳴殊可笑便是文人趁筆之習至說六朝文章之病字字確切此公於文章一事當行也問韓文公云醇而後肆肆是工夫是天分曰自是工夫理明白了然後能放筆言之如東坡便是肆而不醇就他的話亦說得一片只是推敲起來不勝病痛文章要曲用曲筆便似其中林巒澗壑不可窺測惟韓文公㑹作直文章以所見道理足本色已深厚韓文選定七十一篇若再去其有疏漏者十許篇存六十許篇真是文宗其氣極古雅如西漢人而又無其纍墜只原性一篇有不盡當處然却去不得要以他壓卷若去此則原道無根矣某選韓文許多精竒瑋麗者俱不登然凡昌黎之粹然一出於正有體有用確可見之行事而有補於世者盡此矣其他或有病痛或無關輕重隨人自去揀讀問選韓文甚少送董邵南序何為入選曰聞得友人說當時不得志者往河北都是要從亂賊故此文弔望諸君為其不忘燕也此關係忠孝豈容不録凡文字有寄托者便好答李翊書亦好但太似自己一生學問供狀為賢者諱故去之昌黎時在字句上留意其後門人衍成惡派如皇甫湜等故意將下一字移上上一字移下欲以見古再傳至杜牧等句幾不可讀矣栁子厚記韓文公論天一假甚翩躚雖是偶然戲語亦可見其不知天天地萬古不歇止是生物而生物之中又是以人為主凡禽獸草木無不愛其子者至人一生經營無非為子生子又要克家天地之意猶是也若凶殘貪惡之人乃是種子自生蠧與天地無干所以有太極西銘諸書此理始明白栁文精金美玉獨識見議論未若漢書之精當子厚之文亞於孟堅退之之文過於子長韓文直追周其質直處正是其髙處看來古文詩俱到家者惟陳思栁州耳韓便文好於詩栁州文字莫要論其道理意思何如只就其文論雖千餘言要刪他一箇虛字不得劉蛻孫樵數家雖皆小品不無可觀就中孫樵又為差勝文字扯長起於宋人長便薄太公丹書行幾多大禮說出來才只四句箕子洪範三才俱備才只一千零四十三字老子道德經不知講出他的多少道理才只五千言宋人一篇䇿便要萬言是何意思文只要簡淨蹲㳫拖曳皆詞之纍韓文簡潔如此三蘇則專事虛翻而已至南宋一味冗長若非理足者有何意味鍾旺歐蘇之文何嘗不好然見解不甚透自是本領差說事說理皆不透韓栁便透如復讐議栁已凌牙厲齒言之鑿鑿韓就理論之更明而盡朱子文字何嘗能到馬班韓栁但理足便覺得任他才學筆力馳騁藻耀都壓他不下如封建論孟堅之雄博子厚之精悍一遇朱子平淡說來足令二公失色伊川不以文名今看來兩漢之文也所上諸劄子春秋序道理既足字字確實有斤兩比朱子文字更古古文自史漢後只讀韓栁曾王便足曾王學問如何能過韓栁韓栁遇一通經守師說之人那樣推服愧赧曾王便輕肆譏彈王守溪評文謂昌黎後惟半山得宗派不數歐蘇最有識見東坡文亦有好的只是薄大凡浮動囂張處便薄歐文微弱最是曾子固厚王荆公氣亦强文亦古但深求之却是學成的不是本來如是作古文要歸於真實不爾心先不古文何能古東坡作韓文公廟碑便稱其揮斥佛老之功張皇誇大及作大悲閣諸浮圖記又稱佛之妙窮天極地却是一口兩舌其歸談儒儒亦不精談禪禪亦不精只落得要做好文章卒至文章亦不好所以聖人說修辭立其誠東坡文字大約帶澀的便好飄飄欲仙者便不佳其小文字極妙盛稱其䇿論者不知文者也議論既博雜筆力又冗弱何足取至彈劾程子而以為姦豈不荒唐可笑即謂王荆公姦人亦不服作文要一意到底有結搆說到後來還與起處相照東坡潮州韓文公廟碑頭腦太大下正當發揮其排斥異端獨力自任之艱苦却接云談笑而麾之便不的當是東坡風度矣至開衡山之雲馴鰐魚之暴等句益沒緊要下面一路說開去遂以立廟結不復照顧起處矣文章有立言之體東坡才既髙功夫亦深只是道理不正當武王何嘗無可議處只武王非聖人也一句便令人不欲看你非聖人何由硬下此句你即聖人亦如此說不得孔子生平贊聖人總不肯說煞動云也與都是想像未定語為文有本有末所謂本非必定是聖賢道理本人所見透處便是本蘇明允所說多非正道却有透處便是他的本次公文字鋪張似有得說收緊來却無實際所以不如東坡陳后山張文潛二朝文字皆好黃山谷有孫樵輩風氣但太破碎蘇不如韓然其門下士如此數公恐自不亞韓門陸象山文字筆力爽透象山文學王半山朱子文學曾南豐只因學道便住手故都未成記得某人說學古文須從朱子起此言却好看朱子後來文字不似其少作有古文氣調朱子正不欲其似古文也只是一句有一句事理即叠下數語皆有叠下數語著落一字不肯落空入手作文須得如此古人作書如司馬通鑑朱子綱目皆藉朋友生徒之力想杜佑通典亦然今人動欲成以一人之手其無成也必矣諸葛公木牛流馬鑄甲造弩諸事皆假人為之能用人便是才大漢有董子及劉子政鄭康成唐有韓昌黎宋有周程張朱明二百餘年全不出人想因靖難搜窮種類而胡廣楊榮金幼孜皆迎降無恥之輩歷相多年士氣遂盡試看其一代所傳著述可與董劉韓比並者為誰即今顧亭林之音學梅定九之算學亦明朝所未有徐文定之崇禎厯書尚是西洋人作算不得徐氏之書梅顧二書是中庸裡邉有的一是車同軌所資一是書同文所資宋潛溪方正學輩文字亦佳要選如曾王名篇者了不可得即老泉子由亦有精采有明一代人皆無之看歸震川王道思古文拖㳫說去又不明白兩三行可了者千餘言尚不了令人氣悶顧寧人說明文不如元果然當明季時如李贄之焚書藏書怪亂不經即黃石齊的著作亦是雜博欺人其時長老多好此種却將周程張朱之書譏笑以為事事都是宋人壞却惟先君性篤好之王弇州古文一時風靡先君以為村氣甚妙後來聞得人人皆以為不好大凡那一書古今來都推奬過只我一人不服便當想自己的錯處若是人人都呌不好便就不錯了一面好古一面又要擇善而從看古文亦當如此萬季野於明文推宋金華黃梨洲而以黃為更好其實黃何能比宋宋尚能造句至黃議論之偏駁粗淺又無論矣友云泰州人但知有王心齊不知有儲柴墟柴墟古文甚溫雅無虛套當時學者自然首推蔡介夫其次只得算王伯安然同時人初未論定而柴墟獨兩屈指推服其送介夫歸序甚好即此已見其具眼曰文章品題各人意異某以為惟字字與之核實其自肺腑中流出有關係者便佳如海忠介諌世宗疏陳紫峯易經著述序調雖不古皆由中之盛氣坌涌而出自是可存做古文這件事想是與學道相似自歐曾王蘇後亦斷了六七百年問先生何不繼續此事曰見得到那裡只是須要工夫心裏覺得於經書上明白一㸃是一㸃受用比文章又要緊些問韓文公亦見道曰他便是被花草牽纍了不爾專心併力到道理經書上當又自不同問某人古文如何曰雖提得起筆但是向外走的學問此派傳衍已久尚未見傑出有人不但儒先為性命之學者不爾即韓栁歐曾蘇王之學亦不爾方做得幾篇文字出韓文公非三代兩漢之書不敢觀非不能觀不敢也下句非聖人之志不敢存略大些然實是立志如此韓文公如此志向如此讀書所成就尚貽儒宗訾議大要從初讀書時意向是如何成就便是如何佛家所以說證甚麼因便結甚麼果古人終身不得幾篇好文字著一書便竭畢生精力今人動輒成集不數月便成一書如何得好作古文要曲折學古文須先學作論蓋判斷事理如審官司必四面八方都折倒他方可定案如此則周周折折都要想到有一處不到便成罅漏久之不知不覺意思層叠不求深厚自然深厚今倣古文者多從傳志學起却不是某友看古文不從議論文字入手先讀碑板文字亦是一病所為文亦長於碑板若叙事文便不出色學文自當先教議論暢達逐漸縮斂方佳如今看小學生文其下筆論頭汨汨不休者便有成若短短粗通雖有些筆意思路到底有限墓志只該志其姓氏卒葬而已謾誇虛譽無當也且此等斷不傳鬼神亦不許顔子並無著述只孔子誇他幾句四書存他幾句萬古不磨武侯不立史官到得陳夀作志蜀並無文字可采所以蜀志獨少然由今觀之魏吳二志大率虛浮蜀志雖不多是何等光焰所以人貴實事做古文只要不說謊聖賢雖於父母亦不虛加一語加以虛譽人必指而笑之是貽父母羞辱也且稱人曷必全備如孝德之本也孔子未嘗以稱顔子豈顔子未孝耶舜稱大孝他聖不聞豈他聖都未孝耶某近得一作文之法如有人有事可作文者先將其人其事想出我所欲語既有所見便信筆直書達意而止既成且閣下一邉過幾日再看加之裁剪有不明白者改之意未足者補之字眼冗泛者去之務使詞加少而意加多又有結搆畢竟可觀作文且未須說得體製法度第一先要明白若那事考究得十分明白據事直書自然不煩刪減而閒文自去詞必古矣作詩不可句句相承如此則太直似文字非詩矣即文字太直亦未為佳朱子說古人文字有六七十里不回頭者他却見得不能做得朱子文字却是步步回頭抓住主意說到底朱子論各色文藝都在行文須錯綜見意曲折生姿李習之教人看獲麟解一句一轉可悟作文之法却不教人看原道今人作文動稱伊川為正叔朱子為仲晦雖中庸亦稱仲尼然古今既異即當致其尊禮亂稱先賢名字斷使不得作文字此等須有義例文字要改雖孔子猶然歐公醉翁亭記原稿起處有數十字粘之卧內再四改訂到後來只得環滁皆山也五字平生所為文都是如此甚至有不存原稿一字者孔子作春秋筆則筆削則削說者謂筆是録舊削是刪舊恐未必爾就是那幾箇字眼下得有未妥便削去故游夏不能贊一詞文字詞氣雅俗尚有能辨之者至句中有眼人多不講其鬬凑成文者即有一段好處必不能通篇自圓其說文中有一兩句似無甚關係却是他為文眼目說話雖多終須歸到發明此句上這是傳下來的一㸃法脉巖云作文字不可稱人曰子子稱重寧稱君可也曰古名人稱過便可稱子亦通稱書傳皆然韓栁歐蘇如此用亦用之而已如嵗在某干支嵗次某干支本謂嵗星在某次某非謂年嵗在某次第及某也如今年戊子子與丑合歲在元枵之次矣但今如此用人反大怪雖朱子亦錯為之奈何某總不用直云康熙某甲子而已大凡地名官名作文字都應從今之名何必以古名換之令後世反無所考證文之古雅不在此今舞刀者皆取美觀臨時一無所用惟善刀者筋節著實當之者便不能支蓋虛處費去用處便不著實如學書者尋常作字不著實依法寫寫時一定手滑不得力文章亦然以上論文文字不可怪所以舊來立法科場文謂之清通中式清通二字最好本色文字句句有實理實事這樣文字不容易必須多讀書又用過水磨工夫方能到非空疏淺易之謂也選文字宜簡嚴孔子刪書取其有用者動輒架漏過幾百年所以妙如今無論選古文時文即將其文當作經看一字不放過方好王安石陳傅良的八股似對不對甚古所謂八股宗者不可不看如詩有古詩及古歌謠之類也時文名句與詩詞不同要從性命道理上出中庸纘緒節時文皆講成三王統緒未成至武王才了得三王之志竟似周家父子祖孫纍世欲暗干天位者然豈非大悖不知纘緒者言能修德行仁不墮基業到得天與人歸一著戎衣便有天下故雖以臣伐君而不失顯名一戎衣句非結上文乃起下文重一戎衣不重有天下惟明初楊慈文是如此發明大有關係所以八股不可輕忽明代時文洪永宣景天為初成𢎞為盛正嘉為中慶厯為晚天啓以後不足録已問王守溪時文筆氣似不能髙於明初人曰唐初詩亦有髙於工部者然不如工部之集大成以體不備也制義至守溪而體大備某少時頗怪守溪文無甚拔出者近乃知其體製朴實書理純密以前人語句多對而不對參差灑落雖頗近古終不如守溪裁對整齊是制義正法如唐初律詩平仄不盡叶終不若工部字律密細聲響和諧為得律詩之正做時文要口氣口氣不差道理亦不差解經便是如此口氣錯道理都錯房書坊刻始於李𠂻一可謂作俑坊刻出而八股亡矣如人終日多讀經史久之做出古文自有可觀若只採幾篇左國數篇韓栁手此一編以為樣子欲其能作古文得乎某初次㑹試將所作時文就正於鄉前輩王命嶽恥古就中一篇批云骨節尚大某請此批是優是劣答云骨節大不得脈絡一線謂之單微無龎然而大之狀知道單微便密細粗大不是好消息此論大妙時文之壞由於不肯看書書理懵然而思以詞采勝則必求新竒靈變以悅人之耳目遂至離經叛道而不可止矣文章先通順了其火候有時豈能强所未至但世有一種從心裡放逸昏惰志氣不立的人先時聰明才華儘有到後來漸漸消亡實可惜了臨文在題之皮毛上鋪排似是而非心思不入了無神氣至於膚淺無味最怕人病却中在根本上以上論科舉之文榕村語録卷二十九

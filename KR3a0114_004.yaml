body:
  text: 榕村語錄卷四大學士李光地撰下論徳行一節纒繞不及門從患難窮愁聚散離合上説是陋之至者夫子説皆不及門亦是偶然不在眼前作悲涼太甚語便不相干然是由此説起畢竟還該照應須説諸人以這般學行儘可各自炫竒燿名却依棲一終日皇皇的孔子瀕於死而不去無他欲得夫子之道也看書要得最上第一義正是此等問冉求為季氏聚歛何卑汚至此曰冉求也未必是十分刻剝百姓只是替季氏算計無不到耳他平時聞得夫子講忠於所事既委贄於季氏便盡心力以事之子路之死孔悝亦是如此他們師聖人都是篤信力行雖時有過執處要皆從真誠發出如無此段意思為人謀事都不懇切周至直至事敗之後但曰吾曽言之而彼不吾用以此自謝如此等全無誠心講甚麽大道今人為公家司錢榖一心要得公家富强者便少不過是要侵牟肥已耳以道事君自非由求所及然由求此意便是根本有此而後可語大臣之道若侵牟肥已乃盜臣也夫子安肯以具臣許之大抵士必有硜硜之節方可進於稱孝稱弟又可進於有恥不辱命若無此段誠確之意便無根柢問回也其庶乎一節曰注中說成兩截言其近道又能安貧也其實屢空正見其近道賢哉回也一章即是此節注解夫子以何以為問原是要他們用世如何又許曽㸃因由求不知此皆性分所固有各人胸中却要自做一番事故夫子一聞㸃言而不覺深契問此是徇外為人否曰却不是此等原是當做的事只是要自表見的念頭不能與舍之則藏底意思竝行也問日侍聖人如何尚不能化曰意見最難化今人便有一種日與講性說命亦自領略其人亦不是貪富貴一流只是功名一念却不能淡覺得畢竟揮霍得一番方快却又不是為生民起見古今人情大抵不甚相逺凡人無事時要得天下有事風塵中纔好見己之長是謂倖災樂禍子路率爾而對之言意思便不好夫子與顔子說用舍行藏他忽然挿一句子行三軍則誰與故夫子斷以不得其死胸次氣象間著不得此種最是要𦂳文中子論李密曰幸灾而樂禍愛强而願勝神明不與也亦是此意不讓雖在率爾上見然即此用才使氣意思到為政上便能作病非只哂其言之不遜而許其治國之優為也子路雖不率爾而其言中之意不讓自在亦猶曽㸃氣象於其言中可以想見其鏗爾之從容蓋心氣之符不期而然者耳自記好仁惡不仁某意不欲分兩人好仁的人即惡不仁的人四書中所說智仁誠明之類皆是如此看得合一方可分開如明道伊川兩先生便有一是好仁一是惡不仁的意思但兩先生初間立意做工夫豈有分道之理天心好生春夏固是發生秋冬亦是收歛春氣以為發洩之地如看見好人便喜歡見不好人便要他死雖不為不正但如此久之亦恐漸次入於愛之欲其生惡之欲其死一路故雖至不好人若他有事犯只得據理法治之不爾便聴他自消自息於天地間何須著意春秋雖俱是天氣畢竟人當以存春意為主如侍坐所言曽㸃說暮春既是和煦之時春服能成則非年榖不登物力匱乏可知冠者童子能從曽㸃游則家門無事從容有餘可知肯從曽㸃游則向善親賢可知浴沂風雩詠歸無復有公私苛暴嶮巇之虞可知所以為有老安少懷意思子路無論其言不讓即無端想到師旅饑饉就是三年之後能使他有勇知方此三年内已戰鬭死了多少人饑饉死了多少人及至臨陣亦不能保得一個不死何苦說到這裏吾輩日用間豈能無此等意思纔起時便思有以消化之方好子路之千乘冉求之六七十五六十非必想做諸侯有舉國以任之便是諸侯之事近來講家拘泥得可笑撰字及志字要看撰具也㸃所見根本處高於三子而所講求用世之具却不能及故謙云我之所志異乎三子有應世之具而夫子以各言其志慰之不然夫子問何以㸃何為以行樂對時文反言此即㸃之酬知殊可笑㸃爾何如節在論語中朱子以比一貫之傳皆不作第二義看周程授受尋仲尼顔子樂處後便有吾與㸃也之意其妙可知注内曽㸃之學一段是言前意而其言志一段是言中意其胸次悠然一段又是言外意若將言前言外之意盡裝入曽㸃口中則反害了當日洒落氣象以視其言不讓者又加甚矣自記朱子學問全在躬行心得處實有工夫曽㸃言志節注人欲盡處天理流行隨處充滿無少欠缺人心私欲不除饒你如何打叠到底有些欠缺惟人欲盡處中無罣碍便靜坐亦得看書亦得乘風亦得澡水亦得全然是天理逼塞滿了這是朱子實體騐出來下的注語然既有此體段又須從容於禮法之塲沈潛乎仁義之府隨處真積便是曽子底工夫曽㸃狂者只是存此胸次無却許多細密所以中庸後半至誠至聖兩段兩面夾來顧寧人講韵學到得意時便曰非達天徳者其孰能知之梅定九推算到得意時便曰以是知𨽻首之為聖人也實則就將顧梅諸公并籠將來亦未必是聖人故曰君子多乎哉不多也禮度文饒使件件俱理㑹得而無至誠一段為之胚胎終久是朱子所謂俗學然既打叠得一段心胸又須將禮度文件件理㑹方是兩邊俱到的學問清植㸃爾何如一段注是朱子自家體貼過所以注得如此踏實但若一逕如此不知回頭便可落在莊周一邊去所以曽子便收轉過來孔子說内省不疚夫何憂何懼孟子云仰不愧俯不怍聖人只說到此不似曽㸃手舞足蹈曽子戰戰兢兢如臨深淵如履薄冰又動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣到後來以能問於不能以多問於寡有若無實若虚犯而不校這是三段工夫人心有一㸃惕厲的意思便覺得有一段過意處從戰兢中得樂方是聖賢真樂便自無弊曾㸃之樂尚差這些子問原憲克伐怨欲不行只是清淨此心未曽著得養性工夫曽㸃亦只是於心上見得大意所以為狂曰克伐怨欲不行心是冷的曽㸃便有萬物一體意思心是熱的狂强於狷者以此問如洗心退藏於密曽㸃可謂洗心矣但藏密中尚欠理㑹曰聖人以此洗心此是甚麽物事無這此字却將甚麽來洗這心洗心藏密是吉凶同患之根然吉凶同患又是洗心之根心是理之根理又是心之根所以中庸言肫肫其仁而後言淵淵其淵浩浩其天清植曽㸃莫春數言夫子與之以能見其大然三子之事功却是脚踏實地學問故安見方六七十如五六十而非邦也者赤也為之小孰能為之大皆是褒辭而曽㸃行不掩言之失亦隱然見於言外以上先進篇克己兼直内方外涵養省察與答仲弓者有詳略無異同自記一日克己復禮天下歸仁焉不是說效騐即是發明上句言克己復禮即仁也你能一日克己復禮人便都說你是仁蓋工夫雖可以自信然察言觀色合乎公理與否亦須著意如做篇文字人看不下時那處畢竟有些毛病汝楫問一日克己復禮是用功起頭的一日還是成功的一日曰這便說獃了順著文理説去便一意都包在裏面薛敬軒文添出二日克己復禮便有二日之歸仁雖有此理但不必添出陸稼書解動而世為天下道等句以為世字是周家八百年之内故只言世不言百世與百世以俟聖人不同若到後世豈不是上焉者之無徵乎此皆拘泥字眼之過也向看道理不熟講克己復禮為仁定要補出存養一邊工夫蓋以人欲之私畢竟是事至物來方有也不知靜中一團昬氣非己而何所以敬勝怠義勝欲二句便是克己鐵板注脚無事時怠慢之氣即已也人以下文視聴言動皆是指動處說不知都兼兩義如言語不合道理是義一邊少工夫未言時氣之浮動意態之輕儇便是敬一邊少工夫言箴中傷易則誕傷煩則支是不敬也己肆物忤出悖來違是不義也豈可謂言而非禮纔是已氣之浮動意態之輕儇便不是已視聴言動禁其非禮者須有由禮一邊方是復禮方是儒者之道自記子貢問政章時說全不明白以去兵為是去其冗者糜餉無益不知三代時兵即農也只是牛馬車輛衣甲器械要完備敵來則起而應之敵退還復歸農其厲兵講武只在田獵時如何有冗兵糜餉之事就是不得已三字已先說錯若果是存亡呼吸國破只在旦夕則那時兵食已無何勞君去去字還是自能作主的話上一個不得已是新造之邦或值兵荒之後既是百姓流亡凋敝何暇講武如今衣甲器械且莫問車輛馬牛且莫問蒐苗獮狩且莫問只得先招撫安輯休養生息為主第二個不得已即哀公所問年饑用不足一般食如食之者寡之食去食云者大荒之時凡百官之俸禄君之羞饍賓客之廪餼祭祀之粢盛一槩莫計算追索寧到餓死大家死亦不可失信於民民亦不肯失信於我這是説到盡頭處聖賢的話要照著可以行得不是空著幾句懸空語支吾問答而已有友稱王守溪百姓足二句文者先生詰之云文中說百姓足了祭祀賓客一切費用皆於是出不知是正供是科派難道是要行科派姑先休養之以為朘削地不成此便把題目做呆了此章摠要著眼年饑二字平常說得所答非所問迂濶不切情事哀公時久已十分取二取二原得勾用只因年饑百姓輸納不前故曰年饑用不足是想要設法取盈於二之數未是要多科於二之外也有若曰盍徹乎不是迂論言百姓既輸納不前何不十分止取其一乎徹字𦂳對百姓說哀公悞以有若為是代籌國用故曰十分取二民尚不輸而所入甚少若取一則所入更不堪矣如之何其徹而益之不足也有子言君此時要謀足用須先固住幾個百姓要𦂳如行徹百姓不至離散就令所入儉省用去亦自可支孰與不足不然百姓逃亡田野荒蕪一分所入尚不可得孰與以足者乎如今田主逢年荒租收不起躊躇問人其意必是要催迫佃戸有一人云何不救恤佃戸田主云救恤他自己益發沒得用了其人云有佃戸在歳豈有常饑之理假令佃户走了則田卒汙萊矣是常饑也只當省節用度不可促迫佃戸有子語意是如此本極平正切實非姑泛說君民一體與年饑兩開也百姓足二句若如時文說作欲取姑予是王者因民所利之道無非利民所有之術矣殊有闗涉毫釐千里不可不辨也節用意在孰與不足言外主忠信徙義即質直而好義也又析言之則曰修徳講學徙義改過周子所謂乾乾不息於誠又必遷善改過而後至皆其義也自記慮以下人不在察言觀色之外即察言觀色處又慮以下人也使非慮以下人則察言觀色是徇外矣自記注云遲以夫子之言專為智者之事又未達所以能使枉者直之理此又字是從上文未達生來實則因其疑為專論智故未達非有兩層也自記以上顔淵篇如有王者必世而後仁說成王道無近功的話頭便不是如舜繼堯禹繼舜何俟必世如有者夫子為當時言之也後字必字𦂳闗如有二字言當今之時上失其道已久人心風俗極敝而不易變如有王者作亦必世而後乃可仁也上章善人為邦百年亦是説當時殘殺之風已甚故曰百年比例觀之顯然可見萬厯庚辰此章文皆說久道化成只做得王者世而後仁如有必三字不曽做若父子相庇䕶而濟其惡則真曲矣掀然揭之於外又所謂矯枉而過直不得為直也惟隱字最妙蓋不敢䕶其惡以傷理又不忍列其過以害情是以直在其中如只説得相隱是至情却遺了道理一層若孔子諱昭公之取同姓即就諱處自以為過處還他公論却不是回䕶到底也春秋書法内無惡則雖辱不諱諱者皆内惡也此是直在其中之義自記父為子隠子為父隠隠字最妙不是回互是不敢響人説吾至親惡事豈有嘿嘿的理不敢響便是虧理可知所以說直在其中不徒在人情一邊說連天理一邊亦不碍方是觀夫子答司敗孟子論瞽瞍殺人便見得此意名之幽厲雖孝子慈孫百世不能改此義原在那裏問直在其中曰隠則明明為不善矣故曰直在其中問朱子云凡言在其中者皆不求而自至之辭此在其中與祿在其中不幾不一例乎曰學非所以求祿而祿在其中學有得祿之理也耕非所以求餒而餒在其中耕亦有餒之理乎在其中不必定是一様虗字眼執定亦不妥如諸字之乎切我不欲人之加之乎我也我亦欲無加之乎人施之乎已而不願亦勿施於人朱子解顯諸仁藏諸用諸字亦作之乎用只得解仁為濟物之功用為機緘之妙推仁而出收用而入然仁本在内誠之通也生物之心顯焉用本在外誠之復也成物之功藏焉故下以顯仁為盛徳藏用為大業不必以仁為外用為内也即作顯其仁藏其用說有何不可讀書全要有喜意易傳先云說諸心然後云研諸慮不喜歡則思路無由入顔子云仰之彌高始云鑽之彌堅仰如高山仰止之仰覺得聖道不知如何妙有庶幾窺見始可為人之意狂强於狷者以此中行之人何嘗無喜悦却包在内此種最難得至狷便帶冷惟狂則刻刻自喜不是欺人實實自己有得意處别處說善人地位處便要分别得斟酌即戎及勝殘章正是說他好處何暇替他稱量本領時文有纒住善人說他質美未學者又有把即戎兩字說僅可以固圉自存者自謂體認之至不知先差了口氣也自記以上子路篇不行與克復從源頭上分别克復大段以天理為主是根株盡拔的光景不行是以天理遏人欲禁而不發的光景如東漢人矯節勵行豈非賢者但謂之純粹於道則未也不是安仁是仁勉仁非仁只看源頭清不清耳克復如禹之治水行所無事不行如鯀之障水有時決防羿奡之死由簒弑不由射力禹稷之興由聖徳不由躬稼适却暗了善惡一層單以不應死而死不應得天下而得天下翻作疑案不是疑禹稷羿奡已然之迹乃是疑當世之亂賊簒弑相尋而據有邦家孔子躬明聖而不得位不應定理便差錯了故口設為疑難而心斷以定理此所以不容答而又不能已於贊也自記不能不勞誨者情也不可不勞誨者理也自記若臧武仲之知四句如謂是指生來材質則藝字說不行蓋言須是學此四人之知廉勇藝而又文之以禮樂也時講竟似虚說天生一人知廉勇藝俱全而又加學與子路無干豈有此理若字是要像他如其仁如其仁朱子說誰能似其仁者覺得太過或是也就像個仁了的口氣一匡天下亦不是說一總都匡正似是就經他匡正了一番為合管仲稱仁是一大案程朱說似未諦當細按道理却宜如此立論蓋子糾不成其為君也假使襄公當日立糾而使管仲為傅便有可死之義管仲之從糾不過是倉皇結隊行耳譬如夫婦必經父母之命媒妁之言而後夫亡婦為之死謂之烈為之守謂之節若六禮不備邂逅相遇從其所私而為之死雖不可厚非要之旌奬不得匹夫匹婦之為諒諒本是好字管仲若死亦是諒說不得他不好但比之功在生民則所成就爭差逺矣問夫子何不說明此意而但稱其功之大先生正沈吟間復問想是言外有不能如此立功又不如死之為愈底意思曰正是如此聖人衝口立言無處不到却不肯放倒那死的一邊八面俱圓糾弟桓兄伊川單據薄昭之說耳他處都云子糾是兄只是果係世嫡自然名分有在既皆庶孽如何居長便當立當時桓糾皆不當立則其孰兄孰弟原可不論魏徵之傳建成高祖命之也管召之從子糾誰命之乎不過是倉卒逃難各隨一公子走耳其君臣之分甚㣲所謂可以死可以無死即此之類如豫讓之不死於中行魏徵不死於李密人竝不以為非也子糾之遇管仲未必國士桓公三薰三沐委國而聴之可謂國士矣妙在聖人亦不說他不死的是總不應答這一節話只稱他的功却說召忽是匹夫匹婦之諒亦還他個諒字未嘗說他不該死兩面俱存互看自明見得管仲亦少這㸃諒乃化工之肖物也不怨尤則不求知下學則無以異於人而致其知及至上達則有人所不及知而天獨知之者朱子所謂兩頭蹉却此所以莫吾知也自記修己以敬章道理甚難看修己兩字不是空的如說一敬便畢修己之事便差了致知誠意正心修身皆修己之事要離不得一敬字耳安人安百姓亦非是無事但只是舉此而措之耳若説敬則人自安百姓自安即又差了口氣自記以上憲問篇古人之學皆是以心地為之本聖人固是以一心而涵萬理學者亦當涵養其心以為窮理之源學者固離不得多見多聞聖人亦何嘗不好古敏求中間只差個生安學利困勉若説聖人自一而萬學者自萬而一却是裂了道術而聖凡有兩心也所以論語兩個一貫皆是聖人以身立敎指示學者做工夫處若抗而高之便謬以千里自記兩個一貫皆是敎以知本之學用力之要非如異氏印證契悟之說一經指㸃便豁然無事也忠恕章注至詳明此章注即云說見彼章可知兩個一只是一個更無異義何則一本故也漢唐以下學不知本故所謂心學者往往為異氏所冒知天下之大本而立之則所以貫天下之道者此矣自記問多學而識章曰此章一貫與曽子章同大都聖人全性渾然一㸃不曽破耗天地間至理都是印証他心裡的原不是零星記在那裏東漢人物矯立名節衣冠言動都少破敗便道是吾儒盡頭鄭康成輩博聞强記著書立説縫掖尊尚以為是吾儒高流所以自漢及唐一貫之義何曽明白佛氏見吾儒學問不過至此而止遂將心性之學搶去提唱簸弄精神光怪陸離儒者亦從風而靡豈知吾儒之學寂然不動立天下之大本元是以此為根只是兩邊都要到敬以直内又義以方外所謂敬義立而徳不孤也直到程朱實實在此做工夫纔說得一貫明白吾輩何嘗要作惡只是胸中意念不純以為在内不純不形於事或者不妨不知即此便是天命不流大本一差無事不差聖人心源一私不掛一息不間斷三月不違便是顔子問子貢聞一貫雖無一語至他日云性與天道不可得而聞想是已明白此義曰禮樂名物何一非由性而出耳目聞見何一非以心為主性是人之本天道又是性之本故立天下之大本乃知天地之化育人說一貫是曽子子貢先全不知在心上做工夫夫子於其道之將成以此㸃化他如和尚付拂子一般他既聞此便全無事不思曾子子貢若向來不知從心上做工夫如何得到道將成地位且聖門安得有此等學問若起頭全無此一後來如何忽有此一此一原是徹首徹尾但地位不同耳不獨聖人有聖人之一貫賢人有賢人之一貫即弟子亦有弟子之一貫弟子入則孝一章非弟子之一以貫乎君子不重則不威一章非賢人之一以貫乎只是聖人先但敎你如此用功不提出宗旨來說蓋遽與人說心性難曉且不必中間必要隨事精察而力行之到工夫做得久了乃將熟底一以貫告之提破宗旨益好用功以前非全不知有心是隨時隨事上用心不知大本大源却要提起以為綱主耳曽子聞一貫後經門人問便解以忠恕為注脚倘當日有問子貢者不知子貢將何以為對若能以誠明二字作注脚則道理益顯闡矣清植一以貫或分學識說似有著落學是正往前用功識是將已學的記在胸中學說一貫是心得而理得凡見解不定都是不曽見得自己的心見得自己的心所學便了然無疑識說一貫是心存而理存凡人遺忘都是心不曽存心存則温來温去只是此理便不消逐件求記如今都說以一理貫萬理不知一理指著甚麽畢竟說心有把鼻些曽子章忠恕亦只說心無兩一貫也有間又曰一理亦說得去以五常統萬善以一仁統四徳何嘗不是一理然仁人心也理亦在心無為而治章註說甚明時文講無為多根恭已立論如言篤恭而天下平雖有此理然非此處本意清植友其士之仁者仁字要淺說如云好心人耳子文文子豈非賢孔子不說其仁是仁在賢之上此處賢却在仁之上故一云事一云友或曰事或在大夫上說友或在士上說曰不然此處說不到勢位斗筲之人何足算也自重在賢上說春秋者或謂周人改月不改時或謂月改則春移看來須以夫子之言為據若果不改時夫子只應言行夏之月不應言行夏之時矣清植以日至寅而明證歳至寅而生極確今言一日必以一晝一夜為限言一晝一夜必以日出為度故夏正得天百王不易自記夫子無所不學想顔子亦是如此不然夏時殷輅周冕韶舞豈是逐旋方去講求者矜而不爭二句有相似相反二義矜似爭羣似黨矜是持已爭却務勝人羣是大公黨却務阿比矜羣皆須兼内外說矜者内而嚴威儼恪壁立萬仞絶無與人爭意見爭勝負之心外而是非可否辨别執守却非與人爭門户爭名利羣在内說如看得萬物一體絶無私意要與人同流在外說如和平接物却非因其人為我私交纔加周旋結納相反意在根本上見相似意在發露處見一言終身行行字要提清是指事上説不然何不說誠說敬而只云恕直道章癸未闈墨其以直道屬民心者固非亦有專主在上之人行直道於斯民者而於斯民也三字所以兩字全不體㑹亦非也蓋時至春秋人皆謂民心不古直道難行故夫子謂民性之同今古不異三代之所以直道而行者即斯民也自記吾之於人章萬厯癸未㑹試主考以下節為主民說謂是非善惡民之公心三代以來未之有變安得以毁譽易民心之直道此論宋人已有朱子謂如此說則所以二字無著落又行字說不去此章上節須重譽字蓋毁原不與不直對如說人不善太過只好說他刻薄說不得不直譽人過當乃謂之不直口氣云我固未嘗毁人又未嘗譽人如有所譽亦必有試究非譽也下節雨蒼言當先有一段感慨議論極是蓋時至今日人都說末世人情無不好諛直道不可行於今不知特我不行直道耳斯人何嘗不可與行斯民也即三代之所以直道而行之民民心之公何嘗有異時文都說譽且無之而況毁乎又説善善長而惡惡短口氣語脉都不浹洽直道而行者三代所以直道而行者斯民當時之民已非昔民論者不歸咎於行之者非而動云民心之不古即如今眼前人好行面諛以為趨時者是也故夫子言民心無今古今此之民即三代之所以直道而行者此意最為懇至精切自記乙酉北闈以吾嘗終日不食章命題先生因閱闈文曰此章當先講明如何是思如何是學大抵古人之學不外四術六藝就中如禮便有許多節文所以固人肌膚之㑹筋骸之束樂便有聲音以養其耳采色以養其目歌詠以養其性情舞蹈以養其血脉都是踐履所以朱子解學字兼知行說思却是空空的在那裏想人心之靈無所不通就所思處亦有一路道理如莊子許多見解圓變無窮豈不是他想出來的只是不根據古人便有走作朱子說得好有所証騐而後實有所裨助而後安心雖見得是了然尚虚在那裏得古人以為證佐所見方實心中雖有所得然安知不更有一層道理足以奪之得古人以為幚襯所得方安看來諸闈文都是吾嘗終日不食終夜不寢以致其知無益不如力行也致知豈單是思且致知豈可謂無益因抽出就中張椎一文云此文小講下說學思本不可偏廢照管夫子平常說學而不思思而不學之弊下隨轉一語云彼學而不思之弊易見也此句大佳學而不思如讀書不求解這不過是愚庸書生何消理論若思而不學便有高明才智一流往而不返就偏僻一路生出許多見解自許獨得開敎說法其弊無窮若文衡有準便當以此句定也問謀道不謀食章曰不是中兩句是無命也不是末一句是無義也命是為中人說的知義則命不足道故口氣須著一折自記不讓於師是旁觀者之辭非當仁者時存此意也自記以上衛靈公篇均無貧三句若照上文宜說均無寡安無貧如何反說均無貧却添出和字而曰和無寡又添出傾字而曰安無傾將謂聖人是隨口說來無甚意思其實非也細細體貼一字不錯上二句口氣言你不要患寡患貧但當患不均安耳何也如父母有千金四子分開若一人得去五百必有貧者矣今每人各分二百五十雖不免於寡然不至於貧矣蓋寡是家私少些貧竟是空乏了不均則彼此相争而不和均則和矣和則彼此情意浹洽有無相通竝可不至於寡矣既均且和則輯睦相安雖或不免貧寡而斷不至於傾此所以貧寡不必患而不均不安之足患也逺人是指强鄰敵國非顓臾也前云邦域之中社稷之臣後又云邦内奈何以逺人目之乎自記桓公雖假仁義猶自修方伯連帥之職至三卿田氏斯為無說此孔子所以稱管仲之功而惡三桓也庶人不議非指怨謗如所謂處士横議之類皆是其流禍甚烈觀周衰人立私議究於坑焚可見也若止於怨汝詈汝則所謂庶人謗者是盛世所不禁自記天下有道則政不在大夫據上節說天下無道則禮樂征伐自諸侯出何不云政不在諸侯蓋政原在諸侯天子司天下之政諸侯亦司一國之政但不當自諸侯出耳若夫夫則僅可議政而不可專政故下又云庶人不議明大夫得議也分寸絲毫不差朱子註上論一字不可移易下論雖道理不錯文理便有疎漏如三友三樂損益必要說得相對覺得牽强此乃各分淺深朋友之間有好直言的然或沽名或使氣未必出於真誠所以又要諒真誠矣或學問少見理未明所以又要多聞便辟者外面威儀詞令或尚可觀至善柔則一味卑屈諂媚以順為正矣至便佞則又變亂黑白倒置是非其害更大三樂亦是如此不必皆相對立言也朱子對門人說某讀上論覺得比下論好些上孟比下孟好些中庸前半部好些不知是古人之書前後不同不知是自己心血不足看不到可見朱子既誠且明光明磊落千秋萬世皆得見之益者三友損者三友時解以者字作虚字友字作實字謂益於我者有三様朋友損於吾者有三様朋友看來此者字以人言作實字看友字以交接言作虚字看言㑹長進的人有三様交接不長進的有三様交接如所交的是直諒多聞這便是求進益的若與便辟等相與便是不求進益的如此則上下友字俱屬一例珣樂節禮樂三句某意以節禮樂為根自己於禮樂不徒好之而已一一節目都詳明有條理惟其節目條理所以見人有善此者便樂道之既樂道人之善自然樂多賢友互相講習樂驕樂三句亦都在驕字生根先只見得自己是要快活到佚游竟放開了到宴樂便又溺於其中終日醉夢而不能自拔矣樂節禮樂節字照注說自好若從張子說亦有味蓋禮勝則離樂勝則流節者以禮節樂以樂節禮終日用意孜孜只在身心上檢㸃是之謂樂節禮樂聖人言語俱有次序九思章視聴居先四勿亦先視聴心官之外惟重耳目人惟視聴最易入又無時無之次則色貌之見於身者次則言事之接於人者次疑次忿皆日用間所必有而切於身心者然後以見得思義終焉由内及外一絲不亂問九思以視聴為先洪範五事何以先貌言曰彼以敬字為主故先貌言此以思字為主故先視聴自記見善如不及章語意本明但前一項人却是後一項人的根基抹殺不得大概是要門弟子拓開些的意思如原思自守有餘却少與世相闗之意若由求則又於隠居求志邊少了伊尹樂堯舜之道再聘還不出來即太公八十自是有終焉之志忽遇文王非所料也隠居以求其志行義以達其道人都說成用之則行舍之則藏窮則獨善其身達則兼善天下兩個以字不見醒出而隠居行義字皆不著實見善如不及見不善如探湯雖亦是他的志如此然其志有限求志之志便大必隠居以求者何所謂龍徳而隠不易乎世不成乎名遯世無悶不見是而無悶伊尹在莘野之中樂堯舜之道便是如此孔子五十以前總不出來當亦是此意達道固是要行其所學然云行義以達其道何也若待堯舜之君三聘而出千古能得幾見但有可為之地有可為之機不必大有為之君大可行之時隨分而行如見行可際可之類全是如此故曰惟我與爾有是夫此二句是聖人全神由求等便不能隠居求志荷蕢荷篠之徒又不能行義達道由求行義矣而不能達道荷蕢荷篠隠居矣而不能求志故曰未見其人隠居求志二句某意每句皆有兩義求志非隠居不可然荷蕢接輿之徒不可謂之求志隠居矣又畢竟要求志達道非行義不可然當時從政者不可謂之達道行義矣又畢竟要達道此節講家多以未見其人一言難於安頓顔子只得串講謂顔子不曽出仕其實不然安知此語不說在顔子既亡之後只是說此等人身分就是終身隠居亦何害其為行義達道不學詩無以言此句極要體味三百篇中有含蓄不説處便是不該說的須逐篇體味一番清植論義理及文勢則稱於異邦曰寡小君者䝉上邦人為文為本國對異邦之所稱也孔子作春秋於夫人之卒則稱夫人臣子之詞也塟則曰我小君蓋有列國㑹塟故曰我曰小君皆對異邦之稱也自記以上季氏篇上智下愚不移大意固是言此等人不常有而中人最多欲人之謹於習而不可諉於性然其所以不移則是此兩等人立志不回自不肯移也茍下愚者而肯從善則亦無不可移之質惟其不肯移所以為不可移所以為下愚也若中人則斷無不可與為善不可與為惡者顧所習何如耳程子言之甚明真得聖人之指蓋上智習惡亦不肯為惡下愚習善亦不肯為善此自其立志則然也自記小子何莫學夫詩學不是尋常習誦若只尋常習誦如何能收其益下章為周南召南為字亦要看出沉著工夫來清植四時行焉百物生焉平看去亦可若作四時行而百物自生如所謂春秋冬夏莫非至教說於何言意似尤𦂳切清植有人聞其弟訃二日即入衙門辦事又巨細不遺神氣如常先生非之因曰即不得已而辦公事總其大要不及瑣細倒是有疎略處方是宰我謂禮必壞樂必崩其實不壞不足以為禮不崩不足以為樂此所謂無體之禮無聲之樂禮云禮云玉帛云乎哉樂云樂云鐘鼔云乎哉人逢喪事亦須思如朋友死倘不思便悠忽過去了惟思其待我如何自有不容已處子張曰祭思敬喪思哀理當如此以上陽貨篇或人諷栁下惠之去不是激懟之詞蓋諷道之不可行故答詞有直道枉道等語自記孔子攝行相事如今說錯觀家語自明古者兩君相見必用相禮之官當時夾谷之㑹欲命相知禮無如孔子者故以司冦攝之司㓂官尊所以云攝朱子於齊人歸女樂注仍温公通鑑之悞皆以為行宰相之事當時官爵竝未有宰相之名也三月大治即為司冦與聞國政之時與聞國政效便如此君子之仕也行其義也如時解行義只是求做官殊不成語語類中說仕纔有義既不仕矣逺近去就都沒了緣何見義覺得有著落些但又似與上下文不甚闗合若說行義是輔君以有為又與行道相犯行義既即是行道又如何說道之不行已知之矣此義字却指君臣相闗之意說譬如朋友徳業相勸過失相規言之聴而計之従是行道倘規勸而不見聴却不可存一好歹由他之意視同陌路此段望其開明幸其悔悟肫切意思是義也此義字是說性之相屬情之相闗所謂大倫也與長㓜之節對說若在皮毛上說如何謂之亂大倫所以說隠居以求其志行義以達其道行義即此行義達其道即行道之謂也荷蕢晨門之流隠居矣問其所求之志何在不能行義矣又安有所達之道聖賢不是說我有一副當學術一得君便行出來其見之施為者皆是他内裏一段精誠逼出來的有此方能立之斯立道之斯行綏之斯來動之斯和舜有臣二句亦是夫子語如逸民節亦然記者提起作案不然此語何來如今史中論贊尚是此體侑食在堂上而以琴瑟為主雖未有考証然據周禮王大食則奏鐘鼓明每日常食不奏鐘鼓也又禮記玉藻進禨進羞工乃升歌疏人進羞之後樂工乃升堂以琴瑟而歌雖天子與大夫士之禮然諸侯可推矣自記以上㣲子篇執徳不𢎞信道不篤這兩句極好守其一説而不參之以衆論行其所見而不考騐之於人情皆不好倘𢎞矣而信道不篤恐見新奇可喜者遂棄其學而學焉却又不可子夏之門人小子及問交章覺得兩人俱有是處各有不是處子游說本末非說始卒是就立志大頭腦上提掇他未為不是不好說門人小人便當先末後本也至於始卒自應有次序問交章子夏語雖較褊然夫子云無友不如己者拒之未即有乖於聖教也子張語固寛大苐門人是問交非泛問處人也曰容衆曰矜不能衆與不能非友也容之矜之非交也兩章書問答皆覺得針縫不對至孟子議論雖極翩躚却少罅漏答湯武放伐的說話語吻似覺咤異然推到最上一層道理本是如此天生民而立之君非要其坐享富貴也要其撫養天下耳茍自絶於天則人亦不戴之為君矣如好貨好色好樂乍見之覺不倫說來都是道理苐夫子却更渾厚完全所以為盛徳之至如或人以徳報怨之說若孟子辨駁必說到以怨報徳矣聖人却問一句何以報徳已包得此意方分兩路與他說何等妥當博學章某意重在兩而字一折折到篤字近字上蓋不博學無以為篤志之地然博學而不篤志徒以廣見聞資口耳而已篤志是鞭策所學必定要討箇實理不切問無以為近思之地然切問而不近思徒求之事迹而已切問已是切於事情裨於日用近思却又體騐到自己身心上云此二句甚密與子思博學審問慎思明辨篤行差不多子夏却以此包篤行在内極似欲誠其意者先致其知見得非截然兩段工夫聖人龍徳又不同學以聚之問以辨之妙在入一句寛以居之然後說仁以行之規模火候不同問寛以居之是必有事焉勿忘勿助否曰某解之云虚明廣大而無自用之私涵泳従容而有自得之味一句說規模一句說火候聖人放在那裏磨盪消融未嘗斷火鍊得全無渣滓仁以行之便了子夏云篤云切云近是用多少力把𦂳了做恐到底成就與聖人别曰顔子是此一派否曰亦不知何如但問為邦夫子一口氣將四代禮樂說與他於問為仁便曰克己復禮天下歸仁告他人便不如此曽子又稱他以能問於不能以多問於寡有若無實若虚犯而不校却是大舜光景曽子恐是壁立萬仞做又差些問及其知之一成功一可是全無分别曰堯舜性之湯武反之其純然天理自是無二若規模火候畢竟不同問顔子若不死能與孔子一様否曰只怕是一様如舜之於堯周公之於文王大抵剏始人其工夫即與後人一般而氣象渾厚濶大處乃天之所為不可及舜似比堯更精細然堯却能包舜周公似比文王更精細然文王却能包周公博學而篤志章某意比常說又不同博學一頓篤志切問近思都收往裏面如讀一書實在專心致志讀透他至問人又無一句閒話亦無一句虚話又都反之身心體騐一番朱子所云切已體察即近思也都承博學說凡言在中者皆不求自至之辭蓋這一件與那一件似不相干却都相闗故未及力行意須補但云以此措之施行便是了告子章即儒佛分派子夏之門人小子章即朱陸分派子游謂當提起大本為宗論非不是子夏說孰先傳孰後倦譬諸草木區以别矣倒似聖門學問畢竟先末而後本者以大學論致知格物此謂知本此謂知之至周禮三物之教以六徳六藝六行為序及論語弟子入則孝等章觀之似不如此當日若答子游云即此是本語倒無弊蓋即灑掃應對進退小心謹慎中規合矩便是培養其良心久之自然知本陸子靜謂先立乎其大者說何嘗不是弊在把窮理工夫看輕了便破敗百出蓋窮理工夫甚大與主敬存誠竝重但觀王陽明致良知欲破朱子格物說到後來做詩出韻冩字冩别字論古將事記錯了此豈良知中應爾乎窮理格物而良知乃致也子游譏門人小子本之則無有似象山一派直達本原子夏之意又有似呂東萊只教人留心名物象數其實灑掃應對進退正是養正之功所以培養他根本使心不放而範於禮也子夏若將此意剖破子游更有何辨却但說教人有序竟像子夏之教原是先末後本的聖人沒而㣲言絶游夏已分兩路一貫之義體㑹者甚少夫子兩番為曽子子貢拈出人都説是言道妙某獨謂是示人以學道路頭大抵聖人空說道妙處甚少只是聖人有聖人的忠恕吾輩有吾輩的忠恕聖人自然體用一原顯㣲無間吾輩須是提醒此心則散錢有串心一昬放便無此索子奈散錢何收斂提起是學者之一貫也問學優便不仕何害曰古人最要仕所以自試所學故曰皇皇如也子使漆雕開仕不騐之於仕自己亦信不過古人之仕不是身外事以上子張篇論語自是門人之門人所作不知誰氏之筆而裁節乾淨妙至於此堯曰一篇敘幾代事數語已盡妙義且有波瀾裁斷到至短田地而精當具足自記雖有周親節是解上善人是富善人國之紀也故以為安天下之首務謹權量二節皆是在上之事至於及民惟食喪祭為重寛則得衆四句不見於書自是統論帝王不單指周說子張問政章大綱只在惠而不費勞而不怨下三句是此二句之根為政不能使百姓自己治生雖日散萬金而不可繼徒費而已勞之以所當為之事如教他孝弟力田三物六行皆是特迫促嚴急不以其方無為善之樂無自己以為本分當為之意便至於怨費與怨便是驩虞之術一養一教尚有何事欲仁而得仁是惠而不費之根蓋我之惠百姓者是見民之困苦必使之得遂其生方完得自己一段惻隠之心既非為利於已亦非欲沽其名何貪之有此所以惠而不費也君子無衆寡無小大無敢慢正其衣冠尊其瞻視儼然人望而畏之只是檢㸃自己以身先之人見其如此感而且愧一有條教自然奉行雖勞何怨此乃勞而不怨之根也不教而殺不戒視成慢令致期與無敢慢儼然人望而畏之相反虐暴賊則勞之而怨矣猶之與人也出納之吝謂之有司與欲仁而得仁惠而不費相反問與人只在與一邊説出納納字不重否曰出則吝其物納則吝其名皆是與人之吝也惠而不費勞而不怨是節用愛人使民以時一項事欲而不貪泰而不驕威而不猛是敬事而信一項事此章與道千乗之國章關照欲仁而得仁言我欲仁愛於民不過得吾仁愛之心而止不望其報不干其譽此所謂利之不庸乃惠而不費之根也此句說得不錯則前後許多言語皆是一片王道貫穿矣吝與貪與費只是一事貪是本根費是枝葉吝在二者之間看出一面貪其名一面惜其費勢必至出亦吝納亦吝也自記不知命章近亦明白了問有異解乎曰只是尋常講便是不知命便無站脚根基何以為君子不為小人問知禮何以次於知命曰知命是出處取舎義利之間知得分明儘有出處不茍取舍分明不能合禮者到得言動合禮便是隆禮由禮之意問何以知言倒在知禮後曰知言是格物窮理其工夫原廣大精深觀孟子說他得力只是知言養氣他說知言不尋常其歸至於見其禮而知其政聞其樂而知其徳由百世之後等百世之王莫之能違是如何本領問但從知上講不闗行事否曰自然連行在内不但知之而已以上堯曰篇榕村語録卷四

body:
  text: 榕村語録卷一大學士李光地撰經書總論孔子留下幾部經部部精妙佛書一看便有佛氣老書一看便有老氣經卻一槩正當無他聲色臭味在聖人手中一過便純粹無倫天下之道盡於六經六經之道盡於四書四書之道全在吾心孔子之書如日月經天但看尊之則天下太平廢而不用天下便大亂孔子六經字字可信博學多能一肚皮家當卻又江漢以濯之秋陽以暴之只是細心到極處謹慎到極處夫子所留下的書萬理具足任人苦思力索得箇好道理若是他不説的所見畢竟不確久便自見其弊如所見實在精當再向他書上細心尋求卻原在裏面包著雖聖人亦有所不知只是他不知的就不説如夏禮吾能言之把不足徵殷禮吾能言之宋不足徵他原曉得因無徵便歇了有這本事又有這箇道理何從尋得他箇破綻出尼山造化在其手易本卜筮之書春秋本記事底檔書亦流傳的數篇古文詩本風謠樂歌一經其手便都道理完備範圍天地曲成萬物是何等手段朱子兩眼實在明亮大學中庸其所服膺易中序雜等篇未嘗有異詞孝經雖疑之亦不敢決謂可廢惟前人以書傳為孔子作詩序為子夏作直決然斷其妄此乃確論四書中公案有極難解處要想箇透使了然於心自己臨事方得力聖人在衛六七年受其公養當時既不脱冕而行君相未嘗見招不便自歸而老必還鄉遂在近處栖止只得在衛父子稱兵已是亂國孔子不做其官不與其事而不為衛君必也正名一絲不茍至些須餽養周之可受固不必矯之而饑餓也嘗論篤信好學章自危邦不入亂邦不居一直趕到邦無道富且貴焉恥也其義甚備有安邦自不入危邦有治邦自不居亂邦至天下無邦只得無道則隠隠只不做官便是當日孔子聲名滿天下無處避逼到歸宿處只是甘貧賤而已孟子王由足用為善一段説話信是盡君臣之義當時作客卿不受禄便已為去地其出處進退亦毫無可議人欲窮經畢竟以經聖手者為妙易書詩春秋周禮隨分精熟一部受用不盡儀禮雖亦聖作但在儀節上講何嘗不是道徳性命所發見畢竟略隔一層禮記中聖人議論亦多但大半出自漢人不盡是聖人之筆詩書皆聖人選定文字所自著者惟易周禮春秋而已學者豈可不盡心周禮是洪範衍義春秋義法大抵一出於周易聖人取法古人却又是自已一箇規模諸經多將首二篇包括全書之義乾坤兩卦括盡易理二典二南亦括盡詩書詩書中道理總未有不從修身齊家説起者冢宰管到宮闈瑣細俗儒疑端以此為首不知此乃修齊之要正治天下之本春秋隠桓二公亦盡一部春秋道理隠無王桓無天無王者隠公終身未嘗朝聘於周直似非其臣子者然無天者桓公弑君王不加討又從而恩命稠疉焉惟此二義一部春秋豈復外此文章隨世運雖孟子不免雜戰國之談鋒朱子不能脱南宋之衰弱惟洙泗不隨風氣觀左國等書可見風尚夸靡聖門卻撰出一種雪白文字又各體不同論語是一種大學是一種繋傳與中庸又是一種乍看是黑洞洞的中間卻分明一大世界道理根源都在此春秋更竒又是一種王荆公好古文獨詆春秋其實春狄是作古文之根一字不苟稱名切實不如此便錯立言最難伊川窮一生之力著一部易傳多是自己的易還不是周易的本義春秋只解到桓公十年已有繆誤隠公不書即位穀梁義例甚明却廢不用而曰外不受命於天子内不受命於先君然則書即位者皆受命於天子與先君者耶桓公又書即位何以解乎至春秋序卻做得好其他議論好處甚多不可緣此等一二處便槩行攻駁也若句彈字議除是孔子方一字不可移易孟子便有可疑如臣視君如宼讐聞誅一夫紂之類皆似太險又如取之而民不悦則勿取文王是也文王由方百里起是以難語意皆微欠圓成文王服事終身何嘗是要取殷見民不悦而止又何嘗有意圖王迫於國小以致事業不成至不動心章依然説得妙得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不為何等純正精到詩不必篇篇皆美刺春秋不必言言皆褒貶詩貞淫並著而其教歸於正人心春秋善惡並書而其教主於存天理自記易春秋在五經中最竒其中條分縷析又皆是自然之理日用眼前之事所以為妙易虚而實空空洞洞無所指定而天下事事物物形象變態無一不備春秋實而虚有名有事各不相假然引而伸之觸類而長之天下萬世皆於是取則人情物理皆稟律令幽隠微曖神明鑒諸信造化之精髓性命之模範也凡修一書必立意推戴何人做主詩經自當以朱傳為主綱領内便不應入詩傳序周易折中綱領采程傳序者不敢主程傳也朱子説易之取象不可盡以道理求葢謂隨人隨事皆可以生解耳雖象皆有根根即是道理卻要知他原可以隨人隨事求之也朱子此説畢竟是講易的定盤星尚書注亦未有彊於蔡傳者但多敷衍幚襯不能字字著實其解天聰明二句云天之聰明非有視聽天之明威非有好惡即以本書作証天視自我民視天聽自我民聽何以見得天無視聽帝乃震怒皇天震怒何以見得天無好惡其説之弊直使人把天作糊塗物事全憑人以為聰明好惡者然蔡氏此等處都似還未見到根源所以未覺熨貼朱子説春秋據事直書為多未必盡有褒貶或不以為然不知朱子不是説全無褒貶謂未必如今人説一字不放空都有褒貶耳道理却是寛寛的説好寛些包得道理多寧可失出不妨若過密萬一失入其弊甚大胡傳多不是聖人意你看朱子傳注文義或有未當至大道理一絲不錯他人便大處錯朱子議論人物規陳時事容有太剛過嚴處要無不可見之行事者若胡傳説來一步不可行修此三經詩當全用朱傳惟斟酌幾篇書半用蔡傳春秋則當不用胡傳合者數條而已五經六藝今止四經四藝而已經止易詩書春秋禮即在六藝中藝止禮樂書數射御已不講易將註疏程傳朱義看過畧通大意一年可了詩將註疏與朱傳看書經亦然春秋三傳註疏每種一年兼之禮樂書數不過十餘年無不通矣聰明人用十餘年功亦不難便是許多年代無此人豈不可嘆易與春秋多言天人之際學者治之易入於漂忽夫道在唐虞臯陶為帝者師其陳謨也以秩叙命討歸之於天則春秋之㫖也以視聽明威考之於民則易之要也光坡今年夏秋間庶幾將易解可改完一遍然改完恐仍非定本也凡著書須要將那部書字字精神都灌注得到以前看十翼似還可多説幾句近纔覺得全無欠闕經書實難看即如中庸到如今看得還有不愜心處惟洪範似再搜尋不出甚麽意思來至大學則不解問不解處在格物無傳文否曰段落難分格致之義朱子説一件格到十分便是格十件各格到九分九釐亦算不得格此最説得好那一釐不到處便是本知得本處方是十分本就是明明徳學問固以存心為本卻又不是只守著這箇本就無事了物有本末須是從本至末無不理㑹事有終始須是從始至終無不講究方能知所先後若只守著一箇心便落陸象山王陽明一路學問問象山與朱子不同處安在曰朱子為學先立志主敬以為學問之地而又加以學問之功象山只先立乎其大者把心養定便無欠闕讀書亦只檢切於身心者讀之只要借書將治心功夫鞭䇿的更𦂳些不是要於書中求道理所謂六經註我我註六經也他看朱子不拘何書都不放過於文義細碎處皆搜爬一番便道是務外逐末都是閒賬躭閣工夫問他竟將事物之理全不理㑹不成曰他是要心定則靈明無不貫徹不消零碎補凑不知天地間無一非道理只守一心則理有未窮性便不盡中庸所以説至誠了又説聖人之道禮儀三百威儀三千略差便不是故君子旣要尊徳性又要道問學存心致知一面少不得象山不可謂不高明只是少道中庸一邊耳某欲選詩解春秋都有一見解須體聖人意思可以興觀羣怨事父事君多識鳥獸草木之名不為二南便正牆面不學詩便無以言授之以政不達使於四方不能専對思無邪皆是刪詩凡例管仲器小八佾雍徹旅泰山林放問禮之本季氏伐顓臾天下有道禮樂征伐自天子出佛肸召陽貨欲見諸章便是春秋凡列以此推之思過半矣大學大學者大人之學或以問朱子朱子曰成人之學也今人多講得如孟子所謂養其大者為大人之大人非也其實大學者太學也今人於周官小司馬小司空等皆知讀小為少卻不知大司馬大司空等亦當讀大為太也如大宰之為太宰小宰之為少宰其顯然者則大學之為太學小學之為少學明矣朱子謂古者八嵗而入小學徧檢經書無此語惟白虎通中有之據禮記所言入小學年數參差不等恐少小就學須就各人姿稟以為遲早白虎通之説未足為據清植今人動言小學只習禮樂射御書數到入大學便專講心性從來無此説不想灑掃應對進退之節禮樂射御書數之文節文二字作何解節是童子不知登降周旋所以然之故但習其節目文是童子不知禮樂射御書數所以然之理但誦其文詞到後來成人時便已熟慣而知其用日用而益明精義入神下學上達不離乎此非大學後便不提起六藝之事也明徳指性不指心明明徳合知性養性而言鍾旺朱子云行道而有得於心之謂徳是徳乃得於心之理非心也大學章句解明徳乃云人之所得乎天而虚靈不昧以具衆理而應萬事卻似以心為明徳若明徳是心則明明徳不疑為異氏明心之説乎故觀彖中於晉卦大象注改云明徳者人之所得乎天之理具於心而昭明不昧者也清植事物上之止止有兩義必至其極一也不復遷移二也然二者止一意必至其極則不復遷移矣凡一事一物斷置盡情盡分便快然無憾截然而止自記大學或問中提出敬字以補古人小學工夫葢養育徳性之功小學已豫故大學直截説起其實定靜等字即跟小學説來只應於定靜節提明此意不須添補大學首節只言教人之法在此三者知以三者為歸宿便是知止如知終身有正業他事不能搖動豈非定乎到得定旁邊雖有許多擾攘我卻一意在此並不知有别人别事豈非靜乎靜後雖置我擾攘中我自安於我之事豈非安乎此是立志以端其本居敬以持其志乃格致以前工夫不然論語首篇即言忠信中庸開頭便言戒懼豈大學獨始於格致乎至能慮則格致之事能得則誠意以下之事知止節朱子説得周折些因以知止為在物格知至之後所以慮字説作處事精詳不云察理精詳以察理是格致工夫故也古人先有小學一段工夫聰明已開趨向已正故大學直從明新説起然畢竟有箇頭有箇根基立志是箇頭從心上打疊是箇根基此節便是此意知止者知道要做何等事何等人如此然後志有定向志既定雖旁邊有人戲閙都似不聞不見一般非靜而何既能靜雖走到戲閙塲上自然不被他引去只安然在此非安而何心至此於事理方能入纔可用格致工夫所謂能慮也理明然後可實體於身實措於事所謂能得也得之於己即天下之理得矣意誠以下之事也注中志有定向心不妄動所處而安皆無可易只處事精詳難説五峰所云立志以端其本居敬以持其志志立乎事物之表敬行乎事物之中而義乃可精都全包在此節内程朱不將此節作頭竟像工夫只從格致做起故陸王乗此以售其説問知止亦在立志内乎曰知止即立志的頭畢竟知道這箇好心方向著這箇如夫子志於學亦是知道學好志於道亦是知道道好子靜陽明輩攻駁格物就是知止節頭路未清知止若如章句説何須又用定靜安慮許多字面來贊他聖賢等閒不輕説出定靜等字定靜是為學根基只是有此根基卻又要件件理㑹尊徳性是道問學之基只是尊徳性又不可不道問學陸象山答趙詠道書引大學從物有本末起至格物止引得極精兩物字便是一箇把物之本末事之終始講究明白便知所先後未有知本末終始而尚倒置從事者知所先後便有下手處豈不近道故下便接先後説去心身家國天下是物也修身齊家治國平天下是事也本即修身故曰壹是皆以修身為本其本亂而末治者否矣始即齊家書曰始於家邦終於四海故曰其所厚者薄而其所薄者厚未之有也知所先後即知本知本便是知之至章句云物猶事也窮至事物之理欲其極處無不到也極如皇極太極之極是中間透頂處不是四旁到邊處極字亦有作邊際訓者如四極八極之類但非此注極字之義格物之説至程朱而精然物有本末一節即是引起此意物事即物也本末終始即物中之理也格之則知所先後而自誠意以下一以貫之矣象山陸子看得融洽未可以同異忽之自記朱子解物字亦言事物之理可見物字兼事也章句表裏精粗四字似不如本末終始之為親切然精即本粗即末表即終裏即始也大學除此處别無物字而道理又極完全以此詮格物之義則程朱之意益明而古注涑水姚江之説皆絀矣自記自天子句時文建極歸極之語固失之必曰君卿大夫之元子適子與凡民之選造將來皆有天下國家之責亦曲説也天子有天下下至庶人亦有家便使終身無位行於妻子亦須是以修身為本此句是泛論話頭不必學校中人纔用著自記學問全要知本知本之學所學皆歸於一本格物之説鄭康成是一説司馬溫公是一説程朱是一説王陽明又是一說自然是程朱説得確實但細思之亦有未盡如云格物也不是物物都要格盡也不是格一物便知天下之物積累多時自有貫通處這箇説話便似子夏之答子游子游譏門人小子本之則無子夏只應答以灑掃應對進退正是培養他根本處人之初生天性未漓大人者不失其赤子之心使之入孝出弟一切謹愿後來盛徳大業都從此出故曰蒙以養正聖功也子夏卻説成君子之道畢竟先末而後本子游子夏都將本字看得太高妙即如一貫章都説零碎工夫盡做到了只不曉得本源故經夫子㸃化便洞然無疑若其初不曉得本源日用之間如何用功果然如此多學而識正是用功處夫子何以截斷曰非也特其初要將一去貫終乃貫於一耳以此起頭以此煞尾聖賢學問都是如此離了本便無末但不可云只要本不須末耳此謂知本此謂知之至也古本即在其本亂一節之下極有理大學説誠正格致中庸説誠明總是要修身身即是本舉而措之則修已以安百姓篤恭而天下平矣但看三代以後一物失所引咎歸已實見得正心以正朝廷正朝廷以正百官正百官以正萬民道理確鑿此等人能得幾箇或云知得此意有何難處如何便為知之至不知要知得到非見得天性之本者不能惟吾之性即天地之性故自盡其性則能盡人物之性參贊位育都不外此問古本大學遽及知本知至難道朱子所云即凡天下之物莫不因其已知之理而益窮之以求至乎其極此段工夫竟無耶曰此工夫即在知所先後内事物皆格至本末始終俱透方為格物之全功大學恐人疑惑知至至字為當窮盡天下之物始謂之至故又曰以修身為本本亂末未有治者厚者薄未有薄者厚者此謂知本此謂知之至朱子説極字即是本字一物皆有一物之極即此一物之原本今人説極字像四面都到的一般非也縁格物致知之義首章已説明故下面直接誠意説去首章亦非致知之傳大學如中庸只是一篇文字一片説去問窮理是極𦂳要事大學言之不太略邪曰經文安能條縷講盡如正心亦有現在旣往未來許多境界大學亦只輕輕指㸃而意自足大學一書二程朱子皆有改訂若見之果確一子定論便可千古何明道訂之伊川訂之朱子又訂之朱子竟補格物傳尤啓後人之疑若格物應補則所謂誠意在致其知正心在誠其意皆當補傳矣所謂誠其意者經中文法原一變非無縁故且以誠意為八條目之一亦欠輕重不過節次只得如此説耳如明善誠身中庸雖與治民獲上信友等一例説然豈可一例看明善即格致是誠意中事到得誠意則正心修身功夫皆到只隨時加檢㸃耳古本原明明白白特提誠意誠意總言即是誠身故章末便及心體可見語類中窮理只就自家身上求之一段説格物其精王陽明因格竹子致病遂疑朱子之説豈知朱子原未嘗教人於沒要𦂳處枉用心思也人與物本同一性禽獸真心發現處與人一様或止一節比人更專篤這箇是萬物一源的所謂本也子思孟子不説格物而曰明善曰知性正是大學知本之意説到性與善則程朱之説愈顯然明白而包括無餘矣聖人説出格字物字已包盡各條件但其歸必以知本為知至朱子之説與此頗異然不照著他說終不能知本其言或考之事為之著或察之念慮之微或求之文字之中或索之講論之際又謂如身心性情之徳人倫日用之常天地鬼神芝變禽獸草木之宜實盡格物乏義陽明攻之非也朱子原以身心性情居首並非教人於沒要𦂳處用心其實身心性情之徳果能窮本極源人倫日用能外是乎天地鬼神禽獸草木能外是乎只是經文巳備不消補𫝊耳伯安以格竹子為格物原非朱子本意今人講格物便如此説反為姚江所笑只以擇善明善知性等觀之便自了然天下之理皆是吾性所謂擇善者如申生之孝可謂非善乎但不能中庸不可謂至善於善之中擇其尤善者即中庸也故又云擇乎中庸擇善而後能明善見得此理内外無間天地萬物與我同一仁義禮知便是格物致知便是明善知性佛氏亦知於本體上求但其所謂性者乃靈明知覺而非理也善乎先儒之説曰佛所謂性吾儒所謂心佛所謂心吾儒所謂意葢彼所謂性指知覺所謂心指動處耳誠意章歴來講者不明其根便是失於以意為善惡之念豈知是念也非意也意便是有箇張主之名故須貼好惡説不可貼善惡説好善惡惡人之秉彞致其知者固有即未致其知者亦豈全無但其好惡有實與不實耳不必一片偽妄而後謂之不實即心中有不好不惡者與好惡雜發便不算是徹底實心矣旣無徹底實心便無徹底實事如此則其好善惡惡之發便虛而不實矣虛而不實是自欺其好善惡惡之初心不能快其好善惡惡之初心也此實字且對虚字看不必就對偽字看纔虛而不實便是自欺其初心矣至於虚便生偽自欺便至欺人如下文小人之厭然揜著是也總是一箇茍且徇外為人之根自微而盛耳凡人言而不踐行而不終是言行之不實也言行之不實者人得而㸃檢之若發動之意人所不知而巳所獨知其實與不實惟有自已㸃檢得到於此慎之而禁止其自欺則所發者無非實心無非實事此之謂誠其意也從來講解謬誤多端朱子於此節注亦數更其本至易簀而後定自記誠意章從朱子後總説不明白守溪亦只隨常説卻是寉灘説得瞭亮誠意之意即是好善惡惡之意非善惡之念也好善惡惡自途人至於聖人皆有之只是人不能誠已好善矣卻不能如好好色則好之中猶有不好者存而不能求必得之矣已惡惡矣卻不能如惡惡臭則惡之中猶有不惡者存而不能務決去之矣夫好善惡不善是自己明知其當好當惡卻不肻好之惡之以至十分真實非自欺而何果能真實務決去而求必得之乃為實用其力此處誠字且莫對偽妄説只對虚字説自欺只是不結結實實的好惡到十分尚未到如下面掩著欺人以至偽妄也鍾僑云如此則好惡非意之第二層乎曰就是第一層善惡屬念不屬意志意念思等字要分得明白志字屬好一邊最是光明的説到志大約是志於賢聖功名道徳意亦近好一邊人心靈明有主意便要好至念則紛然其擾起滅無時思則於念加功詣其極窮其變矣念是起頭思是深入如好好色如惡惡臭也不必定由致知來亦有不讀書人其好惡真摯不可謂不誠者只是由致知來更較親切獨知知字即致知知字實與不實實到幾分與不實有幾分自己未有不知者若致知的人其獨知處更自不同萬厯庚戌科此題文亦有見及此者但即以謹獨為致知又不是致知只是窮理謹字卻兼省察克治在内朱子語類中有一處言慎獨為誠意之助助字或係訛誤而陸稼書與四舍弟皆堅執以為誠意有正面工夫謹獨所以幚誠意如此則兩謹獨皆幚助的工夫惟末節誠意為正面豈有此理汝楫問心正己到至處如何又説先誠其意曰要曉得此條目都是搜根語國者天下之主家者國之主身者家之主心者身之主意者心之主故曰主意如船是心意是舵工一般意與念字思字不同念有善惡思有邪正意是立意要這様所以朱子説意字從性善説來意雖有為不善者乃是輾轉歸到不善去其初所發未有立意要做惡事者故意只好説好善惡惡而已但是旣發好善之意少聞又覺得善亦可不好漸漸淡來而初發好善之意虚矣旣發惡惡之意少間又覺得惡亦可不惡漸漸輕了而初發惡惡之意虛矣是不誠是自欺必狠用力務決去而求必得之有所好必好到十分滿足而初發好善之意始實有所惡必惡到十分滿足而初發惡惡之意始實人君名為敬賢而實未嘗敬到十分其敬賢之意未誠也欲去不肖而實未嘗去到十分其去不肖之意未誠也故曰王道本乎誠意讀書最怕是無疑道理本平常看去不過如此其實進一步又一層向曽問某人誠意章有疑否曰無疑問其解曰意即是動念處誠即是無妄無妄其念便是誠意如此解似乎明白其實不然念頭是無主的意卻比念有主志又狠些故曰有主意意惟好惡可言人性皆善好善惡惡不必致知的人都有此意誠未對妄説且對虚說平常人起一意思漸漸的虚軟了如草木不結實一般有箇好意又起箇亦不必然的意來攙了他漫漫的淡淡到與無此意一般後來遂流為妄又流為偽為詐惟實有此意才實有此事曽子追究其無是事之根只是其意不曽親切茍如惡惡臭如好好色實實務決去而求必得此之謂自慊慎獨即誠意獨乃意之處所如言人得而聞行人得而見意惟獨知而已慎者誠之下手丹頭也問正心工夫如何曰朱子謂更精細如好所當好而過於好惡所當惡而過於惡畢竟是涵養不到有走作某意以為誠意如戒慎正心如致中和誠意工夫精熟即是正心誠字有對妄説者有對偽説者有對虚説者自己不好的念頭常起以為不見之事何妨此便不是真心為善是妄也本來不實在為善卻遮遮掩掩借以欺人是偽也起意本善中間夾入亦可不必然的意思則不能滿其初心之量矣這是虚章句卻用虚之一說至下節揜著方説到偽妄有人問王陽明白日不想做的事夜間又嘗入夢何也曰畢竟是念頭未斷其未見之事者不逄其㑹耳你可曽夢見攜鍬鍤往人家鑽孔偷盜否曰不曽曰可見必不做的事便不入夢矣此是妄念不除也朱子用虚之説可以包此初是妄念不曽斷中間雖有好意亦夾雜而不能自慊以自欺旣自欺便卒至於欺人作偽使此意滿足如惡惡臭如好好色則妄與偽皆無矣朱子此章及中庸天命章尊徳性節論語一貫章㸃爾何如節周子太極圖説諸注皆孔孟傳心之要誠於中形於外某意不必説小人亦誠中形外竟是反找語氣根上何益來言如此可見誠於中方形於外不能誠於中雖外面假著其善終不能使善形於外也則何益之有哉自明自字且不必對新民説因有明命峻徳之云疑若有加於性分者故言不過皆自明己徳耳非有外於我非有加於我也自記邦畿千里三段是釋知止一節之義首段釋止字次段釋知字三段釋靜安自記止字本在事上説然必本體無有不盡故能立事理當然之極則止至善自須兼體用乃是易艮卦有不見之止體也又有止所之止用也況所引穆穆之詩以穆穆發其端而終以敬止即周子主靜立人極之意自記與國人交止於信說來卻與為君止仁相似前人因此乃謂是他國邦交如虞芮質成看此數句文意卻是泛説君當止仁臣當止敬父當止慈子當止孝與國人交當止信交字泛就朋友説不必著在文王身上清植骨角有條理講學者必條理分明故曰道學玉石皮面上有一層粗厲修身者必變化氣質使歸於純故曰自修清植問先生謂誠意之與正心似戒懼慎獨之與致中和其説嫌於史伯璿分戒謹與致中和為四項之弊曰這不同誠意者實意為善去惡正心則工夫純熟了誠意有似於不自私而用智正心有似於廓然而大公物來而順應戒謹工夫到得無少偏倚無少差謬方是致字説與戒謹不同也不是説得全無進步也不是史氏之病在分境地有箇不睹不聞又有箇無思無慮有箇念慮之微又有箇應物之際便大差矣有說正心無正面工夫者亦不是就如修身正衣冠尊瞻視三千細行八萬威儀何一可以不備齊家亦有齊家之事治國平天下更有許多禮樂兵刑之事只是意一誠都以此為根如崑崙一源凡九州之水千支萬派放乎四海總是此貫注時講於有所二字便説作心病有所與下章之其所一例此處未有大病痛但人心纔發便易至於失正要看此心字與下章人字皆指常人之心言也注中人所不能無及或不能不失其正語甚虚活又用之所行不能不失其正是言心之體本無不正到有用心便或有不得其正者非謂不得其正専是用而不累於本體也自記因在常人身上説故著忿懥等粗字面聖人則只説得喜怒哀樂此節是要無欲故虚下節是要有主則實其實則一而已自記先忿懥者怒最易發而難制也次恐懼則以禍患卒至易失其常次好樂便從容憂患不過慮及子孫之類益寛緩矣忿懥親愛等弊一曰蔽於理一曰累於私知至則理明意誠則私袪正心修身根源皆從致知誠意而來但加涵養省察之力耳自記時説指定治國為為君者故於事君事長使衆須說是教國人方通得去遂令孝弟慈一層屬君事君事長使衆一層屬國人幾不成文理矣不知有治國之責者豈惟天子諸侯凡大夫士皆是也三句便與孝經君子事親孝故忠可移於君事兄弟故順可移於長居家理故治可移於官只是一様口氣不獲乎上民不可得而治矣不能事君事長又將何以治其國乎自記老老長長恤孤字義與孝弟慈自别葢皆指施於國者言也言一國感應之效見平天下不外乎此為國與天下所爭只是逺近大小如以矩度物得其一角則四面準是矣自記平天下在治其國節某說似較直截明切老老長長恤孤不是孝弟慈絜矩亦不是使彼我之間各得分願之謂孝弟慈是家裏事上言治國在齊其家故就家上説此是平天下在治其國自然該就國上説老老長長恤孤正是治國之事老老如養耆老以致孝秋食耆老養國老庶老及異粻貳膳月告存日有秩八十者一子不從政之類長長即入學以齒將君我而與我齒讓之類恤孤即恤孤獨以逮不足春饗孤子孤獨者皆有常餼之類上所老者即國之老所長者即國之長所恤者即國之孤國之老上為老之民有不興孝者乎國之長上為長之民有不興弟者乎國之孤上為恤之民反有倍上者乎矩者曲尺是四方之一角國乃天下之一角也平天下無二道只絜此角而四方之耳天子在王畿之内不過是治國至巡狩述職亦止據其所以治國者以行賞罰非治國之外别有平天下之道也下文有國者不可以不慎道得衆則得國失衆則失國結末此謂國不以利為利以義為利仍結到國上身之在家國天下如算法之言圓心故曰其機如此又曰藏乎身不恕而能喻諸人者未之有也曰機曰藏皆以心之運乎中也絜矩如算法之言方角舉一隅以三隅反有一角便可以知四角也時説以民之父母作頌祝謳歌極難得之美名立論豈知平天下者原有父母斯民之責必如是而後稱耳民愛之如父母則其自然之符也自記忠信恕三字須看得分曉如盡吾孝慈之心忠也老老幼幼實見之事信也老老以及人之老幼幼以及人之幼恕也信與恕亦可就一事上看如所求乎子以事父其本實心以事父處是信其推實心以事父處即是恕自記巖問君子有大道必忠信以得之大道即絜矩之道否曰即是絜矩之道問信如何是循物無違曰如這箇盤子旣是盤子便道他是箇盤子豈不是循物無違若説他是箇杯子便不是循物無違問忠信曰發已自盡為忠以實心言循物無違為信以實事言忠如要東不肻西要西不肻東以實如説東即往東說西即往西問有忠有恕又有信莫是信居忠恕之間曰不説恕信即實事説恕信即實理忠信所以進徳文行忠信信皆指實理說忠信有在文行之先者如忠信之人可以學禮非此無以為文行之基有在於文行之後者如五達道所以行之者一也前輩多以恒足為足國以上文有財有用下文府庫財觀之或然也張太嶽程文劃然分足國足民義理尤備自記大學一書純是説道理就是平天下章講到生財仍説仁義義利全不及制度若周官周禮各自成書正不必牽混而自為表裏徳字仁字忠信字仁義字俱在絜矩之前一層所謂王道本於誠意自記問平天下章以理財作柱恐啓流弊據臯陶謨曰在知人在安民人君所綂臣民二者盡之矣欲安民者其要必由知人欲知人者其意只為安民凡章内所言人土財用以及生財大道等語無非所以為安民計也若以臯謨二語作此章柱意似尤渾成曰亦説得去清植榕村語録卷一

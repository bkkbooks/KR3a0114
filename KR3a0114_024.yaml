body:
  text: 榕村語録卷二十四大學士李光地撰學二聖人首聰明睿智大學先格物致知人總以明白為主若心裏不明白則剛為暴仁為懦勇為亂許多好字面俱可變壊孔子聖之至亦是始條理與他聖異兩漢人物儘好然底裏病痛只坐有些不明白不明白縱使天姿純粹只做到兩漢之功業節義而止不能復向上記問之學不能心得都不濟事得之於心就是不得工夫讀書亦日日進禁他不得逝者如斯夫不舍晝夜他心道流行所謂源頭活水也讀書只要心裏明白便是源頭活水崑崙一脉處處貫注放乎四海有本者如是老來見得讀書只要心裏一㸃明白除此都是無用若著一部書天下家傳户誦心裏却暗暗曉得有不妥處更是為累揚子雲配享孔子王荆公位在孟子上却有聖賢在後到底無用佛家心裏亦有亮處吾儒亮在理上不知他亮在甚麽地方然他却見到這一㸃受用不要人知雖是同聲相應同氣相求有人信向亦不可少只是本人若注意在此便沒有底子了讀書博學强記日有程課數十年不間斷當年呉下顧亭林今四舍弟耜卿皆曾下此工夫亭林十三經盡皆背誦每年用三箇月温理餘月用以知新其議論簡要有裁剪未見其匹耜卿亦能背誦十三經而畧通其義可不謂賢乎但記誦所以為思索思索所以為體認體認所以為涵養也若以思索體認涵養為記誦帯出來的工夫而以記誦為第一義便大差必以義理為先開卷便求全體大用所在至於義理融透浹洽自然能記即偶然忘記亦無害程朱亦然治參同契者皆以為有外丹某謂即有外丹亦須内丹就方能服得外丹不然消化他不得内丹就一團陽氣如火之然不拘金石皆能消化方有益即如糓食須是脾氣好方能成精液長氣血若不消化便都成病讀書亦然須要融洽不然撑膓拄肚便為害前嵗為一友作時文序彼時隨筆寫出偶然翻閱篇中有語云學求自得則視傳世末也此語古人却未曾説想人身後若全無知覺則千秋萬嵗名寂寞身後事要他傳何用若是有知生前浪得名所作的不成物事急忙不得消滅更覺得苦今人作文字及選文字都要多某却另一癖性只要少又人都要傳世某只要愜心方快活刻板印書如此便當何漢唐人都想不到然因此流布得廣反将書本㸔得容易不以為寳人須有求明道理滚熱的心如渴饑到十二分滴水顆米俱如甘露如仙丹立刻便要吞在肚裏那有不消融滋益精氣之理賓實讀書一切詩文厯算都不甚留心惟四書五經中這㸃性命之理講切思索直似胎包中帯來的一般此之謂法嗣當時徐立齋韓元少每見輒問某近又讀何異書人好讀異書便是大病書有何異四書五經如饑食渴飲祖宗父母一般終身相對豈有厭時不爾便是異端和尚家不必説他道理偏駁只丢了父母别去認箇師父丢了兄弟别去認箇師兄師弟人只一本彼有二本便不是人倫兒欲以二三年工夫學㑹算學冄回頭來耑心於經書道理其意以算學有盡而經㫖無窮也不知經㫖雖淵微都是根本語至易至簡厯數之類却欵項繁雜難以遽罄試觀一顆樹還是根本多些還是枝葉多些况人要精於六藝尤須以經書道理為根柢則用力雖勤而即末見本自有從容悦心之樂不然勉强先從繁雜處入恐致心病敝鄉有一秀才於石齋先生三易洞機極意殫精必求其解遂至失心正坐此也㸔得四書淡而無味就有些明白亦以為不足奇所以高者談性命卑者工詞賦豈知四書中青紅碧緑何所不有其味至味也不知其味者保得他講的性命必不是性命學的詞賦必不成詞賦自漢以來的學問務博而不精聖賢無是也太公只一卷丹書箕子只一篇洪範朱子讀一部大學難道别的道理文字他都不曉然得力只在此某嘗謂學問先要有約的做根冄泛濫諸家廣收博采原亦不離約的臨了仍在約的上歸根復命如草木然初下地原是種子始有根有幹有花有葉臨了仍結種到結了種雖小小的而根幹花葉無數精華都收在裏面讀書不專是要博須是凑成一堆某十八九時經書外纔㸔一部性理聞長老援古證今茫不知其端然覺得其言間有不聮續處又有違碍道理處當時思其受病之根為之説曰天上繁星萬有一千五百二十若凑起來比月還大只因月是團圞一物所以月光比星大别又如百十燈火因散開了反不如一大把之光昔有人力格數人問之渠云力兼二人便敵得十人兼三四人則三四十人不足道也以此見得須是合幷若散開終是不濟事荀子云合二十五人之智智於堯禹只平常人合凑起來便比得堯禹而堯禹不多見者以其散為二十五人也看書要逐條想一遍不但為書且将此心磨得可用不然遇大事此心用不入便做不來人須要用心但用過心不獨悟過好只疑過亦好不但記得好就不記得亦好中有箇根子便有時㑹發動讀書以心為本心不在雖勤無益佛家所謂如磨麵驢身雖行道心道不行是也心裏通透一㸃便為功甚大心為諸事之根然諸事又自有根諸事之根所謂派頭也文不學史漢韓栁字不學鍾王顔栁理學不宗周程張朱雖終身専精何益無味處致思至於羣疑竝興是超凡入聖闗頭自記程子云只是思便無邪重在思字亦説得好邪蕩之行可悦者一時而禍害無窮衛風鶉之奔奔便接定之方中其禍至敗國亡家可不戒哉問如此是懲創逸志分數多曰好處豈不用思思吾之性情何以不如古人之厚吾之行事何以不如古人之當其處上處下處常處變内外大小都有道理如何不思思却到無邪方是問讀書如何方有益曰且未説到躬行只要實在通一經便有些為己之意要通一經須将那一經註疏細㸔冄将大全細㸔莫先存一駁他的心亦莫先存一向他的心虚公其心就文論理覺得那一説是或兩説都不是我不妨另有一意㸔來㸔去務求穏當磨到熟後便可名此一經當日虚齋只将易經如此做得一番工夫後來天下傳其䝉引曰欲易明問蔡清故某作重修虚齋祠堂記曰自宋以後得漢人窮經之意者惟虚齋先生一人有人説十三經廿一史皆看過只是不記得總是他立意要㸔完經史便不能記何也為其泛也非切已要讀如何能記天下書原讀不盡虚齋云欲為一代經綸手須讀數篇要𦂳書書讀要緊者方好文中子云不廣求故得不雜學故明某自己驗之確是如此孔子説得極平常都是自己有得之言說一箇温故説一箇時習可見不溫不習便無處得説與知新京江張先生曾有對句云天下有讀不盡書總非學問心頭無打不過事便是聖賢因戯謂曰若作天下無讀不盡書總非學問心頭有打不過事便近聖賢何如先生頷之清植讀書要有記性記性難强某謂要練記性須用精熟一部書之法不拘大書小書能将這部爛熟字字解得道理透明諸家説俱能辨其是非高下此一部便是根可以觸悟他書如領兵十萬一様看待便不得一兵之力如交朋友全無親疎厚薄便不得一友之助領兵必有幾百親丁死士交友必有一二意氣肝膽便此外皆可得用何也我所親者又有所親因類相感無不通徹只是這部書却要實是丹頭方可通得去倘熟一部沒要𦂳的書便沒用如領兵却親待一夥極作姦犯科的兵交友却結交一班無賴的友如何聮屬得來若是要有所得精熟一部經書儘可用之不盡若要醞釀深厚畢竟是多讀多通方得沈浸醲郁四字最妙讀書不透多亦無益然亦未有不多而能透者人無所得雖讀得三通高談博辨証佐紛羅其歸如搦氷然初非不盈把漸搦漸消至於無有所以讀書以實得為主學問之道最怕那地方派斷如李中孚幼為孝子長為高士半世讀書所著論多未諦當以闗中派斷故也所以孟子見得透甚重見知讀書要搜根搜得根便不㑹忘将那一部書分類纂過又隨章劄記復全部串解得其主意便記得某向㸔三角法過而輒忘後得其一線穿下之根便再不忘某於河圖洛書搜得其根放下空空洞洞一提起千頭萬緒無不了然孔明當日獨觀大意今人解作草畧便不是大意者即精英根源也杜工部讀書難字過便不屑記難字如揚子雲乃是要採其精英某少時好看難書如樂書厯書之類即看易亦是将圖畫來畫去求其變化巧合處於太極圖不看其上下三空圏却揀那有黑有白相交相系處東扯西牽配撘得來便得意覺得朱子注無甚意味及入舘幸遇德子諤徐善長兩先生辛未後又得張長史楊賔實他們往復疑問俱是從道理根源上尋求因此想出見頭來再去㸔朱子書方有滋味有精采某年十八手纂性理一部十九手纂四書一部二十手纂易經一部凡某家某家如何説皆一一能記至今以為根基不然雖閒時熟思從何思起某先年只喜看有道理的書近年來不擇書看詩便覺詩裏有許多理看史便覺史裏有許多理如此方好讀書而惜乎已老矣朱子自廿來嵗便是如此所以無量精進讀書千遍其意自見某初讀參同契了無入處用此法試之熟後遂見得其中自有條理初讀大司樂亦然用此法又有入處乃知此言果丹訣也人做大司成只糾合有志讀經者且不要管他别様只教他将一部經一面讀一面想用功到千遍再問他所得便好有言不好讀經而好史者曰此不過是心粗不耐細看道理其看史亦只於沒要𦂳處看取耳到後來粗浮無比安能區别是非措之於用學問須是熟梅定九於厯算四十年工夫尚不能熟讀書不熟終不得力魏伯陽所謂千週萬遍也讀書著不得一㸃為人的心著此便斷根雖孜孜窮年無益也梅定九筆算乾浄有條理信成耑家之學可見學無内外終日談身心性命意却要人知我不妨是為人歴算詞章之屬務欲心通有以自樂不妨是為己總在心中𤼵念處分别某十七八嵗時於正䝉觀物有幾處不明白到省試時坐肩輿中崎嶇登頓一思輒竟日子弟生性廓落不妨但當有耑心之處便好大凡一技之精皆未有全為為人起見者讀書要見得自己有新意高出前人處却不可執定此意以為至當不易亦有此意初見甚確久之覺得前人老老實實的一句已似有此意到得後來確乎見得他那一句渾厚無弊包得我的意思足却不可易便到是處讀書人且要如和尚家先記得六根十八戒要𦂳的幾箇公案四書五經中條目數説不出却説我留心根本此不過空疎之别名耳只是地名人名瑣瑣碎碎記得許多却不必即如孟子五箇人倒忘了三箇都不妨若如大學中八條目中庸中九經忘了一件如何是箇學者後代書更多讀不盡事更多亦知不盡莫若就我所能為所能知者求箇著實據所見者寫出來再看所寫者可能如意中所見否若不差便存著不必定想傳世如此甚簡易近於為已朱子曾説有著碁高手人向國手從學國手經年不教一語只令看他與人著其人問故國手曰但是高著你都曉得令你看著者要你知道低著耳此語最妙他那規矩準䋲平平無奇處正是妙處困倒英雄所謂低者正是高之根讀書只贊其文字好何益須将作者之意發明出來及考訂其本之同異文義之是否字字不放過方算得看過這部書今耑門之學甚少古來官制田賦冠服地里之類皆無精詳可據之處此等必實實考究得源源本本確有條貫方好不然隨便著作有何闗係如淛中萬氏禮樂極有佳處但多是自己做主意所引經史只據來証吾此説不管對面反面尚有别義如問官事要偏在原告便只取原告干証不管被告干証要偏在被告便只取被告干証不管原告干証如此豈能歸於至是讀古人書詩不将全部五七遍過遽欲選他的大都是强作解事讀到五七遍畧已上口辭意俱能明白方纔見得他出即如見一朋友不是談到五七次如何知其為人朱子譏永嘉學問説王道不說孔子只説文中子説覇道不説管仲只説王猛其實不尋到源頭連這半截亦不識得盡即講周程張朱不尋到孔孟亦不能盡周程張朱既不見其疎漏處定亦不知其精到處古法之壊不壞於無知者而壊於一知半解者十分中曉得九分那一分不解不肯闕疑定臆造以求合承訛襲謬久且不知其非而古法之真益晦聖人云多聞闕疑萬古讀書人不可易此程子傳聖學功甚大但往往以絶學為言却起後來菲薄前賢自我作古一輩人流弊夫子自云信而好古好古敏求子貢答公孫朝何難説不由師𫝊黙契道體却説文武之道未墜於地在人尤妙在説賢不賢識大識小莫不有文武之道夫子焉不學而亦何常師之有立言多少穩實與夫子平日所言一般大抵風俗人心之壊皆起於讀聖賢書不信聖賢某幼時曾聞耆老云孔子之書不過是立教如此非是要人認以為實豈不是癡人説夢明末人都是此見風氣雖嘉靖以後方壊却是從陽明開此一派明代人讀書不細大害事王陽明為王守溪作傳最表章他的性説性説中引孔子語云心之神明謂之性以為吾止以孔子為斷不知原文乃謂之聖非謂之性也記不確乂不去查落筆便成笑話明道因濓溪敎他㝷孔顔樂處晩年欲作樂書朱子曾笑云不知樂如何作書謂樂在心作不得書耳性理中載此語恐人讀作禮樂之樂乃於樂字下旁注洛字書生不㸔小註於問樂策往往答云明道常欲作書是讀為禮樂之樂矣常州錢啓莘又錯以旁註洛字為正文因費許多心力著一部洛書皆畫作龜文繫之以詞以竟明道未竟之志豈非説夢此殊有關係非止文義少差而已明人讀書不及唐宋人汝楫問曰病在何處曰前半截以為程朱果髙於漢唐遂不讀漢唐人書又不能讀透宋人書後半截知讀漢唐書却只獵取一㸃詞采為文字之用與義理不相干許魯齋云學問到有朱子已經都説明只力行就是了此語似是而非恰像人已無不明白只欠得力行其實不能明白者儘多乍見似顯淺人人與知却中間難理㑹處無限只當云熟講深思而力行之方無弊且如堯舜以來之道至文武已無不明備周公又仰而思之夜以繼日何為也易經文周闡𤼵已明孔子又韋編三絶何為也説是前人説明亦要我在身心上實實體㑹親切方好近人不是想翻程朱之案便謂程朱𤼵明已盡不必措意都不是申公曰為政不在多言顧力行何如語雖結實亦未詳盡不講明如何行得夫子拈一信而好古為宗就中又開出許多方法如所謂闕疑闕殆擇善而從不是見古不論是非一槩深信不疑也人於書有一見便曉者天下之棄材也須是積累而進温故知新方能牢固問這様人若肯加功豈不更勝曰便是他不肯加功如富貴家兒生來便有得用他㸔錢物天然不愛惜惟辛勤成家便一草一木愛之䕶之讀書從勤苦中得些滋味自然不肯放下往往見人家子弟一見便曉者多無成就有人自訟其過生平所讀書不甚愛惜此是大病又有人自訟其過生平喜讀新書不好讀舊書亦是大病人畧畧知道有所不為便出衆若再講求學問有些淵源便不可測必有成就某嘗以厯論質於猗氏衛先生猗氏以示顧寧人寧人曰厯之是否吾不能知論文字則元人之文也某曰以先生之愽學何謂不能知厯寧人曰吾於經史雖畧能記誦其實都是零碎工夫至律厯禮樂之類整片稽攷便不耐心此是大病今悔之而已老矣梅定九了然於心了然於手却不能了然於口寧人則善談論其自訟處實讀書要訣也出門之功甚大閉户用功何嘗不好到底出門聞見廣使某不見顧寧人梅定九如何得知音韻厯算之詳佛門中遍参歴扣最是妙義豈必髙明人就是㝷常人亦有一知半解凡瓜菓時候未到縱將他煮爛他終是生人只知春生夏長秋收之為功不知成物却全在冬五榖至秋已成矣若當下便將來下地作種終是不好畢竟收過冬生意纔足人見其已入倉囷以為既死不知他生意在内自己收縮堅固以完其性可知貞下起元之理一絲不錯凡學問工夫火候未到時勉强為之終是欠缺讀書已是見得如此却須放在那裏久之寫出方好不但錯處須候其開悟即是處亦須候其爛熟爛熟後向人解説聽者不待吾言之畢而已自領悟到此時候一筆寫出自然枝葉渣滓盡去不消多著言語而義㫖朗然矣此竟非可强致程子自言十七八歲時見得如是至今仍見得如是却意味自别正是此意學聚問辨下著一句寛以居之大妙如用武火將物煮熟却要用慢火煨滋味纔入方得他爛以上致知人總以言行為要凡一生之吉凶禍福功業之大小成敗皆於是定之行者人之禮也言者人之樂也人取益改過自視宜小容人納諫自視宜大以能問於不能以多問於寡有若無實若虛何其小也犯而不校何其大也不學人往往與之相反人須是立心寛大若褊急縱使耿介特立亦是自了漢不能成大人物要有陶鎔人一團熱氣方是聖賢的派做官人不要貪逸樂人乃得逸樂武侯澹泊明志食少事繁把身子都抛開了做佛家以大地黄金布施不為希罕須將身子布施方是大布施即是此意他又推而上之至虛空無我不有其心便是大布施吾儒却不然到了不私其身鞠躬盡瘁自然連上一層都有了人心一味熱不得一味冷亦不得如關切人使為之營私大不是去了此病却又一㸃不照顧人連分人以財敎人以善都沒有須要乾乾淨淨却又滿腔子都是仁厚相愛之意方好風氣淳厚便太平聰明才智多是天生的至厚道可以學得大家都學厚道便成風氣有人問程子古人對姑叱狗炊藜羮不熟便至出妻何過耶曰古人厚道不可淺測寧自己落些不是必有宜出而不忍顯言者所謂出妻令其可嫁絶友令其可交此段説得甚好東漢人多近古便是勉為厚道耳問小學以恩怨分明為非有徳者之言怨不必分明恩上分明何害曰病在分明二字上如人有恩於我分數到那裏我報他亦止到那裏便是無情如我有恩於人亦論分數責報豈不大差且使其人有恩於我而其人却非好人我明説報他倘我有權勢他竟倚以作威虐將若之何只是遇他的事於理不甚違碍有可周全處周全之便是了不必使他知世間事變幻多端吾軰遇之却要反觀自己自己身心上有此此事便是有根的自己身心上無此此事便是無根的無根便可視之如無有矣機心最不可用他來害我我又生法去害他便兵連禍結而不可解即消化了不存在胸中猶非第一義須是反到自己身上追尋出我必有所以致之之處求所以善處之方纔為有益人當大驚懼時切不可就處置事此時非本心之正若以事機不可緩因旁言亂聽急忙應之十件十錯某自經鄭冦耿逆之變身嘗試之當鄭冦狓猖時欲招某出某不應遂至怒聲言欲禍予家彼時若一言稍靡便貽名節之羞若過抗便可殃及父母某只不動聲色至數日後有王友者問某作何計某曰僕不過一窮百姓彼若欲得而甘心者遣一役來牽之而去即與見面矣友曰招之不見牽之而見可乎某曰招之無可見之理牽之便有可見之義何也招之而見不為殿下臣必為座上客牽之而見則為簿下囚矣友曰見面奈何某曰若能以禮待則從容告以實情僕非明之臣子而實我朝之詞臣也倘為不才便不足用如以為賢未有賢而失節者彼於明家失節之人皆殺之流之則僕之不宜為用明矣如慮僕有别圖生變者請侍老父老母携妻子傍城而居教童蒙度日可已若彼赫然而怒發淡水洋亦命也王友為之稱善其後竟得瓦全倘倉卒應之則心氣驚惶思慮未能周到剛柔緩急之間皆足以憤事致禍矣當年某家貧賤時被光棍衙役設計陷害至辱及父母及後冦亂某起鄉兵保䕶鄉里迎請大師當時地方大吏皆仰重生殺可以自由有勸某因事報復者某皆不應此輩若積惡不悛自有天道不必參以人為團結鄉兵是為鄉里為朝廷藉此遂攙入一分報復私忿的意思便覺羞不可當當年有友謂某曰亂後長許多見識某扣之曰平時極相厚者皆掉臂不顧疎慢不堪此世果是佛家所云魑魅世界看破虛幻無復有情某應之曰果爾則是我於斯世先為疎慢以待人矣豈是處世中正之道惟當思吾平日所以感之者恐未必誠未必合理苟誠而合理則彼自負恩亦不足校凡極不得意時吾心中必有事焉則有所以處之如人久在亮處行忽入暗處一物不見彼時狂躁無益惟合目静坐再一開眼則虛室生白不須願外告状者雖無直辭然被訟者追㝷受訟之由畢竟有自己一㸃不是處故自反是切實受用若他人不是與我何干於禽獸又何難焉人貧窮時有求志一段自己的快樂貴盛時却有臨深履薄一層自己的受用無此便人生亦沒意味且如此方可不窮若是窮了便不是易當事只要作退一歩想便自安詳審慎如一味誇詡將去必敗之道鍾旺飛鳥遺之音不宜上宜下急喚其囬頭事毎要囘頭看鍾旺聖賢只論當下任千駟萬鍾總不易吾此一刻一念之安不與人論人非論鬼責這便是到頂要義過去未來皆所不計事到當頭時惟有義所當為者便為之不要思前算後某當海氛擾攘之際事勢甚危想來别無巧法只有義所當為力所能為進前做將去幸得免難鍾旺鋭峯僧云截斷做最是如今我們行一件事説一句話且求這件事這句話有當於理莫管後來時勢之有無翻覆無論料不到即料得到亦無益未有抛了當下的道理却去預管後來者以氣加人不惟累徳亦必害事鍾旺委蛇遷就固非君子之道然茍徒恃義理之正一任激烈做去以致僨事甚且貽患無窮祗是為血氣所驅耳推其極亦是一己之私非出於天下之公也鍾旺凡奸邪成黨時切勿過激彼既成黨釁將自作急之彼反合勢緩之則自相攻擊必矣乘其敝而去之則事半而功倍看史鑑中處此者或得或失無非天意人於既往事便如根本將來事便如枝葉如當下富貴便忘却窮時情状只覺得應該享用便是忘本枝葉必不茂盛將來享用亦必有限然不忘又有分别不忘而知止知足是也若怕將來再窮便貪財厚蓄以為備豫之計便為大錯人能公其利便自受其利如山之出雲本以為雨及雨下出雲之山亦被其澤此自然之理勢若施一小利即懐望報之心一著計較便索然沒趣人能勉强便好六家叔少時聞人家有不祥事便有喜色某規之曰叔父何為倖人之災樂人之禍叔父頷之自後便强為咨嗟或作愁苦酸悽不可忍耐之狀其始未必即出於實心到後來便習而成性他如今福禄夀考甲於一族若那意不變便非享福之相又人有一長刻刻要施展亦是大病如喫得一物却不消化存在肚裏豈不為害所以顔子有若無實若虛謂之亞聖客有云學者以治生為急父母日受饑寒却杜門不出而曰我以立品此邀名之事殊濶於情實先生曰此乃佞以自文其説事通賄之失而便其私者此等須論道理若合道理的經營奉養則即此便是立品的切要事不是兩件若非道非分則無營求之理父母雖不免凍餓有招之行竊者從之可乎夢中遇極凶險事只心不動便不能為怪推之日間亦當如此凡變故猝乘只心不動當不能為害問心不動自當有箇道理出曰固是且不必説到此只以神之應感論之亦自不爽又曰此須是涵養得到不然亦當忍敎不動天下做得事來者多是不要做的人急躁便易敗張子房於髙祖之欲廢惠帝武侯於先主之東征都暫且由他盖事到無可柰何時只得放寛以俟其機不知天意如何且聼天處分若是天要如是人有何本事不然必有轉機乘其機而用之可也古人當此是窮了只得用此法某當年值耿鄭之亂曾用此頗有濟耿逆初平時諸當道行事殊失民心某憂甚知且再亂或勸某進書言於親王某念彼時雖進一書如以小石投大海何用姑且由他如天意有在或反生出好機栝來未幾白頭賊聚夥萬數劉國軒攻圍漳泉親王歸路已斷於是督撫提鎮一齊束手某乃團聚鄉兵使三舍弟引廵撫呉興祚兵吳表弟引將軍拉哈逹兵自山竝進遂解泉州之圍於是親王以下皆視某為干城而姚熈之得某一字立刻施行凡諸苛酷弊事以次銷革王荆公詩漢業存亡俯仰中留侯當此毎從容最妙不知當日宋業未嘗存亡俯仰荆公何以那様不從容人必靠定道理不走作至風波來方可言命只是賢路﨑嶇時須委婉些方是立朝柄政者茍非大賢與之交好比附未有不為所累故仕宦以孤立為安身的是名言人只當存至誠心禍患之來如何可定天便來替你解救是誰力量敵得過天方正學論此一段甚好受暮夜金更不好却之亦是常事何故楊關西便傳為美談可見東漢雖風尚名節而受暮夜金者尚多立品不真自古而然奸惡黷貨之人竟似他終無死日不知這罪過是要帶去的人生須是刻刻辦著死時不罣碍如做官的人刻刻恐怕有賍欵日日造一交盤冊子打算去官時落得乾淨走路纔好朱子云自古未嘗有被人殺死的聖人以聖人都是一團好生意思故也賢者則有嚴氣正性嫉惡如讐者矣此便有殺機佛家云羅漢見惡人生嗔惡菩薩見惡人生憫度羅漢與菩薩只差這線路即是此意状貎雄偉人須要現出善象無意中流露一㸃仁愛渾厚意思便有福所謂心象也若一味剛强快利便多沒沒而死某閲人如此者甚多聖人不廢肉食禽獸食草木人又食禽獸以其尊於萬物而備有萬物之精英故也若禽獸食人則為變異矣只是不可貪饕須存逺庖厨之心父兄敎子弟以權術莫要説實話畢竟即先在父兄身上學起子弟懐利以相接是無所不為之根而其端在於詐有痛詆人惡者先生曰子親見其事耶曰得之傳聞曰就使親見其事立言固自有體夫子惡稱人之惡子貢惡訐以為直正為此耳况傳聞乎鍾旺人有不是處雖子弟僮僕且莫罵破他某督學時屬僚有無禮者某竝未當面質責及他知悔來謝某則慰而勵之他便相安了賔實督學時敎諸生極其至誠懇切只是當面罵他不通他便難堪某當時只與他透講書理他這一邉明白那一邉不是處自然知道何須罵破所以隐惡二字最妙不但是要存心長厚亦是留他改過之路好使人自新陽明云人有過不可又加功去文飾其過如一句話説錯已是錯了又添一句去塗飾是兩句錯了恐塗飾不工又添一句去彌縫是三句錯了何若改向好處十句話有後來九句是那一句不是人亦諒之矣何必展轉囘䕶徒然增其破敗最為髙明不誠無物此理最奇人説話纔著些假不但當時人不信即千百世後人一見便知之如諸贋書之類是也可見此理無形影無聲色充塞遍滿斯須不可離之鋭古之聖賢都亦随時孔子於弟子皆呼名孟子七篇便無對面呼名者程子當面稱賢背面呼名至朱子背面亦稱字以上言行榕村語録卷二十四

body:
  text: 榕村語録卷二十七大學士李光地撰治道一天下有道不止是朝廷清明連士庶人都依傍著道理上行方算清明在上重濁在下其實息息相應如天氣清朗則地下百物滋生人靣上光潤則體中無病果然朝廷清明便百姓殷實矣草木無根豈能開花結實學問不有心得總不相干功名亦然聖賢事業悉從方寸流出不然雖做得一匡九合猶是器小此根即是天地之根順天下之情定天下之分兩者不可缺一虛文多一件實事便少一件作事不可過粗亦不可過細講求得太繁碎不特人難行覺得自己亦難行只得不行若算計到其事之利害又算計到自己之聲名得失如何有這樣萬全的事故計較得及於民者有七八分利益只得就去做為治事事要不拂民獨有毒水而漁焚山而獵却宜禁一用此無復噍類矣孟子說數罟不入斧斤時入不如此民用不繼興北方水利以省漕運之煩除天下厄塞要害留兵外其餘城守半用民兵即厄塞要害處亦倣屯衛之制以省養兵之費而厚官俸以蘇民困是切時要務制度全壞於宋以周禮為本而參以漢唐與明之法其庶乎人要剪除惡人須自己果能無惡才服人如淫祠豈不宜毁但自己道理足心地光明氣焰大於他他就無說不爾他便不服西漢諸事草草郊用五畤原廟陵廟紛然無理却人民樂業至匡韋輩引經據古盡廢不制之祀毅然欲明先王之道而盜賊蜂起饑饉洊至日就淍敝諸事不古獨在這事上復古徒為紛擾而已何當於治所以立身治國皆要有本末徹底澄清方能一線做成某以兵部侍郎銜出為督學古北口總兵官馬進良不依儀注輒抗行某初不與較及某為巡撫某標下把總葉保告馬酷刑事下巡撫馬甚懼不知某胸中何曾有所記挂只看理體如何葉保本是刁悍之徒總兵將把總掌嘴未為酷刑武官大一級打一級軍法也此關朝家體統把總遽敢以私憤告總兵乃亂民也某問葉保流三千里奏上改發寧古塔須知設官所以為民然必由官以及民不爾便民亦不靖如一顆大樹畢竟由根以及幹由幹以及枝由枝以及葉然其幹其枝其葉何嘗不與根貫為一體細栁營中但聞軍令不聞天子詔文帝喜之者喜其奉將軍令即天子所用之將軍仍奉天子詔也人都是一般上農夫不過食九人何以授糈詔祿至有千石萬石者豈非不均之甚却是理當如此其功德足以及人也易云養賢以及萬民必養賢而後及民只是德要與爵稱小德役大德小賢役大賢若下犯上少陵長小加大賤陵貴當下便是無王法典史得治百姓所挾者縣令之勢縣令所挾者府道之勢由是而藩臬而督撫其所以然都是奉天子威靈耳福建大吏又請開捐實倉殊覺不必大槩事不從根本上做只從半中腰做起便不見其利只見其害如今地方倉穀大半都為官吏侵盜那移且福建潮濕實在浥爛亦有之既至虧空私行攤派上司借端盤查需索使費層纍申咨部行駁詰文案紛冗生出許多事端而害總歸於民倒不如且聽其自然總督又因海賊之故請禁海上捕魚之船不知如今海賊不比當年鄭成功等有巢穴傍海如舟山海壇南澳厦門臺灣諸島皆是官兵駐札海賊無駐足處其行劫不過如陸地之賊偶然盜竊耳陸地之賊何嘗斷何獨異于水賊且渠輩仍在岸上居住何嘗以海為家如文官留心查訪安插武官設法搜捕但得其魁首一二人便可平息閩廣小民以捕魚為生一行禁止民便失業況漁船不行則所行者唯賊船而已如禁夜然不許良民夜行行者獨强盜與夥盜之營兵而已當年遷海禁海使百萬無辜室廬田産蕩然不存饑寒流離而死者不可勝數其實海賊一切銅鐵硝黃何所不有通海者就是耿精忠王進功營辨猾吏貪兵奸民是但許耿精忠王進功營辨猾吏貪兵奸民通海而不許良民下海也何益之有哉目下法禁何嘗不具而不肯奉法者官也非民也如今但講求任用好人一切疏節濶目便自然利及百姓矣治天下樣樣皆當講求第一是要有根本湯曰朕躬有罪無以萬方萬方有罪罪在朕躬武王曰作之君作之師有罪無罪惟我在天下何敢有越厥志一人橫行于天下武王恥之有此便要算他是聖人論語堯曰章能得幾行書直是說盡聖人為政惠而不費不要百姓感恩但存望報之心便有限了豈必望報心裏記得有此便害事臣道無成而代有終坤之含章是已即君亦不宜自張其功一有功績恩德欲人見之知之便不精不純耕者吾田鑿者吾井帝力於我何有羣龍無首不言所利皆是此意天下平萬國寧平寧而止無他神妙天地亦是如此人有不善一能羞惕便不可量古人不說無過而重改過故顔子不二成湯不吝凡惡人直言敢諫者欲以動無過舉自髙也適以得愎諫言莫豫違之名而不知受諫改過為聖賢至髙之行而不可及也自古稱改過之善者穆王作甫刑出於逺遊之後秦穆思一個臣發於敗殽之餘漢武輪臺之詔感於窮兵殃民之末聖賢儒先皆矜重而録之管仲謂小白惕而有大慮知所惕懼便是圖治之根本及葵丘之㑹微有震矜而叛者九國惕之意怠矣立國以民為邦本固是但中間士大夫一層却要緊人君不與民接如大帥令將辨將辨令士卒便可聯如臂指恩信不及於將辨到得有變而望士卒越將辨而衛大帥亦僅矣故養賢以及萬民乃一定之理古聖賢心熱無比明知天下不能常春而不秋常治而不亂就是得幾年人物安育風俗醇美亦樂莫大焉孔孟之所不能一日忘者孔子至夢奠兩楹尚想明王孟子言數過時可舍豫其誰無一刻忘世至老始悟五百年之運孔子當之而已為見知聖賢皆無先存一教後世之意在其胸中者讀書人須看得宇宙間事皆我分內才好郡國立學多方培養不過要培養得此意出古人仕以救民當官盡職乃分內事非為君也鄉人有新製一服者其子索之不與乃曰父不以此服見豫欲兒為父讀書不可得也鄉里傳以為笑今人以做好官為為君與此何異做官者不思令君重但思令君親不求見敬於君専求見愛於君最是惡消息做大臣要知古意又知時務方才做得些事古今只是一樣不是兩截不知時務算不得知古意不知古意亦算不得知時務做事全要推功讓能大家做方可以久些若凡事多要是我做便有病便不能久此即王伯之分所以伯道一時雖哄得人過後便消滅無餘既為大臣顧不得情靣所以謂之公者不宜復有私也所云孤者甚危而無偶也若要人人呌好則大壞極敝矣聞江蘇張孝先撫軍一到任吳下人便歌頌曰不是好消息暗地在那裏做呌人不覺方好一近名便有毛病許魯齊說凡做事就教人歡喜便不好喜歡是不能久長的物事士大夫老自當退天地亦有休息時寒冬至物多凋枯此不是無用却于生物有功古者憲老而不乞言但觀法他的模樣竝不敢勞其言語原有此種道理如老臣致政之後天下仰其德望何嘗無補不是奔走禦侮方為有用治者事有條理也亂者紛無頭緒也顧亭林云小官多而大官少則治信然文中子曰唐虞三代不可復見舍兩漢吾何之先儒或笑其陋其實三代之流風善政惟漢猶近當時守土之吏自郡守上更無人郡有十縣縣有令長又有三老嗇夫游徼三老即今之鄉約也掌教化嗇夫即今之甲長也主錢糧游徼即今之練總也司盜賊縣有十鄉鄉有鄉長又有鄉三老嗇夫游徼略如縣制鄉有十亭亭有亭長凡三老嗇夫游徼皆郡守自行啓除薦之朝亦即為之録用猶見聖人闢門之意此等皆即用本縣之人其名俱載在宦籍故漢書列之百官志非比如今之鄉約甲長練總皆無賴之徒為之竝無職銜他自知貪叨事敗不過笞逐於其微賤無損也故趨利為非不少顧惜漢時內之黃門執㦸一切左右服役之人以至外之三老嗇夫游徼大抵皆用士人所以吏治可觀三老之類惟其為官也故亦榮於鄉食其祿而不肯自棄惟其為本鄉之人也故各習知其風土人情有一盜則知其根株不逾時而獲矣有一訟則知其孰曲孰直而為之調停排解其拖纍寢擱者寡矣於土田竝知其疆界以及其買賣所自雖刁誣無所施從與民親切處料理故得其情而事省某初入館時同人聯一小㑹一日魏環極先生至靣有喜色問之曰道長寧爾講參董漢䇿差快人意某曰以僕觀之不為好事先生詰其故某曰漢唐屢下求賢之詔訪積行遺逸之士此段意思甚好此典久未及行范覲公獨舉其人以為他處倡朝家置之顯要未必非買千里馬骨之意今被劾則薦者削色聞風者閉口所關不在漢䇿一人也且謂曾受笞辱即不宜舉人之受笞亦當問其官為何官事為何事假令以枉法受賕之官笞不畏强禦之人此其過在笞者乎在受笞者乎縱使少年不謹率德改行亦不必追其既往公冶長在縲絏之中不害為可妻妻尚可官獨不可乎古人或取之奴僕或取之盜賊盜賊猶取况受笞乎先生㸃首曰是蓋當時授漢策以臺諫諸言官不平謂傷衙門體靣雖先生初時亦不以此見為非其實皆私意也後某為閣學時方舉𢎞博以充翰林館中亦以破例沸然有謂某宜力爭者某不應宋時舉大科無論已仕未仕皆許赴試中式者官在諸科上進士之専為翰林非古也朝家官人考德論材非吾輩所能私也人身分愈髙工夫愈深愈見得天下多好人自己不濟轉見得人都不如我動歎天下無人聖人隨材器使最妙人各有一長避其所短用其所長孰不思有以自見在上者又惟恐其功業之不成奬勵優容之到後來多把朝家發楦得不可測度連氣運都覺得隆盛工虞水火終身只辦得一事後世都以為聖人原不是聖人之世人都多一耳目口鼻只是聖人器使得妙西蜀人物能有幾個經孔明用來便覺得足用因其材也不然雖人材之多如宋仁宗神宗時用之不盡其材只如無有一般神宗臨朝對程明道尚歎天下無人豈無人哉不能用耳自古小康亦必有人若一時屈指無人便可為戰栗問既知無人畢竟如何才好曰須是求賢豈惟求賢又要興教化重師儒養出人才方可選而用之一部易經即乾坤兩卦尚有戒辭惟一涉尊賢養賢便無不吉祥者可見尊賢是無上妙道古時命官惟視德德懋懋官功懋懋賞是有功者止於賞而官不及焉此是治天下之要道而其根却在不邇聲色不殖貨利課官且先講清亷已得要領王荆公說得好伯夷在伊尹之後數百年而孟子品居第一以其清也人能革靣聖人已許其為善這便是天地之心革面已是革心之漸况面何由革畢竟從心裏動了愧悔方能革就是趨風氣圖功名亦且引他到這邊來久之習慣自然天良亦現矣某人對策云假亷吏不如真貪官或欲髙拔之某不可因奏云為官至于真貪貪固極矣不應尚有罪浮于此者况假亷吏在他雖帶些假在地方生民已受其利矣升平之官大家以亷介相尚豈必盡出於心之本然但得相釀成風不敢更變所裨於世道者已多奏訖大䝉嘉許做州縣官全要體認父母二字須實引父母的事任在身上養之教之有此誠心為本大段已得又須委曲以得其心為守令要在周知民情甚非易事必以心著實推求刻刻做題目入思議來方好先歷州縣而後為大吏民間事體都閲歷過做來自較熟鍾旺書吏實少好人然欲天下太平必先此輩孟子說班爵祿却自庶人在官者始漢家吏治曹椽得自辟用最妙此輩都用讀書人從下面好起不相欺事便易辦不爾雖上有嚴明之官覺察不到者多太平之世民生日滋而土不加廣欲其地利之盡則水利不可不興溝渠開泄大以成大小以成小隨地宜而修之要在守令得人著實留心耳鍾旺明代雖經泰平然諸事多未曾整理如直𨽻山東儘可開溝洫修水利治其田土以省漕運乃置之不理安坐而待哺於東南使江淮之間有竊發者中梗漕運則青冀兗豫幽并之地無以取給矣世間要熱閙須耐得幾年冷淡人儉朴了方能富厚但教民儉又須兼勤南方勤而不儉北方儉而不勤教之勤儉矣又自官府躬尚簡朴與民休息自然民氣日復若只要外面熱閙饒使百須具舉到處興修究所自來皆出蚩蚩者之膏血安能使家給人足平糶以出富民之榖此法最妙古人立倉曰常平曰社皆是此意至借賑蓋不得已耳以教化防間為無益豈有此理即如眼花了用眼鏡一遮便都看見若說待我閉目靜坐養出精光雖有此理然當下用不著即如狐裘以禦寒當下便暖難道倒說待我保養元氣足時自不用此不成聖世教化行人材衆多彼此薰蒸德品淳厚意思深融如米穀多置釡中則飯成倍美人家製蛤醬備置五味終有草氣不如捕魚家囤置一處其味自佳彼此初不相假借惟互相醖釀其美自倍教人而人服從却有兩路一是示以心得一是誘以功利七十子之服從示以心得也漢之經學唐宋之詩賦明之制藝誘以功利也聖人在位躬行心得以施教化又官不及私昵爵罔及惡德人材安得不盛教養人材最要緊某督學直𨽻時於文武童生中有能背誦四書全經小注及三經五經竝有膂力武藝者皆試之文理粗通便為拔取此是勸誘之法久之自然皆歸實學六藝之風庶幾可復宋時監試即今鄉試省試即今㑹試廷試即今殿試也監試及額者省試不中明年仍入監試省試及額者廷試不中明年仍入省試進士有五甲六甲其一甲亦不止三人有五六人不等一甲方得簽判後甲則丞簿尉一年一考自張元廷試黜落謁韓魏公公命作雪詩元得句云戰罷玉龍三百萬殘鱗敗甲滿天飛公厭之不顧元忿竄西夏見用遂使中原疲於奔命自是廷試者不復黜落矣問簿尉皆用士人使皆得至大僚此法殊善曰如今吏員出身自知終身不能望正印長官亦知其無復逺大賤而陵之他自然一心圖富安得不奸貪百出若概用士人勿以資格相限必知自愛以幸進取矣親民之官得其人天下便易治宋時簽判尚在通判下惟一甲大科得做明代科場解大紳便作弊永樂命擬人所不講事為問解泄之於其鄉人吉安一府遂至鼎甲居其二前十名居其七狀元曾棨記資好將書冊上語成片寫入至卷紙不足書於殿磚上永樂閲卷未完傳問具以對乃命就磚上録而閲之吾鄉李九我蘇紫溪自少同學後蘇復從李受業而丁丑先逹至癸未李㑹試至都主其家蘇以部曹為同考臨入闈問如何看文字李曰子才髙遇有平淡文字恐係有學有養之士宜留心不可輕棄李卷適在蘇房已置之矣忽思李言覆閲乃大稱賞薦之遂得元彼時尚有古道言不及私亦以信二公之生平不茍先王禮樂都有原故如制禮便將鬼神情狀都安置體貼妥當在內樂的緣故不知如何便感天人格鬼神其製十二律幾箇竹管便與天地之氣相應却甚奇某看禮樂亦不是難事如今把禮斟酌令至易簡人不難行自然樂從樂便把如今的戲整頓起來就是樂孟子斷得直截今之樂由古之樂人多在律管上講究即使得了虞舜的律管作起韶樂亦不必一時便鳳儀獸舞家語中記孔子入齊見童子揖讓於道曰疾驅車韶樂將作矣此等話皆荒唐安上治民莫善於禮移風易俗莫善於樂若只郊廟中作樂就是雲門咸池韶頀大武亦只天地鬼神聞之如何天下風俗就㑹移易自然是人人見聞才能移風易俗如今人看戲到那忠孝苦難時便涕泗交流移易風俗可見不難伊川論禘謂以所出之帝為東向之尊其餘合食於前此說為長朱子但謂以始祖配之自記古人的樣子莫要走他的他不敢破決的事畢竟破決不得如入繼之君自尊其親雖濮安懿王亦終未曾入廟至明世宗居然將興獻入廟坐於武宗之上不知當日曾經北面如何能相安既非創業時追尊之比而使為帝於身沒之後不復有宗法後世能從我乎繼嗣之君於所生父須還他一個稱呼即稱皇考尚未全不是伊川謂當稱皇伯父亦無據至明世宗直入其父之主加武宗之上孝子不為人後要做孝子就莫即帝位既即帝位又不承前面統緒豈有此理這是太祖傳來之統不可以私其父者聖廟從祀之禮斟酌停當最難前日議朱子升堂將位於顔曽思孟之下某奏朱子功德雖不讓顔曾思孟但十哲俱是聖門先賢一旦加其上恐朱子亦不安似不如列於十哲之下為是果䝉俞允古者君臣如朋友情意相洽進言亦易畏憚亦輕朱子云金人初起君臣席地而坐飲食必共上下一心死生同之故强盛無比及入汴得一南人教他分辨貴賤體勢日益尊崇而勢隨衰漢髙祖初得天下羣臣固無禮叔孫通不過記得許多秦家制度耳杜工部云叔孫禮樂蕭何律其實壞事就是此二件問民俗奢靡冠服僣踰共相炫耀了無分别不如此衆便笑為鄙嗇失禮若不立為品制欲民生日厚難矣哉曰諸事自當法古然亦必順民情因時勢而行之方好如今倘要復緇布之冠豈非無謂若於一頂帽分别貴賤使奴僕賤流一出門人便知為何等人雖衣錦繡無用且覺其不稱自必廢然而止矣古人飲食衣服起居皆拙滯不求便利總欲苦其形骸也凡極形骸之樂者皆後世所為某謂四舍弟六經外六藝皆當留心文武既分途射御暫可不講至禮樂書數實要緊事書學有顧寧人數學有梅定九音學五書後苐補聲氣之源一卷便完全定九再將厯論補幾篇仍做出九數存古亦算完備樂某留心數十年其書規模具存胸中只得一年工夫便成至禮須弟具稿後再共斟酌其略當以孔子所分冠㛰喪祭射饗朝聘分目其實八件只四項冠㛰是一項喪祭是一項射饗是一項朝聘是一項起於士大夫推而上之以至朝廷有經文者不消說至如儒先所論有參差處須著一論於後以見意今所不行者則分集經書以類存古制又有一小禮一大禮幼儀曲禮在冠㛰之前者附見於前有朝廷大事不在八項之內者附見於後更斟酌為一簡便禮書令鄉黨士大夫居家可行者又省便又免於村野同志者相約行之㛰禮三月廟見朱子改定三日今便可從或問三日連本日算抑離本日算曰古人亦是大略說連離皆可如武成丁未祀於周廟越三日庚戌是離根算召誥三月惟丙午朏越三日戊申下越三日庚戌越五日甲寅皆是連根算可見不拘所謂宗子者自髙祖直承下來皆是世嫡方可稱之若於祖於父於曾為嫡長而於髙則非者便不可以祭四代稱宗子矣須俟異日其子為己立廟方是宗子此段曲折先儒講論甚略以其義明白耳然如自身顯貴至於公卿又不忍不祭四代即古之為公卿大夫法得立廟者豈必盡嫡長乎此則可推禮文而知不徒以義起也如今要斟酌禮最是大宗小宗難停當此處處置得妥他都容易古今不同者此為大若事必不能行者空言無用只是不可自我創造畢竟依倣古人或本之經或本之先賢如伊川說人皆可祭髙曾祖考既有服豈得無祭朱子亦如此說便當依他人皆疑伊川奪宗之說細思之亦是庶人立不得廟他有爵廟因他而立未有冕服在後反以庶人主祭者如今只得爵位尊者主祭而宗子竝立以存其統祭有大宗大宗之難在宗子宗子而有祿位則善矣宗子而無祿位無祿則不祭如是而主祭猶用宗子則犯分不用宗子則廢古如之何則可先君斟酌最當主鬯者必用有祿位之人祝文則竝列主祭某宗子某直祀某主鬯者居中宗子直祀居旁俱視行輩年齒為前却先時寒族祠堂祗是春秋兩祭先君以為冬至元旦應祭冬至天氣之始宜祭始祖元旦王正之始宜祭先祖先君未見程子書恰暗與伊川合人總要明理禮本因人情而制也程子謂服既及髙祖則祭亦宜如此只是品物有豐殺禮物有繁簡是庶人亦可祭髙祖但不可僭用士大夫之禮耳然其中有古所無而今時勢不同者須想得到不然後人亦難行宗法是大事大宗固宜復然其子孫貴者不必宗子宗子不必貴祭用貴者之祿豈反使宗子之賤加其上萬一宗子竟是農夫如之何其加於朝官也只得貴者主祭宗子及直祭同祭主祭者居中宗子居左直祭居右長一輩者稍前同班者齊排卑幼者稍後祝文竟寫主祭孫某宗孫某直祭孫某至小宗亦宜倣此意如某於法得立髙曾祖考之廟然某即非髙祖之宗子也某為主祭孫而宗孫即用髙祖之長房長孫為之直祭者每年換人至五世而祧則用曾孫之長房長孫為宗孫以次而下倘有德有爵不可祧者則倣古禮祖功宗德之意將此主移向始祖之廟合族公祭不然貴者之子孫倘竟降為皂𨽻又安可以祖之爵而隆祭之禮與所謂葬以大夫祭以士者大不侔矣祭以本身之爵非以祖考之爵也家禮既脫稿被人竊去後來朱子不能重具稿惟囑門人楊氏曰此稿日後出時中有某條某條未訂正當為改之故家禮中有數條皆經楊氏注明讀者不可忽過家禮要存古法故段段有宗子行禮到底人不能行如今須考定令眼前可行方好卿大夫家古有世祿故子孫雖無位行事尚得與大夫同今卿大夫既無世祿設數傳之後支子顯逹而宗子却無祿則宗子分止宜薦而支子又不得祭是使有祿者身享鼎烹而祖宗僅受菲薄於心安乎寒家宗祠在山中先世士大夫多居郡祭時不躬不親惟使直祭者經理其事故時序嵗臘潦草獻享而已及先君定議以為宗子有祿自當主祭即宗子舉人而支子進士宗子侍郎而庶子尚書爵秩相倣亦仍當宗子主祭若宗子無祿而庶子顯貴則貴者以其祿主祭居中宗子居左直祭者居右一同奠獻如此斟酌既不背古意而於今可行方不為空言問官及三品者皆得立廟假如官六七品得立廟否曰適士二廟古也六七品於秩為郎今之郎即古之士立祠何妨亦得祀四親只是殺其體問諸生庶人何如曰不可立祠祭於寢亦可祭四親其禮又當簡略問小官亦可祀始祖否曰亦可只殺禮就是了大抵程朱有一人說過便可用他是從道理上稱量過的聚族之道聖人所尚不忘本之誼君子所先人皆不敢忘其祖宗無不是處自然風俗日厚只是屋之大小禮之豐殺各安其分初亦無害小宗如及身貴便應立四親廟子孫以世代而祧下至本身元孫都該用貴者之宗子宗孫主祭蓋五世之澤未斬也如五世內支子有貴者亦不得於此祠中主祭當自别立四親廟可也大宗不容有二小宗不妨其多祭為吉禮今仕宦之家四親多不立廟又止忌日設祭祭墓及祭忌古無是禮也朱子不敢廢忌日之祭然變服用淺黑色巾蓋猶哀之餘也豈可當吉禮乎程子云凡人服既至髙祖祭亦應至髙祖既得祭豈可不詳制度某歸即為廟於宅內作四龕依朱子法隔開便不嫌竝坐南向且便於忌日各祭神座略低以便祭時几筵相接古時天子諸侯大夫各有祖廟其合食也則太祖正東向之位今既無各廟之制又無東向之禮則同堂異室自然竝坐南向只是妣本附祖合饗時人家都設一筵大不妥母子同席猶可舅婦可同席乎伊川自說得確四親應分為四席寧可以一筵而分為四處若再為通融則祖與祖為一處妣與妣為一處一筵分為兩筵則更便矣意厚而禮明不惟其物也吾家遵程朱之教祭自髙祖以下於官舍則立祠版奉以行但祠版只同一龕既不容版隔作四如朱子之制則供饌時勢難多席若循俗通用一席則是舅婦同席於體不順今酌分為二席東席祭四代祖考西席祭四代祖妣父子姑婦固無嫌於同席也官舍無常難以如禮如此權宜行之庶猶不至大謬清植畫像之設程子以為少一根鬚便是别人其言似太固夫推孝子慈孫哀慕之心夢寐髣佛猶願見之况形像宛然想見平生者乎自記張子言三年之喪期可祭此句未安至云期之喪既葬可祭緦功之喪踰月可祭似乎可行自記墓祭以寒食始見於開元之詔其文曰寒食上墓禮經無文近代相傳寢以成俗故萬季野疑其起於陳隋之間寒家上墳不用寒食而用戌亥之月似更有理古者廟祭墓藏樂以迎來哀以送往報魂報魄求諸陽求諸隂各有其類順天道之節自記祭酒之禮有三樣不同先灌酒者代祖宗祭先代為飲食之人所謂祭酒也次奠酒斟一杯奠於列祖斟一杯奠於列妣次方每祖位前各斟一杯每妣位前各斟一杯如盛筵延賔然初登筵則向外以酒灌地所謂祭酒也次斟一杯送首座客所謂奠酒也客辭則令人每客前各斟酒亦三樣不同有人年少妻死無子即扯一族人為嗣於神主旁書男某奉祀大為悖謬繼嗣本為繼祖乃為男子設未有為婦人設者況夫在則夫為主其題主應作亡妻某氏神主其旁不書奉祀錢楮乃五代後事然行之久亦難廢即使聖人到今制禮亦必不同于三代何則人之習俗不同即鬼神亦不同也古人祭取蕭合膟膋爇之所以求神於陽灌酒於地所以求神於隂今之燒香亦求神於陽之義此皆無害於禮從俗可也古冠皆以束髮當𩕄處率使空如今婦人之覆髻者而略加髙夏收殷哻皮辨爵辨及後世竹皮進賢逺游諸冠皆然即冕亦然惟後板向前如覆瓦前仍空也至漢元帝頭上有壯髮一攢因覆以片巾王莽頭秃又全覆之而謂之幘自是人皆效之及宇文融遂製幞頭以方巾幂首四隅四帶兩帶結髮後垂其餘以前兩帶從髻後繞回而紐結於前唐明皇因以後兩帶用銅絲鈎起彎向前以示異即今戲場中兩翅冠也魚朝恩則內用桐木為楞骨使髙而方士大夫皆承用之五代時始改為軟紗帽即用幞頭而模之明始加漆為今戲場中圓紗帽而以方者為幞頭榕村語録卷二十七

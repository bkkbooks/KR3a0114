body:
  text: 榕村語録卷十一大學士李光地撰周易三繋辭傳古今至文也惟中庸像之文體直是一様上繋是說易經大本大源下繋是説讀易的秘訣及凡例繫傳首章乃太極圖説所自出圖說之分隂分陽即尊卑一節之義動静互根即摩盪二節之義但繋傳由摩盪而生六子圖説則由變合而生五行言各有所當耳男女即繋傳之男女也知始者所以發其神作成者所以生其形易簡二字實包中正仁義之義成位乎中則所謂立人極者也清植動静有常兼二義其分則或動或静其變則時動時静如風雷是動的山澤是静的就山澤言則澤是動的山是静的所謂或動或静也水停蓄處又是静山發生處又是動雷迅風行是動歛氣収聲又是静所謂時動時静也清植剛柔相摩是一對對相摩雷與風摩山與澤摩八卦相盪則山可與雷盪風可與澤盪都是言交易問此二句著卦上説否曰未著卦所言八卦猶言天地間之雷風山澤如此相盪耳王輔嗣及程子俱不著卦説惟朱子方説作生卦剛柔亦只是説天地間之二氣不是説卦畫剛柔清植至尊言春風帯潤最為豐年之兆乃知易云潤之以風雨非漫下風字也雨以潤之上繋竝風亦曰潤者謂東南風也詩曰習習谷風以隂以雨舜之操曰可以阜吾民之財清植乾以易知之知乃乾知大始之知與易則易知之知不同坤以簡能能即作也易主心言故屬徳一邊簡主事言故屬業一邊後儒只因把知能二字看混遂有以知行分配徳業者悞矣清植朱子説悔是吉之根吝是凶之根最好凡遇不好底事只求之於已便消了多少火氣纒繞佛家重懴悔亦是此意吝不是大惡如何便至於凶只是不爽快留在那裏遮遮掩掩便可以做出大不好來人當禍患來時痛心疾首思愆悔過有這念頭便可不動火氣消除魔障某平生覺得與人無大仇怨事事要忍耐亦是尋根見得自己身上明白了便已消息許多憂悔吝震无咎不在悔吝无咎之辭之外即在悔吝无咎之辭之中看出介比小疵先一歩悔比補過又先一歩於此處提撕警覺便是憂且震處自記仰以觀於天文一節淡淡幾句把佛家無常迅速生死事大六道輪㢠諸説都包盡了至與天地相似範圍天地之化兩節便是佛家説不到的尺蠖之屈以求伸也龍蛇之蟄以存身也把道家虚静之説都包盡了至精義入神以致用也利用安身以崇徳也過此以往未之或知也窮神知化徳之盛也便是道家説不到的仰觀俯察節括盡佛氏精妙幽明難知也其實不必逺求但觀察於至顯之天文地理陽主施隂主受晦明盈虧循環往來幽明便是這縁故下箇故字言其所以然不外此也知之則凡作息出處進退顯晦皆視此矣死生難知也其實不必逺求但於所作之事原乎事之所以始反乎事之所以終自無而有自有而無死生便是這様下箇説字言其説即如此也知之則知誠者物之終始只就應事接物上可以了當生順死安之義矣鬼神難知也其實不必逺求但就身上體驗耳目口體精之為也其聰明運動氣之為也隂精陽氣聚而成物是對待的至於思慮夢想倐忽現滅出入有無幻化萬端則逰䰟之變是流行的鬼神之情之狀即是這様知之則踐形盡性克己復禮清明在躬志氣如神郊焉而天神格廟焉而人鬼饗矣原始反終始可原終之後又誰為反之所以朱子亦覺説不去只云能原其始而知所以生則反其終而知所以死反終即在原始中看出以某言之始終不必貼生死只是泛論言即一事一物之始終而可以知死生之説也精氣為物游䰟為變亦不必貼定鬼神觀凡精氣之為物游䰟之為變而鬼神之情狀可知矣夫子賛易許多神字有説似鬼神者有説似神化者有説似心神者要想箇至當不易的著落纔好神者兩物相感之幾互根之妙其原只是一理如人一心放之可以千頭萬緒歛之便自一些沒有可見一些沒有處便有那千頭萬緒在其中至千頭萬緒時原有那一些沒有者在其内此之謂變化千載而上千載而下我一思便到可見千載上下我有他的他有我的不然如何相及無他一理故也動中有静之理故於動便知有静静中有動之理故於静便知有動隂有陽陽有隂相生相剋止是一理湏知説廣大為何推到専直翕闢葢明天地一動一静無心之妙即所謂易簡也故通章以易簡結住此意少人㑹得静専動直静翕動闢是推廣大之原於易簡處故曰是以大生焉是以廣生焉而下文以廣大變通隂陽之義歸之易簡至徳自記法言云萬類錯雜必衷諸天羣言淆亂必折諸聖河圖洛書如何形狀自漢以後宋以前無有也惟班孟堅五行志有自一至十八卦是也自一至九洛書是也畧可考據至陳希夷後始傳河洛及先天之圖朱子答王子和尚以先天圖為不足信而以九為河圖十為洛書後見蔡季通始改九為洛書十為河圖而歎先天為最精朱子於大根大源處已透又心虚而大故一聞合理之言便從而信之今日既有朱子以為依歸何必重加根尋自取擾亂且説道理必不能如朱子之精考據源流必不能如朱子之確以折羣言之淆亂可也河圖不必拘天一生水地二生火諸語只以隂陽奇偶言洛書只以參天兩地三才言天下之理數盡此矣五為皇極人也參兩之㑹也三至一二至六皆生生不窮無住時其順而加則乘也其逆而減則除也五不用至十又成一用奇數之皆得五用偶數之皆得十變化鬼神即從相得有合上看出相得所以成變化有合所以行鬼神自記變化是就推行有漸處見鬼神是就合一不測處見五氣順布所以有漸也隂陽互根所以不測也推此則變化鬼神分頂相得有合甚明説卦傳以後天分職為帝先天互藏為神亦此意自記聖人揲蓍而數學之精俱括於内其根皆始於七故勾股法勾三股四為勾股和以無餘數也大衍之數五十其用四十有九七七四十九未至七不成比例過七又不成比例以有零數也凡開方方圓相求圍徑相求圍積相求無不始於七方徑七二十八圓徑七二十二為密率以此為例卦乃乘數蓍乃除數蓍䇿是法厯數的一年全數為三百六十五日四分日之一除五日四分日之一為氣盈其整數為三百六十蓍策則虚一外所餘者四十九復以掛一一策當氣盈五日四分日之一之數其餘四十八策則一策當七日半合之得三百六十日併掛一所當數正與一年全數相合不似太元潛虚洞極諸書牽强與厯數相應却極割碎分裂不整齊郭子和専以掛象閠朱子辨之詳矣但朱子以扐為指間奇為揲餘又似専以扐象閠而掛無與於閠數如此則下文而後掛不得為别起積分之象矣其實掛象氣盈扐象朔虚二者皆象閠氣盈不用算一定是五日四分日之一故掛亦分二了便掛朔虚却湏細算始得故扐在揲四之後夫子分明言箇奇字奇是箇一數扐字從手從力又是箇實字故歸奇於扐當是歸掛一於揲餘言併氣盈於朔虛而後成閏併掛一於揲餘是象閠也五嵗再閠而後别起積分故再扐而後掛也然如此則掛象積分之端耳象再閏者再扐也不知氣安得盈朔虚而後氣盈蓍安得掛覺得四四揲之尚有零數所以有掛専以扐象之則不全清植揲四象時過揲象期歸奇象閠揲䇿正數也奇䇿餘數也時與期亦正數閠亦餘數自記問啓䝉附論中迎日推策一篇算來皆與厯法脗合孔子於各様圖象未嘗以配厯法獨於蓍策諄諄言之所見必無差謬倘治厯明時直用此細加推測未必不冠絶今古曰恐是如此清植以言只是將所為所行之事於問時對蓍言之自記問本義以至精為辭占之事至變為象變之事觀彖不從以變占屬至精象辭屬至變何也曰至精節是言蓍筮之用至變節是言卦爻之藴葢本河圖而立卦爻生蓍策以前民用易之本末具是矣故此篇首列河圖遂紀蓍策因備舉辭變象占四者以象辭具於卦爻變占生於蓍策故也以此推之則變占應屬至精象辭應屬至變明矣至下文又復列舉蓍卦爻其義可見問至精故能極深而通志至變故能研幾而成務下文通志與前同却舍曰成務而曰定天下之業又増一句曰斷天下之疑何也曰通志主蓍言成務主卦爻言以方知易貢將析卦爻以立義故於成務中亦以定業斷疑析言之卦方以知故能定業爻易以貢故能斷疑如當需之時貴於孚亨而貞焉斯足以定其業矣然自郊而沙自沙而泥處位不同義各有當則非爻無以為斷要皆所以成天下之務而已清植以此洗心此字何所指即指蓍卦之徳六爻之義也蓍卦爻之設乃是聖人牖民一片婆心所寓以此洗心則滿腔都是惻隠至退藏於密而此意常在故及其發而能與民同患也以此齋戒根神物來亦是此意清植易有太極此句即其圓妙氣根於理理因氣見説來渾融無迹鍾旺吉凶生大業且不必入教人趨避意天地間若無箇吉凶或有吉而無凶一切事業經綸何自而起惟大業由吉凶而生故聖人教人趨避以成天下之業自記書不盡言何以繋辭便能盡言既有盡意之卦象因而繋之辭則非凡書之比矣故於繋辭下著一焉字其㫖自明第二章繋辭焉而明吉凶亦是根上設卦觀象來與此正同即有見於天下之動節所云繋辭亦是根上節象字來繋辭焉所以吉亦是根上文四象來故俱著焉字經書中助字無虚下者清植以上繋辭上傳卦各三畫以天地人有定位而事之始中終有定序都是如此因而重之為六十四亦皆理數之自然非有一毫造作於其間貞正也常也吉凶不一要以正而常者為勝惠廸吉從逆凶豈無修徳而凶不道而吉非其正常也天地以正而常者為觀日月以正而常者為明天地日月豈無變異非其正而常者也此隂陽人事之主宰若如時解便大有病吉凶相勝既是一定之理聖人教人趨吉避凶謂之何哉貞觀貞明便是天地日月之貞於一處老氏所謂天得一以清地得一以寧亦頗得此意自記大徳曰生故生乃天地之性絪緼化醇則生意可觀者也自記日與月寒與暑二氣兩體却是交藏互根此所以自然相感而無容心也自記承否之後是甫安甫存甫治也觀三箇不忘字便見得去亂亡未逺與制治未亂保邦未危口氣是兩様自記八卦是伏羲所名朱子於乾卦顯言之至屯則不敢定繋傳其稱名也雜即指六十四卦之名也而下云其於中古乎其有憂患乎亦未定為誰名今思伏羲時井鼎諸物或未備意者其文王所名乎聖人憂患都是憂患天下不是只為一身作易者其有憂患乎吉凶與民同患聖人滿腔都是仁原不見有一層皮殻其出入以度外内使知懼則雖師保之嚴不是過矣然又為之明其憂患與所以致是憂患之故牖民覺世全是一片婆心故人不覺其有師保之嚴而直如父母臨之也口氣是如此清植柔之為道不利逺故六二不如九二以此推之則知九二强於六二矣以逺貴剛故也又知九四不如六四六四强於九四矣以近貴柔不貴剛故也其柔危其剛勝故三雖多凶而六三又甚於九三五雖多功而九五尤强於六五也此二節不過數語直括盡全易中四爻義例然其立言曰其要曰耶一以見聖人之徳盛禮恭語多渾含不似後人武斷一以見易理變動不居雖畧論其大體見得如此而終不可以拘泥看殺清植理本易簡惟健順者能體之若謂易簡生於健順則非也天地之道可一言而盡者誠也誠則自然易簡不誠而自謂易簡者妄也自記健以聖人之心體言順以聖人之行事言非兩人也易對險不對難前章所謂辭有險易中庸謂君子居易小人行險皆是以險易相對葢以險遇險則不能知險而亦無以處此險也故惟易者能知之亦惟易者能處之本義却用難字為對然難亦險也雖易而能知險所謂不逆詐不億不信抑亦先覺者也簡與阻亦然自記易乃坦易如居易以俟命之易不是難易之易如人以機械變詐來我亦以機械變詐應倒往往為所欺蔽遇機械變詐人我只以明白坦易處之倒都照見得他的情偽所以云易以知險也既知之便能以此處之不過坦易明白誠心直道彼亦乆而自化矣簡與阻亦然遇事之煩難瑣碎者我只求得其要領則煩難瑣碎處亦俱知其故若仍以叢脞御之如何知其阻以簡知之即以簡處之而已某解易以知險簡以知阻與本義畧異葢身亦入險阻便難有濟我即易以知其險即簡以知其阻以此知之即以此處之則險者易而阻者簡矣人心之光明易也行事之順理簡也在我無邪曲曖昧而行所無事當險阻有何不濟静専動直静翕動闢即是詮解易簡二字葢在人之易簡可以心地行事言之天地之易簡於何見天之道其静也専一其動也直遂豈不易乎地之道其静也都包在裏面不見形聲其動也一放出來色色俱全豈不簡乎朱子説得妙専直是一箇翕闢是兩箇如兩扇門有閉有開閉則一無所見開則無所不有却不是開時方逐物造出來原是一有都有也愛惡生於時逺近生於位情偽生於徳利害最重悔吝為輕吉凶居其間凡易之情近而不相得則凶或害之悔且吝總頂時位徳而論之不相得者以惡相攻以偽相感也近而不相得則勢必致凶甚者或至於生害即輕者亦必悔且吝也以此推之則近而相得者必獲吉利可知逺而相得者雖未必吉利其免於凶害亦可知即逺而不相得者雖或不免於悔吝其不至於凶害又可知矣著語無多八面周盡故是聖筆清植以上繋辭下傳繋辭都是説辭説卦都是講卦繋辭中雖有講卦處意總歸於辭説卦中雖有説辭處意總歸於卦參天兩地而倚數儒先之説都不甚明白葢以理言天一地二地為天包豈非三乎以數言一數不行必至三方有數三三為九是也以形象言隨便㸃三㸃求其心皆可規而圓之隨便㸃兩㸃求其角皆可矩而方之兼此三説其義始備清植朱子謂圓者徑一圍三方者徑一圍四三用其全四用其半其實徑一圍不止三徑七圍當二十二且用全用半之説又多一轉看來天數起於一而實行於三一是全數行不去推至於十百千萬總是箇一必以三推之方可至於無窮地數却只湏從二起便可行又曰三一為三三三為九三九為二十七三二十七為八十一歸到一上來葢此數是自三歸到一不是自一數到三清植道即命徳即性義即理物所固有者為理性命人之體之則為道徳義能和順於道徳而理於義則能窮理盡性以至於命自記和順於道徳而理於義謂立卦窮理盡性以至於命謂繋爻自記兼三才而兩之分隂陽而迭用之且就聖人上説六畫成卦六位成章是就易上説兼字語勢側在兩字分字語勢側在迭用字自記兼三才而兩之是道有變動故曰爻分隂分陽是爻有等故曰物迭用柔剛是物相雜故曰文自記參同契納甲應月候之説似先天八卦方位太元方州部家之法似先天生卦次第故朱子疑希夷康節之前有傳自記天地定位節與出震之序不符又與乾坤六子之次亦異故邵子以之證明先天確矣然湏先言水火乃及雷風而此反之下雷動節兩相對舉又俱先陽卦後隂卦不以左右隂陽為次為可疑耳葢此章重在雷動節見隂陽次第此節卦位對偶原可錯舉至下一左一右對舉先陽卦後隂卦取其於辭為順於左陽右隂之理無礙也自記數往者順節邵子之説似與朱子異愚謂此條葢承上節起下節之意言八卦方位若如上文起乾坤三陽三隂數至震巽一陽一隂是順數也若起震巽一陽一隂數至乾坤三陽三隂則是逆數也論方位相對尊卑之序湏從乾坤説起然易圖之意則是起震巽終乾坤以著隂陽消息之次如下文所云也自記數往知來邵子説是自震至乾皆已生之卦為順自巽至坤皆未生之卦為逆看來此湏與雷動節合為一章而數往一節為過文天地是三隂三陽底卦山澤是二隂二陽底卦風雷便只一隂一陽自三隂三陽數至一隂一陽為數往者順是結上節自一隂一陽數至三隂三陽為知來者逆是起下節逆數云何雷動風散云云是也坎離亦二隂二陽却放在雷風之後聖人之意以水火為重故邵子曰乾坤定上下之位坎離列左右之門推而至於天地日月四時畫夜莫不由於是也又如雷風之例則湏云日以晅之雨以潤之聖人立文却不然不以女先男也上文山水居澤火之先下文水火相逮亦是此意清植雷動節既卦位與上章同則氣候亦湏相應何以一南一北之風雷同為生物之功乎葢是兩兩對說雷以動之動其潛陽也風以㪚之㪚其伏隂也雨以潤之秋多雨也日以晅之春多暘也艮以止之是収歛之時兌以説之是發榮之候乾居大夏首出庶物謂之大君坤居大冬息養萬物謂之慈母自記冬春之際陽氣將𤼵故曰雷以動之秋來則凉風至日晩暮亦多風雨潤在西邵子所謂秋多雨是也日晅在東觀朝日尤可見艮止也生意止息以徳言也兊說是生機暢遂亦以徳言然春夏則萬物皆䝉潤澤秋冬則草木歸根山林象在其中矣自記雷風皆火之所發似乎重複體之於心二者最大雷主動有二義一奮發有為一戰兢惕厲風主散人有私欲凝滯要有箇消散他的道理即省察克治也雷即戒慎恐懼風即謹獨是問學中要𦂳處故震巽當頭問澤亦水也譬之人身作何分别曰水主流行澤主滋潤人身中周流榮衛活動筋骨那沾濕潮潤者皆水也其便溺津液涕唾則澤也水無形以氣向油漆物上呵之便有水是從陽氣生出既生有形質便是澤水是初生頭澤是既生尾至尊以天縱之姿撫大一統之運件件俱經講究著落甞諭四海甚小不過是一大湖退而思之漢書中明言西水自入西海而先儒説先天圖乃有澤注東南之論向疑其為據中土以立言大地形勢未必如是恭繹之下始知先儒之論原無差舛也梅定九亦言西洋之水與中國之海通漢唐以來都不識天多以天為茫茫蕩蕩無有知覺不過胡亂生出人物來任他升沉顯晦後來儒者覺得不是亦只空説有箇理在不然何以日月星辰萬古不錯生人生物都有條緒其實天之形勢大其運動包羅人豈能與之同乃聖人説來天與人直是一般説天聰明果然天聰明説天有好惡果然天有好惡説上天震怒果然天有震怒説皇天眷佑果然天有眷佑人有性天亦有性人有心天亦有心無絲毫之異一切風雨雷霆都是天之材料而中間有箇主宰謂之帝各項職掌無不聴命於帝其生殺舒歛氣候一到無有鉅細莫不響應如人一身其五官百體皆人之材料亦各有職掌而主宰乃心也㧞一根毛髪心亦知痛所以謂之天君聖人説天竝不説他精微奥妙只在人日用飲食上説盡道理先天圖陽生於子隂生於午後天圖陽生於亥隂生於已京房火珠林及十二律旋相為宫又皆陽生於子隂生於未問先天圖正也後天圖陽生亥隂生已何也曰至子月已成一陽其實無無陽之時亥月陽已生特未成一陽耳隂亦如此問隂陽相配而星術家率言隂生於未何也曰此扶陽抑隂意也然亦實有此理但觀春夏秋冬雖平分其實正月物已萌芽直至九月始彫落則陽盛隂微極顯然者論林鍾居丑應在子月之次而今居未者隂陽分對亦有此理如日屬陽夜屬隂也又如夫婦初娶之時同牢合巹本是一體及至成禮之後則男正位乎外女正位乎内各不相攙同者所以聨其情異者所以嚴其分子午宜對而起於未者避陽之衝也後天圖儒先原不曽講明朱子答袁機仲云後天圖思之終不得其解與其支離附㑹不如闕之以待知者可見朱子亦不敢自信其餘諸儒所説卦位不過依著震東兊西離南坎北説過何曽説出縁故來當初只有此圖竝無後天之名因邵子傳出先天圖遂别此為後天如今因分先天後天又以後天為先天變出來的多讀些古書者知道以前原無先天之説至詆邵朱為杜撰而篤信宋儒者讀書又從宋截斷不思漢唐以來就説得未必是然源流在此不特好處要知道就是不好處亦要知道所以讀書貴多不耑是考究却是源流不可不知耳讀宋以後書者不知後天即易之本圖非先有先天而變為後天也讀漢唐以來書者又不信先天以先天為於易經之外以意造出者二者皆不是後天圖惟項平菴一説近似項氏以此圖配五行謂震巽皆木故居東離火故居南兊乾皆金故居西坎水故居北土旺四季故艮居冬春之交坤居夏秋之交木金土各二者以形旺也水火各一者以氣旺也坤隂土故在隂地艮陽土故在陽地震陽木故正東巽隂木故近南兊隂金故正西乾陽金故近北而接乎陽也此亦一説然使當時畫圖之指只如此亦無甚關係竊謂此圖理甚大大抵以四陽卦始終四隂卦却置在中間如人原只是純陽之氣中間必娶妻而後能生子至生子又只是純陽之氣始終只是陽氣中間却離隂不得又如播一種子所包莫非陽氣假令此種便自能結果豈不甚善到底湏生枝生葉開花方能結果中間許多事雖是無用底然却離他不得清植後天圖把乾位在西北其義甚深蓋到子位一陽来復天心已動惟前一位故者已滅新者未生寂然不動喜怒哀樂未發時乃天下之大本已往的渣滓盡皆消化方能生生不息人不特惡念要消即善事亦要消不可留滯如喫飯到睡時都要消若留在腹中便成病堯舜事業亦浮雲之過太虚曰戰乎乾者不戰不能消化天如此聖人亦如此只是聖人有不戰戰必勝矣若消化不盡便是間斷便息了過去的留滯便是未來的將迎文王得力於此所以謂之純後天似與先天相反然天道人事脗合甚精伏羲以動為陽静為隂文王却以静為陽動為隂如人静而無事將心存在内卓然精明此以神明用事為陽有事而動則形骸用事為隂萬物藏於冬蠢於春生成於夏秋然冬春却是陽生夏秋却是隂生巽離兊震坎艮各從其類陽却隔斷在頭尾中間夹著隂如人動念要做一事不是一心便做得來畢竟費些力氣做成方完了這箇念頭最妙是安頓乾這一位好人做事有兩様一是倦怠了打不起精神一是事已做完放不下還攪擾在胸中這便接不過去天命就於此斷了非於穆不已也戰乎乾正是要去此二病果木地下種子不是大始枝上方結之實乃是大始所以乾在木果在木之果也艮為果蓏則下地之種也終日乾乾有事之時也夕惕若正是戰乎乾萬事皆從此始艮萬物之所成終而所成始也所成終要重讀而所成始也輕讀積之不厚則𤼵之無力藏之不固則出之易盡艮物之所成終也而成始即在此齊乎巽一隂生也如人形體用事便理欲不齊要截斷使歸於齊潔齊者一毫不罣累方為潔方才齊人只見地下種子為始不知枝上方成形者為大始所以謂天徳不可為首也人不知此為首耳乾是由動之静轉灣處艮是由静之動轉灣處兊是盛滿時常人有常人的八卦陽是理隂是欲震是警動意坎是閱厯意艮是歸於静正巽是私意萌動離則虚妄兊則溺矣聖人有聖人的八卦陽是誠隂是明震為戒懼誠之端也坎則中實艮則復於静正而乾也者終日乾乾夕猶惕若吾軰睡時心便放逸聖人猶是惕然一放則天命不流行矣中庸注自戒懼而約之約如約之以禮之約非約少乃約束也約是約心不是約戒懼乾是静動之交過渡處又是始終貫注處巽是明之端離則朗若懸照無物不見坤是無往不順兊是和悦皆中於節矣朱子致中和節註可謂達天徳致中便是誠致和便是明後天圖包盡天下物事以人心言之最易明白帝出乎震即是人心動處人心無事時原自寂然到有事便動出來至巽則所以做事之意已定故曰齊然必此心乾乾净净方能齊故下文添出潔字潔字甚精離只是明底意思故曰相見又曰嚮明而治到得坤正是做事時節故曰致役説言乎兊則事已心休了乾卦伏羲原放在南邊此是天的正位文王却放在西北妙處正在此不可放過大凡人做事已完則此心必懈了不然則昬了故放一乾卦在此欲人提醒此心使常常分明孔子下一戰字最妙此時不戰便昬惰了如人日間做了許多事到了夜來睡後便昬昬沉沉不省覺了此是不戰之故必提醒此心使雖在夢寐常有清明之氣始得此一卦是文王最用意處勞乎坎則休息了成言乎艮言事至此而始成也萬物之所成終而所成始也此句甚有力不可輕抹過言萬物到此方成是萬物之所成終然人但知其為成終不知其成始者即在此其實萬物之所成終即萬物之所成始也而所成始也五字湏著眼清植至尊嘗垂諭云先後天圖可説得合否奏云論理自説得合理只一箇只是論其物事却是兩箇頭面復諭云如此則先天是自然的後天豈不像是安排出來不自然了麽奏云據臣愚見想來凡天下物事頭一箇都是自然的至第二箇便要畧加安排就是先天圖横圖是自然的圓圖便畧有些安排如數一二三四五六七八九十數去何等自然若用他來算必定要用一歸不湏歸等法亦是安排的聖人老吾老㓜吾㓜以及人之老㓜一毫無所勉强但至要做實事便到底是他的老㓜不在一家住這裏便要安排湏是替他制田里教樹畜有許多事豈獨聖人天地亦然赤道是自然的黄道就不能全自然天包地外地在天中兩極為樞運動有常豈有不自然的到了黄道便斜掛在赤道上月與五星更有些參差到那行不去時連天也像不得不畧加安排遂䝉笑諭云所論極當正是如此後天是帝之各専其職處先天是神之互為其根處帝變化成萬物神則所以能變化而成萬物也神字専屬先天前面只是引起自記上章言帝存乾坤之位此章言神則去乾坤而専言六子此理至妙葢乾坤即帝即神也程子曰以主宰言謂之帝譬之於人則心也以妙用言謂之神譬之於人亦人之神也心與神非二物也然心有主而神無在故言人之心則心在腔子裏可指其處所而言五事以思與貌言視聴竝列猶上章以乾坤與六子竝列也若言心之神則固難指一處以為言如我們静坐於此忽然有人言觸於吾耳則耳旋聴之目旋視之因辨其聲亦鑒其貎彼時將以神為在耳乎在目乎將以辨聲者為神乎抑以鑒貎者為神乎無在而無不在故不可以指其處所也問程子之釋帝釋神皆根乾為義似於坤無與曰乾坤豈是二物坤即乾中之坤也分言之則為乾為坤専言帝言神則坤綂是矣清植足是行動的於震為似艮何以為指解者曰手能止物手之用不止於能止物也從來解易者多順著經文隨便扯一箇道理來解以為聖人的話雖横説竪説無所不可而不知非也指之為用比足不同足一動便離故處獨指之用不離故處以静為動雖動而不出其位故艮為指也聖人取象皆取與他物不同處直是體物工妙如水取其至實何以為至實以其不盈也論形之堅實者無如金石然都不能比水如今用土築堤雖極堅厚使用夯硪舂之畢竟陷下些去五榖八斗斛雖極堆滿試揺動之亦遂陷下金銀至堅矣鍊之亦有消耗中有渣滓即虚處也惟其盈滿隆起故得而消陷之水則取平而已流而不盈滿則溢無不由地中行者人之學問自己做出一箇盈滿光景便是他虚處無而為有虚而為盈約而為泰難乎有恒矣乾為健而健之中始震動以有為中習坎而出險終凝然而能止皆健也坤為順而順之中始盤旋而深入中光明而洞達終怡然而喜悦皆順也總言之健順而已分析則又各有三徳焉以上説卦傳河汾以時之相生贊序傳以旁行不流贊雜傳極有見天下道理只有相生相對二義序傳因經卦之序流水説去以明卦卦鈎連皆有相生之義雜傳因反對之卦雙雙發明以見卦卦配搭皆有相對之義如此看易方覺得活活潑潑頭頭是道而占筮者引伸觸類能事可畢夫子如此贊易後來詮易者尚多看作板定物事豈不可歎清植以上序雜卦傳榕村語錄卷十一

body:
  text: 榕村語錄卷二十八大學士李光地撰治道二問韶至何時始失傳曰其晉之東乎漢髙廟中尚有之五代亂至二三百年秦炬所不盡者至此始滅絶無遺問古樂似皆以詩為主曰詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和樂之始終條理備矣詩所以言志而詩之言必抑揚髙下歌之而後可聴其詩之和平廣大者以宫聲歌之清揚激發慷慨悲壯者以商聲歌之歡忻流暢者以角聲歌之急疾清促者以徵聲歌之繁碎嘈雜者以羽聲歌之然五聲無節不能中和則以律和之由律而寫其聲於八音之中至於克諧無相奪倫則神人以和矣問鳳儀獸舞是實事否曰是實事如今官府行禮處畧有肅雍之意便人皆聚觀各有懽然悚然處雖悍卒野人亦不敢譁可以見矣教化莫重於樂唐虞之教胄子曰典樂夏商曰樂正周曰大司樂今之祭酒即古之司成成樂之一終也又有司業業懸鍾磬之板也即如做戲然竟把國子輩演成一箇様範後來要變亦不㑹變其初勉强教習及其成也都是順其自然導以固有而已後來把第一義先澌滅盡而以下賤倡優視樂工欲天下化行俗美人材輩出得乎宋時用女戲門人問有事當用否朱子曰時尚安得不用聖賢亦不能違時只是女更不如今之男矣唐宋仕宦皆有官妓名尤不馴明尚演其餘習髙麗人進貢論官之品級以妓陪之直至今日始革去甚是男女無别則亷恥道喪矣教化將從何處說起雅樂是舞者舞歌者歌俗樂是舞者自歌殊無理如大武之舞始而北出一人總干而山立人莫知為誰也歌者則歌殷商之旅其㑹如林矢于牧野維予侯興上帝臨汝無貳爾心人知為武王矣再成而滅商一人𤼵揚蹈厲人莫知為誰也歌者則歌牧野洋洋檀車煌煌維師尚父時維鷹揚涼彼武王燮伐大商㑹朝清明人知為太公矣以此推之想韶亦是自徵庸在位殛罪命官遂有九成也當時國子豈必如今優人不過有其象而已為其事者口不言而旁觀者則稱羨慕誦之雖其詞誇多亦無妨若斟酌雅俗之間如蘇武即將史傳語放在他口中自說而臺下别用人贊嘆之亦可五音惟管子言之的當宫博厚洪長君欲其如此商激昻慷慨臣欲其如此角清和調暢民欲其如此徵警動而煩襍事欲其敏也羽細碎而悽切物在天地間至多却各不相混也聽人之聲皆出於㗋其人便正道而貴入鼻多者恐乖厲或作危險舌音多者或心回互或巧佞齒音多者或狠或艱深唇音多者或不正或賤試之頗驗作詩用韻脚若是喜慶事用宫音便洪亮發揚感激事用商音述平常事用角音可駭愕事用徵音悲惻事用羽音黄鍾之宫另是一物非黃鍾管也朱子以律準律通比之極是然吕氏所謂取竹斷兩節間三寸九分而吹之以為黄鍾之宫次曰含少者此義千古不明以啓隋志及近日李文利之說某謂黃鍾八寸一分應鍾四寸二分自黃至應相距三寸九分是諸律長短皆在此距内耳黄鍾為宫則自太簇為商至應鍾為變宫皆以少聲與之相應少聲者言其聲比黃鍾為少也既得黃鍾遂穴諸孔於三寸九分之内間而吹之其全聲則黄鍾之宫其次所穴孔間而吹者即所含商角徵羽及二變之少聲也此以一管而備五聲故曰黄鍾之宫及制十二筒之後則果相和而此管可以生之自記向解吕覽三寸九分以為黃鍾以下應鍾以上中間三寸九分於隔八相生分寸之位穴孔吹之以得諸律所謂間而吹之立此為律本在十二律管之外前年王振聲往天壇看樂器其穴孔處却非隔八相生取之今律吕正義書中乃言其故琴是隔八相生者平方也靣也管以比例言則立方也體也體便隔八相生不得乃知吕不韋不知此義故云三寸九分間而吹之班孟堅漢書全引此段只去三寸九分一句想是考究過知不如是故去之耳問律準律通之制曰以木安十二絃如琴狀一絃為全律黃鍾或具七聲如十二管之有黃鍾之宫一管或可以上下按取十二律之聲皆不可知此絃不在十二絃之内餘十二絃即應十二律用十二絃不用此絃此絃以驗十二絃之合否為十二絃之母問何妥雖止存黄鍾七均但既有黄鍾七均用此以推各律依以旋生有何難處而謂自此旋宫之法遂廢何也曰正是總是因陋就簡不去推勘補足他且因此可見朱子所謂君臣之道不逹一段議論之確葢五倫都是逹道後世惟父子兄弟夫婦朋友四倫逹於天下而君臣之道不逹何也君者九州之綱然宰相亦做得主行些事六部亦做得主行些事下至鄉亭嗇夫皆做得主行些事便人人有君道有臣道後世事無巨細俱要稱制裁決所以朱子云然黃鍾獨存一調而不能各自為宫以相生者以此這道理甚神妙明道論樂謂將上下聲考之須得其正一言以蔽之省辨論者多少紛紛此等處與所謂加一倍法者皆可謂要言不煩自記問朱子謂從來無祉角何也曰亦嘗疑此朱子謂自漢唐以來之樂不能以祉角成調不知何故宋徽宗强為之起聲是祉尾聲又走了問審音是祉而用之如何㑹走曰如彈琴頭一聲是祉了尾聲不應彈至那裏一様安放却是别聲可奈何此理甚㣲葢三代而下君臣皆具生物仍然但事多不得其理民多不得其所此聲竟亡問民事既錯則物亦失宜何以有羽曰畢竟差如今所生之物竟有較古時加多者但看武王既得天下偃武修文商聲不用國祚遂衰弱而綿長景王造無射之鍾伶州鳩知其以心疾死劉歆造樂而莽死荀勖造樂而晉亂宋仁宗作樂亦以心疾死王朴為周世宗造樂聲太髙世宗死而國祚促宋太祖至太常聞樂嫌其管太髙令下二律國祚遂衰弱而綿長如響應聲此理怕人齊景公作徵招角招只怕那時此二聲便有些作怪晏子勸景公出舍於郊大戒於國於行慶施惠之時作此樂我輩不㑹吹彈又無精曉音律之人可問不知果否苐向時曾聴一友彈琴逐曲問他大抵宫商調多羽亦有未有說是角徵調者又亡兒學琴時說琴中本有啞處某不信同是有木有絃如何㑹啞及試之果然以此驗之或有此事即以人之說話言之激昻慷慨者商聲也凄切哀怨者羽聲也至合乎人情令人歡悦和暢是角聲𦂳切事理一字不浮汎是徵聲此二聲便少問三代以後文不如古亦然曰然大約宫聲是天地元聲聖人謂黄鍾萬事之本此不容亡者慷壯激發凄𦂳瑣細此後世之所有至民氣歡悅流動諸事懇摯警切此聖王之事三代以返不能及也角與宫相近徵與羽相近以為是角矣仍是宫以為是徵矣仍是羽今人認錯部位者多元人曲子只四齣猶是古樂之遺古樂只升歌笙入閒歌合樂四節儒先都謂舜樂九成周樂六成某意謂四節之樂唐虞三代恐皆如此所謂九成六成乃舞也但古人却無此說存以備考如今戲亦當以四齣為則把中間没情理者盡刪之至其履歴姓名莫要自己叙述使一人在旁以詩歌詠歎之更有情理戲最可厭是中間夾雜許多不相干事而收塲草草文章須是篇末收拾完全一絲不漏戲何獨不然明世用冷謙韓邦奇等所定之樂將舞都依字音五行有俯仰伸縮而無疾徐進退信為可笑古人制七始都與造化相應如黄鍾為宫則太簇為商只隔一位姑洗為角亦隔一位至林鍾為徵則隔二位南吕為羽又隔一位自南吕至黄鍾又是兩位角徵相隔兩位故取中以蕤賔為變徵羽宫相隔兩位故取中以應鍾為變宫月行節氣亦然至將置閏則越兩節氣不得不置閏與五聲二變同故房氏以二變為閏宫閏徵有謂三分損益隔八相生為不是者其說以氣是一呼一吸未有極長而漸縮短極短而漸放長不知隂陽二氣以相對者言則呼吸是也以一氣之始終言則漸長漸短是也如人之聲自丹田出即撞入鼻乃到舌次齒次唇則出口矣何嘗一出即一入也十二管音之母也作樂時却用他不著其調中所用律則寄於簫管之孔琴之絃鍾磬之厚薄八音惟革木不入律塤有孔亦入律十二管却藏著所謂王府則有金石絲竹有差則取出管來正之聲大莫如黄鍾細莫如應鍾皆可以起調而其腔板聲口則不改於其為宫者也如大江東詞大聲唱使得即低聲唱亦使得而其聲口則淨也非旦也問樂律曰律者樂之末節也曰諸書言古律分寸不定因失中聲而古樂無由復何云末節曰假今樂得中聲遂能鳳儀獸舞乎古禮之不復果以衣冠籩豆之制闕而無所考乎曰然則古之立律何也曰人得天地之中以生性得天地之中理氣得天地之中氣形得天地之中形則聲亦得天地之中聲聲之大者如雷霆小者如蚊蝱皆非中也就人之聲喑啞叱咤則過大咿嚘啾唧又過小亦非中也惟平常之聲髙下抑揚大不過宫細不過羽其中有十二部焉故律吕十二配人之中聲也黄鍾大吕太簇夾鍾姑洗仲吕蕤賔林鍾夷則南吕無射應鍾皆鍾名又以鍾之擊有輕重不等則聲不足以為定不若竹之分寸一定而人儘力用氣吹之為較準故製管為律以存聖人中和之聲於是以十二律之聲寫入金石絲竹匏土之内則聲皆和而樂成矣問宫商角徵羽既分清濁髙下如宫濁矣何以旋宫又有極清聲為宫者曰此是兩様論頭如應鍾為宫其聲細矣則他律為商角徵羽者更細於宫律管本長於為宫之律管者臣民不可以陵君則以變以半應之自合若在言志之詩論其氣象是宫是商終不得變大抵宫商角徵羽為虛位古人作樂以律從詩今人講樂以詩從律詩言志歌永言聲依永律和聲豈非以律從詩如今填詞却是派定某字用平某字用仄鐵板不可易又自樂學失傳論者便謂聲音之道無從理論而詭誕者又造為秘傳怪異之術轉相迷悞其實今日看戲見忠臣孝子則感泣見奸邪害正則髪指是即樂之大本大源也聖人有作而欲制禮即今所行者折𠂻之可矣欲制樂即今崑腔戲考定而條理之可矣樂有調有聲調如今曲之清江引新水令是也歌如歌關雎鹿鳴之字句是也如以宫調歌關雎則闗字必用宫所謂起調也至逑字必收到宫上所謂畢曲也二章參字側字三章參字之字皆然是之謂調若每句之字宫商角徵羽變宫變徵七音任用各隨其宜如首闗字用宫未有次闗字仍用宫而並頭者勢必湏用别音葢即一字隨人歌作七聲總在髙下長短上分别非本字自為一定之七音而不可變也全曲謂之調每一律有五調其六十調二變不為調每字謂之聲每一律有七聲共八十四聲自隋時鄭譯得旋宫法於西域蘇祗婆何妥恥其不能止用黃鍾一調七均至今雅樂尚如此今俗樂唱戲者亦未攷調聲之全否但用某調則以某聲起調某聲畢曲如用黄鍾則以黄鍾歌第一字及完仍以黄鍾歌末一字而通歌所用字總不出黄鍾所生之宫商角徵羽變宫變徵以他律為宫皆然律吕新書中却不曾把五聲為調一處挑剔發揮明白故人難看聲依永律諧聲分得清楚則了然矣問如奏黄鍾之商用黄鍾七聲乎用太簇七聲乎曰竟用太簇為宫之七聲因其為商不可云太簇之宫只可云黄鍾之商他律皆如此十二律制器止可以制金石絲竹匏此五者有十二律至鼓柷圉則不具壎雖為人所吹然土為之亦未知能具與否十二律用以考音而不用以作樂雖以竹為之而以鍾為主故以竹管而取鍾名者甚多黄鍾夾鍾林鍾應鍾皆是也八音之中惟竹絲匏可以字字依人聲音節簇而金石土革木止一聲或以起樂或以止樂或以節樂也問八音之序曰金石所以為衆音之節故最尊絲堂上之樂竹管也乃堂下之樂天子元侯始用管卿大夫則用笙笙即匏也故次於竹土塤也雖其用小而為人所吹與竹匏同故次之至鼓與柷圉不過節樂起樂止樂而已又曰鼓無當於五聲故又次之問方響有十六箇十二箇是正律四箇是清聲何也曰方響即磬也正律只有十二至第九聲即不能全具五聲少一聲第十聲少二聲第十一少三聲第十二少四聲葢律至應鍾窮矣只得截律變半為四清聲以全十二律之五聲二變不為調故止十六所以編鍾編磬皆十六編簫之管亦十六其故俱是如此舊欲作一部樂書竟分八章樂用樂教樂章樂聲樂律樂器樂舞樂理今思只以周官大司樂一篇為經禮記中樂記為傳而與經相發明者曰附大司樂與傳相發明者曰附樂記或將八章另編各成一類以便専考一門者言樂者嫌不得古之黃鍾猶習禮者嫌不得古之衣冠豈今之衣冠必不可以行禮耶自元以前講厯者必欲求上古之厯元冬至嵗月日時皆㑹於甲子日月如合璧五星如連珠勉强凑合終不能確至郭守敬始悟其非追之既往未必是驗之將來未必合又無闗於厯之𦂳要於是一筆勾去即以至元辛巳為厯元而授時厯遂迺超絶前古自元以後人皆翕然服之不復言厯元矣黄鍾之說亦是如此朝廟之樂實能有以象功昭徳字字確實明創業之艱難道君臣之一徳憫將士之憔悴咨黎庶之勤劬便好然古之作樂者非徒以朝廟為重也移風易俗全以用之邦國用之鄉黨用之閭巷者為要葢朝廷郊廟之樂臣民得與聞者有幾惟家家户户皆得見之方能興感孟子云今之樂由古之樂以樂記冕而舞大武一段及賓牟賈一段觀之古之樂與今之戲何殊若將廿一史中忠孝節義之實事如戲編出但詞不要艷聲不要淫使聽者心氣和平可以語可以道古何代事即用何代衣冠官號器具禮節自士大夫以及編氓無不歡欣鼓舞而臣思忠子思孝夫思義婦思節則太和之風洋溢於宇宙此豈徒講黃鍾之所能致耶至於詞漢即用樂府唐即用詩宋以後即用詩餘曲子無不可者編纂皆要設一局禮局樂局天文局書算局講求在這裏便有舉而用之之時朱子何嘗能用於當時明朝承其餘緒得其糟粕尚可支持三百年莫以空言為無補也今欲考訂朱子所言禮為一書而以己見輯樂書至厯算有梅定九之書在亦覺燦然可觀矣崑腔之吐字每字有頭腹尾如西要烏之為簫伊要烏之為憂之類如但有頭腹而無尾則聲短非其本音矣歌麻支㣲齊魚虞皆自𤼵自收為聲之元東冬江陽庚青蒸真文元寒刪先侵覃鹽咸有頭腹而無尾國書以阿厄伊烏於五字為字頭最妙歌麻即阿部支㣲齊即伊部魚虞即烏部古人習樂其舞蹈有節能使血脉活動所以云養其血脉只是如何舞法今已不傳然果然作樂不患無傳禮記說樂如抗如墜等聲之節即舞之節其轉折疾徐亦如大不過宫細不過羽之意以理準之雖不中不逺矣樂最要𦂳禮即存於其中即如章服代各異制惟優人不禁有虞氏之衣冠至周衰必蕩盡無復舊制而韶舞則全存之友曰髫年看劇演見扮髙力士者尚戴紫金冠今則為烏紗㡌矣唐制中官雖極老必戴紫金冠不敢烏紗㡌見酌中志做那一朝戲即用那一朝衣冠方是名優曰嘉靖改定禮樂以為大備其實到此乃大崩壊舞按五行醜不可言古舞斷不如是大率即如今劇演冕而舞大武者即武王尚父則發揚蹈厲各肖其形容行事令人想見當日光景故曰舞以象事不肖其人焉取哉又恐人不曉歌者却從旁贊其功徳若何行事若何所謂一唱三歎也優孟之似孫叔人即以為真故當日樂工皆非庸俗人也各省大吏多以優伶為性命無怪其然即吾輩之幾本書也不爾政事之暇如何度日古人暇時便有琴瑟歌舞先王知道人身心必有所寄因其勢而利導之以歸於正様様都動得手故有用不是全靠讀書如今禮樂久廢只得守幾本書檢束身心開廣知識若移而之他則放辟邪侈不可言已古時必有民間之樂韶武豈士庶可用宵雅肄三亦不可用於燕閒使徒九廟明堂之間作韶頀而天下即風移俗易恐無此事如今即將古書中忠孝亷節之事製為詞曲去其聲容之無情理者令人歌舞之便足以移易風俗感動人心不妨從粗處做起禮始諸汙尊而抔飲蕢桴而土鼓後來便至禮儀三百威儀三千古人詩何嘗有平仄後分為平仄又於平仄之中分為四聲又於古詩之中論出聲病唐人則竟字字程式做成律詩用之久自然漸漸細密連日因讌藍總兵演戲做到入情時未有不感動者以此見得樂之效速若就元人百種中選其忠孝節義有事實者改其義理不通處每事四齣此外誨淫導欲者禁之亦粗足以感人心而成風俗矣至尊嘗論及樂律奏曰其理於經書上畧可考見至聲氣之調和都不能曉得諭曰和不和極容易講如你向我說話聲髙我髙聲答應聲低我低聲答應自然和若你低聲說我胸中有不喜歡的意思髙聲答應這便不和此語見得天地間都是感應之理實說得著聲氣根源時壬辰四月舜曰有苗弗率汝徂征其詞責人之意多畧有滿假益窺見到此故贊曰滿招損謙受益此是行兵𦂳要處驕忿極害事孔明七縱七擒後以為兵可用矣故前表有奬率三軍北定中原攘除奸凶興復漢室諸語直視曹叡如孟獲㣲有自恃之意及街亭既敗想亦見到此意故後表曰成敗利鈍非臣之明所能逆睹其識髙矣孔子云善人教民七年可以即戎孟子推衍其說如發政施仁深耕易耨修其孝弟忠信都是教民裏事教民至於七年豈但與民休息而上下相信即以之戰民亦各知大義勝不輕喜敗不輕懼國手教奕若有下一善著狂呼得意下一失著悔恨失聲者國手必斥之葢輕喜輕懼中不定氣不靜最不好兵事尤忌孟子云大國五年小國七年必為政於天下他原有戰勝攻克的本事却不用所以規模大後人便疑孟子用兵未必濟事不知孟子手段竟可不用兵事事束縛之以禮教人便動不得何必用兵穀梁子說得是善為國者不師善師者不陳善陳者不戰到得善戰者不敗善敗者不死善死者不亡便不妙了管仲生平便不曾與人打仗何况孟子後世惟武侯有此意所以人說將兵非其所長豈知正是他本領大處老子亦見得此意曰惟慈故勇以無為取天下都確有此理鄉兵最妙孟子所云出入相友守望相助管子所云夜戰則聲相聞晝戰則目相識其歡欣鼓舞足以相死情誼既聯屬而鍊習又熟故鮮敗至卒長黨正之類用之課農則保介田畯即是人用之勸諭則飲射讀法即是人用之出兵則伍兩卒旅之長即是人人相習而教有常法文武兵民未嘗分也何等有條理漢經費無兵餉徒有吏祿而已故太平數十年則國富用足自唐宋以來有養兵之費故官俸代以微薄天下雖無事而兵常聚食故國家縻費恒多而動有不給之患自記官俸之薄起於宋其所由簿則起於養兵漢時兵在京師者不過南北軍武帝止增七校而已其餘南征北伐皆用民兵無事則農故少營伍支給之費而官俸得厚唐之府衛雖已有兵民之分而兵皆屯田未嘗坐而仰食猶然農夫也至宋削藩鎮兵權乃悉以京室禁兵出防各路兵額既多而更番往來費尤無數故國帑虛耗貧弱不振而官俸遂減但三代時勸農之外即以講武為事法制整然條理精密漢則無事聽其佃作有事便驅而用之是謂以不教民戰三代之民日日使之習勤内外有備故無倉卒之患漢時兵民不分故國勢富强宋藝祖但就所見目前之弊率意釐革因藩鎮財富兵强遂設兵仗以收其銳卒立轉運以收其利權務使文官有民而無兵武官有兵而無餉以為如此方不能為害至各路應設守禦之處皆從京都遣戍更番往來以致養兵之費府庫為虛不獨官俸緣以寢薄即郊祀大典亦時以匱乏不舉豈知官俸厚如天之雨澤散而為利也兵餉多如水之決隄聚而為害也若稍省養兵之費而散之百官以養其亷恥貪墨則盡法繩之自然大小寅恭不敢朘削小民而閭閻日富於是興禮樂施教化以感之三代之治豈逺哉朱子論兵政謂唐之弊在主兵者専制强梁宋之弊在主兵者分散煩冗而歸之責成郡守可知漢法猶善於唐宋也觀朱子前後議論大都猶有取於漢制自記古之陣法只武侯八陣李衛公五花陣為有根五花原於鄉遂之兵八陣原於都鄙之兵鄉遂之兵以十為數起於五都鄙之兵以八為數起於井田之八家自五家以至於萬二千五百家皆以五相叠故出兵自五人以至於萬二千五百人亦如之自八家以至五百一十二家皆以八相叠其在卒長之教皆以五八為隊而教之一居中前後左右為四無論多少皆依此此五花陣法也天地風雲龍虎鳥蛇無論多少皆依此此八陣法也問鄉遂四閭為族是百家四兩為卒是百人每家出一人而都鄙四丘為甸是五百一十二家出長轂一乗步兵七十二人甲士三人鄉遂亦出車牛馬否曰亦然鄉遂雖百人大槩亦用七十五人隨兵車輕車也餘二十五人隨牛車重車也歸馬於華山之陽謂輕車放牛於桃林之野謂重車孫武子書總是說詐如虛者實之實者虛之之類終以火攻實大不仁之事火攻無一存者吾儒兵法入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣故善戰者服上刑至於人來算計我却不可以無備湏要事事周到漢將自當以趙充國為第一看他幾篇奏疏無一句不靠實立於不敗之地魏相論驕兵貪兵忿兵幾句亦得兵要外有充國内有魏相所以相濟成功若將左傳國策史漢諸書選集一部兵法當勝於今所謂七書者充國傳嘗以遠斥候為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰數語盡兵家之要自記韓文公論招募鄉兵大妙客兵便一戰而潰施將軍平海若不即用福建人如何能成事王輔臣反亦是西兵平之此却是用兵扼要處用兵如下棋然低棋貪殺又要多殺國手只要自己不敗到嬴人一著亦是嬴何湏多管仲用兵何曾殺一人而天下畏之武侯節制之師不曽多殺人司馬懿畏之如虎趙充國金城之役何嘗與賊打仗都是國手凡用兵敗後再進鮮不勝者王姚江初遇伏而敗夜復整兵而往便破贛州用此者多勝巡撫浙中者前有范覲公後有李武定浙中士民至於今稱之武定之才視覲公為優當行兵時施其智術亦能得其懽心武定先與鎮浙將軍結納為兄弟及耿逆作亂武定言於將軍曰今勢危全要得百姓之心百姓一心便可憑以立事今與將軍約萬一兵有生事害民者吾闗白將軍即當按法治罪迨後别為庇䕶操縱總由吾等耳要使民知吾等不䕶兵以蹂民而已將軍唯唯未幾適有是事武定聞而升堂作色令標兵皆環甲發令箭召將軍兵百姓觀者數萬移時而將軍縳兵至以法治之一時歡聲雷動武定又損家資及用庫金之無名籍者以充犒勞凡滿兵向前者必拊其背奬諭賞賚之故滿兵亦歸心焉武定於督兵王子及領兵將軍皆用此法王子將軍見其兵民歸向肯擔當事亦倚以為重以故内外和輯又臨事頗能不動一日與頼將軍拉將軍同坐一山望見一二千人擁至從者不敢誰何兩將軍皆失色武定自頻捋其鬚徐步出帳外來者至皆跪武定和顔色問曰汝兵耶必有苦試為我言之衆曰無之曰或有條陳事試為我言之又曰無之武定曰然則欲何為衆曰吾等前私通於賊受有吳耿兩家劄付觀成敗為去就今被公厚恩視吾等若骨肉心不忍有二故自首於公後有賊至當奮刃以自明也武定垂涕慰之曰汝等皆忠肝義膽之人也吾何以得此於若輩應時悉焚其劄付而以牛酒犒焉衆皆欣然而去兩將軍於是大服後某以是事問之曰如此比者尚多每與之語果能不動雖平常語無即答者必稍存思而後應當日白頭賊妄假名號衆至三萬圍安溪縣某出示言蔡寅本永春賣漿家兒托名三太子值此年荒民食不繼何故甘被誑惑以糧賫賊我已興兵𠞰捕諸鄉不得仍蹈前轍倘賊以為恚即可嫁怨於我若我家破餉之未晩或故相違忤甘心餉賊是亦賊也便當移兵先剪以為諸鄉戒又復分兵守其要道抄絶糧路更出一招降告示敢殺降死無赦出示之翌日即有賊弁林起以七百人降某量留四五十人餘悉遣為民自林起來賊輒自相疑忌又苦乏糧不數日散走强半僅六七千人忿來攻我某以兵堵之山陘賊不敢下經大風雨而退某遣李治以二三百人尾之令去賊二三里即結營自固勿與交鋒治請曰萬一賊回衆來戰奈何某曰只據險一交鋒便為黔之驢矣又數日賊盡奔散其髪即用腰刀截之棄滿道路葢人多則需餉亦多無所得食自然破亡矣管仲初見桓公三薰三沐之後所進不過管子頭一張書一二十年用之鄧禹於光武武侯於先主一見說得幾句話終身總不出此他見得明白所以行之有成辛酉年施將軍方督水師専平海事某遇於逆旅問數語某即喜曰臺灣已平矣施曰何相信之深也某曰君言之已在掌握豈不能行乎說得實在是了便不問而知其能行地曾啓奏云有人說海賊凡數萬人浙江来都是此輩搬去故常患米少此說不確數萬人必有宿泊之所今臺灣澎湖舟山金門海壇厦門諸島無不重兵鎮守其餘小島能駐百人者便少數萬人何處栖身此輩不過是内地之人乗南風則出掠北風起則仍歸内地耳未幾擒獲一賊地奏且莫正法就此窮究其根株必有巨猾為之窩主得其巨猾則餘黨易散矣其後果得鄭盡心大凢兵間事須得其要領成功便易又莫妙於以賊攻賊不易之道也馬見伯整頓山西營伍兵皆譁然站隊見伯有將材不知何以如此其無序凡仕宦所至要有興革須使他不覺以漸而更又要有同心的人方得成事為將又須先擇材幹技力有用者使為頭目頭目皆我之人則其下安能動乎此所謂機也至尊所不可及者不嗜殺人雖吳三桂亦不曾族誅耿精忠親族尚有為近臣者前年一大臣親族有以叛逆論者他已自分連坐乃寛之不問下諭曰豈有人做此等事而謀之宗族者何等聖明三代以前想已有相及之典故甘誓湯誓俱曰予則孥戮汝如此盛徳事竟超絶千古矣有惜晁錯早死者曰便不死亦不過如此即賈誼所言衆建諸侯而少其力雖似合機宜但視諸侯王都似劇賊一般亦太不廣人本領大度量便大周公誅管蔡後未嘗猜疑同姓親親之誼如故後世多因一事有變至於懲羮吹虀者聖人先從修身尊賢說起然後及親親晁賈議論都不曾理清根本至族滅一事乃秦之酷暴以霍光之賢猶族上官其意以為不爾恐有後患耳惟武侯本領大李嚴廢斥若遇他人便恐其不走魏或走吳矣武侯如此處來何嘗有他患武侯一切都用王道罪人以族嬰兒之在襁褓者何與彼事皆駢首就戮實是惨事當日耿尚二逆親族羣臣皆請誅之䝉垂諭曰他在外要反親族奈之何哉豈獨不害其命竝不去其官兩額駙仍如故甚盛徳事可為萬世法聖人本領大只隨事處得當不計其後問他本領大處就在那不過分際處持得定否曰他抛得便是大如有徳易以王無徳易以亡到了無徳不亡何用如殛鯀而用禹道理應如此某巡撫直𨽻時奉命築永定河堤當時私心以為何須與水爭地但免其民之錢糧使無催科之擾則民頼水利亦足以生堤久必壞終歸無益今思之聖見為是大禹之功萬世永頼然不久亦輒廢遷如今既與斯民同時得幾年安享地利令少者長長者老老者死亦可矣譬如年荒賑濟明知此三日糧不能保其三日之外但且救他三日未有逆料其三日後之必死竝靳現在之糧而速之死者當日去看南河時靳總河引到髙家堰一帯看六壩曰此明潘印川所留四十里天然減水壩處也原是四十里行水竝不說害民今只留六壩科道却參我害民彼時不解其故及後大城静海頻苦水患先是二縣無隄竝未告災至近嵗堤成民反大病於時適某出為巡撫因悟六壩之害與此正同葢水平漫則淺而無力用堤束之一遇崩決則力併而猛其疾如箭當之者無不麋潰後又看漳河至成安聞崔惟雅著有治河之書因訪其子其子便說得好他說築堤斷非良策漳水來時初不甚急至深不過五尺人畜概得遷避若以堤障之一決直是所向無前人畜俱不能保且漳水東行則西路退出西行則東路退出退出之地皆極肥美反得數倍收成只勿與爭地隨其所行之地蠲除其糧可已某遂據此奏請施行後有言漳河現分四股當併歸一者某奏云禹疏九河殺其勢也天分為四正使勢緩便是世運將泰不應併而為一奏上遂䝉許可至興化一帶下河却是靳總河說得是他說海反髙於内地若開七道河洩水汐時内水外出潮時外水内入出者甜水入者苦水但見其害不見其利今人不想鹽城范公堤因何而築全是為海水侵田築此障之苦水所過田便無用今下河人家半在水中安之若素田倒肥美又有魚蝦之利開下河無益此言甚當其後下河雖開倒底湮塞友云鯀湮洪水便是用堤禹貢一篇無一隄障字惟九澤既陂澤乃可用陂耳葢澤水淹漫畧用陂堰便田可有收若江河之流難以隄束所以孟子謂行所無事榕村語錄卷二十八

body:
  text: 榕村語録卷二十一大學士李光地撰史古時史官當其職以死守之馬班雖不及古至今讀其書扵漢何嘗肯輕假借明太祖見修元史有醜詆的悉令改訂雖是盛德事要非古義此是為天地間存一公案既付之其人隨彼舉職不須更行監制某四十年紀不喜看史以閱歴世故未深故也頃看通鑑甚易為力祗以身經者多看他處得如何有處得高出吾輩者有反不及者須是四書這一邊先看得有箇底子看史方有益如無一些把柄便讀盡廿一史道理都不著實看史漢三國傳紀必須以類相從長者短者分者合者詳者畧者有以此人事蹟列彼傳中者又如稱名爵年月日時或載或不載之類皆要講其體例緣故總之要先治春秋纔有根本某常説做理學文字不能離學庸論孟易經學古文不能離尚書學記事不能離春秋學詩不能離三百篇五經是各樣文字的根本兩漢史内但是有名人傳俱應檢抄熟看長人學問不單取其好處就其不是處亦可為鑑史書總是公修便壞古者以此為耑家學馬班皆父子相續而成就是歐陽公宋景文亦聽其自出手筆當修史時朝廷但資廪給而已唐書中歐陽公所任惟志其餘盡係景文作景文拙扵序事書成送與歐公改訂歐公以其前輩辭之看來新唐書到底不算好作史不是易事史漢二書俱父子相繼尚未及成史記中或書沛公或書高租稱謂俱不一朱子謂因未成書不曾一例改正是也漢書又經大家補得許多方成清植左傳中有先王典制亦有小道鄙説有君子格言亦有小人謬論大畧可與史記竝稱而已凡稱仲尼曰者多不確如趙盾越境乃免殊不為當史記載伯夷叩馬事歐王皆辨其妄亦有理二老久受養扵西伯何至叩馬時乃似初識又前云武王告扵文王之墓載主而行後卻云父死不𦵏不𦵏安得有墓潁濵譏子長淺陋不學疎畧輕信朱子以其言為當子長時古文尚書周禮左傳俱未出子長所見但國語耳至孟堅時古文尚書周禮左傳皆出而劉向父子從内府得許多秘書孟堅亦得觀之其識見筆力又能運鑄諸書只是文字骨氣雄健處遜子長耳實則學問之醇識見之卓殆有過之某未領鄉薦時曽將左傳分類編纂言禮者一處言樂者一處言兵者一處言卜筮者一處嘉言善行一處如此容易記未及編成以人事而廢昔蘇子容記得史熟東坡問之答曰吾曽將某年某月下將事繫之編得一次復將事下繫以某年某月又編得一次編來編去遂熟東坡曰吾何嘗不如此下工夫畢竟公記得大概欲史熟須如此凡文字不可走了樣子史記剏一箇樣後來史書便依他叙記諸文韓昌黎剏一箇樣後來亦便依他其初剏為者都非常人若後來不是此等人生要剏為便不成樣子太史公文字似不如昌黎一字不可増減然其不如處正是好似他處太史公無意寫出昌黎有意裁剪也韓文力去排偶太史公却似隨筆寫下自不排偶常有三四件事一筆寫去自然各樣句調班史便煉作幾句相對太史公與昌黎覺有天人之别班馬史贊議論亦多不錯班固揚雄贊褒貶俱當司馬項羽贊突以重瞳為舜苖裔殊無脈理至結末論自不刋司馬子長筆力周衰諸子不及也其文渾渾噩噩結搆處大人莫知所措置昌黎較周密論筆氣到底史公高班孟堅得劉向揚雄班彪諸人講貫議論意理自較完備筆力卻不及史公史記大都剪裁别人的多就是當代列傳恐亦有底稿自著者只有諸侯王年表諸篇却便見他筆力傳贊一兩行有説得不是的亦有没甚意味的班孟堅文多排語至如禮樂志等便不用排豈讓子長所以老蘇云遷固之雄剛問人言漢書為史書正體看來畢竟史記為正史是紀事之書史記自己不肯多著議論如周紀前引書中入左傳後入戰國䇿剪裁其文而已此正體也至伯夷傳人動云變體列傳為太史公剏體豈有自剏一體開頭一篇即用變體者其所謂傳即據舊傳文而云然也前後著議論而已曰極是宋史不好便是坐此有許多好文字不入却自己填上許多話但史記扵賈誼不録治安策董子不録天人三策却不如班史為善史記議論誠有翩躚處然其志歸扵尊孔子謂先黄老而後六經其自序作書之意何不祖述黄老耶朱子謂史記强似漢書果然近來因輯樂律見漢書律厯志許多没要𦂳語如鍾種也陽氣種種然而生也竟是混語史記要去他一個閒字亦難字字都是骨子漢書節人文字多未工如治安䇿中間項欵皆不清太史公秦楚之際月表以德若彼用力若此盖一綂若斯之難也孟堅節作以德若彼以力若此其艱難也其艱難也四字總承上兩句與史記原不甚異但使讀者連以力句讀意指便混不若史記明亮又孟堅歸重在秦以暴故失之易而漢興之速史公却歸重前代以封建故得之難秦以郡縣故失之易漢興以來諸侯年表言因封地太濶以致僭逆其後分封子弟始得强幹弱枝歸扵以仁義為本可見史公胸中大有見解只是游俠貨殖之類皆崇奬之以此讓孟堅出一頭地班氏父子兄弟自成一家學天官律厯乃出大家之手友曰史記列游俠貨殖或亦有見見得先王法製盡廢將來兼并呑噬不在上而在下則俠猾爭攘者出而持世矣曰如此宜露其意以抑遏之反為之揚其波無是理也孟堅文字雖不如子長雄健然識見醇正議論皆是韓文公絶不見提起想以其勦襲揚劉議論耳文公果不勦襲然孟堅正未可輕其評論二劉及董仲舒揚子雲諸人皆精當戰國文字之氣習識議至孟堅始變盡子長亦非戰國文字其高視濶歩中有斷處而穿田過脈皆有針線高出左國之上但議論多是戰國耳漢書乃孟堅凑籠劉揚諸家而成者殊可觀十志惟天文五行穿鑿餘俱典實淵茂後世情偽之變無所不有讀史乃練逹人情之學左傳尚不能備後世情偽若漢書則幾備矣為天下除殘去賊宜縞素為資留侯之謀扵漢高此為第一自記陸象山有武帝優扵文帝論以為拊髀之歎不如輪臺之哀至謂二帝三王之心吾扵武帝見之使帝誠存二帝三王之心平生所為皆宜自訟何特貳師喪敗為可悔雖悔而猶有恥諱之意哉推其詞指當見之以此便為優扵文帝之決欲窺堯禹用心亦好奇之論自記漢書扵孝平后下云安漢公太傅大司馬莽女也此只宜用莽女也三字自記婁敬言周公營洛是欲令以德致人不欲阻險令後世驕奢虐民見解直是儒者能知聖人之心豈辨士乎至贊和親之䇿而曰冒頓在固為子壻死即外孫為單于豈敢與大父抗禮則失之迂矣既知冒頓之殺父何謂其不敢與外祖抗也自記史稱良多病未嘗特將非也良之智慮深長固如是耳自記賈子所云糾纒者言糾之急則轉亦急翻覆乆而後定也應説未盡自記鼂錯欲敎太子以術數此等議論皆戰國亡秦之餘酷習俗溺人故雖以文帝天資粹美而不能辨也以錯為太子家令顧反以賈生傅梁王豈不輕重失宜之甚自記李廣蘇建傳贊心字與隣叶非是班史中如此類極多古韻至漢時已差謬自記韋𤣥成傳中諸奏宜與郊祀志相聮綴以備一代之議以應古者郊廟之本文不當扵韋傳見之盖作者文重思繁未及釐正耳自記劉更生之獻鴻寳苑秘書乃少賤好奇不足為更生累自記李尋傳日將旦清風發一叚乃有師授之言左傳中有明夷之謙一叚可參看自記谷永黑龍之對俱是為異姓游説漢以火德王如何更以黒龍為同姓至攻至尊之惡固是為王氏蔽䕶然充成帝之行即微王氏能乆安乎春秋深探其本而反自貴者始雖有伊尹周公不得舍此而彼是攻也永則可議矣庸可謂此言之非是乎劉子政懇懇扵同異姓之間而格心之論無聞亦缺事也自記揚雄贊以序為論瑕瑜不相覆極妙贊體自記酷吏傳贊扵甫刑報虐以威之意不可不揭為世鑒也惜未之及自記貨殖傳貪賈三之亷賈五之二句孟説似未是貪賈以十計而三之謂得十之三分餘也亷賈以十計而五之謂息十之二也自記西域傳中天篤天竺也即身毒明帝迎佛在前班傳曽不一及故知其事本微後人張大之其云日所出日所入之理史中未明盖未通周髀之説耳自記孟堅西域傳贊立論如彼而定遠竪功西海白首僅還豈其家庭平昔議論漫相乖剌耶故自古功名之㑹違厥素心者多矣西域諸種何辜而仲升積年薙獮之唐王龍標箜篌引發此意自記漢書敘傳中窮逹有命吉凶由人二句精極若以為窮逹由人吉凶有命則大謬矣自記敘傳中律厯志賛可謂潔淨精微自記漢書十志天文乃曹大家所補五行多荒誕之説郊祀敘漢武事太繁然三敘亦精餘七志俱好自記房中歌云簫勺羣慝簫勺即消爍也晉灼謂簫舜樂勺周樂者非是又云安其所樂終産樂終産世繼緒所字與緒字叶兩產字相叶又云澤𢎞大大字恐久字之訛下文徳施大者𢎞也世㬅壽者乆也久字便與保壽叶自記禮樂志循首迄末議論純粹孟堅儒術之文自記刑法志因井田而制軍賦一叚當採以補周官少司徒之章自記漢文除肉刑而張蒼等扵當斬右趾者忽進以死刑求輕反重議事鹵莽至此自記漢書食貨志云有賦有税税謂公田什一及工商衡虞之入賦共車馬甲兵士徒之役充實府庫賜予之用税給郊社宗廟百神之祀天子奉養百官禄食庶事之費康成注周官甚差得此正之又云約法省禁輕田租什五而税一量吏禄度官用以賦扵民而山川園池市肆租税之入自天子以至封君湯沐邑皆各為私奉養不領扵天子之經費此漢家致太平根本也猶有古者公天下之心焉自記所云律厯志者因厯法用黄鍾起筭故前半説律為後半算厯張本也後行四分厯便不與律相干史記分為二何嘗合來後世修史者不察遂俱云律厯志豈不可笑自記黄鍾之宫另為一管非十二律中之黄鍾也與京房之準梁帝之通正相似長亦九寸而以三分之法穴其旁吹之若今簫篴之類可据以為準而定諸律故六律六吕此管皆可以生之而為律本也月令十二月皆有所中之律中央律中黄鍾之宫盖謂此耳縁今吕覽錯互三九二字讀者遂不得其解而妄為之説紛拏喧豗千餘年扵此矣只細讀漢志自見自記律厯志言丑未居其衝乃隂陽之要妙諸術莫不用之自記漢志云玉衡杓建天之綱也日月初纒星之紀也綱紀之交以原始造設合樂用焉律吕唱和以育生成化歌奏用焉指顧取象然後陰陽萬物靡不條鬯該成葢日在子則斗建丑日在丑則斗建子日在午則斗建未日在未則斗建午綱紀之交謂子丑午未之際也周官大司樂分六樂而序之者是律吕唱和一歌一奏分祭之樂也下條圜鍾為宫乃黄鍾之誤用黄鍾祀天林鍾祭地是以綱紀之交為陰陽之首大祭之樂也此條文義至深莫得其意又曰此叚説樂至精蓋周官祭祀天神地祇人鬼用三綂之律為宫而四望從天山川從地祖妣同饗故云合樂其樂天用黄鍾地用林鍾今周禮天作圜鍾者與宗廟之文互也想班氏為志時尚未差失綱紀之交謂斗建與日躔相遇交互處乃子丑午未之間也其時隂陽初生造化萬物故大祀天地則用之其餘分祭則天地四望山川先妣先祖各有歌奏如奏黄鍾則歌大吕奏太簇則歌應鍾以其合辰之律相為唱和因其陰陽終始生成以取義類此則分祭之所用也二祭皆因依法象使陰陽萬物條鬯該成者也自記律厯志嘉量一條與周官考工㮚氏章今所据以定黄鍾知其以積實為主而不紛紛扵圍徑之誤者賴有此耳故皆曰聲中黄鍾自記律厯志以權屬水衡屬火矩屬金規屬木繩屬中央須云木規金矩水準火繩而土為權衡以生四者乃與篇首之義相應自記律厯志云壽王候課此三年下只言其厯最疎課最下也顔注以為下獄者非自記大初法至朔同日為章交蝕一終為㑹分盡日首為綂綂首日名復扵甲子為元其日法以八十一為分又十九之以一千五百三十九為小分以三百六十五日又小分三百八十五者為日周天之數以二十九日又小分三百一十七者為月㑹日之數十二㑹不盡歲氣而閏餘生焉十九年七閏則氣朔分齊是為一章然每月合朔不在周道之交則㑹而不蝕厯法五月二十三分月之二十而一近交凡一百三十五月而一當交當交則蝕分盡章之日月雖㑹扵冬至而不當交積二十七章然後朔日冬至交㑹分窮故謂之㑹以日法計之一歲全日之外小分三百八十五比之四分厯法而稍贏盖侵小分四之一也章㑹至朔之分不在日首積之一千五百三十九年恰贏小分三百八十五其明年景復則去酉入子而冬至交㑹起扵日首而無餘分矣故為一綂也然甲子者日名之始必氣朔肇扵此日乃得厯本故初綂而得甲子次綂而得甲辰三綂而得甲申三綂既盡復值甲子朔夜半冬至揚子雲所謂章㑹綂元與蝕俱没則後元之端也三綂厯劉歆因太初而作者又云所謂去酉入子者四年而景一復初年冬至在子次年冬至在卯三年冬至在午四年冬至在酉第五年始又復扵子今一千五百三十九年則四年之數未盡是冬至當在酉也然有日分所贏之小分四之一者積至此時恰贏小分三百八十五滿四分日之數則冬至已不在酉而在子矣自記黄帝得寶鼎神䇿神策即蓍策也此一叚傳聞只是黄帝作厯事耳黄帝得策作厯正與取竹造律同一符應卿自不解自記子長扵武帝時事多不諱故論史必推史漢不獨文章佳以其出扵直也文中子以三國志為勝兩漢看来魏吴有底本便多文飾不能簡實惟蜀志則承祚自為之字字不虚作史全要簡潔蜀志後主二年終歲止八字曰勸農殖穀閉關息民只此的是良史才魏吴二志皆有底稿不能盡如承祚意至蜀不立史官反得盡己之意筆則筆削則削如張嶷傳載其與費褘書戒其太簡易恐有姦人不測之禍又與吴諸葛恪書戒其根本不清但欲立功扵外恐為人所圖後來皆應只此二書便顯出其人他不足論何等有識關侯傳載關侯為曹操所得操使張遼説降關侯曰吾極知曹公待我厚然吾受劉將軍厚恩誓以共死不可背之吾終不留吾要當立效以報曹公乃去遼報曹公曹公義之只此一叚三人身分皆見蜀志最好魏吴二志俱不如吴志尤虚華只是蜀志亦有太簡處裴注斷不可少問三國志扵曹操未建國之先雖稱太祖至為魏公則稱公為魏王則稱王曹丕未簒時亦只稱王明其為漢王公也至吴則未稱帝之先只書名惟先主始終稱先主似承祚意中巳將蜀作正綂如朱子之見曰亦未知其意果何如或者承祚是蜀遺臣故書法稍别然此書為文中子所推重不為無故清植隋書天文志極好唐書天文志是張燕公筆詞采太勝沈約所作宋書其志中説天體處最詳明韓文公順宗實録質實得經意無虚詞無遺事方是實録彼正不屑學史漢人反以為訾議何也唐鑑議論及新唐書論贊朱子俱稱之今看來敘事不及史漢至論贊兩漢後未見其匹比五代史尚覺差勝五代史無人物事蹟底子不好故覺得闇然無色通鑑從韓趙魏為諸侯起朱子雖有詩譏之言履霜堅氷其來已久不到此時王靈始下替然又稱他不直接春秋留空一段是不敢僣妄處左傳終扵智伯之滅而通鑑接此自居扵傳却有體史記雖多可議亦自有意思結搆如世家始泰伯列傳始伯夷貴讓也即尚書首二典詩首文王春秋始隠公之意通鑑扵己所不喜者并其人削之如屈平是也扵己所疑者輒刪去之如隆中對是也昔人評孔子作春秋録毫髪之善溫公作通鑑掩日月之光指屈平也通鑑遺漏者甚多如關侯對張遼數語全載不過四五行便精采動人義氣凛然何必剪裁武侯抜三千户而歸賔僚都賀武侯愀然不樂謂普天之下莫非漢民使之困扵豺狼皆亮之罪那一段氣象議論甚好孫權下令稱武侯信感陰陽誠動天地雖是異國之語都應登載何為削去若斟酌裁減再查閱廿一史増入要𦂳處别成一部小鑑狠好惜年老無工夫奈何錫言某門人陳大章最熟通鑑檢得其中疎誤處便作一篇文字辨駁之聞其師謂之曰不消如此只註其下云應作如何足矣宇宙間幾部大書譬如祖父遺訓萬一偶誤只好説我當日記得是如此若侃侃辨證便非立言之體先生曰正是如此今人讀程朱書扵其道理精純處毫不理㑹至扵地名人名制度偶然疎舛便當作天來大事狂呼大呌累幅不休雖說得是亦令人厭所謂辭有體要也春秋是當日史書全本提綱耳不然僅存此敎人如何看綱目似亦不必加目只云通鑑提綱即以通鑑為目何等好如今目覺看不得某意當編一小鑑全要簡如夫子刪書不妨架空多少年無一字但須識見大又博學方可做此事友云通鑑如許大部而隆中語却不全載殊不是曰正是若編小鑑如天人策出師表之類須立例在前云為世傳誦者不載不然恐太多千古選書如易書詩春秋各具一體裁為萬代文章之祖朱子不安扵文中子司馬溫公之所謂綂者而修綱目止綱為朱子所定目便付之門人多欠商量所輯小學許白雲雖極稱之但恐其中忽載一叚極古雅經傳忽載一叚常言俗語義理何嘗不佳論體裁未免雜綱目尚少剪裁春秋好在沒要𦂳事刪削一空存其大經大法而已多無為也文中子扵南北朝奪綂歸北亦有意思晉雖簒弑然既一綂其子孫播遷江東中國衣冠文物在焉得不以為正綂乎宋齊梁陳相繼簒奪年代復促晉滅恰值元魏興扵北修明禮樂慨然欲復古制春秋之法中國用夷禮則夷之夷進扵中國則中國之天意無中外也後分為東西高齊無復人道宇文能整理則以正統予周隋恰好承周之後此以人事體貼天意頗亦有見至朱子則一總細註扵下不分正閏萬代可行自更簡易正大若其次則文中子也通鑑不妥當不及文中子多矣舊唐書把張曲江杜工部韓文公傳都説得不成體面所以有新唐書之修然新唐書亦為武后立紀何耶綱目扵三國時以綂歸蜀扵武后時書帝在某處已是眼高千古前五代王仲淹以綂歸北歐陽公又欲奪以歸南至後五代有言南唐為唐後者歐陽公以為無據反以晉漢相簒為正綂雖有予之以綂正所以著其罪之説畢竟牽强溫公因之大約都認做天有一線的綂串下來一般朱子始創分注之例妙絶天至此時亦未嘗有所専屬矣至熒惑守心惟魏應之無論災祥之説不確即果爾亦是天氣非人心天理也通鑑有狠不妥處如以曹氏為正綂卻書諸葛亮入冦其立例但簒得共主位者便為正綂起自他處者則為賊文中子扵五代時忽奪此與彼忽奪彼與此只為每年要存一年號便没擺布朱子忽想一例只書甲子分注其下雖聖人復起不能易矣綱目大體已無可議只有秦家十餘年竟當準王莽例黜之班孟堅所云餘分閏位也其年數既不多扵莽而莽罪在漢一代秦惡流毒萬世復浮扵莽若以秦時無他姓為主莽時亦無他姓為主也不過以莽後仍為漢秦後不為周耳實即以漢繼周有何不可綱目扵楚漢之際五年間分注先楚而後漢似不可依楚漢竝起漢先入關仁暴復異自當先漢因論吕后事曰後儒偏固之論最是廢后事斷定以為不可如譏光武廢郭后是也假使當時高祖廢吕后未見吕后之惡後儒亦必譏之如光武矣出妻聖人所不禁至如國本之説亦不盡然要當視其本如何秦始皇外扶蘇而内胡亥隋文帝廢勇立廣善惡顛倒此自不可若如漢武立孝昭有何不是天下大事果然太子狠不好却説萬萬動不得難道舉祖宗之天下而喪之其可乎此類須有斟酌光武之過不在廢后在不任三公而柄歸臺閣不先六經而篤信䜟緯一壞政事一壞名教此論俗人以為迂濶其實切近後來明帝遂求佛敎魏伯陽之參同張道陵之道術都起扵東漢光武焉得辭貽謀之過後世必謂太子換不得皇后廢不得似覺太執只是換得不當廢得不當便不可此處當兼賢否論不全以嫡長論也如昌邑不道則宗社為重霍子孟尚可廢立何况君父堯舜人倫之至欲為天下得人竟舍己子立他人他人尚可何況己子擇賢而立光武廢郭后詔云宫闈之内有若鷹鸇果爾如何可為后方正學譏之云糟糠之妻尚如此貧賤之交可知矣羊裘老子早知幾為向桐江釣煙水他一生迂拘不能成事的本領盡見扵此嚴子陵一段極有趣的事被他説得氷冷無味試看權文公詩能使薄者淳持此報故人識見議論豈不比正學較高范文正公云非先生無以見光武之大非光武無以成先生之高雖畧夸張却是實事問漢孝獻廢時蜀人誤傳已崩先主諡為孝愍綱目既以綂予蜀帝諡似應以蜀為正曰想因蜀是諡扵生前故姑仍通鑑或是朱子偶失檢㸃亦未可定清植綱目是非褒貶雖稍嚴些然大要不差以某之意如曹操司馬懿倒底不曽正名即依律固是死罪但死之中亦要分别與王莽朱温不同莽温自應立斬操懿還可秋後處決否古今言莽操若以孔子援情定罪畢竟操少别倒底不曽簒雖曰苟天命在我吾其為周文王然比莽身為之則差矣若使操後接以陳思終守臣節則操豈至被此名哉某扵朱程議論有不敢附和者二條程子論管仲與魏鄭公不同恐未然桓與糾俱是奔竄管仲隨子糾非奉先君命也不過急時合夥原算不得君臣魏鄭公所輔者太子上尚有高祖受高祖命輔之建成死太宗召之鄭公神色自若太宗責之鄭公曰太子若聽徵言豈有今日之事其分不過至此而止若高祖命他輔太宗他即輔之有一君無二君管仲尊攘之功與貞觀之治亦差不多貞觀之治鄭公之力為多若以功準過二人相彷不得優管而劣魏朱子進狄梁公而斥荀文若武氏立周廟改唐年號梁公為之宰相徒以中宗尚在勤勤以姑母曉譬薦五王成身後功遂謂反周為唐至荀文若初佐曹操削平禍亂操未遽有逆謀也及欲加九錫文若即憤恚至死未見得有共謀簒弑之端若不論迹而誅心心亦何據之有且後來魏受漢禪功臣配享無文若在内則魏之外文若明甚何所憑而謂之漢賊哉只好責備他不識人不見幾孔明謂曹操挾天子以令諸侯周公瑾謂操雖漢相實漢賊英雄識人預先見得甚明程子責揚子雲不能見幾法言中尚謂王莽為周公不責以死而責以不識人便無詞矣只是程朱到此等處見得明把得定處得是伊川一見哲宗便有去志朱子扵寧宗亦然如此立身方可責備人梁公與姚宋皆事武后武易國號廢唐廟巳是移祚諸公俯首為臣豈逆知有五王在後耶君子論人須恕後既成事諸公賢者足明無他荀文若猶為漢臣未為魏臣至自戕其生以求免扵大惡其志亦可悲矣而朱子罪之不巳謂其為唐衡婿文若方二歲唐衡已死則結親乃其父為之何以為文若罪哉自記近看續綱目令人悶絶續綱目三字就不妥何不續春秋綱目正不易續寧各自為一部書可也綱目之有發明後人為之商素菴輩自作而自發明之又贊曰續綱目作而亂臣賊子懼豈不令人破口况其議論剌謬尤不可言陳洪進值五代亂盗據漳泉二州宋已平海宇洪進獻二州地正與錢鏐同而尤之曰春秋重死守社稷故貶之春秋諸國受之天子傳之先君洪進之地誰予之誰傳之耶此例一開是必欲使為賊者雖已四海清平尚負固拒命殺人盈城盈野力窮勢盡而後就縳始為合春秋之義耶宋史應重為之三百餘年人物實過前代卻蕪蔓若此豈不可惜作史要有剪裁我輩生在後代便要依傍彼時人品學問之可信者如朱子語類文集言行録極是要𦂳書某自幼聞得長老言朱子説秦檜有中興之功岳武穆强横即任之果専亦恐不能成功及後讀朱子書何嘗有此此乃瓊山乖異之説也朱子到淛東即檄毁秦檜祠門人問中興諸人有在岳侯上者否朱子尋思有間曰次第無人如此痛惡推服乃以瓊山之論加之何妄誕至此但是朱子有褒貶過便當依他只有張德遠却要斟酌魏延楊儀不過有才武侯尚終身愛䕶南渡人物以李忠定岳武穆為最德遠乃彈劾忠定與武穆亦嘗有隙卻是為何班史有可為萬世法者史記内不必改的漢書即全用之今如要傳濂溪明道伊川豈能加扵朱子有不備者論贊中増之可耳言行録成朱子悔之曰黄魯直孝行敦篤惜未入然存此語已與入同友言某觀宋史亦易修只把幾箇大人物大姦惡作主其餘不關扵國勢綱常者都附其下數語而足略有聲燄者便多幾句不必盡立傳曰如此便省許多閒話只揀其關係萬古綱常者記在那裏豈不乾浄人間之史便是天地紀簿如人有得意事提起足以悦心大不如意事提起足以警醒便勾了宋史儒林外又有道學揚子雲云周公孔子一儒也不知道學如何又在儒外友曰董江都在漢另立傳不混在儒林内倘修宋史周程張朱當彷此例曰然就是史漢立些名目原不古可傳者傳之何以名目為友曰歸震川云人嫌宋史太多吾尚嫌其太少為其事實多所遺漏也今人因此竟謂宋史尚宜増添直是癡人前不可説夢又人謂五代史太少某却謂其太多五代原無人物何必立許多傳以某看來如綱領分明宋史亦不難修曰此元不是易事真箇明有人非幽有鬼責只是宋史前面人物朱子都秤量過便可據以為準如邵康節傳便用明道志周子傳便用朱子狀此類不必另做不備者賛内補之可也史遷書已不滿扵文中子謂其記繁而志寡只看唐虞之書所存幾何想為夫子所刪甚多故史不須繁也凡律算等書當直截説明本㫖不可牽扯隂陽五行八卦配搭豈必無理但無益扵本義都成閒話古来史書不可盡信某今有一法若修後來之史只據人之可信者信之如程朱心平理明其褒貶自當不錯再據其人自著之書如姚江自有文集破敗百出未有自誣之理想春秋戰國時異説自是無數孔孟一舉刪之秦漢間邪説亦多太史公扵不雅馴者刪去許多尚有好奇之論班孟堅始淘汰精純可以為法欲搜廿一史中取其有關扵修齊治平之要者彷東萊太事記為一編又搜歴代典制沿革及後世如何可以通行者略彷通考各著為論為一編但恐無此歲月耳榕村語録卷二十一

body:
  text: 榕村語錄卷十六大學士李光地撰春秋二責當喪以朝禮晉其狄乎曰晉處父如介葛盧倪黎來之比耳自記年文公二文不書八月雨後時也僖書六月雨及時也自記年文公二躋僖公汪氏説斟酌于情理間極不可易蓋惟兄弟同廟而意欲躋僖故遲遲作主者議未定也夫作主則當告祔于所宜祔矣今欲以僖繼閔則當祔莊欲以僖繼莊則當祔桓此所以遲遲而未作主也及逆祀之計決然後以主祔桓而不繼閔矣然不繼閔雖非而兄弟昭穆同廟則祔桓未爲失故作主之時未有逆祀之形祔祭之時亦未見升僖之迹也必于大祫之祭然後逆而躋之則新主入廟之後同堂異室而僖居閔上不待言矣作僖主亦以末錄本之義自記文公二年春秋有稱王去天者王姚江謂偶爾遺落朱子亦嘗云然思之不爾王非天也加他箇天字見得有一毫不似天處便不是天既可以添便可以去此等處非孔子手段下不得故曰游夏不能贊一詞却非孔子意爲之其祖述堯舜憲章文武無一字無所本禮記于君之亡稱天以誅之周禮太師述王行事稱天以諡宜幽便曰幽宜厲便曰厲厲王之子宣王尚賢不敢改也若曰此天之爲也聖人行事有怕人處似不近情理却確不可易如子繼大宗所生父便降服厭于祖也魯躋僖于閔春秋譏之君父一也嘉靖身繼大統便尊興獻于正德之上試想正德在時興獻稱臣否生稱臣而死遂踞其上安乎所以漢朝幾百年尊一部皮毛春秋亦是好的未必即是聖人之意然據之以斷事大樣不走如光武之父始終不敢僭帝號止稱曰南頓君何等嚴肅然光武却似太過既係中興追王有何不可魯閔公既爲君雖弟父也僖公雖爲兄既曽爲之臣則子也雖叔姪猶然此等事須與同志考據折衷存一篇議論一以聖賢經傳古人成案大儒論斷爲準吾輩在今日爲今人後人視之便是古人不悖于禮而定于一最有功于名教鄭康成豈必賢于朱子而朱子議祧僖祖廟時不記得康成一叚議論以爲遺恨茍得此其有助豈淺鮮哉冬救江而明秋江滅晉之不能救江明矣然若只書伐楚不書救江則無以見其不能救江之意只書救江則處父之師實向楚不向江故書法如此傳謂王臣行而不書者責在晉也自記年文公三書晉侯伐秦于楚人滅江之下見其重于修怨輕于救患無攘却之善也救江則遣處父伐秦則身親之侯伯之職安在哉于秦晉往復之間非褒貶所繫也自記四文公年孔子曰天下有道則政不在大夫趙盾柄政政始穨于大夫矣後乃尤而效之故扈之盟斥晉大夫而畧諸侯若曰自此諸侯大夫班矣自記年文公七書稱徐戎詩稱徐方皆與淮夷蠻荆並舉蓋自西周而不服王化非一日矣非自夫子夷之也自記年文公七壬午公子遂㑹晉趙盾乙酉公子遂㑹雒戎只越三日其爲以兩事出無疑矣而不以繼事書此謹内外之辨春秋書法也自記年文公八春秋因事而見義宋王者後得自命官故因司馬殺司城奔而書官則知列國之不書者僭也其不名啖氏以爲不失節或舊史失其名也其後再書司馬華孫餘則以常書自記年文公八毛伯來求金不稱使不但爲未君直諱求金耳自記九文公年楚椒以禮來故爵其君而著其臣名書法之宜也胡氏漸進之説是若漸強而須假以名號則是夫子畏其强也自記年文公九惠公仲子僖公成風恐皆只是並禭並賵耳仲子成風自是不當賵禭故宰咺名而秦畧其君臣不必特系之惠僖而後見也但僖公之薨已乆不應至是始禭故孫胡有是説自記年文公九自殽之後秦晉交兵是非曲直相半雖然晉遂不能制楚而楚以競秦爲之撓也使夷夏消長于是則春秋之所惡也是故於晉之敝於秦而楚乘間以得諸夏也則狄秦以見志其後河曲之戰又人之何也曰晉稱人故人秦且深貶者一而不再凡爲主者書及河曲之戰不書晉及亦猶惡秦焉耳自記年文公十盟王臣罪也女栗之盟獨公與盟故諱之自記年文公十春秋之教所謂比事者以同類之事相例也所謂屬辭者攷其上下文以見意也自正月不雨至于秋七月則無壊道也而世室屋壊此屬辭而義見者也自記文公十三年趙盾悔子雍之迎而弗克㨗菑之納皆能徙義者也自記十文公四年執單伯執子姬再舉齊人男女之别不可並書自記十文公四年前書司馬司城至華孫來盟乃著其姓未知何意或者見殺與奔義不繫人來盟之人則例無不著也凡來盟不稱使皆其君未有成命其臣以權出而行之也齊高子楚屈完之例是也自記五文公十年子叔姬之歸不書齊子叔姬而曰子叔姬無異于未嫁之詞則知以叔姬爲舍之母者非是三傳于此一事首末似俱未可信自記五文公十年諸侯未盟扈之前侵我西鄙曰齊人盟扈之後侵我西鄙曰齊侯則見諸侯不討商人弑君之罪自記五文公十年一嵗兩見侵反汲汲求盟焉而又不得於以見魯為齊弱之效也不諱者恥在大夫且不以商人之侮辱爲恥也自記六文公十年若果有疾而不視朔春秋何以書哉穀梁説是左公皆未可信自記六文公十年毁泉臺左氏于事或有之不如穀梁緩喪之義正緩䘮猶云不專意于䘮耳自記六文公十年前此盟于扈此㑹于扈而書法同皆以不討齊宋之弑君也春秋之初成宋亂序諸侯責諸侯也至是而政在大夫其聞鄰之有不禮于其君者豈獨不怒于色而已於是諸侯雖欲討亂而不成亂勢且不能故畧之而義已足自記七文公十年赤亦不地耳與隱閔何異其不日以其未成君稍畧之殺於成君者然或舊史因遇弑不得其日之實耳自記十文公八年婦人嫁曰歸故常事歸寧則内夫人曰如適外之女曰來不言歸也姜氏無罪不容于魯而去言孫則非惡言如則不還故取歸寧之歸為義而變文以書之自記十文公八年宣公夫人與出姜俱稱婦者皆有姑之詞也彼諱䘮昬故沒夫人使若不知爲夫人者此則過有大焉而不諱其細故夫人之也彼書納幣此不書納幣何也書納幣譏在䘮也在䘮納幣而猶譏之此書逆女于正月即位之下則納幣不足譏矣舉重之義也自記元宣公年史畏襄仲不書殺惠伯則必書其自卒矣夫子不仍舊史書其自卒而但削其事則非卒可知所謂諱而不沒其實也自記年宣公元楚人侵鄭繼伐陸渾之後則是移陸渾之師也不以繼書戎夏之詞也戎非鄭比故又一子之一人之自記宣公三年得臣之卒不日胡氏謂貶其與仲遂之謀也夫不日何足以貶且不貶仲遂而貶得臣何也蓋高固方來宣公爲之大用嘉禮雖卿卒不以聞故不日耳自記五宣公年仲遂之卒不稱公子以爲䝉前文固也然實於其殁也名而絶之如翬於隱之例耳其或卒或不卒不可以爲褒貶惠伯之不卒必以爲貶可乎名翬於隱朝則意見矣其不卒或舊史失之非義所在自記年宣公八春秋書猶繹而檀弓有卿卒不繹之言則仲遂之功罪姑無論矣所謂書王法而不誅其人身者此類也又案周官大臣死有廢祭之文則不但繹祭也自記八宣公年殽之役書及姜戎此與白狄伐秦不復書及累晉也連兵結怨與戎狄而伐㛰姻之國曰狄道也自秦晉之兵不解而荆楚强盛之勢成矣繼書滅舒蓼亦因事屬詞法蓼六之蓼臯陶庭堅之後也此則羣舒之一自記年宣公八内失地不書我納於彼而非力取旋復歸者則書之濟西田及讙闡是也歸讙及闡不言我旋取旋歸之詞也歸濟西田則逺矣故言我其取也何以不言我取不言我而歸言我臣子之詞也自記年宣公十稱齊侯使國佐來聘其忘哀之罪自見自記年宣公十楚子縣陳而能悔入鄭而不取此所以變而書入書圍各降一等書之也自記二宣公十年邲之戰以晉及楚者畢竟是内晉外楚之詞得臣避晉侯故稱人林父不避楚子故稱名自記二宣公十年入陳圍鄭伐宋屢書楚子者見累年㑹盟征伐中國諸侯皆無復身親之事政在大夫宜其不競於楚也自記宣公十三年朱子曰歸父㑹楚宋及楚平春秋責其叛中國而從夷狄耳罪其貳霸非是春秋豈率天下諸侯以從三王之罪人哉愚謂朱子此言一空衆説之陋文定猶屢以盟主爲言皆不足以訓者也自記五宣公十年滅赤狄潞氏稱晉師滅甲氏及留吁則稱人前猶粗有名焉耳於是士㑹爲太傅晉焉得有太傅蓋官制亂矣自記六宣公十年宣榭之火周來告也告則列國猶書況周乎經未有斥言周者此言成周何以王朝宗廟之重言宣榭則疑魯言京師則不親故舉國號以書若曰此非異代之榭也公羊新周者親周也故知程子以親民爲新民者甚確自記六宣公十年爲國重民命舊史書大有年則聖人緣而書之矣必以爲紀異可乎宣公饑饉洊臻税重而民困喜大有年則幸而書之矣何必曰紀異也而後爲志乎自記十宣公六年肸無列于朝則叔非氏也叔非氏則是春秋字之也内兄弟字者二季子叔肸是也皆取貴于春秋者也友不稱公弟前以公子之屬書矣友爲大夫肸無列也肸有通恩之美友有存社稷之功或謂友討其仲而爲之立後釀成三桓之勢此非其疵者管蔡霍皆有其嗣周公以來未之有改也田氏六卿比比于後微三桓異姓之卿其不興乎自記七宣公十年箴尹克黄則君在也安得與歸父同例君在則殺之者君也命可逃乎君死則殺之者三桓也可以無死死傷勇矣自記八宣公十年一甸之民五百餘家而出一乘則七家而一人也丘出一乘幾於人盡兵矣乘有甲士故云甲自記年成公元齊侯戰敗而窮求盟者齊侯之志也然不曰齊侯使國佐來盟者欲以賂免非專盟也不曰國佐及諸侯之大夫盟而曰及國佐盟以我師存焉則有内辭矣且以見實追及而盟之也自記年成公二凡㑹外大夫不書公非諱也存内外君臣之體蓋史法也獨㑹楚公子嬰齊書公者大夫之執國命舊矣盟㑹征伐專之屢矣獨是役也楚冦臨境臧孫不行孟氏請賂以憂貽君父而使與强楚之大夫盟不据事直書則無以見大夫之罪也自記年成公二蜀之盟從楚者十有一國自成莊之盛未有若此者諸國皆卿大夫惟公在焉故人之諱也諱則何爲不沒公繼乎㑹蜀深著魯大夫之罪焉耳荆楚强盛如此故公之㑹盟出于不得已而無足諱楚秦在諸侯上以强大相先也經仍赴告之文無所更改惟蔡許見削則左氏疑爲得之自記年成公二據古廟制考宮非特作廟也新之而遷舊主易以新主焉耳如是則新主雖未入亦安得不哭況新主未入則舊主在焉但舊主過期應遷不可復以其諡名宮耳如此則尤宜哭也劉胡之説亦未知然否自記三成公年傷則免牲死則無牲可免矣卜日後而免則曰牛穀梁凡所謂亡乎人者皆無可柰何之意自記年成公七伐郯之役蓋吳始稱王加兵小國而又赴告中國以示威也告至於魯是以季文子聞而哀之自記年成公七凡史例有詳畧古史雖不可見班馬以後皆以人之賢否繁殺其詞也伯姬有賢行舊史蓋錄之獨詳故聖人因之欲厚伯姬不得不書伯姬之歸書伯姬之歸不得不書其始皆緣末錄本之義也必皆以爲譏非禮過矣媵微事猶書之況納幣乎自記年成公八當時晉既通吳欲以病楚矣恐非以郯事吳而伐之也其諸郯事楚而吳晉交加以師歟自記年成公八書來媵程子謂以見姬之賢是也然將以見齊媵之失禮故先錄衛晉何言乎失禮異姓一也一娶十二女二也自記年成公八成公十年公羊經無冬十月三字愚謂三傳皆同則必有説如只一傳獨異必文之缺字之誤也不可據以立論自記年成公十晉徴魯師多矣至卻錡之來書乞者茍非其同惡則必以義驅之然後伯者之令行矣秦魯東西遥絶無惡無義而徴諸侯患其不至卑其詞請以私而曰乞自是以後雖有義舉㳂襲為之至晉悼之業成而後一變自記三成公十年公及諸侯朝王于京師曠事也經不書及諸侯朝王而後又以伐秦致明本不為朝王動也削劉子不書諱王師也僖朝王所何如曰以晉文猶能爲王動也然譎而不正又召王而㑹之竟無可取故書天王狩河陽以正晉文之失而僅以朝予魯而不予諸侯也若書劉子㑹伐則須列晉侯上疑於朝京師奉王命而伐秦故沒王官則知此師爲晉動也又踐土河陽志朝王而先㑹後朝其詞若先㑹盟而朝者以責下也此志伐秦而先如後伐其詞若因朝而伐秦者以存上也踐土河陽實與而名不與此則名與而實不與自記三成公十年如傳説則華元未至晉耳安得言自晉歸于宋蓋河上已是晉境故云自晉又魚氏所以復之者懼其以晉討也則稱自者亦著其所自復與自記五成公十年前伐秦劉成二公不書故王臣㑹伐自尹子始所謂挾天子以令諸侯至是方顯然彰著自記六成公十年九月辛丑用郊猶曰用此時以郊云爾自記七成公十年納寧儀與納魚石均惡也二子力不足以自還故著楚納魚石實致楚師而力足以叛故以自入爲文也各舉其實而已自記八成公十年叔孫豹鄫世子巫如晉仲孫蔑衛孫林父㑹吳於善道二事恰相連一旅見于晉一並受命于晉否則兩事皆造晉而聽命受命焉者也是以不書及凡書及者内爲志必受君之成命以往也而後書及自記年襄公五魯屢受莒侵伐前又與之㑹盟而不校蓋孟獻子等方柄政故以釋怨休兵爲事自記年襄公十城楚丘戍陳猶有所䝉也虎牢之戍上無所䝉與專内辭無異與專内辭無異者其非貶可知自記年襄公十楚屢救鄭傳説也據此以求筆削之意間有不通而强説者多矣王仲淹所謂棄經而任傳是也今斷之曰傳事或不可盡信或救而不及則不書或諸侯惡而削其籍則亦不書也當是時楚鄭方與中國爲敵其興師伐救之事不訃可知但憑列國諸侯在㑹者之紀載耳他時楚救蓋諸侯削之矣獨此既戍虎牢則有扼吭拊背之勢故著楚救以敘功舊史如此非義理所繫因而不改也自記年襄公十伐鄭之後始㑹蕭魚魯不以伐鄭致與僖公從桓伐楚之致殊文者外楚而内鄭之詞且雖與屈完盟不可言至自㑹也此類疑聖筆所修自記一襄公十年伐秦之役左氏曰于是齊崔杼宋華閲仲江㑹伐秦不書惰也向之㑹亦如之衛北宮括不書於向書於伐秦攝也夫以惰不名殊無理傳不足據彼謂人者大夫也名者卿也人齊宋衛而序蠆之上不應大夫先卿而爲是説耳當時之序主盟者爲之大較以强弱爲先後齊世子光先下於附庸矣後乃列諸侯上況大夫卿之間哉自記四襄公十年凡侵伐圍無書同者魯為齊弱未有若此數年之甚者也藉晉攄怨十二國之師四靣環之魯人盛大其事而書同圍春秋因之自記八襄公十年九月庚戍朔日有食之冬十月庚辰朔日有食之史官互也簡䇿所書非一人有曰九月者有曰十月者有一誤焉而春秋謹所疑也兩書之爾甲戌己丑陳侯鮑卒蓋此類自記一襄公二十年欒盈復入于晉不言自齊入于曲沃不言以叛著晉過而稍損齊盈之罪也齊盈之罪不見柰何曰書齊伐晉於盈入之後則助叛明矣下書晉人殺欒盈不曰大夫則討賊可知自記三襄公二十年書孫林父入于戚而曰以叛則罪林父過欒盈矣謂盈仇范中行氏而林父與君敵也前是未著孫寗出君之罪以罪君也至是一書弑一書叛則前罪亦因以明所謂罪大而不可解惡積而不可掩自記六襄公二十年衛成公獻公皆出也不名而復也名之權衡自應如是蓋如是而後爲平自記六襄公二十年剽非正也而喜以爲君也是其君也不得以反正之辭與之也喜賊也而衎以爲臣也是其大夫也不得以討賊之辭與之也自記七襄公二十年子札褒貶之説棼如愚謂春秋于札無褒貶焉耳褒貶者必于事于來聘而褒貶其生平逺矣札在國必曰王子札也其稱于我亦必其王子札也春秋所惡於吳楚而外之者僭號焉耳惡之故夷之而加夷號焉吳伯爵而子之者是也故季子以諸侯兄弟之貴降從術椒之例夫亦惡乎其號也或曰如楚大夫之稱公子不亦可乎曰始通也楚累而後書其累而卒書之何也曰義顯而止自記九襄公二十年澶淵之㑹宋儒所論當矣蓋繫此于葬蔡景公之下而特書宋災故以見其意則曉然著明矣或謂春秋弑君者多矣何獨於此特筆乎曰以世子弑君始于此也楚頵南蠻也不可責天下諸侯往而正之也諸夏之君自蔡般始春秋之初君弑有不𦵏者非臣子隱而不成䘮則弑者不以君𦵏之否則諸侯猶知其爲弑而不㑹也般既無隱痛之心又不敢不以禮葬以蓋其事然而諸侯皆往㑹焉則不得不以葬書也書葬蔡侯則諸侯㑹葬定賊可知矣書葬蔡侯于上而著以宋灾故大㑹于下比事屬辭春秋教也爲此類也臣弑君而諸侯定之自宋督始子弑父而諸國定之自蔡般始故兩書所㑹之故爲一書之大書特書州吁何以不然曰州吁誅卒不定也又書𦵏景公則我㑹可知㑹其𦵏不討其賊而豹㑹諸侯大夫以謀宋灾以爲大惡也故隱内卿而目㑹故所以遍非諸侯大夫也或曰隱内卿内無罪也伯姬卒于灾于我有哀焉自記十襄公三年晉楚之㑹兩先晉皆爲天下諸侯隱存内外之坊非於晉楚有薄厚耳自記年昭公元莒魯争鄆日乆春秋書鄆悉未嘗繫莒也則意此邑疆界未明與繹爲邾邑異自記年昭公元展輿爲弑君者所立故去疾得繫之國自記年昭公元觀圍戮齊封徇諸侯數其弑君之罪則弑麇之跡當日必甚秘以僞赴于諸侯齊封之對乃發其私也春秋嚴亂賊之法而不輕與人以弑君父之名傳疑一也畧于蠻方二也自記年昭公元越惟于伐吳之役書人或謂許伐吳或謂責諸侯皆非也純外越則是内楚也越蠻也楚亦蠻也子楚於上則不得號越于下以後皆號之也自記年昭公五留有罪不曰陳留何目世子殺于上則著公子奔于下自記年昭公八君臣同謀則稱國此時陳無君也何以不書招殺過與招同罪者也若書招殺則疑過爲非招之徒而見殺者也然則何以不書陳人殺過招實殺過書殺過則疑以討賊與招也不去大夫多矣里克寗喜皆是也自記年昭公八圍惡耳討賊疑於善也是以先書滅陳用知志在滅國則雖討賊非善也招不去氏不與楚討之義也自記昭公八年晉假道鮮虞遂入昔陽秋滅肥冬又滅鮮虞此與獻之滅虢相類春秋惡其行詐也故不書滅肥猶不言滅虢書執虞公之意也行詐狄道也執虞公時晉首入經不得與荆吳無别故于伐鮮虞也號之且繫楚滅陳蔡伐徐之後無興滅救患之師而尤是效屬事而觀宜君子所深惡前此晉執虞公傳者專責虞公非經意也亡國之君甚於公者多矣何足罪哉凡執人者與所執者書法每相配爲均有罪焉耳人晉而爵虞乃上下之稱賊晉而非責虞審也惟滅下陽以虞首惡則自取亡滅之罪已著自記二昭公十年兩言誘皆惡楚也名般故名虔使虔與般同罪也子楚故亦子戎楚戎等夷也自記六昭公十年止非弑君者因其自狀而書之曰弑君蓋以戒夫天下後世之爲臣子而不謹其君父之疾者三傳之説善矣然而與凡弑者無異柰何曰春秋世子弑君三楚商臣蔡般立乎其位者也許止弗立乎其位者也此比事而可知者也許方遷夷又遷白羽實楚之縣耳䖍能討三弑以掩其罪棄疾亦弑君者豈舍止哉繫于遷後此屬詞而可知者也蓋三傳事實同者即不得而茍訾其僞故程氏有斷案之説歐陽之論果哉自記九昭公十年因閏八月故昭二十年十一月得有辛卯或言春秋時閏皆十二月此處却是閏八月也自記十昭公二年惠襄二王之亂不詳于春秋不告也惠不告故本末俱脱襄告矣而其初致亂之由猶不聞也叔鞅在京師親見聞故詳焉自記二昭公二十年雞父之役吳實敗楚師當日吳魯姻也必告告必以敗楚爲詞春秋何以諱之乎于時中國通吳以制楚陳蔡許諸國附楚以敵吳若書吳敗楚師疑吳果爲諸夏動者春秋惡吳甚于楚故特削楚之敗以外吳也自記十昭公二三年書宋公卒于曲棘所以發人之疑問其故則知以如晉而將納公也自記五昭公二十年居於鄆與天王居于狄泉同文春秋主魯故也在他國則復立一君必矣終昭公之世意如猶未敢立君也故時猶稱魯爲秉禮之國是時夫子年已近强學徒大進何忌承父命而禀業焉曽未聞三家有所咨諏聖人有所論白蓋勢不可爲而不在其位故也可以見處亂邦之法矣自記六昭公二十年齊滅譚楚滅弦狄滅溫君奔皆不名吳滅徐徐子奔則名竊疑譚弦溫其國皆不他見其君之名蓋不可考也滕把之屬屢與中國盟㑹于其告卒也猶多失名況譚弦溫也徐則與三國異故得其名耳自記十昭公三年諸小國滅皆不書名者憐之也徐子章羽書名惡其僭王自徐始也徐稱王在楚前紛紛毛舉他過以貶之殊無意味書名所以惡徐非善楚也自記十昭公三年城把晉之私事也城成周之㑹而書其故天下之公事也以此揆之楚丘虎牢蓋亦天下之公事也故以公事書之而不目其人耳公之出亡惟叔孫氏差爲無譏故婼繼公書卒俾考其所以卒而哀其志也仲孫能率伯命遠城成周而未聞有勤其君之志與季氏分罪矣況與陽虎而伐鄆乎經沒不書定哀多微辭自記二昭公三十年榕村語錄卷十六

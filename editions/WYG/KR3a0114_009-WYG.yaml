body:
  text: 榕村語録卷九大學士李光地撰周易一易有交易有變易交易是對待變易是流行蔡虚齋謂對待是形流行是氣某謂形有對待亦有流行氣有流行亦有對待如天與地是對待是交易而天施之氣入地生物水土之氣上為雲雨非流行變易乎春夏秋冬是流行是變易而春夏與秋冬非對待交易乎天有日月地有水火然於月取水於日取火亦有對待亦有流行日與月水與火亦然分屬形氣殊不備讀易全要看明隂陽二字向来看隂陽是兩物只是此往彼来此来彼往循還交互今觀之不然有隂便有陽有陽便有隂如心神陽也形體隂也形神豈能相離只是各有用事之時天依形地附氣豈有離間亦只是各有用事時耳人清明時便是心神用事昬濁時便是形體用事人心中本空空洞洞舉一念作一事皆自無而之有一心盤算是陽用事到行時目視耳聴手持足行是隂用事然盤算時視聴持行之理般般皆具及至視聴持行又即所盤算之事也豈能相離處處皆湏以此意看看易要見得這幾畫何以繫這個名何以繋這幾句辭有斷斷不可改移者即使這名辭都泯然無存只剰這幾畫再有聖人出畢竟還是這様繋方得説易賴有傳義然尚有未盡處如每卦名雖聖人另取一名亦可但當初既立此名定有必湏此名之義又六爻皆從卦繋辭故曰知者觀其彖辭則思過半把卦爻看得各自成義便不融洽又繋得初爻餘爻便可一筆寫下故曰初辭擬之卒成之終把各爻看得各自成義亦不是又如以乾坤分君臣何嘗不是但却泥不得豈為君者止消體乾至坤便與他無干為臣者止消體坤至乾便與他無干麽諸卦各有其時惟本卦八乃指人心之徳欲人兼體之不可以時言乾兌離震巽坎艮坤如何説時乾者徳之健坤者徳之順震者徳之動巽者徳之入離者徳之明艮者徳之止兌者徳之説惟坎不可言徳之險故加一習字更習於險者厯試諸艱之意是亦徳也又通部立卦何以有升矣又有晉有漸有困矣又有蹇有屯聖人必有深意易經諸卦中有甚明朗者有甚奧窔而錯雜者其奧窔錯雜者必湏爬梳剔抉使與明朗者一例始得鍾旺聖人所以開改過之門者最切易中於爻義本凶者多不斷定説煞示以可轉之道也大轉則變為吉小轉則凶亦輕鍾旺横渠言易為君子謀不為小人謀朱子言易中只有貞凶不曽有不貞吉皆是作易本意鍾旺小象傳字字挑剔無一意不搜索𤼵明出来連虚字都有縁故少時見有重複叠用者有但變一二字者似是泛填的言語却覺得自家有許多意思還似妙於聖人由今看来果妙者他其中已有所無者便不妙若妙於聖人便不妙了孔子讀易却是一字不放過所以挑剔爻詞只添一二字便醒出本意来勿藥有喜朱子謂勿藥自愈是不消喫藥也夫子却云不可試言不可喫藥喫藥便有害有孚惠心勿問元吉朱子謂不用問而可知其元吉夫子却説勿問之矣言我有誠心施恩於人不必問其感與不感故加之矣二字井渫不食為我心惻可用汲王明竝受其福所謂我者似井自我夫子却云井渫不食行惻也言行路之人為之心惻下皆行路者云云也夫子却像曉得人必至錯㑹而挑剔之所關於道理甚大先君子嘗有謔詞云資質魯鈍者無如孔子周易經文不多讀至韋編三絶何也每舉示弟姪輩此是一宗公案試思之作何解皆不能答此乃改削十翼也古人用刀筆筆如今木匠畫線之物湏改者則以刀削之孔子盖有所見而筆之於䇿矣移時削之嵗月如此筆削多則韋帯磨攛加以刀鋒侵捎故至三絶今人著書一筆寫成更無改訂不知於聖人何如也孔子傳易於商瞿却不以授曽子以此推之則程子之不出太極圖誠未可輕以流俗見識窺揣也易不是為上智立言却是為百姓日用使之即占筮中順性命之理通神明之徳本義象數宗邵道理尊程不復自立説惟斷為占筮而作提出此意覺一部易經字字活動朱子亦自得意以為天牖其衷周子窮天人之源邵子明象數自然之理程子一一體察之於人事步步踏實朱子提出占筮平正活動的確故易經一書前有四聖後有四賢年来覺得周易一經惟孔子透到十二分不獨依書立義義盡而止有時竟似與原文相反却是其中至精至妙之義覺有透過之處此經漢人只以術數推演至輔嗣始從事理解但發明處少只筭得一分孔䟽亦算得一分周子易通之作直通身是易但於本文未有詮釋算得七分程子雖有傳精采少遜算有六分邵子先天圖精妙無比但説理處畧亦算有六分朱子集成復從占筮中見理又透過一分算有七分至元明以来不見作者矣自漢焦京之流以易為占測休咎之書折散爻畫配合五行干支附以纎緯不經之説遂使聖人之經晦肓否塞至輔嗣始廓而清之一味説理當時耆舊皆以為非厯乆而後章著故程子教人學易先看輔嗣惜其早夭未能精透問漢人用易占測亦靈驗何也曰彼原另有此術如火珠林之類何嘗不可用以占驗但以附於易殊屬牽强王輔嗣易不説變卦互卦實在好似鄭康成康成乃漢末名儒輔嗣纔廿四嵗便歿一小後生乃敢方駕前賢非無見也夫子解易雖是自己説出一片道理却是卦爻中所有不是幚貼上的程傳何嘗不是好道理却是幚上的多程子講易逐叚未必都當如以形體言謂之天以主宰言謂之帝以功用言謂之鬼神以妙用言謂之神及四徳之元猶五常之仁偏言則一事専言則包四者皆精確朱子説易亦不必逐段是如賛先天圖以易為卜筮之書皆有大功於易某解易無一句不是程朱説的道理不過換換部位而已伊川治易逐爻去看他道理事情後来尹和靖得伊川之傳教人看易一日只看一爻朱子便説易是聨片的如何一日只看一爻問初學可以逐爻看起否曰使不得每一爻如投詞人是箇原告被告必湏㑹同隣佑鄉保證佐四面逼𦂳審問方得實情不然雖審得是亦不敢自信不通六爻全看雖一月看一爻亦無用易傳中有解不去的有硬説的每看至此等便懊悵他當日只藏著不與人看如今做一篇文字中間或有不妥雖後生小子看到那裏便停頓疑惑可見道理是天下公共的心中皆有此理便皆可商量就是孔子亦周流天下無常師而焉不學如何著一書不與人看只就一人見解作朱子崇重先天圖得易之本原明為占筮之書得易之本義其言四聖之易各有不同固是然又湏曉得伏羲之易即文周之易文周之易即孔子之易劃然看作各様又不是故朱子又曰恭惟三古四聖一心清植遵本義説易自應分别象占兩字明白然象必有所自来卦爻所具之才徳時位是也占必有所施用大而行師建國細而㛰媾征行與夫舉一端以包其餘言大包細言細包大者皆是也近講名曰尊朱而絶無復根據卦畫包涵人事之意卦卦爻爻皆硬作君臣等様人物分派鑿空杜撰詭怪披猖至九五六二之類皆當作姓名呼喚葢自前人即有此病語類闢之詳矣自記倪鴻寳解易一卦各指一事如豫説作樂遂以鳴豫為和鳴介石為磬盱豫為眡暸貞疾為景王鑄鐘有心疾冥豫為矇瞍泰説祭祀遂以茅茹為縮酒包荒為包匭青茅歸妹為夫人亞獻復隍為求神革説造厯遂以黄牛之革為建寅革去丑也改命為隨時修政虎變為頒行天下上六為閏以豹為虎之餘君子為大人之餘也又言吾只以孔子之言為主若文周討叛孔子必来救援豈不可笑凡著書湏大主意定若只在字句上著脚無用某初治易有了幾年工夫逐爻看想覺得三百八十四爻都不相粘後將每卦鍊作一篇文字然後逐字逐句順將去其初以為一二處不明白且混將去那知此一二㸃黒處正是𦂳要處有一字一句作梗便是大主意不確到得無一字不順就是虚字都應聲合響纔印證得大主意不錯則逐字逐句又大有力也立大主意與逐字句求解葢相為表裏至尊最得意折中中義例一篇啓䝉附論道理非不是却不似義例是經中正大切要處如治天下義例是田賦學校官法兵制刑獄之類日日要用切於實事附論如王府中所藏關石和鈞本来是道理根源但終日拿這箇来治天下却不能某治易雖不能刻刻窮研但無時去懐每見一家解必看今四十七年矣覺得道理深廣無窮無盡向所著雖意頗可用而詞語全非今番改訂略有意思見得變動不居矣却又鐵板一定不可易聖人著語即一虚字都一團義理盡是春秋筆法周易通論自然置在正解之後然欲讀易者却當先看此編内有湏先知道方好讀易的説話以上總論乾坤只一套道理分别聖賢學者雖意思相近而不可拘自記董子曰道之大原出於天此句最好天下之理皆原於天地地又原於天六十四卦無所不包究歸只是乾坤坤又只是乾故看易如看得乾坤二卦透六十四卦皆有入處清植乾坤取象龍馬最精乾即是人心坤即是人身龍是箇純陽能變化的猶心必極健能為五官百骸之主故象乾馬是箇健行的牝馬却又是箇順而健行的猶身必極順然却湏跟得心上方是順故象坤形神亦是如此神用事則形隨之形用事則神便昬了然形雖不可用事亦不可一概怠惰不能從心如牝馬雖不可先牡馬然必湏跟得牡馬上方得地雖不可先天然天一動地亦必動天一肅地亦必肅方是順清植一日新訂乾坤二卦觀彖稿本訖命植録之植録至初爻注云乾雖純陽然其道變化不窮竊疑著語未圓因以為請答曰固是復瞑思良乆曰此語難著翌日乃命取到稿本去雖字改然為而即今定本也清植乾取象於龍者為其變化龍獨貴於五者為其御天變化則元亨而能利貞所以藏諸用御天則自利貞而為元亨所以顯諸仁自記飛龍在天則能統天而行雲施雨矣利見大人所謂首出而萬國咸寧也五爻之詞實備四徳之義清植問朱子謂一卦可變六十四卦故六十四卦之變凡四千九十六卦又謂六爻皆變者只占變卦不占本卦則是占得否六爻皆變者無以異於得泰其卦不能足四千九十六之数矣且既得否而六爻皆變只占泰卦聖人何不使直占得泰必使得否乃變而之泰何歟曰乾坤所以立二用者固是明用九六不用七八之義亦是借以見占例見羣龍无首説者謂即是元亨利牝馬之貞看来到底稍别利永貞亦未全當得元亨利貞葢占得六爻全變者雖是以變卦之辭為重亦湏根本卦立論如二用之比清植見羣龍无首謂如龍在雲氣中藏隠不肯出頭露面便是見其无首也自記傳義以大明兩字屬人故於六位時成湏添則見二字如以大明終始即為易卦大𤼵明乾道之終始則説六位時成全不費力矣或曰大明二字串下言聖人大明天道終始與六位時成之義自記亨處言形貞處言性極確今觀草木當抽條展葉時但有形爾茍未結實則未知其性云何自記爻言无首而象言不可為首言天徳渾然無端不可定其一處為首也葢首可見則非所謂藏諸用者而變化息矣若以不可為戒詞恐失其義自記讀易先要知道元亨利貞四字文王本意只説大通而利於正孔子却作四件説朱子謂竝行不悖亦未言其故孔子讀書細亨而謂之大畢竟亨前有箇大利於正畢竟正前有箇利元大也始也凡物之始者便大如唐虞是何等事業洙泗是何等學問然湏知是堯舜之心胷孔子之志願其初便大不可言范文正作秀才便以天下為己任程明道方成童便以聖賢自期這却在事功學問之先赤子之心大人不失者赤子之心最初之心無所為而為不自私也不自私便大大則統率羣物長子曰元子以能統率衆子也天子曰元后以能統率諸侯也長妻曰元妃以能統率羣御也大而亨不必既亨始見其大元自在亨之前如孔孟終身不得行道其大自在我實有此大不必問其亨不亨也利而貞不必既貞始見其利利自在貞之前亨便當収囘来宜収而収便有利益利本訓宜宜便利如人君手致太平便宜兢兢業業持盈保泰這是利至於社稷鞏固則貞也利者萬物之遂貞者萬物之成成字意利字中已有貞乃是堅實凝固之謂孔子將元亨利貞作四件説其理最精且以為六十四卦占辭之權輿占辭有僅曰亨者有曰小亨者是亨不必皆大也不必皆大而獨繋以元亨則是未有亨先有大也如農之倍収賈之獲利亦可言亨而不可以言大以其先所謀者原小故也若士希賢賢希聖其勲業功用直可以充塞天壤豈不以先有斯大故亨得来亦大耶以此例之則亨不如元亨小亨又不如亨矣占辭有曰貞吝貞厲者有曰不可貞者有曰貞凶者是貞不必皆利也不必皆利而獨繋以利貞則是未有貞先有利也如事之不可常者以為正而固守之則必致凶厲矣何利之有以此例之則凡貞吝貞厲者必其微有不宜也其曰貞凶者必其大有不宜也故以元亨利貞作占辭看似元字利字是虚字亨字貞字是實字被孔子細心讀破元字利字却是實際字亨字貞字反是現成字清植體仁足以長人安土敦乎仁故能愛也嘉㑹足以合禮觀㑹通而行典禮也利物足以和義行而宜之之謂義也貞固足以幹事知之明信之篤則行之果而守之固也和義猶言合義自記貞字舊説有屬信者惟朱子以智字註解極確其源則自周子仁義中正以正屬智處来自記北方前一半屬隂後一半屬陽所以有兩以性情言惻隠恭敬屬愛一邊羞惡屬惡一邊是非則是者愛之非者惡之便管兩邊也以倫言父子兄弟朋友君臣俱是一類夫婦却有男女兩身以至人身賢有二天象北方有龜蛇二象故易于貞言貞固揚子冈䝉直酋㝠冈㝠皆北方自記言行信謹方外也閑邪存誠直内也坤二言進學故自内説到外乾二語成徳故自外説到内自記善世有兩説善葢一世是一説善了一世之人是一説從前説當添入葢字不如後説為妥清植誠即忠信也非見之躬行之實則忠信亦未有著落故必立其誠而後存誠者有所據依周子曰誠之源也誠斯立焉立字之義本此自記進字與至字相關居字與終字相關幾字又根至字存義存字又根終字自記行道而有得於心之謂徳所謂有得非泛泛之謂直似有一物吞入腹内不可復出夢寐依之死生以之任世間可喜可懼之事再不能奪去換去纔是有得業指事言不特大經綸即做一件小事能成就皆謂之業忠信是存實心如孝便要誠于孝弟便要誠于弟總是要自己慊心不是徇外為人念念如此所以進徳然徳又不是空空存在這裏便了湏見之于實事凡日用之間無非忠信之心之所流注以致言顧行行顧言則所行所言處處皆實理實事可依可據而誠立矣如是則有可居之業如人買得房屋便可搬家在裏面住的一般故謂之居知至屬進徳以理言也知終屬修業以事言也理不可以終言理無終也卻有至當不可易處至之者必求到至善之處也事必有終終之者必做到完全處也至之所謂進也終之所謂修也時解以知至至之屬知知終終之屬行非是朱子本意卻以知至知終屬知至之終之屬行乾乾因其時而惕如云當時乾惕則湏云因其時而乾惕如云乾惕所以因時則湏云乾惕以因其時夫子卻置此三字于乾乾之下而惕之上其意以為終日乾乾至夕猶惕是時無終窮而惕無止息因其時三字是貼夕字清植或躍在淵是承龍字為義言龍或有時而出来躍于淵時講都説是欲安于臣位則當時改革欲飛上天卻又未敢便飛滿腔子疑惑將非為邪邪字謂是邪謀之邪一派説得詫異夫子是言其上下无常不是要終于隠其進退无恒不是要遯世離羣是欲内度其身外度其時所以今日出来躍一囬明日又出来躍一囬故曰欲及時又曰自試或之者疑之也疑是疑其時之未可出而不敢輕易出来所以无咎林次厓説近是然尚有未盡清植水火以在地者言雲風以在天者言皆以明應求之理天地猶然而况于人物乎故直接云聖人作而萬物覩下面親上親下又就萬物言之以見萬物無不覩者以聖人能參賛天地故也清植問乾文言中小象三叚有分别否曰程傳分别過恐未確此只是既説了一叚似有未盡卻再説一叚問如九三一爻既説反復道了然反復之故未嘗説故曰行事行事之故又未嘗説故曰與時偕行曰與時偕行是因上未嘗説出夕惕底意思所以復言此清植乾元統乎天之動静故曰乾元用九自記利貞者性情也即各正性命處根乾道變化説来故曰性命就物上説則曰性情自記聖人之學只是希天天只一團生意以生物為事無一息之停那一㸃好生的心乾乾淨淨一無所為天之心何從見于那動處見所謂乾始者此也天心惟其如此故能以美利利天下不然有偏私便不能公普如何能以美利利天下以美利利天下却四時行百物生天何言哉未嘗見天言所利只平平常常做去而已故曰純粹精也純是無一毫駁襍粹是無一毫惡濁精是無一毫渣滓聖人不過是要到此田地問易之教潔淨精微亦是此意曰惟其潔淨所以精微天地好生之心萬古如此不曽有一毫自私自利有所為而為之意聖希天天浩浩蕩蕩從何處希起希其心而已此無所為而為之心天心也故曰有天徳始可以行王道此心天徳也孟子最善形容當乍見孺子入井時只求此心過得竝非為别的無此心就做出堯舜伊周的事來只是覇不然覇者亦做許多好事如何聖賢那様鄙薄他其初那一㸃無所為之本心沒有便與天地懸隔所以中庸從戒懼慎獨説到天地位萬物育末又収歸闇然為己一直説到無聲無臭上天之載方住總是發明此理此一㸃無所為而為之心即是天地生物之心又純又粹又精中庸言至誠無息其功用與天地無二結到不已與純上正是此意乾無始坤無終以一嵗一日驗之顯而易見一嵗之首自正月起其實陽氣自子月生一日之間寅時日出其實子丑二時原算今日而不用豈非無首一嵗隂氣至亥而終却不算終又拖過子丑月夜間亥時已終昨日又拖到寅時豈非無終豈非以大終乾之始即坤之終坤之終即乾之始所以人但知臣下不可以功名自居不知君上亦不可以功名自居也君以功名自居便是覇道驩虞其起念不是大公便不純不粹不精天之生物其心至仁不容自己絶無所為而然故曰乾始能以美利利天下不言所利根本全在乾始二字乾始便自不能已無利可言也堯舜君臣其視唐虞事業總如浮雲過太虚這便是無成有終以美利利天下不言所利之道以貞下起元之道言之都在黒漆漆裏那一㸃為造化之根冬一収歛春始發生即至嵗功既成依然不言所利吾儒以闇然為已之心始之到上天之載無聲無臭仍是如此上天之載若説作窮髙極微便不是中庸無聲無臭中庸之至也天地終古運行那曽有一些聲色臭味動人欣羡所以云剛健中正純粹精也不如此便不剛健不中正不純粹精中庸始終講此道理這裏差一絲外面直繆以千里説得三達徳五達道九經爛漫極處便𦂳𦂳㸃一句所以行之者一也孔子于乾坤兩卦總不説天地神化功用只説天地之徳所以妙四書五經太極西銘無一語不是從天心摘出來的被人囫圇看過便不覺至仁義之利原不消説未有仁而遺其親等語孟子亦為下等人説法耳至與門弟子言便不同曰行一不義殺一不辜而得天下皆不為此派一斷萬事都壞天下平即彖傳萬國咸寧之意彖傳以九五一爻明君道之元亨利貞分作兩片説此又聨貫説來問彖傳根首出説故曰萬國曰寧此根六龍雲雨説故曰天下曰平雖是一意而字無茍下曰然清植平字便有各正性命保合太和之意自記聚辨居行皆修業之事而徳在其中自記何處見得是先後天葢風氣未開而開風氣之先者為先天時事既至而因時立事者為後天時字雖在下句見然所謂先後天者只是先後此時耳自記先天而天弗違後天而奉天時天字以理言不得如以理言後天二字尚可説先天二字説不去理豈可先乎天字只好以氣數言謂氣數未開如堯舜之時然所秩敘都是天秩天敘所命討都是天命天討後天則是因其已有者而益明備之清植以上乾卦乾坤一物而兩體但觀牝馬之象則知乾固馬坤亦馬也特牝耳先迷句後得主句利西南得朋東北䘮朋句程傳説不必從説卦傳曰致役乎坤坤為役則必有為之主者矣若主利另為句彖傳中不應全然不釋其曰後順得常順字中無主利之義也即文言傳後得主而有常有常即得常亦無主利之義也利字自屬下文讀言西南則利于得朋東北則利于喪朋一字雙管清植坤厚載物徳合无疆无疆指天言言地與天合也牝馬地類行地无疆无疆指地言地與天合則天无疆地亦无彊矣而牝馬能行之者以其柔順利貞故也此所以為地類也安貞之吉應地无彊无彊亦指地言言君子與地合也然地合天而君子又合地則三才同撰之意可見矣清植本義以地類一住轉到元彊為順而健不如程傳口氣好自記利牝馬之貞五字破不開即乾彖傳亦未曽破開利貞兩字傳説壞了西南本義又説壞了東北然細尋義理在西南則不妨得朋在東北則宜䘮朋耳不可偏説一面自記程子謂西南得朋不好東北䘮朋纔好如女人羣聚有何用處止與類行而已惟從夫乃得所歸也朱子又云西南得朋好東北䘮朋不好西南隂方得其本位東北陽方則必至于䘮朋某則謂在西南當位用事必湏得朋乃與類行至東北則時過地易必湏䘮朋乃終有慶也如做外官湏有屬員吏役兵馬方能辦事及居近君之位則宜聲光銷减朋亾乃尚于中行矣西南如臣去君逺將在外君命有所不受大夫出彊雖無君命専之可也其聲光幾與君同至東北則與君近不見其有威權聲華銷减如月去日逺與日相對則光滿近日則偏􅃜不全矣存疑諸書苦分不可相無及不可竝行之隂陽故疑本義謹幾微之説豈知其不可竝行者即其不可相無者也有夫不可無婦有君不可無臣獨不可使臣妾用事耳義豈相反乎自記湏知不可相無者即其有淑慝者葢陽則純是性也隂主形形既生而善惡分萬事出是惡乃生于隂也故隂而順于陽則為健順仁義之屬不可相無者也隂而不順于陽則為淑慝之分不可相有者也善惡之分在于隂故聖人于消長之際極其惓惓雖非智力所能損益而亦不可不盡其扶陽抑隂之道也自記不必從魏志小象自多此例如需上之類是以兩句釋兩句坤初乃是以三句釋兩句耳自記直與大都是乾惟方是坤本位直是受之于天大仍歸之于天故曰不習无不利是箇順字又云合徳无彊而終之以承天而時行地道无成而代有終也直而不方則不能大如一件挺直之物四面不方未免褊窄譬如一樹聳然直上然周圍枝葉不能布置均匀却算不得大樹故曰敬義立而徳不孤自記爻無動意象言動者非動則無由見其直與方也葢柔靜者體也直方者用也故曰坤至柔而動也剛至静而徳方動剛即直也如人心敬義之徳義固動而制事敬亦動而制心也爻直方竝言而象言直以方非直無以為方如欲作方物非有一直者以度四面必不方矣非敬無以為義先儒云無忠作恕不出是也自記動而直方則大矣大故不習无不利地道光即大也自記凡數起于㸃當初止有一㸃引而長之則為線將此線四圍而周方之則為面又復疉之教髙則成體直方大即是此意直即線方即面大即體惟直而後可方惟方而後能大故象曰直以方也直了纔能方既直方自然大故曰敬義立而徳不孤清植含章可貞則以時而發静中有動也或從王事而其知光大動中有静也自記陽為質隂為文坤爻除初上外二三四五皆文也或藏或見耳或謂六二無文然地道之光天下之文孰大于是自記永貞即是牝馬之貞即是順而健即是隂變為陽自記問安貞與永貞何别曰安貞者順也永貞者順而健也非安則不能永然非永則亦不足以言安矣清植至柔而動也剛覆釋彖辭元亨至静而徳方覆釋彖辭利貞後得主以下覆釋彖辭後得主以下不言西南東北者西南得朋即亨之時所謂含𢎞化光東北䘮朋即貞元之時所謂柔順利貞順承天而時行也此叚數句皆用而字一折上截柔静後得主含萬物承天皆是其順處下截剛方有常化光時行皆是其順而健處敬義不可分動静静固敬動亦敬如處事時是義然必此心常存義方有根譬如讀書茍心不在則口雖誦目雖視實不知所云為何此安能制事中庸言不覩不聞分别未𤼵已發此亦有説如人畫丹青必先有素絹此似未𤼵之心及制事却似加以采色只見丹青不見素絹了惟空白無采色處方是絹之本色所以不覩不聞方見得心之本來面目實則敬貫動静者也故言敬以直内義以方外則可若謂敬以直静義以方動則不可大抵敬屬心義屬事提醒此心使常在此便是敬無甚條目義則湏窮理精義便有許多條目了清植乾陽即人之神坤隂即人之形神純善形便有善惡聲色臭味之欲不可謂惡其流即惡也所以累神者形也以先天圖論之陽動屬神日用動作皆一心運用隂静屬形事過休息則四體居止以後天圖論之凡生物成物皆隂為之猶耳目手足足以集事事去則過而不留中心湛然虚明總之天君泰然百體從令以陽為體以隂為用者正也人欲横流心為形役者不正也然雖當理欲混襍人心危道心微畢竟神明為尊故𤣥黄者天地之雜也下綴一語云天𤣥而地黄若曰雖是雜畢竟有定分天到底是𤣥地到底是黄周衰君弱臣强幾于上下倒置然大號終存春秋之名分凛然猶是義也天地隂陽君臣父子理欲善惡君子小人無不如此程子説孟子英氣張子説顔子粗心張長史常舉為對果然讀書至程朱可謂細矣比之孔子覺猶未也孔子讀書直是字字不放過坤卦上爻孔子已是解明程朱解之尚都未盡此時陽氣雖微到底陽不可沒故曰為其嫌于无陽也故稱龍焉此時焉得有龍倒反以龍為主似龍自在那裏戰的一般但是龍至此不能自振己疑于隂故曰未離其類不然氣為陽血為隂如何説血隂陽至此混為一區故曰𤣥黄者天地之雜也然到底天是天地是地猶然天𤣥而地黄春秋書法便是倣此因天子失了身分諸侯皆與對壘然春秋之文曰王師敗績于茅戎一似天王不知何故自敗于茅戎者然天王豈能無過到底君是君臣是臣所以孔子成春秋而亂臣賊子懼又如人心原只有天理到得人欲熾時竟與天理爭衡豈可説道心人心勢均力敵只説得道心微茫而已然道心至此已不能超然于人心之上覺得混襍到底天理是天理人欲是人欲豈可竟不分别此是夫子就龍戰于野其血𤣥黄八字上逐字想出來的直細入無間榕村語錄卷九

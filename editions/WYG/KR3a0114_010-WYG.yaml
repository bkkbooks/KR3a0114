body:
  text: 榕村語録卷十大學士李光地撰周易二正義中釋屯彖傳以剛柔始交而難生動乎險中雷雨之動滿盈為皆卦所以名分之則始交而動是釋亨難生險中是釋貞雷雨滿盈是釋建侯今思之屯象稱雲雷解彖稱雷雨則屯之時猶未解也彖傳變雲言雨者欲以見屯之必解則雷雨之動四字是釋亨然動者亨之機耳其絪緼滿盈又足以見貞固之義故程傳以剛柔始交而難生動乎險中二句為釋名以雷雨之動滿盈句為釋大亨貞其説可從清植問本義以光亨及吉為孚貞之應觀彖不從何也曰看六爻中言敬言慎言中皆孚之屬也言恒言衍言順皆亨之屬也其言正則貞之屬也需之時孚義最重故上雖不正而敬則終吉象謂雖不當位未大失者以此亨義次之故二雖不正而衍亦終吉象謂雖小有言以吉終者以此清植邑人三百戸无眚覺得本義説未安故向來作無株連之患解自以為妥矣一日宴見䝉諭云此乃邑人化之而歸於無訟之意想來極當若是不致株連何消鑿言三百戸三百戸邑之小者本義説原是葢二之自克雖未足以成風敎而已可以化小邑聖見髙明洵非儒生所及清植小人勿用謂既撥亂世反之正則當建官惟賢不可復用小人以釀他日之亂階耳用者所謂是崇是長是信是使是以為大夫卿士非不用以開國承家也小象必亂邦邦字是謂大君之邦非指所開之國若以小人為即指開國承家者言則當命將出師之初所謂長子帥師弟子輿尸者已致其叮嚀之意是論功行賞之人大率皆長子之類安得小人哉自古戰勝之後多致驕盈而小人因以得志聖人之特為設戒者以此故既濟于三年克之下亦曰小人勿用清植宻雲不雨自我西郊張魏公解云言陽未應也此句實諸家所不及雲者隂氣雲而宻是隂先唱也若陽入而散之則氣降而成雨矣不雨者以其氣猶尚往也所以尚往者由自我西郊故施未行也西為隂方自我西郊即陽未應之驗觀彖中此意猶未能暢清植血去傳義説未安君臣之際所以致惕為其間有壅隔而情不通也若積誠感動以致去其壅隔則惕可出矣小象合志二字正釋血去之義清植易有大畜有小畜大畜者聖君在上正名定分布徳發政天下風靡小畜則如以臣子而匡救其君父也自上而變下者易自下而變上者難然始雖勢逆積乆自效故曰既雨既處言畜之極而隂陽亦合也但大畜功成則身名俱泰故曰何天之衢小畜功成便宜引退若以寵利居成功必致凶咎故又曰婦貞厲月幾望若以位不當為爻徳之不善則當以釋跛眇今此以釋咥人葢卦有不咥人之辭而三適直兌口之缺故有受咥之象是所謂位者爻位之位也自記履彖傳所謂剛中正履帝位而不疚者即指五也凡彖傳中所贊美其爻無凶者他卦皆然獨履五之辭曰夬履貞厲此厲字當與乾三之厲同言常存危懼之心爾非占辭也惟剛故曰夬惟中正故曰貞惟常存危懼所以不疚書曰心之憂危若蹈虎尾正此厲字之義觀彖中猶是循用舊解清植内陽而外隂内健而外順内君子而外小人三内外是一様或疑順健都是好的如何分内外不知連隂陽君子小人原都是好的如人以心為主難道耳目口體都是壞的不成獨陽不生隂乃所以成物君子當權秉令亦要小人宣力于外趨事赴功何常不好只是要得在内者為陽為君子耳以内外取義則為消長以上下取義則為交泰帝乙歸妹只是以上下取義耳自記否彖傳之言内外隂陽君子小人字俱與泰同只改健順為剛柔葢順雖要放在外却全是好的若隂柔便可生出不好來清植問不可榮以禄對榮字宜曰爵而反曰禄葢當否時稍有識者便知不貪爵位然或廹于貧不得已而為禄仕者有之矣惟儉徳辟難之君子人君不可以禄釣之而致其身于榮此非有衡門樂飢之節者不能也曰看得好清植凡卦必有主爻同人于野亨卦之義也而爻徳無以配之者葢六二雖成卦之主然以爻徳論之以隂求陽以下應上非所謂大同也九五雖剛健中正然居尊位以下交以言同人則可于在野之義則有間矣惟上九處卦之外有野之象坤之上曰龍戰于野是也然既非卦之主而又未極中正之善故其義次于野而曰郊國外百里為郊郊外為野郊比之于宗于門則公矣比之野猶未也故象傳曰志未得于野則亨于郊僅无悔而已志未得釋无悔之義也自記大有有賢之卦也大象兼遏惡言者惡不遏則善不可得而揚堯典先辨三凶而後舉舜舜典先誅四凶而後咨二十二人皆是此意清植同鳴謙也一曰中心得一曰志未得者一則對鳴字為義言謙雖逺聞而實自得于心非徇外也徇外則非謙矣一則對征邑國為義言謙雖逺聞而實不敢自以為得故雖可用行師而惟自治其私邑非務外也務外則又非謙矣中心得志未得皆所以為謙之至自記嚮晦入宴息與隨名義不甚關合此等處是夫子示人以觀象之例羲易無文然觀玩之下隨人識取意理更是無窮所以文周未繋之先原可用以占筮夫子于大象傳指切人事處雖説得與名義關合者為多時漏一二處使人知文王當日假令别命一名亦未嘗不可以此意看易益覺得變動不居意理活潑清植蠱當以革巽二卦比看巽者隂伏于内弊之端也蠱者蠧蝕于中弊之成也巽如果子受溼有一二軟腐之處蠱則内生蟲蛀矣故巽不過要搜索那一㸃伏隂制而去之若蠱則湏從頭整頓所謂甚者必舉而更張是也巽曰先庚後庚而蠱曰先甲後甲甲者從頭做起之意至革則通體全壞湏用變換一番又甚于蠱矣吉凶生大業無吉凶則無業故巽止小亨而蠱革皆元亨清植二陽在下如何為臨以二陽正向盛也三陽則恐盈而昃矣既以二陽為臨未有四隂在上反為下所臨者且臨人必當有道至為人所臨者本無可説故六爻通作臨人説觀卦二陽在上自是為人所觀之象六爻既説為人所觀又説觀人者觀人以自處亦必有道故不可以無言因承修周易折中請得内府宋版本義觀卦辭下注云觀者有以示人而為人所仰也曰坊版于示人上皆増入中正二字如何可通向嘗以為疑今看此可見坊版之誤人不淺清植彖傳神道設教是總説象言觀民設教是就省方一事説非上設教以徳而下設教以政也猶之天有四時風雨霜露無非教也而風之動物尤為深入而逺被豈彖之設教以神道而象之設教非神道乎王者既設教以為民觀復因省方而觀民以設教象意總包舉于彖傳中耳自記觀民與彖傳觀天下之義同言九五大觀之主為民所觀也茍其徳之未至則不足以為民所觀故必觀我之平生皆合于君子而後无咎自記柔文剛文之而已剛文柔何故言分此理驗之樹木最為易見樹之本根為剛為質其枝葉為柔為文枝葉之庇本根是文剛也然其所以枝枝相對葉葉相當津潤悦懌而不枯者非本根之氣為之流布灌注何以能然但枝葉之津潤悦懌即日有加而本根初無所損則分而丈之之驗也清植以象言之一陽居上有得輿之象衆隂在下剥之有剥廬之象以理言之君子當道之窮而人心益歸之得輿之義也小人之剥君子自失其所依芘剥廬之義也然碩果既不可食則廬亦終不可剥故象傳補爻意曰終不可用自記徐善長問陽無盡時當剥方盡一動便是復如何復卦本義云剥盡則為純坤十月之卦而陽已生于下矣積之踰月然後一陽之體始成而來復是踰月後一陽成體而始為復也曰朱子此語自未圓然卻有此理㑹得便不湏疑此卻是無中生有道理喜怒哀樂未𤼵時一切皆有人呼時必有息方其息時正是蓄呼之力此之謂大本人舉足要行卻要先站一站那站便是大本了陽生于子卻胚胎于亥乾所以位于西北也亥添草頭便是根荄之荄添木旁便是核實之核添子旁便是孩提之孩可見陽生于亥亥月謂之陽月非無故也問見天地之心曰使天地無心人物之心卻從何來自記朱子謂也不耕也不穫恐未是本意葢只管耕菑不計畬穫也試將此意代聖人作兩句其立文自不得不如此無可疑者自記行人得牛邑人災也語氣葢謂若邑人得牛則其被罪也乃自作之孽矣惟得牛者為行人故在邑人雖不幸被罪特可謂之災而已清植良馬逐是象利艱貞是占日閑輿衛又是占中之象承良馬逐之意而取此日閑輿衛利有攸往即是利艱貞注脚自記顛頤拂經于丘頤征凶本義云求養于初則拂于常理求養于上則往而得凶是拂經與征凶為對皆占辭也至小象六二征凶行失類也單言征凶本義卻云初上皆非其類是又以征凶二字兼承顛頤于丘頤兩義矣考六爻四亦曰顛以求初也三五皆曰拂以求上也既求初為顛求五為拂則此拂經于丘頤五字當作一句讀而以征凶二字總為占辭黄勉齋之説如是于義為長清植大過四陽在中取象于棟二五變棟象楊者以其近隂則雖為材之類猶未離乎水澤之感也小過四隂在外取象于鳥而五又象雲者以其居尊則雖為飛之類獨有取乎飄揚之質也棟在中故四陽皆棟而三四獨言棟翼在末故四隂皆翼而初上獨言飛同一棟而四隆三撓者以位而定也同一飛而初以凶上則離之凶者亦以位而定也清植大過小過湏當斟酌得妥如事斷不可徇俗則湏壁立萬仞雖獨立而不懼雖遯世而无悶如猶或可從則雖少徇之亦不妨如麻冕禮也今也純儉吾從衆用純原自無妨况又得儉所以聖人亦只得從他若拜堂上則斷不可從此是權衡處天下事豈可教過過便不是了然聖人覺得這邊分數較多便站穏在這邊如獨立遯世聖人豈願如此此便是過處但時當如此聖人便不懼无悶行過喪過用過便不得謂全是了但時當如此亦只得依他然使行過肆喪過易用過侈聖人亦便不從因為過恭過哀過儉尚有好處所以從他這便是權而不失經處孟子答任人處便是小過舍生取義章便是大過清植棟者剛在上也剛在上則有橈之患惟柔在下以藉薦之則可以防其橈矣君子之臨事獨立不懼蕩蕩然無顧慮之意也當其未事周防不懈䕫䕫然存恭畏之心也自記八卦皆人心之徳乾健是不息的人血氣不周流便病脈歇至便病坤順所謂百體從令也健主神上説順主體質上説震主動巽主入而㪚兌主説艮主止皆人心之徳不可無者惟水主險豈可説人心有險徳故聖人于坎上加一習字王輔嗣云更習也最妙程朱不用而以重坎為習坎那一卦不是重何獨坎卦孔子所云重險乃是解習字之意一重險過又一重險非更習而何不是以重字訓習字也不獨上聖大賢將降大任必先窮餓困苦動心忍性増益其所不能即平常人亦困心衡慮而後作徴色發聲而後喻所謂險不獨貧賤患祸也那極如意之中一切飲食男女聲色嗜好那一處不是窞阱都要在此等處鍊過方好如一習字便是人心之徳最不可少者天下至實者無如水以黍稷入斗斛已滿了再築實揺㨪便陷下土沙皆然惟水一滿不可増添他物可堆髙水至平而止所謂水流而不盈也古人文字有兩句似相對而上句斷下句聨下文者甚多史記尚如此水流而不盈似與行險而不失其信相對其實水流而不盈是斷句行險而不失其信維心亨乃以剛中也是一連讀徳行如三物中六徳六行之類教事如三物中六藝之類皆自己身上事程傳以習教事作三令五申使民習熟説稍離清植宛平王相公熙嘗語余云吾閲事多矣凡人設機心假一事以作阱陷人者其人必即因此事自取禍戾余因是語而悟習坎入坎之義其所習之坎即其所入之坎不待他處有坎而後致凶也清植水徳所以為至實者以其未平則未驟滿方平復無増髙既平之後又難以人力使之縮少也然則其後之無損耗者由于其初之不盈大也二在下體是未至于平也未平則不驟滿故爻曰求小得而象曰未出中五在上體是既至于平也既平則不増髙故爻曰不盈而象曰中未大人之心徳有本而無助長之功有實而無過情之譽者亦如之自記習坎之得其道者二五也四承五故亦无咎其餘三隂皆失道者也獨初上言之者初雖渉險未深而居下有坎底之象是小人動作機詐自謂能習險而自納于陷阱者也故爻特加習坎二字而象曰失道凶上雖處隂之極而居上有出坎之象是人之惡積罪大罹于刑辟聖人至仁之心則猶望其習于險而改悔者也故象曰凶三嵗所以終習坎之義充類以至于盡也三雖亦失道然處重險之間則時之窮也時之窮者不可以習險責之柔材故爻但曰勿用象但曰无功而已自記爻言三嵗而猶不能改悔以得于道則凶矣明其失道于今將復凶于後也象言由其失道故凶三嵗明失道于前是以凶于今也言外之意乃謂因幽憂困苦而能改悔從道則三年之外可以免凶矣此爻象交𤼵意也自記繼明者所謂緝熙于光明也傳説太泥不必從清植以上上經遇憂患危疑事如艮卦太髙明道所謂萬變皆在人其實無一事者即是此地位想明道已能到此平常人倒是咸卦用得著事變來以理為主若不能萬全只得順理有把柄取女主陽感隂言女歸主隂從陽言陽感隂貴乎情之専隂從陽重乎禮之别女壯則勿取者以失乎順從之道則不可感者也歸妹則征凶者以不待交感之節則不宜歸者也清植憧憧往來不是説憧憧然往來葢謂把往來放在心上盤算憧憧然不寧也往來即當感應二字看感應是該有的不合憧憧于其間耳自記浚者求深之義也求深非不善而始而求深則不以其序而終至于无恒矣浚恒者求深于其常也而終至于无常事不循乎其序則不可繼而不可乆也自記諸爻皆言遯而二爻無之則是義不可遯者也故傳言固志以明之自記卦皆貴剛惟升進則尚柔葢取難進之義故晉曰柔進而上行升曰柔以時升漸曰漸之進也女歸吉也定九先生曰守得住柔便是剛説明夷因曰自我西郊亨于西山以為指文王皆恐未確惟此卦卻有些像明夷于飛不知指著誰人説想是當時隠者如伯夷太公之類夷于左股用拯馬壯卻像是指文王文王率商之叛國以事紂又隂行善上不失君臣之分下又救了許多百姓所謂馬壯也明夷于南狩是指武王入于左腹獲明夷之心于出門庭卻像微子腹者腹心之臣故繋二止曰股不曰腹箕子之明夷明明是指箕子不明晦正指獨夫初登于天所謂殷之未喪師克配上帝後入于地所謂惟不敬厥徳乃早墜厥命都有些像所以彖傳中分明言文王以之箕子以之將來所著易解中凡引古事為證者皆當盡行删去惟此卦卻不得不如此説清植明夷原是好字今人皆説作昬主明夷是自家明卻被别人傷了故自初至五皆曰明夷惟上是傷人之明者故不曰明夷而曰不明晦清植風火為家人風本從火生也因熱而生故萬物亦被之而生一家和便有暖氣暖氣薫蒸至于黨族親戚而化及鄉國矣此家人之義也君子以言有物誠也不誠則無物誠字信字皆從言葢誠信于言驗之自記暌時湏從小處去行如人子得罪于父母大處動輙生疑且莫動只揀小小事體無可生疑處勤慎自效積乆亦漸消釋是感通之道也有孚于小人作驗之于小人之退説于義雖通但細玩此爻義當是言解之時本以解去小人為急五又居尊惟有能解則吉耳然多欲之君雖或一時廹于公論不得已去其近習心中終有不忍捨去者存如宋孝宗之念曽覿之類則小人雖或見斥而有以窺其隠微猶未信其實能斥己也未信其實能斥己則安肯改惡以歸于正哉故君子之解必使小人共信其為誠心去惡然後可以得吉象言小人退非正釋有孚于小人言既孚于小人則小人必改惡以歸于正如論語不仁者逺之意此説尤長既與孚之字義相合又于句下不用添出之退字面觀彖中尚未及改正清植損下益上為損損上益下為益最為確鑿不是徒以虚理立論天地施生何處不然然必假人力以為輔相如今墾一畝田必湏工本播一區榖必湏糞水損上益下之世民有餘饒自然野加闢而榖加豐是聚于上者雖若見為損合世間所生殖者論之所嬴不知凡幾矣其實民間之財何莫非君上之財豈非益乎若損下益上歛利而藏之府庫所藏者既無生息之源而民間工本乏資糞水無藉勢必棄壤不闢而所収亦歉是在上者雖若盈溢合世間而通算之所失不已多乎此理陸忠宣看得透故有小儲大儲之説其奏䟽中有一篇論損益者極佳清植損剛益柔有時即𦂳頂二簋應有時如損神明之享以濟時艱亦所謂損剛益柔也故總之曰損益盈虚與時偕行自記動者志之奮也巽者心之入也即程朱學的中立志虚心之云説命曰惟學遜志務時敏遜志巽也時敏動也清植君子小人不但善惡之稱凡上位下位皆是也九四與初六應未嘗逺之也然應而不能制之則非我有矣聖人推原其本謂不能制之者由于親愛之失其道也我失親愛之道然後彼之心離離然後不可制也自記易中號笑二字每相應若號一握為笑言萃之所以亂者以孚之不終也若號則仍有孚矣故可一轉而為笑一握猶言一反覆手間清植爻言萃有位无咎矣又言匪孚元永貞悔亾則是無元永貞之徳而但以位萃天下雖无咎而猶有悔也故象傳推其意釋之謂以位萃天下則志未光未光謂有悔也自記升虚邑東坡之説為長五之升階其進有漸也升階而吉則升虚邑之無吉義可知升晉之卦皆利于柔者以抑躁競也九三過剛難免于躁競故其詞如此清植㝠豫在上則不可以乆長矣㝠升在上而曰利于不息之貞者葢悦豫非乆長之道故必速變之而後无咎升則有時難于退者但利于守正不息而已自記困與蹇異困者身之困也蹇者時之難也説者以致命與匪躬同解覺得太過言舉其所遇一委之命而惟惓惓以遂志為心而已彖傳困而不失其所亨志即其所亨者也文中子東歸餓于逆旅講學不輟而曰困而不憂窮而不懾通能之即致命遂志之謂清植君子雖處貧賤無入而不自得非所以為困也惟樂行憂違君子之志也若言不必聴計不必從徒以爵禄縻其身而不得引去不幾于進退失據者乎所謂困于酒食朱紱方来困于金車困于赤紱者意正如此清植困四志在下與臨上志在内同皆非指應爻而言也臨上在卦外于人為事外矣而曰敦臨則是臨民之道敦厚不㤀志存乎天下之内者也非志在内則居事之外何以見其敦厚于臨乎困四居上位者也而曰來徐徐則是無心于進而勢不得退其志常存乎居下者也非志在下則居位至髙何以見其來之徐徐乎自記動悔有悔吉為句行也為句破能履吉相承也遇其夷主吉行也義同自記就爻觀之疑于所謂我者井自我也若井自我則亦井自心惻而井自求福矣非爻意也故夫子釋之曰此謂行路之人過此井者覩其清而不食憫然憂傷故為之思遇明王庶幾食此井者皆受其福耳葢必如此解釋然後我字竝字可通也自記獸皮曰革獸之變必先易其皮故革字又有改革之義六爻中言牛言虎言豹者以此清植已日者革之時乃孚者革之應惟已日故為順天惟乃孚故為應人然而惟有慙徳故必元亨利貞而後悔亾也爻于二言已日三四五言孚四又言悔亾皆析卦義以立文初未至于已日故不可以有為五者創業之成而上則守成之緒也故變大人為君子清植爻言得妾以其子是即以初為妾比于鼎之顛趾而以其從夫得子比之出否也然文意未明疑于初之得妾者然故象傳曰利出否以從貴也則知初是為妾而從貴者矣自記至尊讀書都在最上一層著意信是天亶睿智一日諭地云易經逐爻説吉凶不知道他的根甚疑惑如鼎卦四爻為甚麽斷他鼎折足覆公餗其形渥還是他自己有應得之罪還是天地間有此事硬派在這一爻上地奏云據臣愚見大易三百八十四爻都是聖人逐爻比校過纔下斷語鼎四之辭是他自取不是硬派的曰如何是他自取奏曰鼎卦初六是鼎趾二三四是鼎腹四居鼎腹之上實既滿盈便有傾覆之理又易有義例五位君也四近君之位故曰多懼四宜柔不宜剛五宜剛不宜柔四爻以剛承柔率多凶懼他已犯此例又下應初爻初在下宜剛不宜柔如特立獨行賢人在下之象四宜柔如大臣虚已下賢之象今大臣剛而在下者柔如所信任者乃隂邪之小人他又犯此例初乃鼎趾也故曰折足鼎有實而折足鼎中之所有必覆矣故曰覆公餗其形渥奏訖大䝉嘉悦因曰由此看來易經通有義例折中内有義例一册從此起也易爻以陽為實鼎五隂也然有中徳故可以之為實猶未濟九二非正也然有中徳故可以之行正兩處文義正可參觀八純卦大象與六十四卦大象微有不同葢八卦之象皆造化之本各一其極而無假借君子體之皆是以其徳反之于心非如他卦之或取于時遇如泰否蹇解之類也故天法其健地法其順火法其明水法其習山法其止澤法其滋風法其令推是以譚雷亦是法其震動此震動乃吾心所固有戒慎恐懼乎其所不覩不聞者不可以洊雷之象目為外至之震驚而君子因之以恐懼修省也自記艮背二字之義即是主静故周子曰背非見也程子曰止于所不見惟語類有止至善之説而䝉引存疑因之文意雖殊義理則一自記朱子解艮其背為止于至善道理極是只是以至善詮背字覺得不協程子説背為不見之地是矣又説行其庭不見其人為絶物未免太過聖人説篤實便説輝光説闇然便説日章只是以静為主問止其所曰所字是甚麽近講以仁敬孝慈信之類詮釋頗于字義不肖若直以為寂静之境又恐宗指有差諸燮文云適得吾明覺之體不失吾順應之常于止字本意得之矣自記佛家將心地一㸃靈明謂之三昧真火其他一知半解有知覺處都是無名火所以破除一切以養他那一㸃靈明艮卦三爻正是説著此病厲薰心薰字最妙火條達便光芒照耀若佛氏硬提此心是抑塞壓制使他鬰鬰不能出如火之薫適足以為障蔽而已故程子謂觀一艮卦勝讀楞嚴一部外邊事處置妥心裏便安本是一箇聖人學問如此異端離此而求静乃悍然不顧其中不自在者多矣聖人知之曰厲薫心盖𤼵其隠也六四在心之上口之下以咸例之正當背位合卦義矣然艮為剛徳而四柔也且徳非中正故未能純乎卦義卦義曰艮其背不獲其身夫子釋之曰艮其止止其所也葢止于其所則自不獲其身矣無制身之勞也未至于是則必止于其身止于其身者未能不獲其身也故夫子釋之曰止諸躬也易其為諸義自明矣非禮勿視聴言動皆是也自記漸以女歸為義歸妹以妹為名故六爻皆取女象漸三曰婦孕不育婦指三也其曰夫征不復者引起之詞歸妹上曰女承筐无實女指上也其曰士刲羊无血者波及之詞清植歸妹上六専取妹象由女之承筐也无實故士之刲羊也无血其咎在女也故象傳偏釋承筐自記豐初之配主為四配如夫婦之配合四之夷主謂初夷如朋友之等夷以下交上雖合徳猶必謹其分上之交下既同道則必畧其尊清植往時解風陽也主㪚隂氣西方隂凝時湏風以㪚之至春方𤼵生無隂可㪚乃是㪚去年隂氣之尚凝者耳今思之非也天地間有陽便有隂如心纔動而身體便隨之方春陽氣一到便有隂氣便湏風㪚不是㪚去他是㪚開要他流行如化開飲食以滋益于人不可結凝為患也入而後能斷故巽有制義又有齊義六爻又有武人齊斧之義不能斷者不能入者也自記巽訓卑巽始于輔嗣殊為附㑹巽者入也非謂一隂能入謂二陽能入一隂以㪚之也如腹中無故腸鳴不為佳事若中有痞塊元氣盤旋而解㪚之則周旋作聲人方通泰國家有藏姦伏慝必搜索整治而後消㪚亦是此理常見五六月間空際雲起旋即風來吹㪚之雲㪚則風亦止矣再有雲起則風又至故巽有伏義主隂而言也又有入義有齊義皆主陽而言也何以謂之小亨破㪚隂氣到底不過去滯非元氣本然流行者可比利有攸往者搜擿不可不急也利見大人者必得陽剛而後能化也史巫以搜其姦邪資斧者齊斧也謂以斷物斬齊也上九不斷故凶問上不斷不有疑于卑暗乎曰彼亦刻刻欲搜姦𤼵伏非安于暗弱者但不能斷終正乎凶耳今俗占雨暘以甲庚日蓋十干氣候到此二日便湏少變如嵗之有春秋也蠱是從頭變來故有取于甲巽是從中間變故有取于庚自記渙汗其大號為句渙一字自為句王居无咎為句言能渙汗其大號則雖當渙時而王居无咎也本義以渙王居三字連讀但王居既渙如何説得无咎故以居為居積之居微費周折惟依小象斷句則王居二字即是後世所謂皇居者故小象以正位釋之清植此逖出與惕出自不同故夫子以渙其血為句而専釋之則明下當以去逖出為句如樽酒簋貳之類皆是夫子分别句讀處也當渙之時在事中者則以渙其所利為義在事外者則以渙其所害為義自記卦取澤水為義水甘而澤苦水通而澤塞卦爻言甘苦故傳復言通塞以發明之塞則窮矣故傳曰中正以通又曰其道窮也中孚二爻講家説來語氣全舛和之者其子而已靡之者吾與爾而已皆明其非謏聞動衆之為也不然聲聞過情如登天之翰音則凶矣此二爻對看其義自明清植小過之時以過為中者也然有當過者則雖過而未離乎中有不當過者則不及而後不失乎中過與不及之義如反覆手然過于恭者乃其不及于亢者也過于儉者乃其不及于豐者也麻冕之義過乎儉矣是所謂過其祖遇其妣也拜下之義過乎恭矣是所謂不及其君遇其臣也不及其君則是君不可過也而曰臣不可過者葢言是為臣之中則不可過非為君不可過也自記爻意謂能曵其輪而不進則雖濡其尾而无咎也曵者我曵之也濡者非我濡之也故二義不可一例觀未濟濡其尾吝曵其輪吉則可見矣象傳専釋曵輪其義自明自記以上下經榕村語錄卷十

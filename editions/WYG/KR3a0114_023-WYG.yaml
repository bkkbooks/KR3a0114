body:
  text: 榕村語録卷二十三大學士李光地撰學一陳北溪論工夫節目一條蓋朱門學的也朱子千言萬語只此數事然所謂虚心者又初不外乎立志而已若張子所謂大其心以體天下之物邵子所謂翫心髙明者如是而志豈有不立而心豈有不虚者乎雖然此非朱子之言也立志居敬即中庸之尊徳性也致知力行即中庸之道問學也廣大髙明蓋立志之事涵泳敦篤蓋居敬之事知行則錯綜乎其中精微知新致知之事中庸崇禮則力行之事也古聖之書莫備於中庸近賢之説莫備於朱子若周子之誠幾德乾損益程子之涵養進學居敬窮理以溯夫古訓之制心制事直内方外中和誠明之指雖語有繁殺義有偏全先聖後聖其揆一耳近世於敬知行之説頗有能言之者往往未免於判然兩事截然二時之差故或頑心絶物以為存養曰我将以為知之基或泛渉博攬以為致知曰我将以為行之地而不知古人之精義集義初非二事直内方外本非二時也自記學問須将大頭腦處通透方得姚江主先行後知虚齋次崖則主先知後行姚江引尊德性節為宗指蔡林求其説而不得乃謂先知後行者用功之序先行後知者成德之序不思注中明説聖人示人入德之方莫詳於此安在其為成德乎不知敬在知行之先貫於知行之後朱子已經説明佛家所謂主人翁惺惺著者他連父母妻子都不顧忠孝之事都不行何况其他而惺惺自若豈亦力行乎有此然後讀書窮理便是致知身體實踐便是力行若無此為根本致知力行都做不來只是致知亦是存心力行亦是存心存心工夫亦不離乎此耳當年曾夢大兒向某屈指云一指活二指拙三指存中心四指言詮明五指思議絶後來舉問鋭峰僧渠云禪家竝未有此成語細思此却是幾箇闗頭活是源頭活水之謂拙是用心於内剛毅木訥之意存中心者主人惺惺之㫖三者皆要緊事至言詮明則黙而識之的光景思議絶則過此以往的境界矣拙字甚妙凡有㢘恥不茍為世俗事皆拙也㸔語類門目便見得朱門無大賢問勉齋在内否曰不在内但他的中庸說亦絶不得朱子之説他說首章只説戒慎是以敬為主未及知行後説到不明不行纔是知行工夫如此是單主敬便就巳天地位萬物育了知行儘可不用何須更説知行且苦纒住生安學利困勉説甚無味至謂正是教人莫要學生安那是人學不到的尤為不確後人不善讀朱子書者竟像主敬了幾年纔致知致知了幾年纔力行難道主敬時遇事來便推開不管曰我尚未致知如此使得麽知行何嘗無先後但不是這様分先後如目與足然於今行路眼㸔著路脚纔好走一邊㸔一邊走兩相須兩不相妨豈有先㸔幾日路不干脚事到走路又不干眼事之理吾學大綱有三一曰存實心二曰明實理三曰行實事髙忠憲劉蕺山都是明季學問不佛不儒常州惲遜菴亦是如此錫曰昔髙齋業師曾與忠憲門人丹陽周季純為友言周能端坐竟日心了不動只是夜間熟睡時尚有囈語其語甚或不免有鄙瑣處曰這尚是和尚之粗淺者吾鄉有僧天問坐空山中十餘載蛇虎皆與馴習小兒曾往訪之云其言多鄙俚不過是尋常因果之説而已大概團聚心靈精氣相守便可以有光怪又所處既久與異物親便與異物為化此乃狐媚妖螭之能事原無足怪其荒誕處至謂三千大千世界百萬人天皆在座下天且為之下則父母反拜不足言矣人為天所生為父母所出乃是根本他却要踞其上聖人之道便從孝弟做起終則與天地一般或有助天地所不及處故曰參賛此理徹上徹下同流竝運乾坤即毁而此理不滅道理至此已極若説到空處上下四旁往古來今各無窮極何處是邊際故惟聖人之道謂之中庸過此即為隠怪此是實理此是實心此是實事即淺即深即粗即精無大無小無内無外朱子嘗言始學須静坐又言不可偏求之静當合兩條之指而深思之其義始備自記聖人論學先要忠信無此便諸事無根然既有實心為本倘不博學考問推廣擴充到盡處孔子亦放他作第二等人如宗族稱孝鄉黨稱弟為士之次國手於碁亦終身之事他刻刻不能離碁可見一藝成名也要至誠無息若有一日放得下便非第一流的本事堯舜已将天下讓與人自然尚是勅天之命惟時惟幾一息尚存此志不容少懈人的學問總要不斷這是一㸃真源有源之物便㑹大陸子静於此却有所得故云易簡工夫終久大支離事業竟浮沉但只是真源不息矣又有他水來㑹豈不更好到得衆水合流不得謂此水非他本來水也子静正苦打作兩截非合外内之道某為詩文只畧見得從心源理路上説雖舊日所讀書大都忘了就所記的還能驅使得動這便是自家一㸃本領不爾不能驅使他只是有這㸃本領又要記得多有得運用更好敝鄉西面髙山上有一泉源僅如汗一滴一㸃稍逺便成細渠半里外成溝里許便成瀑布飛洒巖下聲聞數里山上竝無他水來㑹不知何以自己㑹大想他既是真源便能呼噏一山潤澤生氣安卿曰不止一山之氣就是霧露雲漢之氣他都收納得來先生曰然只是有此真源再有他水來㑹更好有他水來㑹而我却無真源如有客無主所謂溝澮皆盈涸可立待若謂我只求真源便可流注不窮斷不要别水來㑹這却是偏乃陸王之見也程門問經史中許多話伊川總不答良久曰某學問却是無中生有明道於史書上纎細事皆能記得門人訝其博識明道曰我若求記便不能記二程非禪學却用禪機錫曰此便是孔子所云一貫曰然安卿曰此還是一未説到貫曰本是一到生有就是貫了源泉一勺耳及其漸逺漸大便成江河問一貫之義似此曰然有了源頭愈多愈好江水一路來無限諸水㑹之然只成其為江不聞品江水者以為此中雜某某之水也河水一路來無限諸水㑹之然只成其為河不聞品河水者以為此中雜某某之水也有源頭的物事他物入其中皆成自己的物事仙家明日成仙今日尚不知總是要工夫不歇如雞抱子呆呆的只抱在那裏火候一刻不到不能得他出來朱子六十嵗上自嘆假如五十九嵗死竟不聞道矣後五六年仍嘆與道無分門人援前言以問曰想是為不得行道而𤼵朱子曰非也就是眼前道理尚逺耳汝楫曰然則下學何時窺見津涯曰此仙家所謂太丹也然小丹亦不可不結想來顔曾思孟有顔曾思孟之丹周程張朱有周程張朱之丹如董韓亦有董韓之丹成得無上天仙固好不爾就是地仙亦强似虚生浪死地中有木升山上有水漸蓋陽氣方盛一出而不可遏及形已成則長便難觀筍與竹可見學問亦然其初便是凡俗與聖賢闗頭一變迥然不同及至充實美大則難矣為學須歩歩踏著階梯得尺主尺得寸主寸朱子言子静門徒仰視霄漢此當為戒鍾旺總論以上夫子十五志學便是志到從心所欲不踰矩田地二程十四五嵗便鋭然欲學聖人便是要學到二程田地立志成德一以貫之然下學之功亦有因師友學問而心漸開明志漸恢廓者趨向亦一歩進一歩也要在勉力不已鍾旺震象傳曰君子以恐懼修省一經震動便惕然畏謹起來斯為立志而萬行都從此出風霆流行庶物露生是何氣象鍾旺精神大於身極是要緊每見人之神周於體者必加精警然志立則神日生要在提撕之力鍾旺凡人一藝之精必有幾年高興若迷溺其中見得有趣方能精如先存一别有逺大何必在此駐足之意斷不精矣某人别件都能領畧只是文章不進每自云只要求得心裏明白明白後自然説得出便是辭逹此即是他心病文章如何能逹却也要剪裁有材料不然言之無文行之不逺藝文如此况於聖賢之學非有一段毅然専致之誠安能有得學者要有千古自命之意所以韓文公云譽之則以為憂毁之則以為喜然此亦是狂者之語若聖賢却只要自慊於心合於理而已中庸説得渾厚云百世以俟聖人而不惑可見聖賢只是自己精進檢㸃沒工夫計較到人的毁譽然却有一層徵諸庶民的道理蓋論到全體必俟聖人始可不惑若零零星星凑籠将來則合衆人之公便是一聖人公等試㸔我們文字心裏有一分疑看者便有一分疑若説得確㸔者亦便洞逹聖人所以説徵諸庶民韓公却不曾見到這一層逹磨一老癯對著壁坐了九年幾奪吾儒之席胡安定在泰山讀書十餘年其後學徒之盛遍天下伊川於周子猶呼其字獨安定必曰先生凡人有十年著緊工夫其聲光氣燄斷然不同鋭峰僧議論極有好處常説偈云學道必須鐵漢用力心頭便判直證無上菩提一切是非莫管此彼學所謂𤼵大願力即吾儒之立志也願力發得大即悟亦悟得快修亦修得到朱子有云書不記熟讀可記義不精細思可精惟有志不立直是無著力處即是此意之銳道理是分共的不是一己的舜之居深山之中與木石居與鹿豕遊于野人之中聞一善言見一善行若決江河沛然莫之能禦難道野人勝似大舜不成白香山詩令老嫗讀之老嫗説不好便改全要解得此意道理原是天地間公共的人心虚則明明則虚虚以受善便可到明惟其真知自然服善學問之事以道為主不當論年齒之大小官爵之尊卑王陽明尚有古義當日泰州王心齋方廿餘嵗陽明已封伯心齋見之抗賓主禮譚三日而心齋服四拜為師後數日心齋又不服陽明于是還之四拜仍為賓主後心齋又大服乃復拜為師吾鄉張净峰諫武宗在午門外晒五日罷歸過謁陽明净峰年亦廿餘相見亦抗賓主禮數日卒不服陽明亦聽之王荆公見司馬溫公為吕公所作墓誌譏切新法人謂司馬禍不可測荆公乃以粘於屏風歎羙不已曰此西漢之文也某向作學而時習之文有友為塗乙數次某皆即時改定每改一次畢竟覺得好些最後復問之曰尚有宜改處否友曰似宜拈出性字蓋時習説朋來樂凡學皆是如此提出性字方是吾儒之學故註曰人性皆善又曰復其初拈出此字則次節以善及人三節成德之名皆有著落如此議論實為精透非冄四講切不聞此義也又常作進呈詩文稿成同鄉諸君觀之紛然指摘諸君不必盡善詩文也然因所指摘改之便覺視舊較佳可見作者自己不明旁觀比自已不同合衆人之見比一己之見又不同所以虚心要𦂳世間有才的人多見得自己身分髙輒敢横下斷語即如三蘇才氣蓋代有許多開天闢地論頭自以為髙出千古今觀之都未確無論千秋萬世中原有人就是你現在一言一行至平常人心裏不服便是你有不穩貼處人心都有此同然之理故也舜知之故好問察邇言人説王荆公剛愎此猶其次所見原不曾透徹明白人明便虚虚纔能受某人答子書云汝所云不為無見我所行一毫不差凡事只見得自己不差便㑹錯悞武侯周諮博訪只要人箴其過所以人稱其聞過必改而無吝色同朝某便推服魏環極先生人有所辨駁他却閉目細聽於是處便㸃頭有疑處即張目問幾句仍復閉目及人盡其詞乃歎曰是事都要與人細細商量便欣然有喜色其次便是湯潜菴陸稼書某人常示某以稼書所批時文某駁其批語有未合處其人以告稼書深以為然次日即以所記大學相質其説儘有好處如説格物主物即身心意知家國天下格即格此極是但又云程子一草一木也須格之説是旁意非正意却踈脱某駁之云草木豈在家國天下之外耶問稼書先生細心讀書如何還爾踈漏曰思路不圓他拘縳在一字一句上不能見到四面八方去只看得道理在書冊内耳目之前都似㸔不見的一般問思何以不圓曰思不出其位切問而近思思在近處方得力問稼書先生所思自不外馳何以不圓曰正坐不能近草木即在天下之中豈非耳目前事他不能見却思到别處去愈思愈逺矣即如人問自天子以至於庶人壹是皆以修身為本庶人如何有新民之責朱子曰異日為士大夫豈無新民之責某意不必如此説庶人自有家刑于寡妻至于兄弟訓子以義方即外而和睦鄰里皆新民也人以為近處容易明白不知舍近而求逺斷無明白之日逺處不明白却要就近處思想譬如天地鬼神髙深幽微無論見得未必是即是了亦難信惟就自己身上體貼合著的便是合不著的便不是萬物皆備於我天地鬼神不可通之理都要從人身上體貼方親切某在涿州病發時公私之事俱不在心惟讀書一生到底不曾透亮糊糊塗塗虚過此生此念纒攪不已乃知朝聞夕死一章喫𦂳喚醒人也人生功名富貴過去輒了子孫昌熾固有定數若加意營謀必更得禍敗只於我生道理明白透徹有可信心處少少許便足當下能到一箇是處是要𦂳事以上論立志虚心静以養敬之原存義之本動以觀敬之發著義之施若有義而無敬有敬而無義皆不足以體動静之神而通性情之德然以敬言之動處熟則静處愈斂而終以斂者為之根以義言之動時當理則静時愈有所存而終以存者為之地况敬義夾持之後則止而止行而行静亦定動亦定是時雖有動静而心則一於静而已此大易艮背之學周子主静程子定性之微意也自記毋不敬是持養思無邪是謹獨存養之功蓋取諸乾説卦曰戰乎乾終日欽欽如對大敵非戰則無以為存也天徳流行純亦不已非健則無以為養也省察克治之功蓋取諸巽説卦曰齊乎巽巽者入也非入則無以為察也齊者斷也非齊則無以為克也清植涵養是築城鑿池省察是詰奸禦暴自記静而存養動而省察打作兩截是黄洵直饒雙峰語朱子無是也居敬以窮理云者猶言用心以讀書又如教人出力以挑擔雖有内外却是一事義以為質禮以行之又曰以義制事以禮制心蓋由乎中而應乎外制於外以養其中也自記敬是在内的義之根雖在内但此時説不得義若敬則嚴恭寅畏時説得敬省察時亦説得敬作事時亦説得敬中和誠明忠恕皆然保合太和中内原有但未𤼵時説不得和至中則在未發為不偏不倚已𤼵為無過不及中雖心亦無偏但主性一邊説忠雖實理亦在却主心一邊説凡為學只在日用喜怒哀樂上用功中即大本和即逹道夫子許顔子好學不是終日講求四代禮樂却説不遷怒不貳過濓溪明道終身無疾言遽色是何等工夫邵伯溫出仕伊川謂之曰打人自一板以上皆立案蓋有案則其罪有等不得乘以吾之意及乘以吾之氣矣人之為學從此脚踏實地所謂易簡而天下之理得自孔孟後心學不講漢唐儒者雖讀儒書只以䜟緯文詞為事講到經濟氣節而止将孔子合外内之道遺却一邊全不從天命之性自己心上下工夫所以佛家窺見此意從内裡打叠便将來提唱呌喚人都從風而靡孔子未嘗将心字作話説然説孝説弟執事敬與人忠言忠信行篤敬何處不是説心到得立則見其參於前在輿則見其倚於衡竟是養成一箇嬰兒隨處現形一般此學不講便無是處從何處説起這却不難将要説話時覺得放易便收住覺得神氣飛揚便斂入身裏來不過言語容貌之間時時整頓久之自然熟了就心存不放形神不相離豈可忽過忠信有在根本上説者如主忠信之類有在一事上説者如事君以忠交友以信之類事君之忠主事説臣事君不是為爵禄是要辦事此事不是一己的亦不是君的是天地間當做的事人看此事是公共的所以不盡心者多如今把作自己當做的便忠交友之信主言説相與朋友是要勸善規過其尊不如君臣其親不如父子兄弟易得不信忠信算不得兩件亦算不得一件如人有心本淳厚偶然説話不循其事理畧浮漫㸃染些便不是信又有說話一絲不肯假借却或為俠氣或欲要譽未必皆出於忠是信有自忠出之信有不自忠出之信忠却沒有兩箇至恕乃如心之謂亦沒有兩箇恕無作寛恕解者作寛恕解想是起于可以情恕之説此句尚未碍理至以恕已之心恕人便斷然不可難道自己不要做聖賢便亦不以聖賢之道望人不成恕字中無此義故大學説有諸己而後求諸人無諸已而后非諸人求諸人非諸人皆不可少必須有諸已無諸已耳須是兩面都到忠信若都在心上説忠畧在前幾已動而事未形此事既我所當行若不極其量有一毫隠匿留餘便覺有過不得的意思這是忠信畧在後意已著事而理有定此理分明是如此若不循其分有一毫夾雜乖離便覺有去不得的意思這是信存養二字本出孟子孟子曰茍得其養無物不長操則存舍則亡又曰存其心養其性蓋人心惟危存者所以使之安道心惟微養者所以使之著是孟子本指惟存為收斂寧静之意若養則當致其滋培充擴之功矣程朱引來却俱用為收斂寧静之名而於理實不相悖蓋心性是一是二未有不存其心而能養其性者亦未有能養其性而心有不存者故心上亦可用養字養心莫善於寡欲是也性上亦可用存字成性存存是也要之心性俱是本原工夫若言心學而只著存字不幾釋老之空虚乎清植程子提出敬字便是救苦救難第一丹頭敬則神存不敬則神亡神存則生神亡則死敬説喚醒二字最好一喚醒起來便是東方日出氣象鍾旺朱子説敬字是畏字意如見父母畏父母見兄長畏兄長見朋友畏朋友退然如不自勝惟恐得罪一般孔子説顔子好學首曰不遷怒定性書説廓然大公物來順應許多大道理歸于怒之時忘情而觀理易説懲忿在窒慾之先損者之樂驕樂居首曾子孟子俱有泰山巖巖氣象自是浩然之氣養得如此然曾子戰戰兢兢臨深履薄動容貌斯逺暴慢又曰有若無實若虚而後乃曰可以託六尺之孤寄百里之命臨大節而不可奪敬字要仔細理論問稱顔子好學何以首及于怒曰怒最易𤼵而難制故大學説正心亦先説忿懥不貳過一切窒慾事都包在裏面羅整菴蔡虚齋留心朱子之學然于天命誠意諸章注都不曾講透他以存心持敬為力行工夫不知存心只是提起此心不要昬去原無多事如何謂之力行戒謹不睹恐懼不聞有何事可行敬字從理上發出心和氣平就是俗語一箇怕字故恭人曰溫溫德隅曰抑抑近人錯㑹多作有意矜厲就是果然壁立萬仞亦是泰而驕威而猛與敬本㫖相反矣有意矜厲是從氣上做工夫既不心和氣平如何能中節東漢人謂之氣節其節自氣中出不從理上來故曰一變至道正須變也劉念臺黄石齋豈非君子惜其工夫都用在氣上敬字被後人講不明白做來形状可畏湯潛菴陸稼書皆中此病竟有不近人情之意令人望而去之敬是怕人不是要人怕我如見大賓如承大祭無衆寡無小大無敢慢戰戰兢兢臨深履薄還是自己怕人還是要人怕已至于敬人者人恒敬之自然儼然人望而畏威可畏而儀可象人若閒散度日過後未免悔恨惟用工讀書便心無不安處可見人只是求心安為主佛家云我視禪定如須彌柱心非須彌柱心安處便是須彌柱也你看這不過一些子却頂天立地是這箇黄石齋云人無今古最妙如有人凡事淳厚不肯茍且欺人便是古人如今冩一本書刻一本書一毫不肯潦草這就是古人之書問有因官事磨得細心者只是怕心常存心便細了曰怕便不好須是不盡心自過不去務要工緻周到心裏纔安帖方好和尚家參禪亦是要心歸一故意説一句極沒理的話要你在這上尋求想來想去别的念頭都斷了人心本自靈明逼到歸一時光彩忽𤼵别見得一箇境界他們得此方好用功不是到此就住從此遍參歴扣直追無上菩提隂符經曰絶利一源用師十倍是這一層工夫至三返晝夜用師萬倍即參同契所謂干周粲彬彬萬遍将可覩乃是思之精熟若心無那一段歸一内力却不能思要思心散去了亦不中用省察省字是從三省處用來字面然曾子之省是事已之後廻頭盤算程朱引來却是作當幾㸃檢語省察言下便是克治故朱子於學庸兩處慎獨注一則曰務決去而求必得一則曰遏人欲于将萌非徒㸃檢一番已也省之之精則知無不致克之之勇則行無不力故省察内便包得致知力行工夫朱子所謂自謹獨而精之以至于應物之處無少差謬而無適不然應物而無差謬非致知力行者能之乎故陳北溪所舉學的只説居敬致知力行不及省察正以致知力行即省察之實也清植榕村語録卷二十三

body:
  text: 榕村語錄卷十九大學士李光地撰宋六子二世人于可愛之物必欲得為己有轉眼便屬他人此身尚不得有又何者為吾有此吾儒至粗道理佛家却以此呼呵人總由愚者多也康節于此見得最透程子乃譏其於學全然不識至横渠雖譏其力索强探然謂自孟子後都無他見識其所言為往聖繼絶學為萬世開太平都是實話非屬誇大若只曉得剝復否泰自然之理數非人力所得與便超然自了何頼于人之立命邪果見得横渠與康節不同大抵此心雖要撒脱放下又要振作扶起方是聖賢之學光坡問存吾順事沒吾寧也只説寧字到底是何歸宿若説不消散像個不安寧的若是消散又似與常人無别曰但以人生行事騐之這事做得不愜心翻來覆去只在心頭睡著亦不安帖若做得妥便放開明日又好做别事聖賢生順死安便是如此雖似消化却是長存的如喫飯一般無病時飲食都消化腹中一無所有又好喫那一頓前此所喫者俱已無存然穀肉之精液補益血氣精生氣氣生神何嘗不存若是喫一顆米存在肚裏飲一口水亦存在肚裏像件件為我所有却飲食不納氣血日損形神枯瘠而日就滅亡矣通書可繼中庸正䝉可繼孟子只是正䝉畧髙些便差其曰神不可致思存焉可也化不可助長順焉可也極精朱子嘗見羣雞出卵就中有一艱難者提他一提雖然出得容易些後來竟長不成以此見助長不得只有順其氣候而已人沒神彩是著意强不來的惟存之久則神明充足自有威光問存神即是存心否曰是佛家何嘗不有所見他見萬物皆有人性故云皆有佛性豈獨禽獸草木皆有豈獨草木土石皆有既與人同此性如何殺害他不殺生何嘗不是只是非天下之達道便行不去但為之節制無故不殺所全活已多矣蜂蟻之君臣不能通之父子虎狼之父子不能通之君臣即雞彘初生子如有人傷其子其母便向前來鬭曽不怕人何嘗無父子之親其子自為一羣何嘗無兄弟之好如何漸大漸不認得又䕶自己的子不知䕶他鷄豕的子惟人知道終身慕父母又知推之他人老吾老以及人之老㓜吾㓜以及人之㓜所以異于禽獸若少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君把父母漸漸忘了便與禽獸何異所以孟子説人所以異於禽獸者幾希經書後果然太極西銘兩篇極好西銘是一部孝經縮本縮得好太極是一部易經縮本亦縮得好孝經是就孝上説全了為人的道理西銘是從孝上指㸃出一箇仁來知乾坤一大父母則天下一家生意流通矣所以孟子説擴充説善推其所為即人異于禽獸處李方言不愧屋漏為無忝存心養性為匪懈兩句似是一意諸友方在疑難反覆間適賔實至因質之賔實曰無忝是盪滌其邪穢匪懈是充長其天良易曰閑邪存其誠雖閑邪正所以存誠然閑邪止是打叠教乾淨至乾乾不息於誠却大有事在先生聞之大以為然清植有稱神化二字張子言以仁義朱子言以中和可謂實體曰然以愛子言之只此愛心一神也而或飲食之或教誨之則一神而兩在也然飲食此愛也教誨亦此愛也均之一愛所謂兩化而推行于一者光坡一故神兩故化如呼吸語嘿皆是兩箇呼來則吸化吸來則呼化語來則嘿化嘿來則語化其實化即生之根兩即化也然呼吸總是一氣語嘿總是一心此之謂神神非太極太極理也非神也雖神亦由於理然却有界限人多將心性混説以性為心將性説成知覺以心為性將心説向虚寂大抵理神氣形原有分際形是至粗的運於中者氣也氣之精者神也神亦由於理如心之不息亦理之不息畢竟説不得心即是理問一故神神是不測之謂似非實字曰是實字妙萬物而為言靜而無靜動而無動神也即説神妙不測何故不測亦由于神所過者化如言出乎身加乎民行發乎邇見乎遠所存者神却是意之所動人便覺寤心之所注人便感應見而民莫不敬言而民莫不信行而民莫不説是所過者化不見而章不動而變無為而成是所存者神張子又不如此解以合一不測為神推行有漸為化化是過去的便要消化如暑過熱氣消了寒便成寒過冷氣消了暑便成如吃飯然若先喫的積在肚裏斷不能再喫消了前面的方好喫後面的又不是消了就沒有却有在那裏其精英具存也隂陽寒暑相反而實相成萬物若不經歴過必不能成就如是者何也原是一箇不是兩箇故曰兩在不測又曰推行于一所以知變化之道者其知神之所為乎翻書人翻性理精義至天體物不遺猶仁體事無不在照常解言有一物便有一天在裏面作主如體物而不可遺一般至尊云這道理極深微恐未必是如此朕意將此體字作體恤體貼的意思説如何地初聞之未能即領㑹再對下文一想確是如此若照常説下引詩就該引天生蒸民有物有則如何却引昊天曰明及爾出王昊天曰旦及爾游衍竟是説無曰髙髙在上日監在兹一般天刻刻在人身上檢㸃大雅原是説敬天之怒無敢戱豫敬天之渝無敢馳驅且體物不遺亦未必不是如此説你説不見不聞他却體察萬物而不可遺使天下之人齊明盛服如在上如在左右下所引詩亦是言相在爾室尚不愧于屋漏無曰不顯莫予云覯乃曰神之格思不可度思矧可射思東銘洗發君子不重則不威意極是要𦂳戱言豈徒傷德且多賈禍以上張子邵易似從太元悟出故甚重其書如元首八十一䇿三十六邵子便説卦八八而蓍七七自記明道謂堯夫之數只是加一倍法以此知太元都不濟事洵所謂一言以蔽之者又搜根及太元是能捉百原底眞贜蓋先天生卦造圖法全用元却是出藍之青自記朱子尊崇邵子只是重先天圖此圖自是有傳授至他所説易却是教外别傳故明道説他學全不識有問擊壤集于朱子者答曰比他皇極經世好些可見程朱皆不甚尚其所學大抵孔孟不講的便可不學邵子把天地間物事都配合作四件却是仁義禮智喜怒哀樂近裏著己之處畧而不講所以某于中庸餘論中補之此却是天人相關至切至要處問經世何故分四件曰原是四件易經開口説元亨利貞只是聖人所言皆精髓邵子所言却是羽毛鱗甲耳若再搜根歸到仁義禮智上便更好邵康節有水園亭活無風草木閒二句極好人心存在這裏如有源頭活水無處不靈動自己心裏不作風波自然所遇皆安靜所謂不作風波于世上自無冰炭到胸中也隱几工夫大揮戈事業卑似儒家大言却是實事如漢祖唐宗熊虎百萬開數百年基業就一時論視儒生學究何啻天淵然周邵張程朱子雖寂寞一室一編研摩却道通天地思入風雲由今看來漢唐事業可能與比否大抵當前之與後世似隔壁一般如鄰家宴享賔客笙歌樂舞自其親賔僕婢觀之華盛無比自隔墻人聞之了不在意假如有一書生貧苦不能自存却在那裏書聲朗朗若奏金石便生羨慕隔了一壁身在局外便各自一好尚康節之數不如程子之理精張昺問曰理數一也豈有離理之數無數之理乎曰固是但内外精粗畢竟有别如一果子皮果也肉果也心亦果也畢竟皮肉與心不可説是一般康節將五行參錯配搭大而天地人細而昆蟲草木形形色色無不融貫聯合要之將以何為不過要見得透得以安靜快活不犯手耳程子便不須此只是講理所謂理者只是吾身喜怒哀樂與天地通其性仁義禮智其道君臣父子内而天德外而王道天地位萬物育何等功用何等精義便覺數為皮殻無所用之問邵子前知另有學問否曰他看得世間物事零碎處俱絲絲有條理心又虚明靜細算數又精熟再以所值時勢參斷自然不差非别有奇怪也呉張溫為權所殺武侯初聞未知其故思之數日曰我得之矣其人清濁太明善惡太分此極有學問語清濁善惡胸中豈可不分明但外面不要見出來文中子曰心跡之判久矣此語未必不是邵子特贊為造化之言如内健而外順内文明而外柔順盛德容貌若愚皆是程朱譏之者以説在答憂疑之後竟似悲天憫人都是外面粧幌耳問邵子取之何意曰邵子竟是胸中快樂一毫不掛看當時政事之得失賢否之進退一㸃浮雲過太虚其遇禍患而不怡者如避霎時風雨不得不然耳心中實不相關程子不肯窮究邵子易學朱子謂孔子便不如此極是邵子謂程子若學須二十年工夫此語亦不是朱子教人當下便予人一條路不如此嚇人邵子不能文觀物外篇乃陳瑩中所記邵子學問有弊其立言太誇程子雖亦有自負語然却有著落如言絶學不傳却還他有箇絶時邵子則曰得不謂之至神至聖者乎此語尚虛或者不是説自己至謂生于冀方長于豫方自號太極天地尚不足道這是何説邵子惟推留侯梁公想他出世亦近此等作用至武侯從不提起及伯溫作論排之始加呵斥大抵聖人仁智竝盡若智處太多於道理上太占便宜便微與聖人隔看來聖人却不妨畧帶得些呆意古人成功後人便以事傅㑹之劉伯溫何嘗知明太祖起己為之佐果知之何苦為元用作兩截人此等即聖人亦不知只是聖人見理精熟幾未動必不輕應人看來若前知耳惟康節説不得他不前知如上古廣成子後世陳希夷輩皆另有緣故乃是聖賢中又别出一小支二程不如邵子正是此處然亦只因見理之後又以氣機象數推其端倪耳大抵人世所為無非上帝作主故其機動而事未形者天已有象也問既是上帝作主何故有時使世亂而不治曰試問君有疾豈君心所欲乎既有此形體即有隂陽五行之錯雜只是當有病時心之靈明尚在或病甚時語言顚倒手足狂亂并心之靈明亦失之然病去而心依舊靈明心未嘗不欲一刻病去調養而保復之也如文王陟降在帝左右武王乃命于帝庭既有帝即有庭即有左右天之靈明何處不在然必有栖聚之所如人之靈明遍體皆是拔一毛即知痛到底心在腔子裏人與天地一箇樣善言天者必有騐于人嘗疑元㑹運世之説如謂自開闢至堯時已到已已歴過數萬年此數萬年中人皆昬昧無知識恐未必然或曰當彼時人都糊糊塗塗殊大可厭先生曰是何言歟譬如赤子四五嵗以前雖無識解却天機渾全浩浩落落無有壞處視長成後奸偽萌生豈不較勝即以人騐天地人長成後所不記憶者僅四五嵗以前事自六七嵗後便能記憶今堯舜時事已自斑斑可考想彼時去開闢不為甚遠人生百嵗中止四五年不明白豈天地自開闢至混沌十二萬餘年中遂有數萬年不明白邪就是十二萬餘年一番混沌之説亦大不經想來小刼數不過是水旱疾疫盜賊蠭起繼以明主數十年休養便可復舊或者經歴萬千年後遭値大劫㓙荒兵火重叠竝至竟致人凋物盡率土為墟只零星存得一二於山崖窟穴中牝牡相生延綿漸廣亦未可定未必到彼時便天翻地覆日月山川盡數更換一番也孔孟程朱只説理雖似把捉不定看來倒準邵子論數却未必準由堯至湯湯至文文至孔子俱五百年自孔子五百年至光武又五百年至貞觀又五百年而生朱子亦未大差至堯湯之間有禹湯文之間有武丁文王至孔子中有宣王而光武前亦有髙祖貞觀前亦有孔明朱子前亦有藝祖自朱子後有洪武至我朝又五百年大抵天道三年一小變五年一大變故易曰三五以變看來大概是如此人只要實見得到某却見得康節説性理處比程朱隔一層其説元㑹運世恐未確問以晝夜觀之或者混沌亦不能無曰便有知到幾時是如此其一代不如一代者如一年有春夏秋冬一般到得這一年完又從春來亦不可知總是聖人存而不論的就不消論康節説元㑹運世往而不復某却不信孔子云文王既沒文不在兹乎自孔子來其統歸之于下五代之後孔孟之學漸滅盡矣宋興風氣忽然淳厚生出許多大儒來此豈人力所為天恐此道遂微生數公以發之殆有所待而行也以上邵子明道生平無著作耑在日用言行間著力時時處處還他箇道理以單讀書為玩物喪志孔子却刪定贊脩事事不放過後來朱子恰是孔子家法十八嵗成進士已將韋齋所托三人之學盡傳將去不厭其欲又學于謙開善後乃歸依延平生平事事不見他放過即做古文官爵地名必書見在詩用故事於古名號講究甚悉至字法亦有幾年工夫而孔孟周程之書皆賴之以明其居官凡大小事毫不厭煩都有區處雖幾句文槀亦覺得理足周程張邵不得他恐不能如此烜赫韋齋本托孤于劉屏山劉草堂胡籍溪三人其後草堂以女妻朱子屏山養朱子以至登第後來朱子溯淵源却單認李延平延平亦韋齋交好想因相去遠故未及相托朱子年長記得韋齋嘗稱延平如秋月冰壺乃往事之滄洲精舍祀七人周程張邵司馬及延平意可見已延平受學於羅仲素仲素受學於楊龜山朱子於楊羅皆有微辭獨延平無間然朱子生於尤溪故小字沋郎其字從水從尤讀如由因沋字不多見後人遂誤作沈某人所編朱子年譜亦襲其訛清植問學儒多叛而之佛未聞有僧悔而歸儒者曰朱子蚤年學仙又師謙開善及見延平疑為非常人始暫將舊學擱起虚心請教延平只引他向低處去久之漸見得那邉疎漏又久之大見其破敗遂改師延平此非奪佛而入儒者乎若失此一豪傑如何了得延平奪統之功甚大朱子因是曽從那邉透過所以身外之物俱不足以動之韓文公便是少此故見大顚便心折朱子既從心地上立定根基又歸于正學所以妙程子説書都是將書返之身心做起工夫及實有所得即將心得處説書所以道理泡透了融洽㑹通觸著即拈出於書之精藴一絲不差而于本文字義却多不管後賴生一朱子闡發著實不然遇不善讀者便可流為禪學有六經注我之意矣孔子教門却不爾朱子正是孔子傳派其於經書躬行心得矣而解説處却字字依文順義不少走作纔無弊周子從來不闢佛老所以人將其太極圖斥為道家之流至朱子一切門外議論都不管就書論書力歸正統榕村講授内將揚雄文中子邵子語編在一處他們都有要爬在人頭上的意思陸子靜便不肯在先聖先賢脚底下盤旋惟朱子只在孔孟脚底下盤旋是孔子家法孔子便只在堯舜文周脚底下盤旋所以云下學而上達孔子只到患難方説文王既沒文不在兹是實信得及學者如何學這樣話門人傳朱子前面都不虚只末語後有作者弗可及已便是閒話天地長久倘又生箇孔子亦定不得宰我説夫子賢於堯舜子貢有若言自生民以來未有夫子看曽子便不同江漢以濯之秋陽以暴之皜皜乎不可尚意味深長顔子仰之彌髙數句又是從自己用功説夫子善誘此等處都好體㑹世有自厲風標清風髙節至不可攀而無流風餘韻在人間者無此叚關切世道意思故也敝鄉李文節公家居十餘年總只閉門一人不接見蔡虚齋便肯教導人其流風餘思至今未艾有言某人及門無人材者先生曰想是不肯講就是二程夫子髙簡方嚴多端坐從之者便有弊楊謝都近禪游定夫竟為僧朱子便日日與門人講説成就了許多人後來教人都正道無一箇差路的事必師古方好若謂自我作祖前無古後無今呵佛罵祖不掛一義直是無忌憚孔子教門定從古人考來心心相印有憑有據不爾寧闕也朱子亦然所以有根有蒂揺他不動近人事事茍且其根都在不信古不考古耳朱子平生篤信好學守死善道有道則見無道則隱國有道不變塞焉國無道至死不變又留心天下事大綱細目無不講究明白斟酌妥當朱子居鄉待人以誠接引後學勤勤懇懇興社倉以濟人困建陽風俗皆為之厚後來雖為侂胄所疾卒未被禍身後亦安全則言忠信行篤敬之效朱子看得明白總不肯出仕不得已應命便辦得生往死歸所以當官一毫不肯假借直來直往行不去便求退浩然之氣塞乎天地亦是宋朝規制風氣尚可以進退自由然今之傅山李顒終身不出亦未嘗不聽許他朱子經濟之才甚大二十來嵗主同安簿尚是佐貳便事事講求即祀典無不考訂詳明聞一常人議論有可取者即筆記之有鄰邑丞自言當年奉秦太師量田令因心未曉了且不舉行閉户讀之累日督促者數至丞不為動及條理分明乃集同事議之彼此論駁之間事益有緒於是僚屬皆明又集吏役耆民使縱講之為之剖析至吏民皆洞曉然後舉行丞不出署不踰時而功成當舉行時他屬有將報竣者及丞畢役而他屬尚推敲較正于詔令之合否奏績迄無有先於丞者朱子遂記其事及後自遇此等事即倣而行之所謂聞一善言若決江河自蚤年便任天下之重如此其論事酌古準今無不可見之行使當時有委任之者功業當在諸葛忠武之上聖賢有似不近人情處朱子斷妓女施以嚴刑判使從良其實罪不關妓女也人至今以為口實朱子彼時寧過于嚴孔子將景公梨園子弟付之極刑太公䝉面而殺妲己何妨同道朱子太極圖注即以正義為靜而主之世多以此為疑不知朱子晚年將聖賢書義字字落實如戒愼恐懼兩節初年以靜貫動言雖紛擾於外而中有不動者存又遇物皆成三角下平列善惡而上有不可以善言之善下平列動靜而上有不可以靜言之靜至晚年不安此説乃將動靜劃分如與人言是有所聞中間停息時即不聞即是未發即是大本與人相對是有所睹其不與人對即不睹即是未發即是大本不然一日之中未發之時有幾問中間停息時還須全無念慮方是未發抑打㸃説話亦是未發曰但未出聲即是未發如心氣不激不躁將所言之事籌畫簡當皆言中節之本也推之於行亦是如此喜怒哀樂雖皆有未發最是憂懼哀戚時覺得萬念灰冷平生嗜好一時都提不起故朱子狀敬惟畏近之可知戒懼是歸根復命之學而主靜即屬正義一邉為密切也讀書須返到身上見得果然如此方好朱子圖解五行一隂陽五殊二實無餘欠也若在物上説急忙不得明白返之吾心則了然矣五行雖各成一件物事實在只隂陽二者如人之性有仁義禮智信其實只有仁義仁是慈愛似乎不分善惡一總都愛無義便愚義却有分别道理不出此二者禮者仁之發智者義之藏三千三百是人心中相親相愛發出來的智非他即義之分别處斂而入内者信即理之實也且如喜怒哀樂實亦喜怒二者而已樂者喜所成哀者怒所深二者已盡無復餘欠隂陽一太極精粗本末無彼此也粗中有精末之起根處便是本有何彼此太極本無極上天之載無聲臭也質固有形氣亦有形即無亦不可謂之全無其昭昭靈靈能為光景者猶是上天之載無聲臭之可言太極圖解美矣善矣尚何敢議畧有疑者君子脩之吉似當兼直内方外説朱子只提敬字想是對上主靜來惟聖人始可言主靜故提敬字使學者有可把捉但細思主靜乃成功非用功也用功却在無欲二字至注原始反終處疑非周子本意周子引此或以開一篇西銘之理乾父坤母物之始也存順沒寧物之終也不足以父乾母坤者沒必不寧意極懇到理極深切朱子以仁義詮釋乃是從靜悟中來朱子見得塞天地間皆是仁仁則盎然萬物皆生遇事截然處便是義義則止而不動其説至精雖未必是周子本意但此等處殊不可輕議至西銘解以知化節為樂天事不愧屋漏節為畏天事惡㫖酒以下遂都散去恐未必然某意欲照孟子盡心章分之知化節知天也不愧屋漏節事天也下數節立命也天生人人承天所以踐形盡性莫明切於此故張子用為節次志事兩字是從天地之塞天地之帥分頂下來一為形一為性形應乎物故有事性統於心故曰志不愧屋漏是事存心養性是志至富貴福澤四句不善讀者錯㑹將字庸字及注中所以字便以富貴福澤是天故意予我以使吾之為善也輕貧賤憂戚亦是天故意予我以使吾之為志也篤果爾天何不盡予人以富貴福澤却又予人以貧賤憂戚誰是該當為善輕的誰是該當為志篤的大抵天有正命因有眞心天將自己至精至妙處盡數付畀與人無一些留餘這是正命刻刻望人成就一箇人全受全歸完他生這人的本意這是眞心但天以正命予人不能不假隂陽五行以成形既有隂陽五行他便混亂拉雜攙和以致貧富苦樂萬有不齊天亦無可奈何只是你既富貴福澤天之所喜也却不是喜你得以恒舞酣歌窮侈極欲將厚吾之生而使之為善也輕你既貧賤憂戚天之所矜也却不是因你窮相就不望你成就乃望你安貧樂道動心忍性刻厲獨立如利刃淬鋒愈磨愈光庸玉成於汝而使為志也篤富貴福澤貧賤憂戚四字須讀斷不可將下句連讀便似天故意以此予人也問若是天故意以此予人天便不似父母父母豈有要兒子貧賤憂戚者如此看天地眞箇與父母一般曰然朱子處己處人何嘗有一語藏匿人稱其詩易諸注曰吾之得力畧在四書至詩易所得如鷄助然但即此鷄肋已勾了都在大處見得到律厯事朱子自謂不知與蔡季通書言之不一而足瓊山定謂朱子若不知樂則十二萬九千六百年無復知樂者矣這却不必唐虞命官典樂特推出后䕫來想是禹臯亦未必精于樂何害其為禹臯朱子即不知樂不足以為病也纂書比自著為難著書任著己意隨力量所至纂書便要知前人的意思又身分須與他相埒方可著手眞西山讀書記門目便極繁亂就是近思錄亦未停當至儀禮經傳通解初欲以儀禮為經禮記作傳無所歸者彚附於後極好後乃變例自分門類竟作自己之書欲盡將胸中所有吐出大凡編書欲自道其胸中所有便不妥論封建自班孟堅後曹冏陸機柳宗元輩各有佳處某心畢竟歉然為其只説到利害終非聖人心事封建行則久於其道民與相習不至朝更夕改又以其國付之是自己物事便與之一體孟堅諸人俱無有從民人大公處著議論者及讀朱子之論則某意仍是第二層其曰封建者聖人大公無我達君臣之義於天下者也妙極天子於諸侯為君臣諸侯於大夫為君臣大夫於家宰亦為君臣乃見得君臣為五倫之一不然凡人所得有者只是四倫而已漢唐以來諸論總是欲使天下長久為吾家物聖人却無此意堯舜當身便以與人何嘗要久倒似至今還是堯舜的一般韓昌黎從來稱揚雄而不及董江都説詩稱建安七子而不及陶靖節至東坡始推奬靖節而朱子大表章之至與張留侯竝著數千年人物須得朱子出而論始定其心公平其論精正如今人都説宋儒刻薄幾於古無完人都是未曽細讀朱子書如馮道温公以為仁先管仲揚雄則更燀赫此等人寛之何補諸葛武侯排譏者頗多程朱出而武侯郭汾陽陶靖節輩洗雪與日月爭光即狄梁公為武氏宰相終身五王皆身後之事朱子猶予以復唐之功何等寛厚世論悠悠不足與語朱子每事議論都當行一㸃不錯如詩表章陶靖節文推史漢韓柳之類宋初有一等猖狂議論如李泰伯之毁孟子東坡之訾武王就是周程議論亦似有過髙處張子尤髙邵子竟落數學朱子出將過當者一槩駁落其髙明精微者一裁之以平實又氣象生得好向來只見得朱子好處在零星處却不知其大處之妙如今見得他大處之妙轉見得他小處有錯可見知其小處便不能窺其大知道大處便小處都識得朱子語類所標門目多不確論為學只當分四項一曰立志一曰居敬一曰窮理一曰力行儒先顯然説有此四項不可偏廢有合論處則歸之總論庻幾稍有條理又所記皆出門人手間有錯聽者有措詞不確者竟有大相背謬者之鋭問語類有不穩字可改否曰説是如此説如何敢改某平常説太極者本然之妙也動靜者所乘之機也妙字似不如性字為穩細思終是妙字好下面有各一其性如何此處先道出性字妙字見得太極不是箇呆板物事又可聯屬無極且與誠字相應況前已有誠者聖人之本物之終始而命之道也此處不説性字何害朱子解書雖有訛錯處不碍為表裏光明朱子幾於孟子但偶有滯處孟子則渾脱瀏浰如琉璃屏無絲毫障翳明道廿二嵗作定性書伊川十八嵗作好學論已到至處眞天授也孔子朱子又不如此孔子自志學至不踰矩逐旋精進朱子少時遍參佛老廿餘嵗始見延平三十外已為人師尚無卓見至四十外始通達五十外始議論不錯六十嵗自嘆所學始透至六十五六嵗又復自云不徹可見其疑而悟悟後復疑黒一陣復明一陣明一陣又黒一陣乃是日進無疆自强不息與天無極欲立教于萬世者必須如此故子貢不曰天定之為聖而曰天縱之將聖縱字妙言不為限量所至無涯窮鄉僻壤有一邪説不知何以數年後便行之天下信是妖言此若有憑之者然亦可見一種下地必竟出葉開花若是果有一立德立言經德不回之人出必竟有發露之日某近來頗不信元㑹運世之説見得孔子下一大種至今尚不曽用難道生周程張朱等空衍其説便算了事夫子當日下種意不如此夫子雖不可得但如朱子那樣人得志行道足矣必有這一日以上朱子諸儒解經在道理上明白融㑹漢儒自不及朱子至制度名物到底漢去三代未遠秦所澌滅不盡尚有當時見行的即已不存者猶可因所存者推想而筆之畢竟還有些實事不似後來禮壞樂崩全無形似學者各以其意杜撰都是空言此漢儒所以可貴董江都劉子政學皆醇其微疵處是好言災異必推某事以實之便有難通處董子應五百年而生班孟堅度其時而為言於史遷董子劉向揚雄諸人皆所指擬看來似尤屬意于劉而終不能定以今觀之則江都是董子不獨深于春秋亦深于易其云道之大原出于天非深于易安能説得到此董子説得好到得天行肅殺已是無物可殺試看雪霜嚴寒時萬物成實皆已收藏過了只是一片白地全無所有一交春百物發生天便全是和氣如人肅然整齊却是在無事之時到得與人相接却不可如此所以明道先生獨坐時如泥塑人至接物全是一團和氣蓋天徳是如此孔子所謂嚴威儼恪以事父母父母亦不安矣然無事時此一叚肅然整齊又不可少所謂敬而後和肅而後雍有三冬之閉固而後有三春之發生也春秋繁露自是贋作江都所著尚多今不傳耳然三䇿已足何必多其論性命云天地之性人為貴論天道云陽居大夏而隂積于空虚不用之處皆極精之語續書不可少許多三代遺制在其中若法言世間便無此書亦不為缺欠至康成註却不可少無此三禮無從看起鄭康成學問博其説亦多自造當時孔北海甚服之然已謂其多穿鑿矣王輔嗣注易時計年方二十許後來即以伊川大儒眼髙千古自非大悖繆者即不敢駁之聖賢不忘本始其厚如此輔嗣之前視易或作厯日看或作䜟緯看言理之竅開自輔嗣其功甚大韓文公雖云非三代兩漢之書不敢觀然未見其于經有所發明也故某嘗竊論其人終是文章學問聰明極頂未嘗思透義理雖自言處若忘行若遺儼乎其若思茫乎其若迷似周公之繼日待旦孔子之不食不寢而終歸于陳言之務去是所用心皆在立意造語所讀書皆是觀其文法因天資髙遂見到古人作文意思義理上生來又原自正直故闢佛老立節概不是單在道理上索求故其評經如奇而法正而葩謹嚴浮夸等語雖無一不當而於諸經究不能有成書漢唐以來有議論不決者當以董韓為斷韓子不獨學問文章好其人亦不説欺人語生平闢佛老只在日用倫常禮樂文物上説他豈不能作精微之論只消如此説而精微之論已盡在其中詩書所言道理宗派正是如此四岳之稱舜也父頑母嚚象傲克諧以孝益贊之亦惟曰號泣于旻天于父母䕫䕫齋慄禹之自叙但曰啟呱呱而泣予弗子惟荒度土功舜了不異于人不過如匹夫匹婦哭泣依戀于父母之前禹不過是要蓋前人之愆汲汲皇皇做些事功即堯之大至于則天而堯典所載只尋常事而其實感天地格鬼神至誠大聖已立人極老佛談元説妙都是人用不著的何嘗是道韓文公二十來嵗數傳道多一揚雄三十嵗作送文暢序又少一孟子都是識見未定到四十嵗作原道便斬釘截鐡云軻之死不得其傳卓有定見矣至與孟尚書書乃是晚年之作耑提出孟子以為功不在禹下而自己幾幸續在後荀揚半字不提起學識精進如此孟子亦然其先方自以為當名世之數自疑自問到晚年纔知得孔子便接堯舜禹湯文王之傳而已乃孔子之見知也韓文公原道幾句開周程張朱之端周程張朱如日中天韓公則東有啟明也千秋萬世韓公之從祀再推他不去唐時佛教盛行不得韓公大聲疾呼再過些年竟埒正教矣韓公胆氣頗大當時老子是朝廷祖宗和尚又是國師韓公一無顧忌唾罵無所不至其氣竟壓得他下歐陽公亦闢佛氣便弱韓公闢佛雖不若程朱之精然是先鋒驅除到程朱便據有城池矣周子通書三十嵗便成程子易傳至晩年尚不敢以示人蓋自寫胸中語尚易而發明經傳最難要不失作者之意不及則漏其本義過則溢于本文文須簡簡須盡韓文公著述自命終身注論語不成眞明白人柳子厚謂昌黎勝似子雲此是確論陳梓云想於易義厯數昌黎不及子雲曰子雲厯數承襲漢厯都是錯的昌黎易學雖不知如何但如奇而法及諍臣論所引釋皆深知易者又如春秋謹嚴及春秋書王法不誅其人身等語便見其精于春秋春秋之作是孔子為萬世人倫起見絶不關那幾箇人只要大經大法常存天壤便是了至所貶斥之人其死已久有何誅殛後人呆將這幾箇人窮其本末搜求毫毛不直一笑韓文公説他要做官他竝不曽入伾文黨説他不能耐貧亦不見他受誰不義之財而諌佛骨使庭凑曽無一毫虧折至其文字中所見道理直如日星河岳千古推仰將數百年尊尚之佛教一旦出孤力以麾斥之是何等見識人不近小人是大端韓文公生平與當時權要姦邪臭味不投絶不沾染歐陽公生平幚靠都是韓范一邉直至濮議方與司馬溫公異歐陽公既自説不曽讀過儀禮如何便議大禮後來張孚敬竟用之而興獻之主直入太廟壓武宗之上此千古未有之事而永叔為之倡但永叔止議尊以帝號未謂便可入主也孚敬因此將永叔從祀孔廟可笑伊川謂退之却倒學了大要韓子是理義與文章兼營非如歐蘇專以文章為事即曽子固想亦是將此事畧入思議其梁書目錄序非曽用心者安得有此鍾旺司馬文正言忠信行篤敬終身無失學者翕然服之只是聰明睿知少不足耳上蔡見識髙明説得精彩想要打起精神説髙一層出來故有程門醉人之誚鍾旺龜山終日坐在門限上或説是門前石上不是門閾大約性情寛緩看他劾王介甫却摘其鳬鷖章解可見鍾旺以虚心與立志竝言北溪所見自是心最要虚方能容受得許多義理不虚則中自壅塞了一切嘉言善行皆格不入鍾旺朱子後儒者眞西山許魯齋氣象最好眞醇正許篤實鍾旺朱子之後語錄無有過于許魯齋者魯齋説理大有警醒處他語錄不過二三十張近閩中所刻却將幾條好的刪去可笑魯齋不曽全見朱子各樣好書却是躬行精到其見理已到透處陸稼書不得謂其不壁立萬仞某督學至靈夀見其生徒文字荒謬問陸則羣瞪目如隔世人古人到一處憑他地方荒僻人才鮮少必定淘沙揀金有些教澤陸在靈夀七年行取入都何至使本治毫無流風餘思魯齋做幾年祭酒後來人才便多出其門河南懷慶府出韓文公又出許魯齋山川靈秀非他可比人以龍門出子長又出文中子又出薛文清為盛較之河南未為過也韓子勝子長魯齋可兼文中子薛文清胡雲峯在元時極為有名儒者説書專用巧彼此鈎搭如今人做巧搭時文一般最有可喜處亦有可厭處文中子是要擬論語故東説一叚西説一叚薛文清讀書記何故亦不以類成編論孟是門人彚集亦畧以類相從間有相因而附者若自己作書自然要有條理吾鄉蔡虚齋林次崖陳紫峯先生於四書易經皆有數十年工夫近來節改者多久便磨滅某嘗欲去其支蔓存其簡要為一帙書而未暇宋末有善相者一朝臣引至閣中歴相諸公出云首座極顯末座凶不可言首座乃留夣炎末座則文山先生也聞留子孫以遺像求題於蔡虚齋題云狀元兼宰相屈身事讐胡遺容猶左衽畫工是董狐前輩直氣如此文集中又載一僧人以三教圖求題虚齋題云三人行必有我師焉擇其善者而從之又曰自生民以來未有孔子也觀此則留題當有之昌黎論一事便一事透徹此人煞有用明朝人學問事功都不透想是讀書不專之過只有蔡虚齋專精四書易經而年只五十七又貧不能多得書如朱子語類都不曽見故到底不明白理氣二字然薦廿餘人於王三原皆有成就識寧王必反便拂衣歸已不是無用人榕村語錄卷十九

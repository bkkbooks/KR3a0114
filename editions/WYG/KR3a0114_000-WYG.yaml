body:
  text: 榕村語録儒家類提要臣等謹案榕村語録三十卷國朝李光地撰光地有周易觀彖别著録是編為其門人徐用錫及其從孫清植所輯有光地所自記者有子弟門人所記者各注於諸條之後冠以經書總論與論四書者為八卷論易書詩三禮春秋孝經者為九卷論六子諸儒諸子道釋者為三卷論史者為一卷論厯代者為一卷論學者為二卷論性命理氣者為二卷論治道者為二卷論詩文者為二卷而韻學附焉光地于律吕算術皆所究心而是編一語不載殆以别為專門為儒者所當知而非儒者所急歟抑或律吕惟授王蘭生算術惟授魏廷珍而清植等不及聞也光地之學源于朱子而能心知其意得所變通故不拘拘于門户之見其詁經兼取漢唐之説其講學亦酌採陸王之義而於其是非得失毫釐千里之分則辨之甚明往往一語而决疑似以視黨同伐異之流斥姚江者無一字不加排詆攻紫陽者無一語不生訕笑其相去不可道里計葢學問既深則識自定而心自平固宜與循聲佐鬭者迥乎異矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cfc95e3bfefe10e4f92fab8e45487105c2ec5c6deea5db626a5ba5228475db7c

body:
  text: 榕村語録卷二十大學士李光地撰諸子管子士鄉十五士鄉即農也朱子謂士鄉俱為士則無農故鄉止十五非也工商之子俱不許出仕惟農之子得為士故謂之士鄉管子有畏威如疾之言未必脫略規矩定須精嚴但根本曠闕耳自記管子云一年之計樹穀十年之計樹木百年之計樹人句句都好若再加一句千年之計樹德更完全問管子不解道此想即是他器小處曰然他見處只到得樹人而止武經七書孫子外餘者皆偽子書如天禄閣乃明代蘇州一秀才所作何友具知其名姓自漢以來荀揚都與孟子竝稱惟韓文公斷為擇焉不精語焉不詳至司馬溫公邵康節又推尊揚雄幾在孟子之上後來一被程子黜落而人翕然信之者實見得到也見得性善則人我一也便能感化人成就人故曰盡己性則能盡人物性荀卿當日聲勢大于孟子孟子日漸尊崇荀卿日就消歇至今孟子為吾敎宗祖而擯荀卿如路人别派以此荀子文字比揚子還條暢其論事甚精采但説性惡太可厭董江都後韓昌黎前惟法言中論中説三書表表中多名言揚子仕莽固可罪但法言中殊有可採且當其時遂知推尊孟子亦必有見未可以其人而廢其書鍾旺太元中顯然頌莽功德所云漢公分明是安漢公溫公注云公與功同不知下面阿衡字如何解得去豈漢天子之功如阿衡耶注書若此等最不可朱子斷無此病王氏盛時天下皆知其將變梅福么麽遠吏尚知逃避揚子雲自謂心通造化獨濡滯不去看來亦非全為利禄特以京師聞見廣好讀書觀于外夷來朝必細問其土俗風物可見又其人呆見莽謙恭下士即實以為周公到後來事已決裂便是怕死不復敢與之異司馬文正謂揚雄過于孟子曾王又推服之以為箕子至程朱出而論始定其實揚雄罪過不必到事莽就是作太元將羲文周孔一齊都做了罪己不容于誅王荆公罪過亦不必到行新法只以春秋為斷爛朝報而廢之罪亦已不容于誅這都是心病可見其無忌憚偶看譚子化書極有名理苐説到盡頭處只説得神氣惟孔子説天地便説他的德揚子雲著太元思入風雲實亦只説到神氣而止皇極經世儘精妙程子謂其洩漏天機尚不離此窠臼聖人言道只説理言天地只説德洪範五福首壽偉長中論中有説一係得之于天者一係得之于王澤者得之王澤是帝王養育出來的此段議論極好子書自法言中説之外如中論申鑒儘有好語文中子說公旦為周一叚甚精周公之風雨綢繆似欲使子孫相繼天下永遠屬之我家迹近于私不知世無賢聖既不可行堯舜之事若子孫之世及者又不為啓沃輔翼使稱其位則害及于人矣故曰安家者所以寧天下也存我者所以厚蒼生也人心道心本在一區要人簡别後世便是寧天下者所以安家也厚蒼生者所以存我也周公謂宗社安而天下安子孫存而百姓治有何不好若是子孫不賢不如速亡故遷都之議曰洛邑之地四達而平使有德易以興無德易以衰即如人家子孫果能繼述祖宗之志事便使科名接踵豈非好事若㒺上賊下惟利是視要他富貴何用倒不如使他貧賤困苦既不至害人或者動心忍性反有向善之機道理原是如此此條比韓子對禹問說得更詳盡中説問聖人有憂一叚程子譏其心迹之判一句果然有弊只是曲為彌縫亦自有説如天有陰晴倘或淫太何嘗不咨嘆憂苦祈禱紛紜至其上一層太虚穆清有何雨晴天下皆憂聖人亦憂天下皆疑聖人亦疑至于樂天知命窮理盡性有何憂疑如此説亦未為悖繆也文中子謂天綂元氣地綂元形人綂元識邵子宗之不善讀者便謂天地只是形氣惟人有知識是天地無知識也連人者天地之心一語都錯㑹了謂天之心全在人如天之視聽全在人之視聽其實人之視聽皆天之視聽人之心即天之心非天無心惟人有心也朱子于文中子推許不小荀揚不足比即韓文公尚不如其懇惻而有條理此是何等地位只是世人將他與揚雄竝斥者為其僣擬夫子也文中子元經是假的中説内有㡬條假的文中子鼓蕩之什門人皆沾襟象山白鹿洞講義利聞者多揮涕何以能爾想他皆有許大精彩聳動得人鍾旺陸子靜才本大其為荆門州至境内無賊路不拾遺又明敏于事造一城估計五十萬人者他用五千人尅日而就若不死便大用必有可觀故朱子謂渡江以來惟我與子靜八字著腳做著巳工夫子靜亦稱朱子為泰山喬嶽于立社倉法劾唐仲友皆稱之不遺餘力使子靜為相必用朱子朱子為相必用子靜若論學術道理就使子靜成掀天事業到底朱子是子靜不是陸子靜要人把心地打掃潔淨若一肚子熬糟讀書亦不相干但只空空的無一㸃物事在内終日江漢濯秋陽暴濯暴些甚麽畢竟朱子有把捉孔子家法是如此問陸金谿不喜人説性其意云何曰想是厭性中分仁義禮智信許多條項但無奈性實心虚心只空蕩蕩底言性則道理鑿鑿實實心方有憑據鍾旺陸子靜只在吾道上說得過些王陽明方可謂之詖淫邪遁子靜只是賢知之過或言朱子與陳同甫書其理易明似無容深辨曰是第一皮義利關頭速須痛與截斷鍾旺姚江所編朱子晩年定論一書羅整菴細查年分與辨姚江詞屈乃曰當時在留都學者爭閙不得已以此權教一言虚誑他皆無用天下後世如整菴者豈少知此之為權敎無不疑為權敎矣誰肯從之明儒無及宋儒者即姚江亦不如象山遠甚象山是要仁義忠信乾乾凈凈只是學術不是姚江便有權詐習氣直是奸雄故作用錯處多問可方張乖崖否曰不止自當突過合曹操荀文若為一庶其似之張凈峰極不服姚江年廿五時親至其家與辨論凈峰曰如何言明明德在親民姚江曰欲明吾孝之德在親吾之親欲明吾忠之德在親吾之君凈峰曰如此只説得明明德省察一邊不可以該存養一邊姚江笑而不答凈峰遂大喜以為難倒姚江其文集中首載此條不知到得親親親君存養巳在内如何說該不得特為姚江所不屑辨耳當日只應就文義折之大學云大學之道在明明德在親民未嘗言明明德之道在親民也且即其言而反之言欲親吾之親在明吾德之孝有何不可即此便可窮之姚江又分首節為生安次節為學利三節為困勉佛家有上中下三根姚江處處提闡可笑姚江才氣好事起倉卒驅市人而戰若使當風塵時正未可測問使他為相何如曰使不得用其偏見私説廢蔑古人成法害不可勝言友云最可惡者末年附㑹永嘉議禮希望起用曰這郤是懸斷誅心未免深文或者他見解即是如此亦未可定只是殺遲仲容降賊三百人于宴席卻是為何嘗問施靖海以處置降兵之法渠謂有老板成法任他多少編入吾軍伍中可也降賊即慮其反覆殱厥渠魁足矣盡數勦戮可謂忍心害理至桂萼輩深嫉其學彈章詆毁極其不堪此卻不可為據淝水之戰雖屬僥倖然人氣不動便有勝理陽明撫贛命下季明徳聞之知其必立功業人問之曰某觸之不動孫北海承澤極惡陽明學術嘗舉陽明與學徒講論其夫人忽閙出掀其几案抛其書帙曰諸君勿信此老厮誑因枚數其平居奸私事門人竊窺陽明顔色和霽如不聞者乆之夫人入陽明徐整書案復理前論若無中間一叚事者以為非人情某曰恐即此已足以擒寧王矣北海為失笑北海又時舉正德實録中人參陽明與寧王交通及閨門穢事某曰吾軰評其學術不正只論學術可已此等謗誣恐不足憑賢豪豈能免此所惡于姚江者為其以四書六經皆是閒賑直指人心立地成佛耳其流毒無窮王龍溪已不像樣萬厯以後鬼怪百出姚江作俑也讀書人不思經義株守傳注字字膠執牽經合傳甚至并傳意亦失之姚江因厭薄此等故反其道以治之不思此等固陋處但就其説以破之足矣何至大決藩籬而不顧耶道釋孔子之敎自與天壤相敝除是不以君為君不以父為父孔子之敎便無用處欲壞孔子之敎先破君父之説佛氏不隨世法是無君父母反拜是無父此乃出來欲壞孔子之敎者而卒之忠孝根心如何壞得楊止無君墨止無父而佛氏兼之此事前人闢之已盡吾儒但當自反把我們這邊做得好孔子敎弟子只以仁為宗又復發揮孝道都是從根上説正與佛家對針佛氏無根故先從父母妻子上斷絶一路差去孟子敘道綂曰見知聞知道豈不貴行而云知者正派要𦂳如領路人領差了行更有害當下不覺到歸宿處便大壞楊墨被孟子指著病痛深切處曰無父無君是禽獸也故其書遂無傳范蔚宗西域傳賛宋景文李蔚傳賛皆是捜佛之根其人其書多是中國人假托増飾有憑有據竝不與他耑辨道理所以中其膏肓莊老滅敎佛滅道禪滅性其所見一耳議論則以漸而深入自記佛氏善言心老氏善言氣都説得精吾儒言性他那兩件便都包在裏面佛以心法觀天地老謂開口氣便洩皆吾儒所當資取者問桃源中了無文物不幾于禽獸之食息乎曰彼中有純氣自有人倫淳朴恩愛與禽獸别若有文物純氣便有發散之意問有人豈能不爭無主焉能和輯曰若爭便是純氣將散矣文物固是氣之發露然氣既漓又須以此維持之如人受參茋之補便是元氣有虧然元氣已損又須以此補之老子曰聖人不死大盜不止不知世既生盜聖人雖死又焉能止老子所云説了一截脱了一截老子生十有三死十有三出生入死十有三有字不是又字解者都指出十三種以實之如周禮息偽十有二亦枚舉以實之支離牽强不可通十有三者十分中冇三分實三分三去零數耳十有二者十分中有二分亦二分半去零數耳必有寢衣長一身有半不欲露體耳非齋服也半此身之長短衣也朱子謂長視身而又得半亦太不便矣三分天下有二幸而有其字不然亦將謂三分之外又有二分乎老子惟貴大患若身難解只是生于憂患之意易所謂貞疾恒不死也寵辱若驚者以寵來辱我故若驚大患來便貴之若愛其身者以為有此便可不放逸怠傲以至于死也卻是愛其身不是要害其身然又不是以平常之養身奉身者為愛又要不有其身所謂外其身而身存也聖人看得道理熟平平常常説出来他們窺見些子便以為秘妙又做竒文字楦出精彩來道德經雖亦有意理某卻不甘為之發明初意欲與參同契離騷為三竒書合刻今看來非二書匹也如道可道非常道名可名非常名聲口總不正又如將欲取之必姑與之總流為機權隂謀口角若參同契便無此惡態隂符經撮道徳五千言為三叚不是没見解人握機經亦是傳古陣法者非泛作大約是戰國鬼谷子之流為善無近名為惡無近刑縁督以為經為惡兩字太險豈敎人惡亦可為但莫近刑乎嘗與澤州陳先生論此以為為善得無近名乎為惡得無近刑乎只是縁督以為經澤州大喜數日後又得一解云為善何必即有近名湮没者不少為惡何必即有近刑漏網者亦多不因名而為善不畏刑而不為惡只是縁督以為經耳澤州又大喜以為更好至尊常諭朕看參同契恐俱是説人身上的話未必是説别項地奏曰臣向來正是如此説如隂符説絶利一源用師十倍絶利是將諸般利慾都斷絶了只在源頭上専一用工便如用師十倍三反晝夜用師萬倍是説工夫不斷刻刻相續便如用師萬倍復䝉諭云正是如此又奏臣有一親戚好道家説臣嘗問之云鐵亦好物可以定子午道家總不貴重只説丹砂鉛汞豈以其為罏鼎之用烹煉大藥可以服食耶他應曰然臣曰以愚觀之殊不爾盖銅鐵煉到底只是銅鐵惟砂裏有金鉛裏有銀都非從外覔得可以煉出寳來以喻人血肉之軀有至寳存焉天之明命在其中可以煉得出來只是要不斷火如所謂必有事焉勿正勿忘勿助長也又䝉諭云如此方是他本意因説絶利一源絶了好不然便向别瓦礫中尋寳如何能得但須三反晝夜不㫁工夫方好絶利一源吾儒之持敬也三反晝夜吾儒之集義也時甲午四月十六日某因參同契悟得易經道理參同契只説一身其實一身即天地凡陰皆魄也凡陽皆魂也隂以陽為本陽以隂為基天之神氣包乎地外然離地便散漫無歸郤要貫注地中以成歲功地若不資天之神氣便成頑塊何能生物如人之形體不禀命于心之神明則五官百骸皆不得所然心神若不宅此形體何以為寄托之地故魂守魄即魄拘魂初無二候乾坤合撰天地同符但看世間凡氣所貫皆天也地在天中初非截然天為一物地為一物也説易者見以乾為君坤為臣即以君臣論君要留心臣民所謂天道下濟也亢則有悔矣臣要一心王室所謂承天時行也否則有咎矣其理亦是如此參同契以人身言乾坤則神魂其乾也體魄其坤也神不得形何所附麗故為游魂形不得神何所作為故為滯魄惟刻刻相守合而為一形即神神即形則丹還矣此即天地交泰水火既濟之理從來説易者卻不曽説到又發明出先天圖位故知其傳授必有端緒參同契取象龍虎是竊用周易龍馬而變其號龍取變化飛騰卻潜藏于淵以譬人心騖八極一收便在腔子裏是魂也虎伏于山林人不能見然一嘯風生郤威猛不過是魄也但馬比虎更覺穏妙馬本是乾而坤為牝馬如牡馬行到那裏牝馬亦行到那裏本是一物但有牝牡之分更精參同契向日分章叚頗不錯今又見得明白些其警發于吾身心者甚切大約先黑方白方黄而終于紅是謂之丹日之出也先紅而白而黄而黑人與草木之生也亦然而道家工夫反之所謂順則為人逆則成仙也他的黑是收視反聽不説話將耳目口三寳閉塞了直使形如槁木心如死灰乆之黑中生出明來便是白所謂虚室生白到得魂守魄魄拘魂魂不游而魄不昧便是黄後來一團純陽真火陰邪之氣都燒化了所謂童顔是也這便是紅紅則丹成矣吾儒工夫亦然以中庸言之戒懼黑也慎獨白也致中和黄也至天地位萬物育紅也佛家工夫亦同其云發大願力即吾儒之立志其云悟即吾儒之致知其云脩即吾儒之力行明儒說三敎源頭本同但工夫各别卻反説了工夫卻同只是源頭不同發願力同為甚麽發願力便不同吾儒是大公的從天地萬物道理上起見道家卻只為一己只要神氣常存佛家看這箇猶粗只要此心光明照徹乾坤亦是為一己不特佛老就是市井人亦必先發願要做財主方講求取利之法然後經營力作所以元亨利貞四字夫子作四項極當亨與貞都是同的元與利卻不同佛老與百工技藝俱有做到亨通之時只是問他大不大耳俱有守之而不變處只是問他宜不宜耳吾儒便大便宜所以五性最重仁義問道家如此用工果能使此身常存否曰亦不知如何想必神氣乆長些他竝不是糊糊塗塗做神仙他儘千思萬想天地陰陽萬物變化人身形神都要知其故亦不是㝷常人問魄拘魂魂守魄如何用工想亦不過定心心不放則魂魄俱安矣曰魂守魄即魄拘魂無兩層心定自是主宰亦要明魂魄之理問他亦千思萬想豈不耗心氣曰他所思想者即是他的事不是游思妄想如一想魂即如見自己的魂一想魄即如見自己的魄與尋常思想不同若是心如頑石只像勞山上人嬾乆神氣足不須飲食年歲長遠一無所知不過如土石龜鶴耳有何足取問他只説黑白黄赤是水金土火何為不説青曰想是怕人戀住生氣他結末卻説丹成後須要在人世立功功行圓滿方能升天吾儒將仁放在頭上他將仁放在尾上參同契道理就是吾儒亦用得著一半其要在慎言語節飲食懲忿窒慾而已慎言語與懲忿為一邊事懼耗氣也節飲食與窒慾為一邊事懼損精也至那一半成仙事卻用不著如孫吴兵法亦有一半用得著整行陣嚴紀律衛民保境是所用也其説得疑鬼疑神處便為吾儒所不道參同不取銅鐵之類而取丹砂鉛汞者取其中有至寳以喻人軀殻中有至寶耳丹朱砂也中有白金砂即披砂見金之砂中有黄金鉛汞中皆有白金四者不加淘洗烹煉不過是丹砂鉛汞一加淘洗烹鍊便有至寶人不去修錬不過是一皮囊與草木朽腐一經修煉便可成聖賢豈非至寶問還丹何義曰丹原非一件物事不過是赤色謂之還丹者初丹後不丹復歸于丹故曰還人初生本紅故曰赤子後長大漸白由白而黄死而黑凡草木之芽先紅後青白後黄落後枯黑日初出紅後白晩黄夜黑仙家當人紅白時他只守黑所謂𤣥之又𤣥衆妙之門到得人死時他活起來人黑時他亮起來一直復還嬰兒之赤故謂之還丹參同契言甚簡易其言天地陰陽即吾身之隂陽也其言黄老清靜而天下治如吾身之虚靜水火調伏而壽命長也其下手工夫不過魂守魄魄拘魂魂者靈明動作但任其浮馳則為游魂魄者寂嘿堅定但任其昬頽則為滯魄當魂放逸時須把心捉來不許妄為紛雜是為魄拘魂魂為魄所拘則魂常精明不散而魄亦不頽然昬惰是為魂守魄問參同契之説易與吾儒合否曰彼不過仍漢儒之言耳漢儒言易以六十四卦配合年月日時七十二候二十四氣雖逐日之陰晴皆為豫定又不是推得一年便可印板鑿定明年又有活法又参之以人事如人事變易象亦應之參同之言易仍是如此問修煉工夫何以與此相應曰有死子午有活子午死子午者天之子午也自子至午為陽宜飲食動作自午至子為陰宜閉户守中活子午者吾身之子午也但倦怠時是子也便宜吐氣運行不使㝠昧覺得有放逸蕩散意思是午也便宜收視反聽寂然不動問與七十二候二十四氣有相應處否曰亦相應到那節氣換時比常時工夫又加謹若後來道家爐丹及守庚申諸説皆誕慢不經參同無是也妙在與吾儒説工夫處都是一樣即佛家亦是如此大約三敎工夫都是從收放心做起而吾儒看得一草一木遂生得所無一不與我性分相關佛道兩家連自己父子兄弟夫婦亦視為膜外此處道理大不相同參同契首尾武中間文與吾儒工夫一樣初時立志要勇猛直前及末後直逹天德竿頭更進又要武中間勿㤀勿助卻要文道家從漢便分兩路魏伯陽修心性張道陵講符法佛敎兼此兩種大約釋道二敎其初亦是隠居修道人因他枯槁清寂巖居穴處恐招異物之害故學些術法以禦之及其苗裔欲為表章遂説元説怪張皇附㑹無所不有卻失了他本來面目致命遂志致吾之禍福壽夭于命而必求遂吾志也如致其身亦是利害生死悉置度外非以殞身為致也古人説命字都是指天命今以屬人如身字一般經書中無是也此想起于道家道家以心之靈明元神謂之性身之元精元氣不死者謂之命修性修命是兩樣工夫兩者俱進是性命䨇修命字屬人矣問修命者務一切不管心死而後氣足倘修性則必窮理致知苦思勞心豈不有礙于修命之説曰觀參同契說千周萬遍可見窮理致知他都有只是窮他修性修命之理致他修性修命之知耳如此焉得有礙于修命乎某深信得人有長存之理萬物之生人為貴草木有數千年不死者禽獸亦有千年者豈人之壽止于百年乎蓋人之不死者在神明而不在形骸聞山左勞山湖廣武當山皆有數百年不死之人不飲食不水火身輕體健如鳥獸然躡峻跳澗如履平地然此乃道家所賤彼言修煉亦重神氣不貴此也由此觀之聖賢自有長存不敝者神明耳李文節閉户多年做一部百鍊草許多軟調不見精采何也友曰他只在那裏錬自己的若讀前人書而錬之便佳先生曰是可知道家修煉無用陰符經著語太險不如參同平易渾穆其書只虚説在這裏隨人用用他修道亦可用他行兵亦可用他治國亦可分那一叚是説道那一叚是説兵那一叚是説治國便呆了只是以陰為主便露殺機乃黄老之指非聖賢之道也陰符者以陰為符得陰則可以招呼羣有指揮如意即陽亦為用矣殺機正其所取猶吾儒言克己之意故曰天發殺機移星易宿地發殺機龍蛇起陸人發殺機天地反覆都是說殺之為用大今人都解作殺機不好大失作者之㫖傅奕闢佛語亦諦當但卻篤信老子至戒子孫猶以道敎當從與聖人之書當讀竝舉不知佛氏即脱胎于老子故韓子原道新唐書李蔚傳賛皆從老子説起佛精于老禪又精于佛其實禪學何嘗是西域來就是中國人替他粧㸃李蔚傳賛最説得透朱子釋氏論文筆雖不古精當第一闢佛幾篇名文該彚在一處范蔚宗西域傳贊傅弈表韓子原道佛骨表與孟簡書宋景文李蔚傳賛朱子釋氏論佛氏無所逃匿矣四十二章經是佛家原文儘有名理如磨麫驢身雖行道心道不行無禮來犯者如對風揚塵持梃擊空皆是妙論次之佛遺敎經他皆中國人傅㑹為之佛子從西來不立文字直指人心清淨虚無一切皆空其視世儒馳逐于功名富貴縁飾于名跡語言直與衆生一道看所以高明之士被其煽誘湛溺而不返只覺得他的是不知吾儒原是如此但既有了滌去己私這一邊又要有推以及人那一邊纔好聖人之道本末兼該物我一體平平正正萬古不磨直到周程張朱此理纔説明把向來推與佛敎那一邊的道理都收囘來所以其功大人心道心本在一區愛私也我必自愛其親乃知人皆愛其親推其愛親之心以及人則公矣貨財利也我必自資于貨財乃知人各資于貨財推其資于貨財之心而不相奪則義矣佛家弊病在斷截此心事皆無根焉能有物譬喻最難佛家説心性之體如明鏡一般物來必現隨物見形然鏡内空空的一無所有冷氷氷全無生意惟程子心如穀種一喻極妙盖穀種内根荄枝葉花實無所不全而其中一㸃生理則仁也心屬火仁屬木是滚熱發生的與金之寒冷不類所以鏡取譬不得凡陽一邉都煖陰一邉都冷佛家以鏡喻心性所以斷絶身累齊向空滅好説鬼神厭煩人事息心不是人心當息道心不當息喜怒哀樂未發之時亦息心也朱子云有滅息之息而後有生息之息甚妙寒冬閉藏來春發生之氣全在此時蓄養就是禪家亦破枯禪云不可有惡心不可有善心亦不可無記無記竟枯滅矣但他所不欲枯滅者心之神明吾儒所云不可枯滅者天命之性也佛家不是一槩滅絶其心朱子説告子㝠然無覺悍然不顧究其歸自是如此他做工夫亦不如此儒者心安理得靜亦定動亦定各止其所佛家忍心害理强行割截把捉豈獨空為頑空即明亦是頑明問佛敎説不去行不去如人盡從他一世人類便絶曰他原説不要人盡不㛰娶就是這樣亦説不去聖人敎人是自己行了敎人行如説㛰娶是好道理他就該從人若説是不好道理如何又敎人行天地間無此道理敎法和尚説來説去總是為自己吾儒講的事都是世上用得著的即此便分公私釋氏之發大願力是吾儒之立志也要常惺惺是吾儒之主敬也遍參厯扣是吾儒之致知也戒律精嚴是吾儒之力行也但他之立志致知力行都是他的事與吾儒絶不相似凡吾儒之所宜有事者他都以為大戒如人從父母而生故篤愛之他便不認父母是斷愛根揀極難處一刀兩斷他以為人之愛都是生于習染即愛父母亦是私心不過貪其乳哺鞠養之惠而已假如自幼無知時養于他姓受其鞠育亦便愛之可見都是有縁之愛不若從無我中發大慈悲普度人天方是無根之愛其愛也真而大孔孟卻説世上豈有無根之人即從根上愛起吾儒與釋氏不同處本易見不知前輩何以都説不透見得只是不分明釋氏説三寶亦説得好如我們古來有堯舜禹湯文武周孔以為宗仰便是皈依佛聖人留下幾部經孜孜誦法便是皈依法有周程張朱幾箇儒先視為榜樣便是昄依僧佛家輪廻之説即循環始終之理亦無足怪只是説得呆了便不可信春夏之發生都是冬間閉藏之氣人記得書多便㑹做文章窮得理明便論理不錯平素更事乆臨事便諳練喫飯多精神便强旺受之于内的即是發之于外的只説得不呆便不妨嘗問僧鋭峰曰輪廻之説無乃誕幻僧曰此有何竒不必逺求佛法觀天地只以心法觀之生死如晝夜晝夜相循環心之起滅無時其起者即其滅者豈有二耶又問人有惡變為禽獸禽獸有善又變為人信乎曰有此理便有此事但看人一日之間念慮起伏幾番為人幾番為禽獸矣輪廻之説以是思之覺得此説殊有理如我們起一善念便覺光明正大不獨念頭是人耳目口體無一非人他人看亦如此若起一惡念不獨念頭是禽獸耳目口體無一非禽獸造化在我何必閆王又問做工夫以知識為先乎修行為先乎曰發大願力為先問假如識見不到修行不到空有大願力可乎曰也好菩薩不是一樣有初地菩薩便是他願力既堅雖功夫未到亦不妨既有此願力識見纔是真識見修行纔是真修行問願力發來多不能乆是如何曰此有二病一為從前不曽用功覺得今日難從半路做起一為力小圖大恐後來工夫不能接續須得此願發時從前種種譬如昨日死從後種種譬如今日生前後都要截斷問羅漢與菩薩分别曰羅漢見人不善發嗔怒心菩薩見人不善發悲愍心問所存心曰亦不存于善亦不存于惡又不是昬然不醒此便似吾儒未發之中又嘗舉公案有人自許心能做得主了僧曰醒時做得主夣時做得主否其人曰也做得主僧曰有夢時做得主無夢時做得主否其人便不敢自許凡此皆彼敎中之至精至粹語佛家説心亦好只是上不能通諸性下不能通諸事須知心如此乃是實理如此又要把此事處得當方好佛家以佛為轉輪王蓋以心轉宇宙實有此理孟子云塞乎天地之間人意思到那裏氣即到那裏不然如何充得林次崖存疑闢陽明數叚卻不中其要害他的病根在無善無惡心之體但觀有道君子于事物未交寂然端坐時滿腔無非善意通身都是善氣豈得云無善若無善此等氣象從何處來問佛家説無善無惡善知識氣象何如曰一看莊肅細看氷冷固無惡状了無善容即與其無善無惡相應也或言佛敎能使人外形骸見危致命然唐人多溺于佛卻沉没聲利不見其清㢘節義者多于後世及朱子之學興殉節者皆視死如歸宋明以還可以觀矣聖人説經綸大經是一叚肫肫其仁所發實是從化育中出來的聖人所言所行都是為此吾輩聞有人呼風喚雨卻不生景仰心聞得忠臣孝子可師可法便心悦誠服即此便見得天地之心亦是如此左慈周顛仙冷謙殺亦殺他不死岳武穆被秦檜一殺便死然今卻不羨慕左慈周顛仙冷謙而景仰武穆左慈果是手叚大何不除了曹操别推箇賢臣輔漢顛仙亦不能除陳友諒終須洪武動兵可知此種毫無所用就是畫一道符誦幾句咒拘得鬼來亦只是未散呆魂問符咒何以能拘鬼曰朱子説得好公既信佛鬼即公軰如何不信今有一異状之僧便傾城往觀施舍駢雜這些人死了如魂魄不散自然還是如此須知幽明人鬼一也看得極平常方是道理高一邊的人説世無鬼低一邊的人説是事皆鬼為政聖人説道理因拈中庸二字最妙漢時六經皆有緯書光武因劉秀為天子一言便尊為聖經桓譚言其不足信輒罪其非聖直至隋文帝始燒除之聖人極數知來不過推之以理如寒往暑來乃感應之必然者癡人以為聖人于後世某一箇人姓張姓李名甲名乙皆知之不直一噱聖人之訓曰將興致祥将亡致孽確然實理實事遇灾異則恐懼修省不此之務而耑以禳報為事至終日在吉凶上作無益算計勢必為鬼物所愚有當凶而反致祥者矣隂陽雜術某閲歴多矣何嘗有驗即有驗者亦是説得多了偶然撞著耳惟聖人之敎一以人事為主你學字㑹寫字學文章㑹做文章如人喫飯㑹飽不喫㑹餓一般何等切實大約人之精神魄力甚大雖偏僻之學逼出一叚光怪亦能驚動人子雲作太𤣥口中吐出白鳯劉更生喜言神怪藜火老人感之而至若聖賢平正學問卻無是也盖其氣已與日星河嶽合矣友言明太祖曽遣人向天竺求經又各王分封皆以一僧傅之姚廣孝則燕王傅也先生曰洪武亦不是信佛大抵人不能無所畏當其分争時匹夫匹婦皆吾敵至天下一統無外患可虞欲保社稷長子孫便懼鬼神思以邀福而除禍未有不為僧道所愚者自非聖人斷不能免夾雜念頭惟聖人胸中瞭亮道理看得透知到我即天天即我坦然做去有何畏懼鄧文潔説他不要學聖賢亦不要學天地不知要學甚麽其刻苦至終日跪庭中石上漬血斑斕到底不見他怎樣超妙王鳯州季明徳軰後來做出文字都通不去所謂自詖而淫而邪而遁必至于窮而後已也朱方旦初至京傾動一時猗氏衛先生在朝班極詆之適史子修聮坐色殊不懌猗氏竝責之子修曰我非孟浪信從其敎者彼實能起死人而生之雖欲不信從得乎猗氏詢其詳子修曰吾妻病已三年委牀待斃聞朱至徃叩之朱曰俟吾察其命盡與否君姑還余即至某問先生能遽來耶朱曰不須余來病者自知是夜妻竟安卧又聞室中有異香至鷄鳴時妻欠伸而覺曰汗透矣索衣易之勸其少間妻曰我愈矣適夢至一公􅅟有大官命吏撿簿須臾吏白曰史鶴齡妻壽限未盡但災厄甚重忽聞屏後有人曰既壽限未盡令其夫婦皈依道敎以禳解其災可乎大官起立拱諾曰受朱先生敎因命余歸遂蹶然而起猗氏聞言悚然遂與子修俱詣朱朱曰余閉目見諸賢聖開目見天注想既乆自然與天地賢聖同歸公輩讀書而不知其何義顧諟天之明命非此之謂耶猗氏遂亦大服嘗邀某同往修謁某先索方旦所著書觀之得其中説質言二種書中别字無數想來天上無不識字的神仙遂堅辭不往後方旦被罪行刑于湖廣市曹監斬者即其弟子王新命也將斬前一日尚慰其弟子曰毋怖明日午時當有赦至其怪誕至此問當史家求禱時何以能然曰妖術本不足論但以吾道推之何妨如是當其清修苦行或者鬼神亦甘為所驅役逮至奉儗王侯驕淫過度則鬼神棄之矣至所云注想亦有可取我輩平生何嘗注想一件事都是悠悠忽忽老死而已用志不分乃凝于神有能晝夜不㤀念念不舍者吾未之見也有行取官許三禮者放言高論開口便説人莫要錯了路頭一大聖一大賢一大儒環極魏先生者冲虚君子也聞其言為所悚動乃謂某曰余不能測其學問高深君當一見之及見頃三禮言其宗㫖云云某問之曰所謂大聖者必孔子也若大賢則顔子大儒則程朱也三禮曰然某曰程朱去孔子千五百年不能得師或至錯了路頭顔子親見孔子孔子何不指以大聖路頭任其錯走豈顔子天姿僅可以賢抑孔子秘而不宣耶三禮無以應翌日為環極述之環極深為稱嘆乆之某入朝班猶聞三禮向人稱説云云可見其糊塗一世人之語不近情理都是言妖今見得佛老果不足辨雖不曽細讀其書但既不是我們的道理便不是此道理外更無道理曹武惠兵已過江南唐始焚卻佛經曰今而知舍周公孔子之道無足以治天下者二氏説𤣥説妙我們治天下著他一㸃便害事榕村語録卷二十

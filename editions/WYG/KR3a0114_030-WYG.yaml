body:
  text: 榕村語錄卷三十大學士李光地撰詩文二離騷頃注得一過看出此人學問條理讀的書既多一字不亂下都合義理今人不得其意説他憂惶瞀亂所以一句説向天一句説到地何嘗如此此人若及聖門恐不在游夏後陳良楚産也悦周公仲尼之道北方之學者未能或之先然絶無片言隻字傳于今而屈子乃不朽可見一㸃羽毛文采亦不可少騷體最難作屈子後惟漢武帝瓠子秋風可以歩武文中子東征歌非大有意思人不能作鋪張賦原不好就是上林子虚長楊兩京三都皆賦之祖已不為佳何論其餘就中兩京差優耳漢賦漢之俗文英華唐之俗文詩餘宋之俗文雖不為可也昌黎賦數篇别具風調得騷人精髓栁賦不及太白賦尤差清植唐賦小巧與詩餘同成戲具凡詩内纎俗惡派語皆可入其體固爾至今所傳唐人名句亦不多以上論賦韓文公龜山操周公有鬼分明是有靈有神之謂若下神靈字便腐鬼字却是字訣學古歌操要直若油便嫩只是意直筆又直便難看所以筆調字眼上又須畧變曹子建四言詩一氣呵成如衝口歕出絶不用一句詩經調陶淵明便將詩經成句冩出韓文公又覺得有意雕刻洗脱不如子建自然栁詩諸體俱工長律尤超絶無一語不從漢魏出却又陶鍊精熟東坡詩無甚好處引用故事亦不知揀擇然天才自勝隨意冩出便有境界山谷如一丘一壑小小結構歐公自負能詩如太白自負能文俱不佳詩選從來無善本不知河汾所選若何孔子云不學詩無以言夫言日用切近之事莫過于禮言今古經權之事莫過於書言隂陽水火吉凶悔吝之事莫過於易何以止説學詩盖溫柔敦厚長於諷諭主文而譎諌言之者無罪聞之者足以戒此一叚意思非他經所兼也孔子言語與他賢不同處全在此如論學曰不亦説乎不亦樂乎不亦君子乎論巧令之無當於仁而尚曰鮮矣患難時極自信語止曰其如予何曰文不在茲乎極其責備止曰毋乃爾是過與是誰之過與則將焉用彼相矣至吾恐季孫之憂不在顓臾而在蕭墻之内反似替他籌畫一般極其譏刺而曰何如其知也曰再斯可矣極其痛詆而曰是可忍也孰不可忍也曰奚取於三家之堂此等處果是得力於詩就是責宰予之晝寢責子路之野其言似極峭直此如詩中有蘇公孟子之作之類然到後來又以聼言觀行名正言順等道理從寛説來令人意消故作詩者全要含蓄蘊藉意在言外以此意求詩唐以下便少宋詩尤少朱子有幾首道理極透意思極足而格調亦下問意理透足便佳何必論其格調曰詩不同格調差詩便差若止取其意理何不做一小文何必詩詩説盡便不是夫子未嘗説作詩之法然觀於子貢之悟學子夏之悟禮皆亟許其可與言詩及所説興觀羣怨之等作詩之法便可想見朱子詩不到處即在説事理太盡也問邵子謂刪後無詩想是見得此意曰又不好全然抛却三百篇獨絶千古者不過幾篇其餘如春秋時作何必盡過漢唐人某欲選古唐詩之有性情闗於人倫日用者數百首令子弟自㓜讀之大抵詩以性情為主試觀三百篇何嘗有一篇全言景色者詩要渾厚不要雕刻有義理便渾厚淺露便是雕刻然又須自己雕刻過方知他不雕刻之妙曾聞一友人説唐詩間有一二句解不去者句中有一二字解不去者其妙處多在此宋詩則斷無解不去的便覺意味淺薄向曽作銅雀䑓詩極詆曹丕無人倫不遺餘力後翻得唐人崔國輔詩只用四句五言絶已盡云朝日照紅粧擬上銅雀䑓畫睂猶未了魏帝使人催帝非曹丕而何自己覺得粗疎村氣不自己作過竟不解他的好處此言殊是某近選詩必篇中有緣故方存不然雖做得好無闗於人讀了亦醞醸不出甚好意思來如此選擇自漢至宋不過三百餘首但觀論語中興觀羣怨及無以言專對四方達於政事正墻面而立等語可見聖人刪詩都是要有實濟杜詩細加選擇尚存五十餘首李詩却是一種仙氣都没收煞絶無吉凶與民同患一段意思工部見元結兩首詩就那樣傾倒送朋友之官皆拳拳以忠君愛民為囑忠告善道非太白可比古來芳藻名篇豈必篇篇入選去取之間要當有一㸃意思在若必全説道理亦不是有經史在何取有韻之文性情二字差近之觸物感事却闗到性情上倘樂而滛哀而傷説得太過亦不足存詩之體製只有古律二項樂府不宜編在古詩之外凡詩皆樂也詩以四言為正然三言五言長短句三百篇中已有但未有耑用三言五言以成章者耳唐山夫人乃以三言成章又有以五七言成章者諸體皆備於漢魏惟律起於唐今人以漢魏作為樂府後來作為古詩舛矣如今唱者為曲子不唱者為詩餘其實一也選詩自應從蘇李起而以蘇冠即其詩亦當冠首骨肉緣技葉結交亦有因二句便足蔽詩之義言骨肉固同根共命即結交之友亦非無因天下大矣何獨這幾人該做朋友盖或意氣相投或徳業相勸即唐虞之五臣周之十亂孔子之七十二弟子皆是有因者也首句可該父子兄弟夫婦次句可該君臣朋友意味深厚焦仲卿妻詩是古今極有名作看來那件事雖可憐但處得未為妥當不足垂教且著語太多過於冗長故刪之蔡文姬悲憤詩纒綿哀怨立言稱情有體實開曹杜一派絶作也十八拍意思不過如此反覺得似安於外域不願復回者故汰之曹子建詩欲尋其竒句不可得友云他實得些風騷之意琢句乃是因胸中沒有道理意思只得於此覔長自張恊輩起至陶靖節一洗此風杜工部雖亦琢句都在自己閒作至於闗係大篇便以淳朴為主如北征詠懷諸作所謂詩看子建親者曰然曹子建人亦有意思當丕簒位私自痛哭丕聞而惡之其詩多寄托之詞而歸於懇摯忠厚六朝人宗之以為源出國風信然鍾旺武侯詩只一首讀者多不得其意武侯使人各盡其材儀延輩皆非端人而用之終身此實成大業之本是詩諷刺俱在言外曰誰能為此謀國相齊晏子若曰是誰之謀乃相國之尊齊國之大晏子之所為也相國之尊而不能用齊之大而不能容勝于深文醜詆矣且中間以士目三人以讒言斥晏子下語顯然矣陶淵明詩有杜韓不能到處其語氣似未説明義蘊實已包涵在内如羲農去我久一首識見超出尋常自秦漢來黄老盛行都説聖賢以禮樂詩書教得人姦偽叢生此詩却説汲汲魯中叟彌縫使其淳黄老之説如言人元氣本足却被後來飲食藥餌戕賊生命不知隂陽之氣自初而盛而老知識開後人事錯雜嗜欲紛起亦理勢之自然所以用飲食藥餌者正欲保固其先天元氣也鳯鳥雖不至到底禮樂一新自仲尼沒而微言絶七十子亡而大義乖老莊之學果兆焚坑之禍不知詩書所以明民非愚民也何罪而至此漢之伏生孔安國輩敦勤辛苦存此六籍如何至今又不以此為事終日馳驅於名利之塲不見有問津於此者下遂一筆溜到飲酒上去謂我若不快飲亦尤而效之豈不負此儒巾乎其溜到酒者彼何等時元亮尚敢講學立教自標榜耶但恨多謬誤君當恕醉人又謙得有意思謂吾之行事謬誤於詩書禮樂者麯蘖之托而昬㝠之逃非得己也謝靈運鮑明逺之徒稍見才華無一免者可以觀矣靖節詩推周孔處甚多其逃於酒者避劉宋耳當時若行表言坊其能免乎韓子惜其不遇孔子議論甚正但與阮籍同譏則未必然其論詩亦不列陶而反及謝故論詩亦必經朱子而後定自沈約有四聲八病之説而詩遂趨於律今既為此體便當莫犯八病沈時本無律體今觀梁陳間詩便有許多竟是律詩者無非求去八病耳明逺詩雕鏤已窮工妙任唐人如何造作不能到此明季黄石齋倪鴻寳乃是欲學此種而意理不足徒至多不可解明逺句句生新有言外之意詞盡而意不盡他手作此等詩多覺破碎纎小他却才力大饒有一片清幽之氣可與子建雙峯並峙無與方駕者王子安述祖徳詩嫌其後半衰颯即年不永之相所以當初不選今觀之宜選文中子踪跡㝠昧似有似無惟觀此詩可知實有其人不宜沒也文詩乃天地元聲莫知其然而然唐初詩人何嘗不師六朝然陳子昂輩出聲氣便不同覺得清而厚此豈人能為之問曲江詩何如曰曲江才華英􅃩或不如人至性情品格幾無與比君子哉若人問摩詰曰他是元暉子山一派聲韻諧和對仗工巧所以無一首不可被諸管絃只是説到清閒髙雅而止無甚深義錢起亦是此種至宋此派遂絶問燕公曰他才氣大大率唐初如陳子昂王勃楊烱王績杜審言沈佺期及燕許之屬又是一種氣調迥乎不同問昌黎曰他不可以初盛中晚論别為一家韓門孟賈張三家文昌為最東野骨節尚大問太白曰他天才妙一般用事用字眼都飄飄在雲霄之上此人學不得無其才斷不能到燕許信大手筆尚不脱六朝腔調如膽猶忠作屏心故道為鄰劍舞輕離别歌酣㤀苦辛雲覆連行在風廻助掃除之類其調都教唐人用爛至老杜北征詠懷一洗此陋直攄胸臆眞氣流注另一風格只是唐初人語意氣象寛舒博大是太平氣運如邊鎮戍歌連夜動京城燎火徹明開雲間東嶺千重出樹裡南湖一片明之句中晚無是也即江間波浪兼天湧塞上風雲接地隂何嘗不雄而悲切無比如陳子昂丘陵徒自出賢聖幾凋枯何嘗不悲壯却無急廹激烈之氣韓文公七律雖少如將軍舊壓三司貴相國新兼五等崇横飛玉盞家山曉逺蹀金珂塞草春之類亦極意莊嚴清雅絶倫䑓閣體是唐初人做得不同如去歳荆南梅似雪一首又大樣又脱套燕公最擅此長陳子昂杜審言沈佺期王勃之流其詩皆有一段渾厚處足見開國氣象若魏鄭公一篇氣格之髙乃所謂開太平者張曲江詩溫柔敦厚詩之教也陶靖節尚偏於山林枯槁曲江乃更渾全曲江歴貧富貴賤體兼雅頌陶則專於風騷耳韓文公不提起豈以其句句對偶是六朝派耶韓論文亦從不提董賈大抵他自己位置太髙詩能窮人雖未必然亦不可開口便悲哀張曲江韋左司詩俱和平溫厚可以養人性情唐人七言律詩某意以張燕公去嵗荆南梅似雪一首為第一情景詞調都合嘗欲推老杜一首為冠不可得或者玉露凋傷楓樹林乎李杜韓栁四家詩缺一不可如長干行之類不但像漢魏更覺得飄灑雖工部不能工部五七言古詩初亦倣摹漢魏晚乃自開派頭一空依傍冠絶古今韓詩直追漢魏以前要造希微淡泊田地栁詩中漢魏亦有些六朝亦有些工夫獨到至香山義山諸家詩集雖大而力量氣味爭差逺矣韓文公平生不輕許人獨于李杜詩稱之不容口極平常語入老杜口便厚便大便雄偉其氣盛也韓贈張籍贈崔立之諸長篇比之北征詠懷畢竟差些以韓多直句而杜句皆曲也論詩太白如酒少陵如飯有杜可無李有李不可無杜李太白唐人推之在杜上者以當時被之管絃聲調易叶而杜少拗也杜諸體詩皆妙絶千古只絶句須譲太白絶句要飄逸蘊藉如峨嵋山月問余何事諸作實是絶調然昔人亦有推王龍標秦時明月漢時闗為第一者杜工部氣盛其長律一團氣在裏面鬰勃其為人也好善韓文公於古人詩少所許可工部連六朝人無不推奬工部詩有性情就是少時作已有一段纒綿委曲之意如太白與杜詩不過思君若汶水浩蕩寄南征而已杜却云渭北春天樹江東日暮雲何時一尊酒重與細論文便委婉有情致工部厚道其詩已駕乎六朝却平生人人宗仰至太白則曰自從建安來綺麗不足珍一齊抹倒矣末云絶筆於獲麟亦太矜張未聞孔子耑能詩也工部文章千古事二句已極自任到下面立言却無此等狀態即是當代詞人無不推揚王維鄭虔已至失節而懇懇切切為之解救此豈淺中人可及杜詩俱以北征為第一倫兒曾説詠懷自起至放歌頗愁絶一氣噴出無一句重複又有轉折似更妙細觀之果然此等詩起處最難若是宋人便落譚理窠臼他人便流誇大謙虚太過又不稱立言直是妙結處亦好子美北征無一對句昌黎與崔羣詩燕席謝不詣二句便對栁詩不能如此髙古其工妙者多似六朝然哭凌司馬與韋道安二詩雖曹子建把筆不能過友云昨夜思韓文公南溪始泛詩説到野人來餽𤓰作幾行冩工部何氏山林詩野老來看客河魚不取錢只疑淳朴處自有一山川輕輕四句便包括在裏又妙有風韻所以昌黎那樣歎服工部自云詩看子建親把庾鮑竟推與太白矣杜詩如宿昔試安命自私猶畏天榮華敵勲業嵗暮有嚴霜以茲悟生理獨恥事干謁之類都耐思索玩味韓詩便無此等句法又如北征説回紇兵不宜多而曰聖心頗虚佇時議氣欲奪似人都曉得此之為禍雖只説至此不肯説盡然以前後推之何嘗不盡看杜詩須如此細看老杜詩説安内攘外都有幾句好説話老馬夜知道蒼鷹飢著人便是用兵要語知道形勢經過戰塲者所謂老馬選將之法也至於卒伍不過飲食勞苦體恤頒給他便為用如鷹飢則就食飽則颺去此使卒之要也顧寧人説經書後有幾部書可以治天下前漢書其一杜詩其一也杜詩為自家保全喜得便雅淡為國家收復喜得便狂蕩立言之體皆妙文物多師古朝廷半老儒直辭寧戮辱賢路不﨑嶇極有意味如風塵三尺劔社稷一戎衣何嘗不好然漢髙祖豈不如此至此四句却是貞觀致治之根道得出太宗擅長處當時承宇文之後文物獨盛而十八學士之屬半於朝廷然不聼其言雖多奚為若後進無人亦非長治之道詩家誰見到此然使入宋人口中便直而淺薄其妙在朴而雅朝廷半老儒似不成語却造句甚古有斲華反朴之意赤驥頓長纓一首不過世無用我將欲卷懷之意公幹輩皆有此等詩却不如杜之深厚至杜之長歌却不如鮑明逺曹子建鮑明逺陶淵明三家直開三派曹全以氣勝開杜韓之派鮑才人之詩頓挫凌厲開太白之派靖節閒雅自然開韋蘇州之派杜長篇時有累句如臣如忽至理君豈棄此物學母無不為等俱不成語然以此見其大擅長謂工部自許不過是賦料揚雄敵詩看子建親如何便道致君堯舜上再使風俗淳果然可議後想來正見古人不欺處其志大而不相掩者就存其眞聖門狂者本是如此韓文公亦是一面自許一面疎漏却不怕人笑若後人為之必加彌縫矣工部一部集自首至尾尋不出他一㸃自見不足處只覺得從十來嵗以至於老件件都好這是一件大病韓文公就有知道不足處韓詩溫柔敦厚纒綿悱惻不如工部然如所云春秋書王法不誅其人身則工部有不及者盖春秋立義之最大處懼亂賊者懼後世之亂賊也若本人之身已為亂賊尚何畏於死後之誅此等實説著深微千古不刋陶詩汲汲魯中叟彌縫使其淳當時風尚盛道老莊以為周孔之道鑿朴生偽而淵明謂孔子欲使其淳可知連上眞字亦非放達謔浪之謂以此意選詩便寥寥矣某人論南山詩痛加貶斥曰却不必大凡前人詩文都有一用神以為秘訣韓文公作詩將前人一字不入胸中以為吾于此時有此時情景於此人有此人情事肖者便新不如此縱工何益南山詩所列彼時所見實有此許多情状他乃一氣吐出誰禁得他只是後人不必效此耳栁子厚長律無一不精以弱嵗遊元圃知命儒為貴二篇為最二篇又以知命篇為尤弱嵗篇因劉夢得用五十韻有欲索性將麻韻用盡之意間或不能自然知命篇則直抒己意矣栁詩工已到至處微不及杜者杜有古朴之氣直逼陳思耳韓詩意盡言止直率不加雕飾栁詩工緻雖説愁苦亦覺冠裳佩玉各有長處不相下也宋人學問才情有何不及唐人只是詩不及耳唐人亦是風氣適然成一種風調大家傳染遂擅其長宋詩不是别樣不好只是有些呆氣問唐人不呆而宋人呆畢竟有箇緣故曰唐人善用虚無板板説的又宋人喜填故事亦不好問唐人亦用故事曰唐人用故事倒是直説不如宋人搯出那事三兩箇字來用教人費猜三百篇何嘗用故事漢魏間用事都是將其事直叙出來影射用事古未曽有歐詩學韓而筆力不及却於不及處露出自己本色如斑斑林間鳩重讀徂徠集之類但他自己極得意的廬山髙却不見得佳處安在邵康節詩只好是勸世文直頭説盡何不做一篇文字三百篇中如維天之命於穆不已於乎不顯文王之徳之純這樣大頭腦下面却淡淡説何以溢我我其收之駿惠我文王曾孫篤之天生蒸民有物有則這樣大頭腦下却以天監在下轉去了濃濃淡淡不盡其辭長發之詩説契説相土又説湯數百年事一兩段駕過方是詩體詩文全闗氣運都是帝命王荆公學問何必下於栁子厚而詩大不及東坡學問何必下於白樂天而詩亦不及王荆公一生長處在孝友清節故其詩一説到骨肉節槩處儘有精采至論事便隔壁可見此事是發乎性情的東坡詩殊少風韻音節逐句俱填典故亦不是古法朱夀昌事未經人歌咏東坡所作趣味極短且末尾如何引溫嶠潁封人諸事作結殊為不類若老杜為此畢竟有許多纒綿篤厚之情又作周濓溪詩説造化乃其徒甚好後忽云栁州栁愚溪愚雖然以比地方因人而傳然擬人亦非其倫宋潛溪方正學文字如何比得東坡東坡生動有仙氣峰巒波瀾尺幅湧現其詩亦自成一家但没有一二首人不能到之作只是東坡詩就引用許多却不蠟蹋黄山谷便蠟蹋可厭杜工部於君臣兄弟妻子朋友都有詩獨無思親詩何也韓文公亦爾止祭十二郎文有少孤倚兄嫂之説耳朱子上母夀詩述韋齋平生無不詳悉韋齋學問人品迥出人羣朱子作行述止平平叙次伊川為大中作文亦無一語褒揚曰先子之命云爾惟其如此所以可信東坡父子相命直欲凌絶古今至王荆公則竟父子相聖矣如何服人性理中止採朱子詩之有性理字面者其餘好詩俱刪去豈知流連景物止以一二語見性情及寄托全在言外者其詩更妙如芣苢之篇何嘗有一字説到家室和平化行俗美上宋景濓詩比方正學好明諸家詩俱不見佳倒是王姚江有些才氣律詩有六七首古詩亦有二三首只是太直唐人亦有直處却用淡淡寫來盖激昂慷慨全要委曲徊翔出之方有一段幽光如人説話胸中有所感憤傾瀉直吐聼者便覺難耐惟作平淡語雖直直説過倒令人思之覺得有味宋詩單看亦各有好處若選以配唐人便不稱歐王且然無論其他王陽明詩某少時畧皆成誦今看來殊覺淺薄他才髙信筆寫來便有唐人風調但根柢氣格不是鹿太常詩選得百五十首在明季竟成一家有眞氣又一肚皮要立事功勵名節筆寫得出詩亦看得多知道各様變體詩有用如此句法者有用如彼句法者章法體局亦然孫髙陽詩便都是一樣不知變魏孝子學漪百韻詩便段段有變化可見錢受之不知詩選明詩不登二公止選髙陽未為允也王阮亭絶句有似唐人的至古詩須有意思滚出來才好陳澤州律詩時有俊句如送某假歸詩有句云自憐名跡清流外常恐交游汎愛中却是唐句學詩先將十九首之類句句摹倣先教像了到後來自己做出無一㸃不似古人却又指不出是像那一首便成學詩當從韓栁入律詩亦惟二家得正派工部太雄放作詩最忌先得句為韻補綴成之那兩句何嘗不好但讀到那裡便覺得氣不貫意不浹洽先覔句者必非大家無論李杜韓栁即錢劉亦决不如此絶句不要使力要淡逺意在言外古詩却要有氣力詩到形容情事難得逼肖處只得造字然須造得自然令人不覺方妙如生造便不好作詩須要知道避字避句人人皆如此用我便當避口頭邉字當避此題用熟的故事當避又人所作都現成我須避到生新一路去人都在那裏雕刻我須避到現成一路去詩即有作料須有景物思路掩映而成若全無意思只將詞藻鋪排最可厭律詩對句自要工巧切合杜工部送舅詩江上對渭陽水鷁對林烏王荆公女傷悲對季行役俱妙又句法以兩解為更入三昧杜詩叢菊兩開矣而下他日之淚孤舟一繫矣而動故園之心叢菊兩番開出他日之淚孤舟一隻繫住故園之心栁詩壁空矣而殘月曙門掩矣而候蟲秋又壁空那殘月之曙門掩那候蟲之秋前人皆推為妙句有尤工部七言律不甚對偶有撘配不來者曰都撘配得來久已壞了律詩本是陋體古人有嫌字眼太偶儷太現成未免俗氣多避之唐人作詩動呼人名如白也詩無敵之類今若作詩亦呼其名殊覺不必詩之工拙不在此犯大聖大賢諱尤不可孔孟之諱何啻父母如何直呼甚且用以押韻韓文公王荆公皆不免犯此者詩雖佳亦不足錄此即無忌憚之端作詩要好甚難離却古人創闢一蹊徑便不像樣一依古人又如薄酒然漉了又漉有何趣味須是有性情又有學問在詩裡邉工夫又到却不多做觸事乗興方為之斷絶酬應之作或者有些意思時文對偶本是四六體然必定字字工緻便華縟傷雅詩亦如此某檢舊作武侯詩以苦李對甘棠便不佳似此小巧或律詩中偶用耳髙髙士子為望親廬求記曰不如詩好文便著實説那人便要描得那人像説那事便要描得那事出至詩説得離竒飄𣺌些都不妨且詩又不消説盡正是妙處後來人正坐要鋪張反不好每一眞人出便有一假者來磨難他子思之中庸孟子之七篇可謂至當不易矣偏有荀卿一輩人出來為祟即如李杜詩當時便有無數蚍蜉之撼到底敵不過韓文公王荆公等之擁䕶蚍蜉多而勢反寡韓公等如熊羆然勢雖寡而力反過於衆以人心之公是歸之也世有靈異之物多遭劫何况人陳希夷謂种明逸曰名者美器造物所忌子名將成必有鬼物敗之上帝各樣福澤都不吝只惜名虚名無益想是清名直達帝廷李太白所謂安知天漢上白日懸髙名正此名也以上論詩考訂書學是要𦂳事須兼通篆籕方能通楷書之不可通處如之下著心謂之志心之所之也著日謂之時日之所之也今志上作土旹上作山於義何取王荆公不講求制字之根而逐字為之臆解費盡心力徒増笑柄平聲加猛厲則上扯長些則去入聲甚短入聲惟閩中多得其正北人氣硬平聲多成上聲聲音之差不獨口差即耳亦差南陵人知讀作兹兹讀作知閩中教授至其地教他讀知他聼作兹教他讀兹他聽作知愈辨愈不清故知耳亦不同也楊友云天綂聲地綂音聲即韻部東冬江陽之類是也音即字母影喻曉洽之等是也聲可通音必不可通杜韓于此最嚴唐人錯者亦少曰一字有兩聲者如過字治字之類此等至宋始分晰精宻唐人尚不分杜詩魑魅喜人過作平聲解者或謂魑魅寂寞久亦喜人來過或謂魑魅欲啖人故喜人來過攫而食之理皆難通盖言魑魅喜人有過失與上句意方相應古人四聲借用者甚多不足異也等韻三十六母現用止廿四字經世韻又列為四十八行某却分斷得有些明白經世盖就現用廿四字細分出上平下平故四十八四十八則有音無字者皆全矣三十六者去有音無字者十二惟存上平下平之有音有字者耳三説皆是也國書阿厄衣烏於五字妙得聲韻之元毫無勉强小兒墜地頭一聲便是阿稍轉方有厄音再轉方有衣音又轉方有烏音至㑹説話方有於音自喉而舌而齒而撮口而出口次第一些不差五字反覆叠呼便有四萬聲音學五書所少者此耳將來把毛稚黄書及度曲須知擇其精要語附刻於後便成完書至某所就國書推出者則載於某所編樂書之後毛稚黄及度曲須知亦曉得支微齊歌麻魚虞七部之字無頭他部之字皆有頭却不知七部乃聲氣之元别字都是他生的無有生他者如西邀烏是蕭字西是字頭邀是字腹烏是字尾又支乃眞之頭都乃東之頭於乃元之頭韻部自當用此七部居前以生各部他知其無頭却不曉其所以無頭之故故仍舊以東為韻部之首非也歌麻支微齊魚虞收本字之喉音佳灰收衣字蕭肴豪尤收烏字東冬江陽庚青蒸收鼻音眞文元寒刪先收舌抵齶侵覃鹽咸收唇音兒音古所無望道而未之見而古注作如星隕如雨傳曰與雨偕是以如為而而字古盖讀如似日字平聲今山東江淮此音甚多而閩廣則無矣洪武正韻不收兒音近猗氏衛先生於每字母皆増至六字而以兒為舌音非也獨以影字為首則精確不易麻字應為最初之聲諸聲皆由此起前人讀麻為謨窪為汙鴉為烏入歌魚虞韻非也國書先阿字得元聲矣寧人謂易韻亦錯惟詩不錯但如興字以鴥彼飛隼一章論之是在蒸韻至言念君子載寢載興及矢于牧野維予侯興又與音字心字為韻寧人無以解之乃曰興字古兩用又安知易韻之不叶者之非兩用耶昌黎云曾經聖人手議論安敢到其見卓矣三百篇不獨各體俱備即用韻變化法亦俱全如彼譖人者誰適與謀取彼譖人投畀豺虎是以者與虎叶而以中句作過文離騷中亦有用此法處毛大可只見維予侯興等一二處便以為古皆通用盡破從來之藩籬楊升菴韻尤舛其實韻部止應分為六昌黎便如此用國書十二烏珠本之䝉古韻䝉古韻昔人已知其好性理中現載有惜不見元人韻書語可證也十二烏珠内三部是閩廣音半用半不用又三部係滿洲音漢人不用其餘六部正與所分同以此見昌黎不謬也又韻部率以東字為首而國書獨首歌麻等韻率以見字為首而國書獨首影皆超出千古盖歌字從丹田起影字從喉起故也宋人用韻多錯朱子雖古詩亦不出本韻却無破綻今用韻且當以杜韓為宗杜是老規矩韓却變而不失其正杜但通用支微齊佳不敢通用魚虞蕭肴豪尤其實支微之于齊佳與魚虞之于蕭肴豪尤一也如今用韻且復唐人之舊漸次復到古韻方是廣韻分部二冬下有三鍾但二者律詩通用今遂并鍾于冬矣其實尚有宜斟酌者如庚部下有耕有清庚部字宜皆入陽看康字從庚字頭可見耕部宜存本部清部宜入青尤部下有侯有幽尤部字宜入支尤古讀儀侯部宜入魚虞侯古讀乎惟幽部宜存本部韻學不講寧人獨出究心直還三代支不應與魚虞通自漢已誤參同契便是如此魏氏乃上虞人故亦就浙音用之某選詩本欲選他此首因韻錯恐誤人遂置之其詩則屈宋之亞也前人于唇喉齒舌或不差而字之偏旁多不講至寧人却講偏旁故獨有著落杜韓用韻皆精當惟入聲不能如寧人寧人講入聲直千古未有猗氏衛先生論韻與寧人同言侵覃鹽咸是眞文元寒刪先閉口不應東冬等部無閉口故于每韻後作圏以為有音無字皆存其位其實侵覃鹽咸四部何嘗無别部閉口在内如侵雖是真文之閉口亦是庚青蒸之閉口若此之類不須補潘次耕若肯將其師所著音學五書撮總纂訂令精當豈不大快他却自出意見欲駕亭林之上倒弄出破綻來他將自己土音影響意揣便欲武斷從來相傳之緒言豈可乎先生文孫清植鋟先生語錄三十卷五月竣工寄樣本來且叙纂記之功推用錫為多發篋讀之悵嵗月之已晚喜意義之如新當今日文教鼎盛之㑹此書將以垂世而行逺自念文行不立得挂名簡端以免君子没世之疾用為寵榮然當記錄時非意所及也凡人著述有名之心類隱隱欲自見己意抑或用功久有所得力熟處不覺流露子朱子謂伊川語上蔡記者便似謝定夫記者便似遊伊川無恙時尹和靖以朱光庭記語進伊川謂之曰茍不得某之心所記者徒彼意耳某在何用讀此書憶用錫年踰三十尚陋至學明季時文以為工於理道一無知識苦甚面牆嵗甲戌宗潢容安公招為塾師至都門獲交徳州孫檢討勷實介予從先生遊先生以氣靜見器許備門牆灑掃之役嗣是而督學畿輔旋改廵撫雖行役多得侍側洎入閣留課孫植句讀先生居官精敏絶人於職事鉅細不遺凡所興除率因時隨事順其機緒張㢮不外形而究多所裨補至談道講藝殆無虚日英賢環座各有質請盖先生於經書儒先要義讀之熟思之近辨之明得之深加以養之粹辭之達領受之下無一不冰解的破洞徹心脾如瞽目之刮障瞙餓夫之飫芻豢驚喜愛重汲汲退而錄之恐少遺忘差舛如失異寶當是時已原無所見况雖欲參以私意而不暇名心何由入之先生乙未假歸用錫繙閲寫稿富溢嚢箱稍檢去冗複覔鈔胥清謄比先生還朝稱完帙矣每讀先生纂程子遺書朱子語類歎其精要尋玩此編雖用錫所錄不及師友條記之妙但義理所歸似由子朱子以上泝周程於其微詞奥㫖實深有發明私念歸去擇家庭鄉黨子弟有志力者以此開其聰明正其趨向又懼用錫學識淺闇或謬於先生之大指因以誤人為先生病則莫贖之罪也戊戌將出都徑以清稿呈閲間一二日先生招餞喜動顔色迎謂曰子所記誠佳前年歸舟著講義竟遺去不患人之不已知章疑尹氏注一條幸為我載之想集中類此者尚有得余為子汰存十之五六似竟為可存之書遂慨然以無暇自歎今先生曵杖後已十六年海内學者頗知景嚮天地久長賢哲相望必有如先生其人者出而纂先生之書以遂先生之志而用錫惓惓不忘先生奬許此書數語者匪僅以不至如伊川之訶光庭為幸亦緣此恃知大指庶㡬不謬於先生諗今之讀是書者信先生因之不疑愚陋而生眩瞀或並累及他友之所聞故為書其後雍正癸丑立秋日下相受業徐用錫榕村語錄卷三十

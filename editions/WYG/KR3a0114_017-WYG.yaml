body:
  text: 榕村語錄卷十七大學士李光地撰春秋三晉人之執宋仲幾傳稱歸於京師未嘗不歸於王也不請專執故雖歸王不書耳自記年定公元凡盟必日之拔之盟不日而且不月又夫子當時之事非遺失也無亦非魯以大夫盟邾君故去月日以見慢歟厥後句繹則如常書自記年定公三臯鼬之盟不日亦當時事非遺失也著衆志已渙散怠於禮而畧於事矣自記年定公四許于夷葉白羽容城凡四遷皆楚令也如是則許幾爲楚邑矣前侵楚之役臯鼬之盟猶有許男何哉此時楚以吳故頗不暇於諸侯許雖遷白羽猶不敢違中國之徵召故楚又遷之以自近歟自記年定公四劉卷之卒赴不以日也其卒前乎此矣若是此月卒來赴往㑹周魯之間其事不應同在一月自記年定公四柏舉之戰言救則美在吳言以則自强雪恥其美在蔡自記年定公四歸粟於蔡穀梁子曰不言歸之者專辭也義通也然則城楚丘戍虎牢亦豈義通乎蓋皆公辭也春秋所深與也事無逺邇惟其公而已功邇而德逺矣自記五定公年於越入吳于是楚以秦師敗吳皆不書非楚不告也直春秋畧之耳蓋吳之可貶在于入郢之日而不在敗也自記年定公五鹹之盟不日不月我不在焉故畧之沙之盟同沙瑣古蓋同音自記年定公七以暨齊平及齊平兩處事實攷之曁齊平之後我往涖盟而齊人不報使及齊平之後兩君好㑹而且來返侵田則曁爲强彼而及乃彼我同欲明也汲汲者彼此俱汲汲也曁曁者彼此俱曁曁也非以一人言也辰出奔時佗彄蓋爲所牽率也故曰暨其旣則同惡其謀彼此欲之矣故及其入蕭則書及自記年定公十以時卒時葬者赴既簡畧㑹亦如之葬薛襄公是也自記十定公二年告至則致成特境内私邑而且無功豈亦告至乎蓋時夫子相魯君行必告至不以近而畧其禮叔孫武叔之毁疑即在此時蓋讒毁而欲去之非特無故譏笑也叔孫毁于内孟孫據邑阻兵于外僅一李桓子信之故孟子公羊子皆有行焉之言及其受女樂而無禮于聖人夫子雖欲不去而不可矣自記二定公十年蛇淵之築比蒲之蒐皆夫子去魯後事自記三定公十年十三年春魯有事于郊膰肉不至夫子去魯矣至十四年而無冬蓋傷王道之不成也則曷不於十三年去冬曰其春夫子猶在魯也故于此年去之王道無成而不終不猶之天之嵗功不究者乎自記四定公十年孔子去魯子貢實從而邾子來朝子貢有觀焉之事則知夫子在行弟子蓋往來其間自記五定公十年以八月庚辰朔推之則葬定姒之日不應在九月以爲閏九月則明年四月又有辛巳也蓋實閏九月也辛巳爲閏月之朏計大小盡明年四月二十八日下辛也自記五定公十年哀公元年楚入蔡而僅書圍吳滅越而削不書或曰不告也或曰皆報君父之讐故也自記年哀公元伐晉之役以傳考之我師及鮮虞在焉不書諱也春秋何厚于晉百餘年來冠蓋相望于宗周猶有臣節者晉耳春秋之外楚爲僭王也内晉爲尊周也自記元哀公年晉趙鞅帥師納衛世子蒯瞶于戚罪瞶也齊國夏衛石曼姑帥師圍戚罪輒也圍宋彭城者主晉之辭也善晉義也圍戚者主衛之辭也誅衛志也晉義善則華元無惡矣衛志惡則齊夏無善矣自記年哀公三魯之桓僖晉之文武蓋皆竊附于祖功宗德之義者自記三哀公年稱人以執諸侯而諸侯不名而爵皆下執上之詞深惡執之者也晉人執虞公其盛也執戎蠻子其衰也而皆大惡故以上下之詞書之自記年哀公四荼與奚齊同而不曰君之子何也曰君之子者不與奚齊之爲君也謂其殺世子而立之也景公者羣公子耳非申生奚齊類也自記年哀公六歸邾子於後則不諱獲于前正如歸濟西讙闡於後則不諱取於前也自記年哀公七宋滅曹也而以入書先儒以爲罪曹誤矣春秋于諸夏之邦言滅者邢陳蔡許是也不言滅者紀虞虢曹是也紀與虞虢先儒以爲猶存其祀安知宋之不存曹祀乎戰國之時猶有曹交也自記年哀公八吳不挾陳以叛楚何用救哉陳之禍吳爲之也救庸足多乎此與楚救鄭一耳蓋争諸侯非救也季子自言之矣文定未免穿鑿自記年哀公十凡侵伐之類多書時而已如國書伐我之事爲夫子歸國之年非不詳其月日可知下伐齊則書月者例凡戰必日不可下有日而上無月也自記一哀公十年艾陵之戰大㨗魯必告至無疑矣而經不致者非削也是時夫子在魯君卿有事必咨焉子貢冉有之徒時有論建蓋雖不能遏㑹吳之役猶能使知㑹吳殘與國之不足榮於廟也而不告歟故傳稱季孫勝而懼自記一哀公十年甸甲不足而丘之丘賦不足而田之傳紀季孫使冉有訪于仲尼而夫子之言曰行度于禮施取于厚事舉其中斂從其薄如此則丘亦足矣若不度于禮而貪冒無厭雖以田賦將又不足季氏卒不聽蓋冉子與其謀也鳴鼓之攻其此時歟自記二哀公十年先生常舉耜卿云孟子卒襍記明明説夫人之不命于天子自魯昭公始也可見春秋據實書而紛紛以爲貶以爲諱皆未必然近是哀公十二年春者嵗始也麟者仁獸也于嵗始而仁獸來遊至仁之應也春秋不書秋冬者累累而此年又止于春春或書王或不書王而此年止書時蓋氣序雖有亂時而生生之心長在王道雖不行而天之所以爲天萬古不可變也自記四哀公十年五石六鷁都特書甲子如何春秋以獲麟終篇却止書春又不是逺年之事豈難咨問而得之此不得謂之無意矣或者夫子以此開萬世之太平所以春秋一書始于春終于春也公羊傳人都笑其在年月日時上穿鑿恐怕他有傳受下來哀公十四年春秋周三家左氏公羊穀梁唐三家啖助趙匡陸淳宋三家孫明復胡安國張洽注疏周禮第一大全春秋第一以下論三傳治春秋者某嘗謂宋三家不如唐三家唐三家不如漢三家漢三家不如周三家其實左公穀好而穀梁尤好或云杜注不免太疏畧曰且寛寛的説在那裏好穿鑿就不是如滕降而書子程子謂是因其後服屬于楚豈有因子孫服屬于楚而先貶其祖宗之理且終春秋不見滕有服屬于楚之事蓋因孟子滕小國也間于齊楚而誤耳文定不安于程子之説又謂其首朝弑君之賊不想春秋中弑君之賊尚不貶其爵而貶朝弑君者有是理乎且貶止其身可矣因這一朝遂終春秋而不復何也朱子又不安其説而從程沙隨謂當時小國之君因霸主㑹盟征伐供億不來故自貶其爵但滕降子時㑹盟之事尚未多有況隱十一年滕薛來朝方自崛强争長豈有逾年而即甘自貶之理惟杜元凱寛寛一句説爲周所貶原是胡文定見程子不從他便駁云如周尚能削人之爵則春秋可以不作矣夫吳楚之僭齊晉之横天子不能問而所貶者惟滕薛把諸小國此春秋所以作也如門祚衰薄之家紀綱之僕尾大不掉惟汲㸑下役朝笞而夕搒之適足以啟輕侮而已且把及邾或貶或封當時皆請之天子何獨于滕而不能削降耶載書曰無有封而不告旣有封即有貶矣至春秋之後晉之三卿尚不敢自爲諸侯故綱目書曰初命晉大夫魏斯趙籍韓䖍爲諸侯何春秋之初而不能貶滕耶如不書即位穀梁所云至精曰書即位正也不書卽位故也繼故而書即位與聞乎故也卽位是朝見于廟有許多事世次相及自然行正禮若有簒弑不正之故則先君不正其終世子焉得行吉禮有故而又書卽位是即位之人亦與乎變故之謀故意欲掩飾其同謀之罪反行吉禮若不知然者此却終春秋都是如此先儒又都不從另出一箇論頭及難通又變一箇義例都不是程子謂公穀次于左氏今觀公穀儘有好處須如朱子之論方平自記左氏非丘明也左氏若是孔子同時如何所紀六卿分晉已是孔子卒後事古者左史記言或者以官爲氏耶蓋因傳春秋而附以己之見聞胡文定于春秋時事不見于經者明知道是不經赴告夫子無從而書又時自忘却説此事左傳有之經何故不書倒似左傳即魯之春秋原本爲夫子所據以脩者此最有關係左傳不可不讀其中有許多三代典禮及二百四十年事蹟又文章古雅不讀覺得看經益無依傍國語一書是左傳未經剪裁鍜錬者想從列國隨便採來其中如吳越逈與他國不同唯魯周差近齊一味誇大晉如今日劇演一般塗飾㸃綴左傳則貫串鍜錬文采斐然韓氏評以浮夸亦確不過孛入北斗左氏叔服曰不出七年宋齊晉之君皆將死亂宋上公齊晉侯伯皆應北斗之象爲天紀綱也七者斗之數自記四文公十年侵鄭之役盾不與楚遇而汲汲于還蓋君臣之際疑貳形矣盾憂内變之將作而志不存乎諸侯焉耳自記宣公三年㸃線靣體事事離不得從此㸃到彼㸃便成線將此線規而圓之便是圓四折便是方三折便是三角都成靣將此面積厚便成體體成則天下之象數備矣左傳物生而後有象象而後有滋滋而後有數象即是㸃滋即包線面體滋字妙生生不窮鄢陵之筮似是遇復之明夷其繇曰明夷于南狩得其大首離南方也又爲目爲戈兵離明見傷故曰射其元中厥目而南國䠞也傳聞不詳故史失之耳自記成公十六年襄之十四年距夫子生時尚九年而伯玉夫子友也柰何此便從大夫與聞國事乎據傳崔杼壽亦太多俱有未可據者自記四襄公十年伐陳之役子産不敢深言陳即楚之罪者鄭亦即楚故也與齊不敢問楚人僭號滅國同意王道無諸已而非諸人春秋諸侯首尾横決爲辭令以相諼而已雖有敬仲子産何所措喙焉自記五襄公二十年季札觀樂前面都是歌某歌某後面乃言舞某舞某蓋魯備六代宮懸止存舞耳故韶箾亦言舞夫子至齊始聞韶音所以韓文公以三月爲音字之誤自記十襄公二九年史趙言亥有二首六身下二如身是其日數蓋今算馬六作亥字下有三而上乃二字下其二字于旁則爲亦算馬也自記買朱鉏密州兩字切音也莒夷也語譯而通自記十襄公三一年郯子來朝時夫子年二十七魯禮樂已盡學矣而又好問好察以廣其智又兩年遂適周而窮文武之道自記十昭公七年左氏于昭二十二年十二月有庚戌是月癸酉朔烏得有庚戌乎自記二昭公二十年公羊傳自内出者無匹不行自外至者無主不止自内出似以祖言匹者匹配之匹祖妣是也自外至似以神祗言主者賔主之主天祖是也自記年宣公二敬嬴公羊作頃熊音之訛也自記年宣公八胡傳誤以叔弓爲叔孫氏叔弓蓋公弟叔肸之孫自記昭公十年大全惟春秋最好永樂命儒臣纂集四書五經性理大全只限七箇月俱成故當時只得將現成本子畧加改換春秋是用歙人汪克寛所纂原有條理所以好某平生于易經外一部書不敢動手大凡著書有一字不安便不好朱子不敢注春秋便是爲此其大綱如何不知不知如何作綱目只是零碎處不曽透曉得孝經程朱提出學庸語孟直是功蔽天壤只少一部孝經孝經道理好到至處朱子疑其有左傳語雖未知其言之先後總當以道理爲主聖賢著書都是提尖如大學一書欲成天下之人才同天下之風俗非此不可子思時已有邪説異端如講老莊刑名之類子思見得天下道理平平實實高者空虚得不是低者又淺俗得不是只是中庸二字切近精實故作此書至孝經亦是提出大道理的要領來説天下道理只是仁義義又出於仁義不是氷冷的仁心之有節制處便是義道理説到仁已頂尖了只是囫圇説箇仁難道墨子兼愛亦算做仁佛家慈悲亦算做仁仁之道却要從孝做起親親而仁民仁民而愛物極其至通于神明光于四海五性缺一不可單拈别的還有病只是孔子説仁斷無流弊仁包四德是我生最初所得的道理然猶恐其泛也孝經又專説一孝字更妙前人多説孝經文字淺易不知聖人説話原不要深只此已足世上有一種鄉人止知愛敬其父兄而惡人慢人又一種好虚名者外事結納而内薄骨肉更是無根由惡人慢人一種便有楊子爲我一種學問由不愛親不敬親一種便有墨子兼愛一種學問異端不過此二事孝經儘是精密此書縱不是夫子自作必是曽子之徒所記生吾者父由父而祖而曽而高而始祖以及始祖所自出非天地而何非天地與吾爲一體而何所以太極圖下二圏一箇是天地生人一箇是父母生人父母人之小天地也吾有一事自覺得好不必問定知父母喜之祖宗喜之卽天地亦是喜的我有此身父母之心在我天地祖宗之心亦在我是以呼吸相通問祖宗年代既逺未知尚有䰟魄否至天地却舉目可見是現在的祖宗曰祖宗魂魄原在天地有我他便未亡我盛他亦盛我衰他亦衰孝弟之至通于神明光于四海道理不到此原未完備孝道不到愛盡天下人亦不算完得孝道中庸由子臣弟友説到鬼神之德大孝達孝直到郊社禘嘗説得實實精到如今説微之顯都説屈實有屈之理伸實有伸之理纒來纒去都是皮膚語誠即理也如心有愧怍靣便發赤人都知其慚恧心中快活便有喜悦之色人都知其得意此何以故其羞愧者必是理上打不過其喜悦者必是理上做得順也我們誠心果到祈禱便應以我有此心彼亦有此心故相感若一有而一無如何能感何以能感此心有此實理也理便是性性與祖宗天地鬼神一也有此理便有此氣便有此象如何掩得往日看中庸此章殊如贅疣今見得如無此章前靣位育後面不顯其德都無著落人知此理便見得暗室屋漏刻刻有神明臨之自已知得念頭不好便是鬼神察你自已覺得此事無愧便是鬼神許你到得暗室屋漏不欺神明尚敢欺天下之人而凌虐之乎故曰治國如視諸掌問不知當日賈誼與漢文帝説鬼神是如何曰必説不到此此理到宋儒纔説得明白程朱大叚與孔孟若合符節所謂先聖後聖其揆一也若微文碎義安能處處都不差若使不差伊川何以亦有不依明道處朱子何以亦有不依二程處蓋主於發明道理不爲人也即朱子于四書注至埀絶猶改可見他亦不以自已所見爲一定不移何況于人朱子疑孝經某便不敢從孝經所説道理實在完全説孝爲至德要道下文德之本也教之所由生也即解説至德要道五常之性德也禮信義智皆統于仁而仁之最篤處莫過于孝這箇根剪不斷的極殘賊兇暴之人説到他父母未有不關心者所以爲德之本惟其爲本故謂之至德五達道所以爲教知愛父母自然愛兄弟因是長㓜有序便見得上下尊卑之分宗祧繼嗣之大四者必頼朋友講明聯絡教都由此而生所以爲要道世上原有只知自已父母當愛敬而不知别人父母亦當愛敬又有一種人不愛敬自已父母轉交結别人孝經云愛親者不敢惡于人敬親者不敢慢於人又倒説回來不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮不愛敬别人父母似無與于己之孝不知不能及人便是自己的不足詩云孝子不匱不匱是取之不窮用之不竭也若惡慢于人畢竟自己之孝有限程朱極推西銘不知却從孝經脱出如云事父孝故事天明事母孝故事地察是乾坤大父母也通于神明即窮神達化以繼志述事也光于四海即民胞物與也又易言天地之心天地之情不有性心情何從而見惟孝經云天地之性是最大頭腦他書都未言及又孝經書名便好是道德頂尖處故以爲經經非孔子自命也以其爲孔子所言而人稱之爲經至云吾志在春秋行在孝經自稱孝經則不可信矣書名如易字洪範範字大學中庸皆妙若忠經便不是忠已包在孝内前儒謂西銘乃原道宗祖吾謂孝經又西銘宗祖西銘言人皆知孝父母而不知孝天地其實如此等去孝天地就如此等去孝父母還是比例相同的意思若孝經則即此便是事父孝故事天明事母孝故事地察直上直下一以貫之孝經只是推將去收將來初由敬愛父母而推之欲其盡敬愛天下之人終必盡敬愛天下之人而後爲敬愛吾父母之盡如人家在一鄉一邑雖在家中無失意於父母茍得罪于鄉邑令人辱及父母便是自已有以致之即爲不敬愛其父母矣若人人皆敬愛其子因而歸美於親咸曰某人生此賢嗣即是以衆人之敬愛敬愛其父母矣至合萬國之歡心以事其先王亦是此意所謂一朝之忿亡其身以及其親好勇鬬狠以危父母皆是此叚話頭的反面此書開口説至德要道下文夫孝德之本也即是解至德仁義禮智皆德也然元者善之長仁以親親爲大仁之實事親是也豈非至德乎教之所由生也即是解要道司徒五教父子君臣夫婦昆弟朋友何莫非道然有父子然後有君臣有君臣然後有上下假如父子不立他教何從而有故曰教所由生豈非要道乎中庸曰脩道以仁親親爲大孟子曰事親事之本也亦有此意然無用此意衍成全書者此書是生人之本如何可少朱子疑其中有左傳語然安知非左氏用孝經耶如元者善之長數語左氏亦有之可云易經襲左傳乎此書道理至足不當于語言文字間疑之天地之性人爲貴貴其能盡人道也蜂蟻之君臣雎鳩之有别就其一節雖人有所不及然而不貴者所賦止此不能推之而盡其道若夫婦之知能似與禽獸不能大段差别然却限量他不得一旦要做聖賢便能做你却禁捺他不下白額虎入市傷三數人羣起而噪之以為罪大惡極人殺百虎曽不以為非人于此要猛省自已貴重在何處榕村語錄卷十七

body:
  text: 榕村語録卷八大學士李光地撰中庸二性教兩字分明即是首章性教注所以分别聖賢兩等葢性即天道教即人道而聖人則能盡其性賢人則由教而入也然就一人論之尊徳性而道問學誠而明也擇善而固執之明而誠也是自誠明自明誠之理自在也但人人皆須從性上做工夫而聖人則合下所性完具聖人亦就學而愈明然教却是為中人設故講此節者須於性教分際看得分明而帶出聖賢之等來則與上章言天道人道而繼以安勉之意思同其説並行而不悖矣若竟將性教兩字便作聖賢名號則大失經意自記自唯天下至誠至純亦不已是一叚自大哉聖人之道至天地之所以為大也是一段惟天下至誠節説至誠致曲及前知節是學至誠説誠至此已完下面是解上面底誠者自成至誠之為貴是申盡其性誠者非自成已節是申盡人物之性至誠無息至悠久所以成物也是申贊化育博厚配地節是申與天地參不見而章節是申唯天下至誠為能化以下是説天人合一而以文王結之大哉聖人之道至至道不凝説聖人是對唯天下至誠節尊德性節對致曲節居上不驕節對前知節是學聖人愚而好自用至不信民弗從是申待其人而後行其人要得德位兼隆方能修德凝道夲諸身照尊德性徴諸庶民以下照道問學此節及知天知人節是申尊德性道問學節世道世法世則及有譽節是申居上不驕節言其不止于保身而且為萬世法以下亦是説天人合一而以孔子終之文王非不足於道以其未及制作明備天德極純故以德言孔子豈不足于德而詩書禮樂易象春秋道于是備故以道言至誠盡性一章以下朱子分天道人道都是硬派不甚貼合致曲節言至誠可學而至但用功到得能誠便形著明動變化可與至誠一般前知節何以見得是言天道國家將興將亡難道大賢以下便不能知道所引執玉高卑其容俯仰初非聖人事也誠者自成章言天下道理尚多如何至誠便能盡性以誠者人之所以自成而道者人之所當自行也人無實心便不成其為人有實心則道自行如實心孝自事親盡其道實心忠自事君盡其道可見惟至誠為能盡其性誠者物之所以成始而成終不誠物都無了如無實心孝便無事親之事無實心忠便無事君之事雖有亦具文而已所以君子誠之為貴也至誠能盡其性何以便能盡人物之性誠者非自成己而已也所以成物也此物字兼人物説成已非他即吾之仁吾心之不能自己者非仁而何成物非他即吾之智將吾心一照便知物亦如此如己欲孝即知人亦欲孝己欲弟即知人亦欲弟言舉斯心加諸彼而已仁與智皆吾性之所自有也内而已外而物若是兩様便照不見推不行惟照之便見推之便行故成已與成物是合外内之道時措者言措之人而宜措之物而亦宜不可説措之己巳不可以措言所以至誠能盡其性便能盡人物之性者以此至誠無息以下是解贊化育參天地至誠亦人耳如何便能贊能參葢至誠便無息君子如不息則能久久則未有不徴徴則未有不悠逺博厚高明者化育之及物以其覆物載物成物耳而至誠之博厚高明悠久即所以覆物載物成物也豈不可以贊化育乎博厚地也至誠之博厚配之高明天也至誠之高明配之悠久天地之無疆也至誠之悠久配之豈不與天地竝立為三乎致曲有誠者能形能著能明至誠則不見而章致曲有誠者能動能變至誠則不動而變致曲有誠者至于能化至誠則無為而成言誠至此盡矣以下乃言天地雖大亦只是一誠不貳者誠也不已者亦誠也天是如此文王亦是如此可見至誠便能贊化育參天地説誠都是説性故以盡性説起至盡人物之性參贊化育都是一片懇惻就與萬物一體上説形著動變亦是就德性上説自成注云物之所以自成物是君臣父子之類即是道字莫認做萬物之物無此實心則君臣父子皆虛位尚何仁敬孝慈之足云物之終始物字亦然無誠心即無道故曰無物非自成已節發明盡人物之性仁知皆歸之性故曰性之德合外内之道載物覆物成物只是説心之及人至實在行事都在下叚故下叚三百三千議禮制度考文祖述憲章上律下襲有許多事朱子説道理都要完全至誠盡性章便將知明處當都説了某意只當且就夲體上説人性皆善竟有私意蔽錮至視父母兄弟如陌路者此豈無人性只是不盡其性耳至誠不忍人之心充滿于中不能自解纒綿悱惻無絲毫隔閡老吾老㓜吾㓜所謂成已之仁也我如此知道人亦如此竝知道物亦如此親親而仁民仁民而愛物所謂成物之智也皆性之德也故盡其性便盡人物之性至誠數章且只如此説所謂肫肫其仁淵淵其淵浩浩其天者至知明處當意湏到大哉聖人之道一叚方説纔各安其部位論茂對時育萬物則化育是人物之根論盡性則由吾性以盡人物之性由盡人物之性以贊天地之化育是一路透上去致曲有誠對至誠形著明對性之盡動變化對人物之性盡自記以前知節為申贊化育參天地之義極有實際蓋自盡性盡人盡物以至贊化參天節節皆有夲分實事理雖一而分則殊不可一滚混説自記前知原是吾儒事只是知其理不是知其事如久隂必晴久晴必隂這是理知道某日有雨某時有風這是事事如隔壁人説話如何聽得見所以佛家説在屋裏能知屋外事便是野狐禪陸子靜答陶贊仲書最高明五經四書所説天命指後天的多都説是作善降祥作不善降殃不肯説吉㓙禍福有一定的命未來之事豈惟聖人不知連天地亦有不知處到那時候氣數所積不得不如此方有這事出來孔子五十知天命難道自五十以往孔子便知道夀止七十三嵗一生不遇所云道之不行已知之者只是見氣運壓得極重難返約畧其理數如此豈如世俗所云前知哉所以向日有客問前知某説是知其理不是知其事知其理不妨知其事天地鬼神一定不喜客愕然曰何故不喜某云如某與公相交知道你性情如此行事如此這都不妨若你家見某客説某話我都知道豈不是打探你家隂私你豈有不怒之理况知其理雖只得大槩其實倒確知其事者必不盡確如亂久必治自是一定道理若説隋之後參井之墟眞人出焉必定是唐太宗後漢之末梁沛之間英雄出焉必定是曹操這便可惡聖人於該知道的知道箇透於不該知道的便留却一邊黒暗這便是他知道到盡處至誠之道可以前知朱子説幾動於彼誠動於此鄭康成言天不欺至誠朱子説乃鄭説之根嘗疑禎祥妖孽人皆看見何消至誠始能前知葢至誠不欺天天亦不欺至誠確是如此但看人有為鬼神所簸弄者吉不必吉㓙不必㓙如龜卜所以紹天明也至我龜既厭不我告猶豈不是天亦欺之乎鄭説甚有味朱子以誠則生明講前知道理極精但與下祥孽蓍龜等句不甚𦂳對既誠而生明又何湏説到祥孽蓍龜之等耶倒是鄭康成粗粗的觧一句甚好言天不欺至誠也幾兆容有不騐者只是為鬼神所戱弄惟至誠不欺天故天亦不欺至誠不欺二字即從至誠看出不待推説到生明上去問前知曰以一定至理前知者是聖賢正經道理外此有二種曰數曰神數者以萬事萬物不外隂陽五行算到精細便能得之神者如人做事必心先盤算心知則鬼神亦知彼能靜一與神明通故知之問亦有其人未生而已預知某年某處生某人行某事者竝無動念之人鬼神何由知之曰亦不外推算隂陽五行而得之又有一説凡人於沒要𦂳事隨時應付如事有闗係便形不曾動而心先盤算推之天地亦然天地於有闗係人雖未生時必先加盤算既有盤算其象便見誠者自成即天命之性道自道即率性之道人有仁義禮智之性而後成其為人因有仁而有父子之親因有義而有君臣之義因有禮而有賔主之恭因有智而有賢否之别率性謂道豈非自道乎誠即實理道即實事誠者物之終始如要做到大舜田地必是實心要孝纔能有終若中間有不誠處雖有其事一若無事如心不在焉視而不見此時豈可謂有視是故君子誠之為貴此處總重自成即誠之為貴可見注中道行于彼夲在言外胡雲峯强作觧事以為誠者物之終始即自成不誠無物君子誠之為貴即自道甚為割裂䝉混誠者非自成己而已聖人説盡已性便説盡物性説修己便説安人説明德便説新民已物無二道也在已一團實理實心故曰仁以我推人曉然見得同一好惡同一事理故曰智仁智皆性之德不是假合與生俱全故曰自成是道也内而成已即外而成物舉斯加彼不間物我故曰合外内之道以時措之而皆得其宜自古賢説話多説人事從隂陽造化説來者惟濓溪太極圖説為然朱子説誠者物之所以自成是從頭上説一句教人知夲源其實誠者自成就是説心誠者之誠就當性字説非仁義禮智何以成其為人有此孝之實心而後成其為人子有此弟之實心而後成其為人弟而日用間孝弟之所當行者如奉養如友恭皆職分之所當自盡也誠者物之終始物者事也有此誠心自始至終方能有成如實存孝心自孺慕以至五十而慕方成為孝子若知好色則慕少艾有妻子則慕妻子仕則慕君雖外面未嘗廢孝養之事其實只如無有所以要一事之成必湏誠意周流到底要終身成一箇人尤湏誠意周流到底雖實心未嘗不是實理但説實理泛些説實心便切實上節平説故次節側到誠上非實心無以行此道故云人之心能無不實乃為有以自成而道之在我者亦無不行矣成已成物無非誠心周流即無息也下章故字正接此章朱子分章似未穏從無有以故字作起頭者誠者自成非指自然者説便有當誠的意思在蓋必有實心而後道可行必有以自成而後有以自道也第二節便是解明此意故結云君子誠之為貴第二節兩物字便當事字㸔誠者物之終始不誠無物正見心為事之根誠為道之夲也講家多失經理注意自記誠者自成性分所固有也道自道職分所當為也惟能完其性分之所固有斯能盡其職分之所當為矣何也萬物萬事皆誠為之終始若人無誠心則應事接物皆虛可見非誠則無道而君子必以誠為貴也此章自𢎞正以前先輩亦説不透大抵誤於大全之説虛齋紫峯説得極好自記誠立于己則道行于已誠及于物則道亦行于彼道行于己則已成矣道行于彼則物成矣成已由誠立于已是仁之常存也仁即誠也成物由誠及于物是智之善推也知即誠之明也仁智皆不離乎誠而為性之德則是合已與物而為一道矣自記誠便是實理實理便是性以其盡性而謂之仁以其推而通之人物而謂之智性之仁體于己則道行于己巳之所以成也性之智體于物則道亦行于物物之所以成也已為内物為外仁智之德既皆性之德則成已成物之道豈非合外内之道乎自記誠是實理仁是生理一團實理渾然實有于内是謂仁以成已前章惟天下至誠為能盡其性是也人物之生此心此理同也舉斯心而加諸彼是謂知以成物前章能盡其性則能盡人之性盡物之性是也自記性之德也人都理會不明白皆因成物智也一句就先解得不是試思性中如何有成物來當其自成便照見物之自成與我一般物之宜成與我一般這便是智仁智是性之德成已成物是合外内之道向以而道道字指職分之所當為合外内之道道字作虚字説今思之不必爾兩道字俱是指職分之所當為性之德不可説仁智是性的德如此則性是箇空的了仁智即性德也仁者誠之全體智即仁之明亮處我自己純然仁敬孝慈信自了然見得人亦如此由我推彼一絲不差由人推物亦一絲不差知之既明舉心加彼自能使他有以全其天以天下無性外之物故也此性之德合外内之道也時措句全指道説大槩成已成物有三層天地亦然為物不貳是一層博厚高明悠久是一層物生不測是一層至誠無息是一層徴則悠遠博厚高明是一層功用及于民物是一層五經中直捜天地之根以立言者極少惟為物不貳是搜根説即天命之性猶藏著頭天必有性而後有命其為物不貳於穆不已是天地之性也上文説至誠載物覆物成物至不動而變無為而成是生物不測之意至誠之功用如此况所配之天地豈可盡乎不知天地之道亦可一言而盡曰其為物不貳而已不貳則不息若今日如此而明日息便是貳了故章句于無息云既無虛假補不貳也于不貳云誠故不息補不息也其實是一箇此天地之道是就夲體説下天地之道是就發見説生物不測如此皆天為之然非天之所以為天也惟於穆不已乃是天之所以為天聖人亦然口氣是如此中庸言天地之道直至為物不貳纔説到所以然處不貳非他即一團生理純粹至善處兼無虚假無間斷兩意一横一直説此道字與下節道字有别此道字如未發之中天命之性下道字如已發之和率性之道問一言而盡單指為物不貳還是連下句曰單指上句問則字口氣似二句相連曰自生物言之萬有不齊似説不盡而其道不過不貳便能生物不測口氣是如此生物之前却有博厚高明悠久一層包在内不貳言天地之道博厚高明悠久又言天地之道葢不貳者性之夲體博厚高明悠久者性之發用又六箇也字是遥應上文至誠之博厚高明悠久自記講家將昭昭撮土等都説作剰語甚不妥言自此觀之是如此及其無窮亦是如此若不同便是貳便是息猶之説聖人就小處觀之是如此大處亦是如此一日見得如此終身亦是如此以此見得不貳不息之所發下文純字就是此意注中非由積累而然句似不必如此下語以水觀之洪河之流何等汪洋浩瀚其發源於星宿也一勺耳漸流漸大放乎四海但不得呆説天地聖人是積累而成耳載華嶽二句言盛大也萬物載焉始言生物純即不貳不已即無息上文以無息言誠結處却以不已言天上文以不貳言天結處却以純言文王都成語妙清植問洋洋優優二節粘聖人説不粘聖人説曰明季有粘聖人説者謂發育峻極是聖人為之禮儀威儀亦是聖人制之朱子却只説是道如此此章朱子以洋洋為道之體優優為道之用尊德性照洋洋節道問學照優優節但發育峻極算不得體與無聲無臭不同二節亦分不得大小只好分天人説德是誠心實意道即上洋洋優優之道無其人道不虗行無此德道何由凝下面尊德性是修德道問學是凝道茍不至德節即是起尊德性而道問學如今説尊德性道問學通是修徳凝道之事未免含糊問以禮儀威儀觀之粘聖人説方是曰經緯萬端皆是道之流行故曰天秩天敘不然發育峻極亦可以粘聖人茂對時育萬物非發育乎格于上下非峻極乎只是説得畧費力問如何是峻極于天曰蟠天際地塞滿虗空皆是此道發育以形言峻極以氣言自盡性至無息章皆言誠所以發明首章致中以立大夲之意自大哉聖人之道至仲尼章皆言道所以發明首章致和而行逹道之意然盡道却離不得根夲故論至道必扯著至德言道問學必扯著尊德性故曰修道以仁此夲末相資内外交養方為聖學之全其以尊德性照洋洋道問學照優優者覺得不合發育峻極皆道之發見于外者與德性何干致廣大極高明不可講入克己躬行意而解者往往犯之注云已知已能而解者必改為良知良能克己躬行非尊德性事而不之疑已知已能是德性事而又不之信此膚末者之弊也自記雖説不以一毫私欲自累却與克去己私話頭不同蓋尊德性是存心之事只好説到立志居敬處若窮理力行乃學問之功也自記只因近學不敢認外面許多為德性此門户所以分也彼為陸王之學者無論矣三百年確守程朱而于温故崇禮二句講章制義必曰良知良能不敢用章句已知已能語何哉自記尊德性只是提醒此心道問學便有許多事今人説致廣大極高明皆説向事上去不知心體夲是廣大高明只大叚提撕便是致便是極何嘗有省察克治的意思至温故敦厚注中分明言已知已能今人必言良知良能上二句全不顧德性下却又太照顧了凡學而知能者雖由學問中來然得諸已便是德性如人生下的血氣固是父母的然後來飲食養成的難道遂與父母不相干問私欲自累是指著耳目口鼻之私私意自蔽是指著甚麽曰指著隔形骸分爾我廣大是對狹隘之心説高明是對卑汚之心説自記尊德性是時時提醒此心作主故屬存心心夲廣大也或見有已不見有人便狹隘了還他箇空空濶濶便是致廣大故云不以一毫私意自蔽心夲高明也或耳目口體之欲沾滯沉溺便卑汚了還他箇乾乾淨淨便是極高明故云不以一毫私欲自累至涵泳已知敦篤已能後人覺得已知已能似問學而非德性因改成良知良能但故字如何算得良知如人調養血氣不暴怒不狂喜不勞攘令血氣和平是尊德性一般節飲食善醫藥是道問學一般飲食節而醫藥善所補之血氣即我調養之血氣豈以飲食醫藥所生之血氣非我夲來而外視之乎問析理處事顯然是一知一行注以致知統之何也曰是用程子涵養湏用敬進學在致知意以知包行也故曰過不及曰節文都有行在中間廣大高明湏還他箇著落如人無事時總不能忘這軀殻就是睡夢中見一竒味便要先到口何待見之於事纔有私意私欲來君子只要天地間都好不從自己形骸上受用所謂平生志不在温飽這便是致廣大見得我必不肯如世人齷齷齪齪沈溺于卑汚之中這便是極高明磊磊落落心境海濶天空問温故亦説在尊德性内何也曰自然是德性已知的就是德性萬物皆備於我知道的非在所性之外有故而不能温由見得不是自家心裏物事故不加愛玩若見得是所性之内自然不肯捨如煨炖在那裏一般今人知道了就丢開全不與已切至便是不尊德性人以前殘忍今日慈祥不好説我夲殘忍今方變作慈祥畢竟是當日失了德性中之慈祥如今復還了這箇慈祥所謂敦厚也問知新湏不在温故之中方與上下句相對曰未知未能的便是問學已知已能的便是德性聖賢説話不出此兩端道問學不過是要尊德性然非尊德性以為基夲又將何者去道問學學問之道無他求其放心而已各色學問皆歸于收放心然非先把心收住如何做學問工夫却是循環相資初非判然為二聖人博厚配地君子則致廣大而盡精微聖人高明配天君子則極高明而道中庸聖人博厚高明而悠久如天地富有之業日新之德君子則温故而知新敦厚以崇禮自記上文説三百三千待人後行何因説到居上居下有道無道正為孔子發其端耳自記今天下與今用之兩今字照應湏補出文武制作德位時三字方有根據不然則是泛然隨時而已自記王天下而制作盡善在昭代惟文武周公足以當之今既躋文武于三王則考之而不繆之君子又果誰哉講説者思之自記知天知人以學問言也此尚在夲身之前然後説到躬行心得則正是夲諸身正面然後説到事為經畫纔是三重正面自記知天知人時講都説反了謂天地顯然可見鬼神幽隠難知鬼神且質之無疑况天地乎三王已徃可考後聖未來難定後聖且俟之不惑况三王乎鬼神包在天地内天且不違而况鬼神乎如何倒説鬼神難知于天地殷因於夏禮所損益可知周因於殷禮所損益可知要知後世但觀前世如何倒説後聖難知於三王言質諸鬼神而無疑以其能知天道也鬼神豈能外天道乎百世以俟聖人而不惑以其能知人道也後聖豈能外人道乎天即天地之道人即三王之道問道理精透即文字亦變化不測單拈兩句却是倒結四句曰然注中以動字括言行未穏形於身為動言行者措於世即為禮度文動容周旋中禮故世為天下道聲為度故世為天下法身為律故世為天下則清植有人講世道世法世則世字但指當代不指後代以指後代便與雖善無徴者有碍也殊為拘滯不通此二章書原不必分居上不驕四句為何止解不驕不倍兩句遺却兩句某意自大哉聖人之道至此天地之所以為大也應通為一章上章既將盡性説透此章道字即對性字盡性以文王結盡道以孔子結非不相兼各從其盛言之也道是性之發見無處不有發育峻極底是他三千三百也是他但非其人則不行非至德則不凝耳尊德性節皆重下截言尊德性矣又要道問學下四句皆然方與道字闗合由尊道工夫以優入聖域則上下興廢無所處而不善矣居上四語句句皆有一孔子在内下因言孔子雖生衰周居下位然就安于下位把文武周公之道講求到精熟至極處其事雖述功倍作者矣又言孔子之尊王非全是依様安分而已以文武周公之道原好也寡過不是謂民即指王者三重即王者所以之而寡過者不曰無過而曰寡者如周正建子武未盡善之類只是大叚不差故曰寡君子之道即指孔子夲諸身躬行心得也徴諸庶民即今用之吾從周也不但是遵王制雖考三王而不繆矣不但是合人情雖天地鬼神無疑悖矣不但當時雖百世不惑矣夫子所考訂之禮樂文章直貫乎天人萬世可為法則此所以與天地同其大而立人極也少時嘗笑時文以君子之道為時王之制不知所謂時王者何王若指春秋中之十二王豈可當夲諸身數句若指文武又孰為所考之三王左右求之皆不可解承訛襲謬至今不察下襲水土如時講意理殊短葢九土異賦五方異宜民生其間異尚聖人周流天下凡十五國之形勢風俗無不周知而凡所謂救奢以儉救儉以禮其方法又皆講貫透熟故曰齊一變至于魯魯一變至于道如今人為守令者下車初政動與其民情土俗不甚相宜聖人則無論那一國有委國以聽者他便期月已可三年有成即此可見其下襲水土處清植巖問萬物竝育而不相害注云人物竝生于天地之間各不相害虎豹蛇蝎便傷人人亦强凌弱衆暴寡却是難説只好説天之生物甚全無一不具羽毛鱗介皆足以自衛曰兩説皆非此句只好照道竝行而不相悖講日月寒暑若似相悖却少一件不得禽獸草木種類非一却是不相妨碍害字不必作傷殘説至相凌相暴相傷相殘乃是有生之後情勢所為天亦無如之何若説各足則相字不見靣目矣對仲尼講如仕止久速乃道之竝行而不相悖動容周旋中禮禮儀三百威儀三千便是萬物竝育而不相害一在大處説一在細處説大德小德人亦知為一夲萬殊然講來却似一夲是理萬殊是氣且有連大德都講得差謬如老子所謂為天地根者總縁不認得理氣界分清楚耳自記至誠盡性一叚是從心體上説大哉聖人之道一叚是從發用上説文王當日大邦畏力小邦懐德事業在天壤中庸却用以結至誠夫子不得位竟托空言未嘗有制作在世間中庸却用以結聖人此猶如契敷五教全主文治而詩却贊其桓撥稷掌教穯全是粗事而詩却贊為思文清植至誠聖人分二大叚若無徴騐還恐分得不是子思又結明此意一章提至聖説得許多物事而不離德故曰溥博淵泉一章提至誠肫肫淵淵浩浩而惟至聖知之見得至誠即至聖至聖即至誠也首章言中和是一書大眼目誠即中明即和德即中道即和中即大德和即小德誠即中致中則為至誠之盡性明即和致和則為聖人之盡道至聖之時出而莫不敬信説所謂已發之和也而先之以溥博淵泉言體以及于用也至誠之立夲知化所謂未發之中也而先之以經綸大經言用以及于體也自記小德川流大德敦化即是忠恕即是中和朱子以至誠至聖兩章分屬蓋是以夫子立致中和之極為中庸首章大義收束而全書論道于是為至自記時講多以聰明睿智屬質以下仁義禮知屬德未妥要是質都是質要是德都是德如何分别四德惟智是兩箇有居四德之先者有居四德之後者必先見得何者是仁是義是禮方可行是在先的及行到粲然分明井然不差是在後的朱子言屬北方者都是兩箇因引譬得許多如龜蛇是兩物夫婦是兩類冬至前為今嵗之終冬至後為來嵗之始子前是昨夜之終子後是今日之始可見中庸文字極密大槩是知之精方能體之盡至體之盡仍歸于知之精以下章推之此是小德川流是在外説以臨容執敬别觀之則上句又是在内説各句又自分内外説大㫖則此章是已發之和下章是未發之中四德五常中惟貞與智不可以一義詮釋湏兼兩義方盡故朱子釋貞云正而固也中庸已言聰明睿智復言文理宻察文理宻察是由利而貞之智所以成終也聰明睿智是貞下起元之智所以成始也鍾旺聖賢道理精熟其下字眼畧畧安排便精不可言聰明睿知寛裕温柔發强剛毅齊莊中正文理宻察皆有開發收閉上二字開發下二字收閉上二字由内之外下二字由外之内中庸最好用字眼惟天下至聖章是多少重叠字都有分别聰明在外睿智在内聰是收受尚半在内明則全然發于外了睿是通㣲尚半在外知則澄然在中而已睿智是聰明的骨子寛裕在外温柔在内寛大之象由内而外至從容暇豫則全然在外温和之氣盎然于體貌尚可見柔則柔順在中而已温柔是寛裕的骨子發强在外剛毅在内奮發是由内而外强壯則見于外剛果是由外而内毅則全是内力矣剛毅是發强的骨子齊莊在外中正在内必有整齊嚴肅之齊而後有端莊之容中者無過不及尚在外正則中心無為以守至正而已中正是齊莊的骨子文理在外宻察在内見得部署分明是由内而外至條貫絲毫不亂則全在外宻是處處周到尚在外察則井然分明全涵于内宻察是文理的骨子溥博在外淵泉在内溥者周遍公普之意博則無所不到淵者寂然靜深之意泉則不窮之根溥是元博是亨淵是利泉是貞字字精細子思中庸畢竟是終身為之方能如此如韓昌黎原道某斷他是晚年作朱子説是二十餘歳時作決不然經書言句疊累皆有次第言天覆地載盡矣然人所指覆載以目所見定耳旁下豈無人物日月則有升沉無明晦也故湏云日月所照日月循天中而行温煖孶生萬物周髀所言兩極之下日月已微嚴霜寒露所鍾然亦莫不有人物焉故湏言霜露所墜自記自誠明章忽露出首章性字教字經綸章忽露出首章大夲字今人説此性字是聖人之德所性而有與天命之性性字不同此教字是賢人之學由教而入與修道之教教字不同其實何曾兩様大經者五品之人倫五者天下之逹道非和而何大夲非中而何化育則天命也特章意是要推入内一層故由大經説到大夲又由大夲説到化育耳王守溪此節文破題云不惟能致和而又能致中妙甚一語中的經綸不單是分合二字足以盡其義至誠之心無不流貫如織布帛然有一絲空隙連全布都不成物事至誠則純亦不已故能經綸大經即此便是天地生物之心而人得以為生者下文立天下之大夲亦在這裏立知天地之化育亦在這裏知下節淵淵其淵浩浩其天都從肫肫其仁來沒了肫肫其仁何者為淵何者為天仁即是誠以好生之心言之謂之仁以實心言之謂之誠以生理言之謂之仁以實理言之謂之誠肫肫其仁時講但以不忍人之倫理不明意引入仁字不知至誠豈止是不忍于人方經綸大經滿腔子塞滿流溢惟有一仁孝亦是他忠亦是他弟亦是他慈亦是他别亦是他不如此便像過不得的一般無以形容之故曰肫肫懇至而已問仁即是誠若説到不忍便是發見者不是在中之體曰然上天之載載始也上天之始即所謂天地萬物之根太極是也書傳有太始太初亦取此意但不如太極兩字渾全的確自記無聲無臭不可説到窈㝠昬黙處葢即其闇然之心充養以至於此所謂聖神功化之極者即其切近精實之至也凡學有好高務外之心即有聲色臭味之可尋君子自尚絅立心之始歩歩收歛近裏以造於不顯篤恭始終是一箇意思所以為誠也所以為中庸也時講將無聲無臭講入𤣥妙則是索隠而非中庸近悖章㫖遠失作書者之意矣自記天之聲色甚大神氣風霆何嘗無聲色但其載却無一㸃聲臭聖人憑有甚德業心中無一㸃渣滓光明潔凈只存一箇性體聖人像天地皆非有所為也觀乾始能以美利利天下不言所利可見天地之性體矣惟其闇淡為已之至所以為中庸之極若説神化不測便非中庸矣無聲無臭時解説作深微對顯淺者言某意是對炫燿者言湏照管夲㫖始得然炫燿則必顯淺平淡乃自深㣲也自記榕村語録卷八

body:
  text: 榕村語録卷二十五大學士李光地撰性命汝楫問胸前心之舎天心亦必有舎曰與人一般人醒時其神在心睡時其神在腎天之心上在北極下在地心又問春夏陽也心在上秋冬隂也心在下與人醒時睡時相配如何曰春夏氣發於上秋冬斂陽地中推説皆通其實何處非心人遍身皆心一毛一髮皆心也天亦是如此賦性譬如誥勑開載職事福善禍淫譬如考職黜陟此首尾兩頭皆是正命中間許多禀受則皆所謂氣數之命自記命字最上一層是天命之謂性純以理言中一層是隂陽五行便自不同是以氣言後一層却以人自感召為主又以理言合而言之總是一理中間氣數之不同孟子説得妙君子不謂命也如朝廷命官予之勑書令盡職守是君之正命後來三考黜陟亦是吾君正命至中間僚友齮齕異同到底算不得君之正命以君命譬天命最眀切易曉給這勑書是命領這勑書是性繼之者善在方給之初成之者性在既領之後鍾旺聖賢説義理即兼利害朱子深譏左傳好夾著利害説其實降𠂻之命與吉凶禍福之命一也二之則不是所以見乎蓍龜動乎四體惠廸吉從逆凶福善禍淫無不兼説問人常有未生時先見朕兆如曹操未生便知梁沛之間有真人出之類此何理也曰天地生人如人做事一般其有闗係者尤所著意未做那事先動那念便有象了問有至㣲之人不過富貴㡬年未生之前亦見朕兆難道亦是天地著意所生之人曰此等人是他後來自家墜落了想天地初生他其意不止如是所以詩書言命只言後天之命立命二字最妙命可以自我立的作善降祥作不善降殃惠迪吉從逆凶道善則得之不善則失之宜民宜人受禄于天保佑命之自天申之都是説此等命天生成有一定的命到得後來變化其理又進一層連天亦不知其然果有天初生人本來是極好的後來自家鑿喪至減其算削其籍有生來命本平常因自家積德累仁至於増其福夀名升帝庭問天地至神如何後來變化天亦不知曰心是人所自有的人尚不能捉定自己的心天如何能知所以佛家説轉輪王是心那機一轉大地山河都隨他轉天地以生物為心而其聚精會神又在人所以太極圖上靣的都是為下靣兩圏而設不知天地但觀人人一生經營勞碌只是要兒孫好問人是有知的固如此至草木無知其生枝生榦生葉生華歸結只是結子天地之心全見矣曰然草木之生色香臭味有絶竒者禽獸蟲魚中羽毛鱗甲亦有絶竒者人乃裸蟲之長毫無文彩而天地之全理寄焉如果實榖種一般其榦枝葉華皆好看結成子便一些文彩没有其好處都包在内問實必有殻包住衣錦尚絅亦是如此可見為己之學即是天道曰孔子教門便是收歸到裏靣來這箇生發無窮堯舜禹湯文武之澤都不如孔子其子孫之福禄亦與天地終極為是故也佛氏圓滿二字最妙圓始滿滿始圓草木之實其圓滿者乃生氣之所歸也種先圓勾萌甲拆便不圓到得結實又圓問如喜怒哀樂未發是圓的發便不圓到得和仍是圓曰然人為天地之心果然人多錯會某亦讀之累年始解謂人為天地之心反一語便可謂天地為人之皮殻故愚誕之輩至有疑天地為無知者即從此起也人為天地之心乃謂天地之精神命脉皆在人耳禽獸草木皆得天地之性而不能全惟人得之最全故曰天地之性人為貴貴者貴於他物也猶之父母生子父母之精神命脉皆在兒子非謂父母為兒子之皮殻也就如一身之中説人之神氣為天體魄為地知識為人便不是只好説魂之靈屬天魄之靈屬地周子張子便説得不錯周子以人之應萬事配天地之生萬物極是張子説乾稱父坤稱母予兹藐焉乃混然中處又極是王陽眀説萬物一體處言見赤子入井惻然救之是赤子一體也見禽獸被傷欲活之是禽獸一體也見草木摧折欲䕶之是草木一體也見磚瓦傾欹欲全之是磚瓦一體也又翻轉來説瓦石所愛也使有草木萌蘖屈抑其下則不惜擲瓦石而出之覺心安而理得也草木所愛也使畜牧無資則不惜芟草木而用之又覺心安而理得也禽獸所愛也值賔祭則殺而饗之又覺心安而理得也至人尤所愛也一簞食一豆羮得之則生弗得則死有路人與吾之父兄竝在前舎路人而活父兄又覺心安而理得也此皆非安排而後有者論皆極精某復因其説而推之瓦石無害於人即觸之不過傷肌而已草木則有腐腸爛胃毒人至死者草木生於肥土而不驕生於瘠土而不求雖有毒草人不食之不能為灾也禽獸得食則争其尤悍鷙者摶噬踶嚙無所不至矣禽獸一飽而止過而輙忘人則蠅頭之利不肯相讓盈千累萬不自知止百年將盡竟不少休睚眦之怨沒身不解以致相讐相殺興戈起戎害遍生民辜及朽骨視草木禽獸之惡千萬倍矣似乎荀子之言不為過不知天以全副本領予人原千萬倍於物所以以不善用之其機智才力亦千萬倍於物且如瓦石止是供人之用至草木則能滋益天和培助元氣瓦石不能也禽獸中如雞犬之鳴吠牛馬之致逺其尤靈者如蜂蟻鴻雁之類草木不及也至於人自身而家而國而天下實能修齊治平則財成輔相上下咸若直至參贊位育彌綸天地雖天亦不能限量他草木禽獸能之乎草木本在下末在上禽獸横生惟人頭向上如天之圓足在下如地之方清氣升上濁氣降下與天地同看來有天地不久便有人邵康節謂天地空閒許多年始生人物未必然唐虞去洪荒亦未必太逺指節可以觀天掌文可以察地大抵天地之數至五而全河圖洛書皆以五居中人手足五指得天地全數然大拇指與四指不同止兩節又虚而不用數十二支不用拇指中指長應夏小指短應冬食指無名指一般應春秋後掌髙處應山起西北注水於中窪處必定從食指邊洩去應澤注東南至右手方位已變而西北東南不異故曰天地之性人為貴禽獸便不如此天地生氣無處不到石蟹在海能走石燕在洞能飛出則為石此石中所生之禽獸也汙潦之水蛆蠓生焉糞壤之内蜣蚋化焉生其中食其中便肖其形便同其性牛馬草食榖食虎狼肉食不能相兼也人無不宜是禀天地之氣全也氣全者以其理全也虎狼之父子蜂蟻之君臣何嘗不倍篤於人而他則不知以上論命性之不明也虚齋整菴欲於氣之曲折處見性姚江以昭昭靈靈言之皆難以口舌争須知氣不過運動神不過知覺而所發之理乃性也如見孺子入井而惻隠能惻隠者氣也知惻隠者神也而惻惻然發於不自覺動於不得不然此處非氣非神乃情之正而性之真也程子稱形而上下為截斷分明朱子言太極隂陽當離合觀可謂精切光坡性字自孔孟後惟董江都明於天性知自貴於物數句説得好自後汨於佛老都是以氣質為性以心之靈明為性至韓文公既以仁義禮智信為性却又疑孟子性善之説難道有不好的仁義禮智信麽直到程朱出來把性字説一箇透程朱後又糊塗了伊川説性即理也蔡虚齋羅整菴輩著實參想以為天地之氣若偏於隂偏於陽便不是理隂了又陽陽了又隂隂陽得中便是理已經説得近傍却還隔一層為甚麽隂了又陽陽了又隂這是天地不能自已萬古不易極純極粹至好的一箇性連天地亦不知其所以然只是不如此便過不得此生理也生理却在心裏所以程子説心如榖種因為性如此所以動而陽陽是好的静而隂隂亦是好的春夏之生長固是生物秋冬之肅殺亦是生物人得之以為性亦是如此萬古剪不斷連人亦不知其何故只是如此便安不如此便不安聖人愛人固是生人殺人亦是生人此處看得明白慿你横説竪説道理都不錯知道這道理天地間那一箇物類那一件事情是不與我相闗渉的知道這箇却説他是氣質不得説他是心之靈明不得善固本之性惡亦必尋其根朱子謂陽主生隂主殺主字覺得太重如形體隂也心思陽也豈有形體主於為惡之理然惡却從形體而生故人以心思為主而貫徹形體則形體亦善以形體為主而役使天君則心思亦惡善出於心惡亦出於心如君命官盡忠效職乃君命也枉法行私非君命也然盡忠效職固憑君命以行事即枉法行私何嘗不假君命以作威畢竟盡忠效職者君命之本然枉法行私非君命之本然也如此看惡字有根而亦不礙於本性之善矣知好善惡惡之為性原不錯但要知何以能知好善與惡惡必我有善而彼之善與我之善合故好之彼之惡與我之善不合故惡之其所以合不合者非我有極善之性何以能然程子以榖種喻性便是榖種裏靣是有的釋氏以鏡喻性便非明鏡裏靣是無的榖種是熱的明鏡是冷的以善言性便盡天下人物皆視為一體痛癢相闗公其所有而已不勞一團和樂之象以知覺言性便以已為明視人為暗自智而愚人尊己而卑人私其所有而欲分以度人必有隔閡之象所以性善之説明便見得天下之人皆有性善老吾老以及人之老㓜吾㓜以及人之㓜養之教之歡欣和厚佛教以衆生迷妄思欲度脱不知上老老他便知孝上長長他便知弟何嘗迷妄總之聖賢仁愛是熱的佛家慈悲是冷的如告子之不動心是死的孟子之不動心是活的活的便是熱的死的便是冷的至尊因説新製律管分寸與古合以羊頭山黍實之亦是一千二百装𦂳自然多㡬顆鬆些自然少㡬顆大槩是一千二百就如説性善難道箇箇都是一様是大槩人性都善不甚相逺耳這一句説性善甚精到問性只在心内否曰通身全是性毛竅中都是性但最中光亮發見處是心耳問光明只是心不是性曰然問心如榖種何處是性曰榖種生處尚不是性所以生之萬古不變者為性性本無形如大麥萬古是大麥小麥萬古是小麥不是性如此如何不會變有性所以有許多物事若沒有這箇不會變不肯住的如何有這許多物事所以云性立天下之有人與天地本是一箇其分界處只在一軀殻而百凡雕斵隔離之患皆從此生聖人所以説克己己私克去得盡則踐形盡性我便是天即中庸所云至聖至誠也人物皆禀此理以生吾渾身都是天理而人物自化又加之在已有學問處物有法度則存神過化而贊天地夫何疑姚江以一段靈明者為性雖少近裏然所見乃心而非性也心便有别但看聲色臭味平時多少耽著至遇疾病便生厭惡遇患難便不復思想惟孝弟忠信則坎壈之中轉見誠篤至於生死利害更生精采故知人心道心確然兩箇可見義理之性不以形骸而生自不與形骸俱斃嗜慾之性皆因形骸而有自與形骸俱亡此處認得確發言行事大段不出定盤星矣王陽明格竹子的性乃格其葉何以三心何以空他木皆通直他何以有節不知此形器也非性也雖細説亦各有縁故如鱗屬木水生木故鱗如波紋禽屬火木生火故羽如木葉而食棲於樹獸屬金土生金故毛似草而深蔵於巖谷介屬水金生水故殻似金石之堅裸蟲似人屬土故居於平地分屬五行却不是他的性惟孔子説得盡繼之者善也成之者性也天命本至善人物承繼來無不善及至成形便有不同今欲求物之性總離不了五倫不特虎狼父子蜂蟻君臣雎鳩夫婦即草木亦然以類叢生是其朋友也有牝牡是其夫婦也移樹必是花開時問其故曰樹最䕶花欲結子也是其父子也其不能全者形器限之也其不能斷者同一性善也天地與人共此一性所以萬古不易萬古不息王守溪許多時文都看不出他的底裏到做性論便露出馬脚盖以金水喻性全是佛家語也性是熱的物事不是冷的物事是屬陽不是屬隂論人性當以木火喻之如草木之實其中原具有根榦枝葉花實及一得土氣而根榦枝葉花實都出其中性便是如此木火屬發生金水屬收蔵如晝夜然吾儒所説性是白日事佛家所説性是夜間事聖賢説四德便説元説五常便説仁元足以統亨利貞仁足以統禮義智佛家却不道元而道貞不道仁而道智都落空了人物皆有五性其參合之中和者為人偏駁者為物至甚偏駁之後則美者亦亡矣人之中有賢不肖理亦如是自記以上論性仁智相連仁收進來便是智智發出去便是仁禮義相連禮是燦然有文若不停當如何謂之禮而停當恰好處便是義信流行於四者之内而位次乃在禮義之中極有理禮都排在外靣若無實心以為之本便是詐偽惟有實心故一歸於實事而合於義也五常仁可以統四德生意無不貫也信可以統四德誠心無不存也智可以統四德收住四德又貞下起元也數中一三五可以做主五行水木土可以作主五氣冬春中可以做主五性智仁信可以做主禮義却做不得主仁為四端之首故中庸云肫肫其仁智能成始成終故中庸始之以聰明睿智而終之以文理密察自記聖人不輕説死惟到仁曰殺身成仁信曰自古有死雖死而生之理存勇士不忘喪其元終非其至者但謂之勇士而已問程子屢駁以愛為仁之説愛者仁之用而非即仁也曰朱子仁説已辨此既曰愛者仁之用獨不可反其説曰仁者愛之體乎問雞雛之説云何曰全在那一㸃嫩處如嬰兒依戀父母那一㸃真心乃最初之心也大舜做出多少事業其根本却是大孝終身慕父母五十而慕覺固不可以言仁亦不可以言智覺者心也仁智者性也在天地覺譬則神仁智是生物蔵物之理自記人心中只有一團生理發出來便是愛愛不可即謂之仁然其理則仁也為甚麽又説公則仁大槩人不能全其仁者只是為私欲所蔽隔克去己私仁心自在公字有工夫愛字無工夫公便愛心自然流出如一片土地但不使瓦石壓占自會生草若强恕則在公與仁之先惟不能仁故用强恕耳然無忠做恕不出纔説恕忠便在内智是兩箇而暗蔵在内的夫婦是兩類又躱在人不見處的以此推之北是幽暗之方黑是幽暗之色水外闇冬閉蔵貞則收斂堅固憂懼亦是隠隠在内盤算的腎亦兩箇蔵而不露無不如此機智是無用的聖人未嘗不有在胸中却不拏出來用所以董子説陽居大夏以生育長養為事隂居大冬却積於空虛不用之處聖人用底只是仁禮義智是蔵在内的義猶半用智全不用若拏出來用便害事如人多端籠絡我架詞作勢我只以老實應之他句句虚我句句實自然他通身伎倆都沒用處你若再以機變應之益發多出事來必敗之道也只是義智却是内裏必要有的不是可以無的後世君子於四德中耑用一智些小利害即便百般趨避問所用恐亦非正經的智曰就是正經的智亦用不得智本是蔵在内的不可以用豈獨智即義亦半用半不用如事不當做則不做便了若張揚表暴便有病故用義便有東漢末流黨錮之禍用智便流於詐偽姦巧之歸三代以上専用仁禮問文理密察是用智否曰全在内寛裕温柔也是他齋荘中正也是他發强剛毅也是他其本位却是文理密察又問舉錯是用智否曰説到舉錯已交付與義矣智所以成始成終仁之惻隠義之羞惡禮之辭讓只是一様獨是非有兩類是處管仁禮非處管羞惡以上論五常性無所不在情亦無所不在心亦無所不在求之五行之位則性之全體屬水心之光明屬火情之萌芽屬木心者性之郛廓心如物之皮殻性是皮殻中包裹的故言心必合性言方是本來的心鍾旺萬物皆天萬事皆心心是易知事是簡能自記知識者人心是非者道心自記心統性情形生神發後便著如此説若論自來須先説性而後及心心亦性之所生也及有此心則性具於中感物而動而情生焉又曰心亦性之所生此句甚險然理却如此有一團要發見的意思便是生理火在人為心在天為日日之所及而物生心之所到而事始人通身皆心也心所不能通處便不是正理若是理之所在心無不通豈止一身凡天地日月星辰之可窺測往古來今之可推求者皆是心之所到通天地古今止是一心汝楫問朱子云心者神明升降之舎妙甚平時只説作心是神明之所棲止不知升降二字是活動的如眼鏡之照日光不是定在一處正側轉動間光亦隨之而移曰然汝楫問血肉之心即心乎曰此心之室週身皆心也當年與德子諤徐善長所言皆錯其時於一切天理人欲都從動静分看便不是隂與陽都是好的如何説陽善隂惡陽氣也隂形也氣非理也然氣與理近猶之心非性也然心與性近一切欲心都從形體上生來如鼻欲聞好香口要喫好味之類凡此非即惡也中節仍是善惟過則惡耳虞廷説道心是從天理而發者説人心是從形體而發者饑渴之於飲食是人心也嘑蹴不受則仍道心也人心道心大體小體都從此分别能中節則人心與道心一矣以上論心性有仁義禮智發則為惻隠羞惡辭讓是非情亦然愛欲惡懼其根也發則為喜怒哀樂愛發為喜欲發為樂惡發為怒懼發為哀言七情者除却樂字耳以配元亨利貞春夏秋冬循環不已無非是者喜尚無弊到得樂便手舞足蹈易至於過樂與怒不相渉何以樂必變怒但看樂之時心滿意足氣易驕盈覺得少不如意便不快活無論不當怒而怒就是怒得有理然忍著不怒何妨試問此時設在患難中亦有此盛氣否怒之後如何轉為哀凡怒過未有不悔者如漢武窮兵黷武天下困苦晚年輪臺之詔何其哀切至哀便有好消息來盖隆冬閉塞時春意已萌動矣由喜至樂由怒至哀皆不妨最是由樂至怒這一節不好歸根復命總在一懼字懼貫始終便都好一部易經全以懼字為用神為丹頭以懼始以懼終而每爻皆有當爻之位的道理懼誠也爻位明也以誠貫明易道也情之發有有次第的有隨感而發的有次第者如元亨利貞隨感而發者如水火金木所謂其發之也仁其裁之也義其行之也中其處之也正分明是有次第然即其隨感而發者惻隠是初動的辭讓是著見的羞惡是收轉的是非是包蔵的雖因事迭見而亦未嘗無次第也自記惻隠辭讓羞惡是非與喜怒哀樂皆情也惻隠便是喜之正氣辭讓便是樂之正氣羞惡便是怒之正氣是非便是憂之正氣憂又有惻隠意盖北方原有二氣人能憂則惻隠之心生矣自記喜怒哀樂固以懼字為丹頭又想土寄旺於四時喜怒哀樂應有一平字象土天道之變以漸而至春至夏夏至秋秋至冬無今日大熱明日大寒之事畢竟以漸而變是平也寅卯辰辰為土巳午未未為土申酉戌戌為土亥子丑丑為土土氣沖和和平下來漸漸而變喜至樂怒至哀尚以類相從其勢順惟樂變怒哀變喜若太驟故營陽王哀樂過人其哭之慘戚便哀感行路方退而歡笑如常朱子謂是不恒其德孔子是日哭則不歌正是此意當其樂樂得平些移時怒怒亦輕些此理勢之必然懼與平亦有分别懼剛而平柔懼清而平濁懼屬智屬水平屬信屬土平是轉灣處懼是起頭處天不可説懼健字便是懼喜變樂怒變哀固須平樂變怒哀變喜尤須平四時如此五行亦如此金生水木生火可不用土水生木離土不得火生土土生金必用土纔生出金來汝楫説平即思也洪範配土先生大以為然虛齋䝉引中畫喜怒哀樂中間著箇思字甚好總是收轉念頭無處放心便是聖人希天都離不了此意喜怒哀樂歸到仁義禮智便無弊以仁喜以禮樂以義怒以智哀有何弊病喜怒哀樂通乎仁義禮智又通乎元亨利貞便達天德下驗之吉凶悔吝人道無餘矣問中庸自喜怒哀樂起直到位育正是此意曰然聖人之心喜怒哀懼都有但中節耳如子畏於匡莞爾而笑無君皇皇㣲服過宋之類吕原明在太學因胡安定見伊川顔子好學論曰真儒出矣遂首先禮拜伊川後來却學佛一日馬行壊橋墮水㡬死及起却自咎曰墮橋便墮橋何為心動從此便在這上頭加工這便異端不是吾儒正道問使孟子際此亦動心否曰不動便是告子矣孟子死心塌地服孔子就在可以仕則仕可以止則止可以久則久可以速則速這㡬箇則字終身摹倣不能到怒最易發而難制只是理不明若明白時自然有節天下事只要明白貞下起元先有智而後有仁若是智不足便仁也差了怒後即自己不悔勢亦必歸到哀上來此天地隂陽自然之理倘用别的來接接不上果接之以喜樂這就窮了有死之道無憂患時作憂患想亦可以忘怒問程子只説觀理之是非倘理當怒者自然該怒何為又想憂患以平之曰先要忘了纔會隨事觀理謂之忘怒是怒已平了是土怒之發也如火於時自加一段收斂退蔵之意便是以水濟火以水濟火則怒忘矣便看水一澄便有泥火一撲滅便有灰皆成土汝楫云懲窒二字是訣曰又以明為主看破他的機闗懲窒亦易為力天道元亨利貞賦而為仁義禮智發而為喜怒哀樂著事為吉吝凶悔成效為治盛亂衰皆相配喜樂怒哀發見於外却是愛欲惡懼為之根不愛何喜不欲何樂不惡何怒不懼何哀哀即憂也大槩喜哀無甚病病全在樂怒上樂便驕滿驕滿易生怒到得哀便有向好消息懼字是回斡造化的金丹喜樂怒時能懼便不過懼便是禮儀三百威儀三千之根懼便有和樂生所以程子云肅則雍人君遇水旱兵荒則懼然必無事時從心中發出大懼方好凡人遇事精神㪚亂粗厲浮動便不中用惟懼便思量處之之道至主意定則不為他端所惑矣終日欽欽若對大敵到得金鼓齊鳴決㡬兩陣却意思安閒如不欲戰治亂都是天運然亦不容無别治由乎天而成乎人亂由乎人而成乎天天無不治之理推其根由乎天而經綸締造以成之則治矣情欲利害推其根由乎人人事壊天感之而沴氣作天札災厲至則亂矣懼者致治保邦之要聖人諄切言之道理要𦂳處原無多聖人丹頭在此佛為轉輪王以心轉乾坤也懼即是轉輪法凡看人亦當以此為訣其人無故知所惕懼或有所觸而警動非常便是為善之人有道之器元亨利貞配春夏秋冬仁義禮智喜怒哀樂吉凶悔吝從古是如此説至配禮樂兵刑而七情中又添出樂字為八是某方如此説禮所以飾喜樂所以飾樂兵出於怒所謂一怒而安天下之民刑歸於哀所謂哀矜欽恤内有愛外始有喜内有欲外始有樂内有惡外始有怒内有懼外始有哀聖人説顔子好學却説不遷怒程子定性書亦云忘怒觀理盖喜樂治之象怒哀則亂之象故聖賢於此兢兢然根源却不在怒而在樂變怒上當樂之時便要留意也丹頭却在懼字當樂之時便提醒一提醒自然不過由喜而樂由樂而怒由怒而哀由哀而復喜其過度處皆用思所謂土寄旺於四時也學者用工却在喜怒哀樂上喜樂怒哀治而天下平矣天地位萬物育不是空話是實事老吾老㓜吾㓜以及人之老㓜一怒而安天下之民哀矜鰥寡樂以天下何嘗不是實事不單是空講道理每年勾囚但看成案都是樂與怒上死的鬭毆讐謀也盗刧滛欲也不曽有喜與哀便致極刑者邵子皇極經世遇物皆成四片却不曽如此配得以上論情榕村語録卷二十五

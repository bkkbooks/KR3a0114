body:
  text: 榕村語録卷十五大學士李光地撰春秋一古史書事月日而已無以時者惟魯之舊史名春秋意者魯史記事以時歟自記聖人刪述六經都是一以貫之春秋遊夏不能贊一詞直是聖人胸中權衡絲毫不差遊夏等下筆便恐不能不錯奈何觀筆則筆削則削遊夏不能贊一詞則知贊易定禮樂遊夏尚能為助至春秋門弟子以為可存者夫子却去之以為可去者却存之裁決精到非遊夏所能與孔子作春秋一筆寫成所謂筆則筆削則削兩則字見他快人情天理歷代禮文明白精熟不假思索聖人用功却在大易看韋編三絶可見春秋最是難看無一點文采不過幾箇字眼顛倒用得的確便使萬世之大經大法燦然具備微而顯顯而微一歸義理之精無非自然之則一部春秋不過幾箇字換來換去數之可了這幾箇字忽如此用忽不如此用忽用忽不用參互錯綜遂千變萬化曲曲折折精義入神不可思議又至穩至當極合人情即以此盡天下之事類萬物之情通性命之理論語有十數章便是春秋義例如八佾雍徹陳恆司敗崔子子文冉子退朝正名為衛君之類不獨大義朗然即詞語輕重婉直之間都是義例如臧文仲竊位舉其大微生高不直舉其小皆是别的經書都是據理而談待人以事實之此經却是現在日用間事立朝理家往來酬酢大經大法微文小節經權常變一舉一動一名一號無不本之天理合乎人情直是人生要緊切務斯須不可離者孟子曰晉之乘楚之檮杌魯之春秋一也孔子曰其義則丘竊取之矣學者緣是謂夫子周遊諸侯之邦采其國史而作春秋誤也如果夫子參采乘檮杌之文而修春秋楚文以上晉獻以前剪并諸姬滅翼作晉其事甚彰夫子何用隱之而沒其本乎荆於莘之役始書始通也晉秦以暨吳越凡其入經之先後皆然推此則有赴告而後有書舊史有書而後春秋有筆不以他史益國史故事有沿故而遺其以聞見核所因故事又有革舊而審且信也自記春秋一書直是人生不可須臾離者凡説夫子竟操二百四十二年南面之權是非褒貶怎生峻厲都是膜外話夫子不過是該稱君該稱臣還你個本分便是所以説必也正名當時禮法蕩盡冠履倒置聖人不别作一書即用現成魯史為之筆削君君臣臣父父子子各止其所各得其安不過不肻一毫茍且假借而已吾輩作文章第一件是不要揑造粉飾有一句説一句稱乎其人與事凡稱謂官爵名字年月之類無一不停當便是一篇好文字春秋字字皆經稱量又義精仁熟恰當事理字靣上下增減變不變稱名辨物俱是化工如陳司敗問昭公知禮曰知禮為尊者諱也及司敗指出娶同姓輒自引過所謂父為子隱子為父隱直在其中矣娶同姓為非禮固昭然不沒而臣子之分亦得此便是春秋義例又如唐平淮西前後四年工夫而韓文公作碑略之似今日發兵明日即捷者及後又有詳敘日月處淮蔡內地聚天下之力四年而後克之作文者尚鋪張揚厲豈不辱國此等處直學書經不書年月體一跳便跳過許多年許多事去其義則出自春秋史書惟春秋當法年下書時時下書月月下書日有以兩日赴者則書兩日有災眚經幾日者則書某月有無關輕重者則不書日古書於字句間不能無錯惟六經無錯處春秋于本文錯者仍之却無奈他何孔子于子陽曰吾知之此公子陽生也子貢曰既知之何不改之子曰如不知何孔子問人如何以報德及如不知何都令人不能答溫公作通鑑自以為得春秋之遺而其中不合者無數如生前即稱諡此最不可春秋未經筆削想亦是如此邾儀父與隱公盟時未有爵也至齊桓公請於王而命之始稱子如何於未有爵之先即以爵稱之書曰邾儀父稱其名得其正矣問春秋若無傳不幾廢乎曰惡是何言也二百餘年事不曉得何妨如今何曽曉得五帝以前事聖人存其大經大法以扶世翼教事迹固不足論有言某治春秋於比例上差有工夫曰此最要緊豈止春秋凡經書皆然同中之異異中之同不是相比則道理不能見得確實況比事屬詞春秋之教乎聖人文章隨處不同褒與貶不同矣貶之中亦自不同有貶至十分者有九分幾釐者又不是特意做文章恰是事理應如此所以説春秋王道之權衡是稱量過的絲毫不差如今説昌黎文為六經之文其道理如何比得六經而作文之法却有六經之意字不虛下言有倫次惟六經為然文章要得此意有當多説者有當少説者有當刪去不説者其前後次第都要安排妥當最是要緊胡文定解春秋豈為無功只是説夫子那樣嚴刻利害却不然看來純是一片忠厚之心有一絲合於善便奬許之恐後其仁愛至矣至托之空言不如見之行事之深切著明皆説作聖人託南面之權為見之行事非也謂他書託之空言不若春秋皆是列國實事有可考證功罪易見義理易明耳史記易本隱以之顯春秋推見至隱説者謂春秋由事迹上推見人之心曲所謂誅心其實非也見字讀現與上顯字同易言造化幽微之故以至於人事春秋則由事迹之顯著而至於精微句法少一以字不與上對耳見即所謂見之行事也陶元亮云矻矻魯中叟彌縫使其淳此老學識殊未易到四書五經聖人總欲挽世風之澆漓而還之淳也友言馮定逺先生云人熟讀了春秋自能做古文此言必有來歷曰某平生即有此論無論大經大法即年月稱謂序次體裁不知春秋下筆便錯左傳隱公在公子翬便稱隱公史記武帝在便稱武帝極有名史尚如此試看字字著落一毫不差一毫不假借除春秋更無有二朱子自謂此生不敢向春秋問津門人問何處不能了然朱子曰即開頭一句春王正月便不了然是絶妙點醒人機鋒其實春秋明白得春王正月便都明白了中庸明白得天命之謂性大學明白得在明明德論語明白得學而時習之孟子明白得王何必曰利亦有仁義而已矣全部便可豁然易之元亨利貞禮之毋不敬亦然人起於寅物生於春春者蠢也言萬物蠢然生動也若十一月木凋草枯謂之發生可乎春秋書春王正月便見得天序不因王制而改若是尊王何不書王春正月乎堯典劈頭説欽若昊天敬授人時可知必以興作人事起頭為嵗首方妥夫子行夏之時乃是祖述堯舜問周公如何不用夏正而用周正曰聖人學問雖無有二然各人亦似各有得力處周家學問都似在建子著意文王後天圖用處在震而發端則在乾隱無正者二年以後無正月也桓無王者十八年之中十四年不書王也正者諸侯所稟於王王者正諸侯者也下不稟則無正上不正則無王桓弒其君王不討焉而生死恩逮是之謂不正而無王隱終其位王命四至而朝聘奔會無一者是之謂不稟而無正然則他君異於此歟曰一經之始於二君見義焉耳春秋書法見義者義明則止其餘以常書自記春秋之初猶以取邑為重故隱四年莒取牟婁桓十四年宋取牛首皆書而後則不書非春秋以為常事而不書乃諸侯以為常事而不告耳自記卒稱其本爵葬從其僭號却有兩説一世情一道理世情者其國來訃稱其僭號我因其訃而記之于我史册中則我為政我為政則何必依其僭直云某爵而已至葬則我往其國而會其葬以彼為主吾非天王安得入其國對其臣子而貶其君父殊無賓主之禮公羊所謂卒從正葬從主人也以道理言先正其罪後紀其實不書本爵何以見其實不著僭號何以見其僭前之義例已明而後隨其常稱兩相印證所謂微而顯也此竟是春秋一通例如弒君之公子先皆削去屬籍以著其惡義例明矣至慶父之後皆稱公子而不削亦是此例見得弒君者竟公子也則無父無君之罪更甚矣如吳楚先書國後書爵亦是此例先儒以為進之非也惟吳楚之喪止於其來訃時書其本爵而已至葬雖魯君或在亦不書蓋葬雖從主人而斷不可書曰某王故寧闕之近看春秋見得一片天理人情只苦來日有限未能卒業其中義例紛然變化錯出思之皆有妙義如亂臣賊子初則削其籍稱其名後乃稱其爵或稱其國或稱某國人或稱盜蓋初則疾惡之至絶之非其臣子也既而並存其爵若曰此為其某官為其世子而至為此事也史官如董狐南史者甚少焉能皆死其官使弒君之賊皆如趙盾崔抒之不能逃其罪史官既不能死其職則弒君之賊必秉國鈞安肻以己行弒訃於諸侯勢必另舉一人以實之如魏高貴鄉公之事司馬昭問陳泰曰今日之事何以處我陳泰曰惟殺賈充稍可以謝天下昭問其次曰泰言有進于此者不知其次論首惡則昭也乃誅行刺之成濟而歸獄焉朱子灼知確見故書曰魏司馬昭弒其主髦假使考之不確既不能無所證據而以大惡加人若書其歸獄之人却令首謀者漏網後世將竟不知其為某某也夫子于此等則書曰某國罪其大臣也曰某國人則與謀者多也曰盜宦官宮妾之類不足齒數也不書其名一以見闕疑之意一以使後之人不知所主名而推求之則其人亦不能以歸獄於他人而卸其罪此等義例信非聖人不能創若綱目則大賢之書成例一定依此書之不敢屢變矣晉乘相傳前代尚有見者其書河陽事竟曰周襄王出會晉文公是誠何語夫子改曰天王狩于河陽何等嚴正稱國人以弒傳云罪纍上也此義大不穩春秋中諸侯之有罪者莫過于三靈楚靈晉靈陳靈未嘗書人也此是大義例蓋其人當權秉政或訃不以實或自已欲掩其罪而亂指一人以代其辜或重賂一人以抵其罪我國何得依之以蔽其姦然史之闕文孔子所謹即明明知為某人亦不便竟以其人實之故作不結之案曰某國有人弒君隱然屬之其人其人時自驚心後人又將究其人以實之如有賊犯拏不到他亂推一人或買一人來抵罪官府不肯與他結案寧可懸以待捕令他終身不敢出頭露面所以不學春秋無以斷事春秋乃刑書也今之懸案即是此例論人止就其事迹不必鈎深索隱鈎棘得之未必不差如用刑寧失出毋失入也孔子論人以及春秋書法皆是如此春秋如今日檔案則例一般凡大事須查案定擬韓文公云春秋書王法不誅其人身但得王法不泯便好何用又推深一層如今覺得春秋千變萬化都是平平常常情理説春秋莫太髙放平些好總是人情物理其中王法森然一字不可假借極寬大極謹嚴溫而厲威而不猛變換無端各當其則如魯君逆不稱夫人而曰女未成禮則為他邦之女而已烏在為我夫人且以著其父母之國也及其來則成禮矣乃曰夫人某氏至自某周則不然往即曰逆王后於某國蓋王者無外誰非臣妾天王曰某為王后則王后矣及其來却不稱王后而著其國與姓焉名已正矣乃本其所自生烏得泯其父母之國乎大法精義動筆斯在周詳委至神化難擬人取我國之土地不書諱之也至濟西則書後卒歸也不書則後歸無因既歸則不必諱矣戰敗不書諱之也至乾時之敗則書長勺即勝也高子來盟楚屈完來盟舊説未是聖人妙盡人情都是內本國而外他國內中國而外四裔之意大凡魯君與諸國之大夫盟皆不書公惟書及某盟而已不肯以我君與諸大夫等也魯有難而齊輕之故使高子來桓公率衆諸侯以臨江漢傾天下之力興問罪之師而楚子不親出僅遣屈完來皆可恥者故不著其君使之來若彼國無君而其臣擅來者非吾之辱也獨成公于楚師之臨孟獻子季文子不敢出公自出與公子嬰齊盟書公者所以著季孟主憂主辱之罪春秋初諸侯兄弟多字蔡叔蔡季紀季許叔之類是也其後率稱公子例已見前也敘伯叔者著親親之恩繫屬籍者寓上下之等春秋之初國命未移故親親之詞厚其後也世卿踰恣故上下之語嚴奉君命則曰兄弟而名之對上之稱也殺若奔則曰兄弟而名之存親之實也叔肹稱公弟於其卒無列也季友字于其歸非對上之稱且賢之也無列何以不稱公子則以為於時之公子未有不貴者也自記載詞稱同盟而以同盟告則同盟之矣其所謂同尊周同外楚或當日在盟諸侯有此意因加此字於誓詞之上耳非夫子所加也自記春秋固謹內外上下之分然所謹者大義大法而已晉楚國勢之強弱權籍之去來于春秋何與説經者必先去此一病而後可自記觀春秋所書女以姓而男以氏則知周禮自記春秋存首月者一時無事者也隱莊三月有事而存首月為元年雖不即位而有朝廟告正之禮自記年隱公元月而不日常事耳則衆紛紛而鑿為之説會戎于潛時而不月乃寂無説焉何歟范氏之説又不明也程子因舊史之説信已會之見書于春秋于盟略故或時而不月或月而不日亦猶侵伐之于戰滅也自記二隱公年內女嫁為諸侯夫人未有書逆者紀伯姬書逆何曰逆女而在鄰國則身親之者也使大夫非正也春秋之時親迎禮廢紀魯不敵猶不身親餘可知矣書此示禮之變餘不悉書也逆不悉書歸何以書曰歸者內辭也逆者外辭也詳內而略外也其不書歸者先儒以為皆有故也遭出者也為諸侯夫人者書歸不書逆為大夫內子者書逆不書歸自記年隱公二求賻不稱使當喪未君也武氏子略辭也仍叔之子詳辭也何詳于仍叔之子蒙王命之稱也自記年隱公三春秋書臣弒君者州吁始也書子弒父者商臣始也繼弒君者宋督是也繼弒父者蔡般是也春秋盟會多矣無言其故者曰成宋亂為督也曰宋災故為般也則曷為不于州吁商臣見義乎曰商臣之弒不責諸侯之誅無父之罪于無王之域若曰楚之自絶諸夏久矣諸侯力不加焉此其可恕者耳州吁者蓋屬辭書事而已明也諸侯之罪已見也自記年隱公四州吁者王不能殺諸侯不能殺而使衛人殺之王不能為衛立君諸侯不能請于王為衛立君而使衛人立之故書曰衛人立晉其傷無王法也大其罪衛人擅立也微自記年隱公四邾人鄭人伐宋長邾于鄭者何春秋之初未有伯者故序侵伐以主兵者為上序盟會以志者為先自記五隱公年公穀皆曰春秋之法君弒賊不討不書葬罪臣下也此理甚精然求之全經多不合者左氏曰不書葬不成喪也蓋有亂臣賊子貶其君父而不成喪者有國亂略於禮而不成喪者貶其君父而不成喪欒書崔抒之葬厲嚴是也國亂略于禮魯人之葬閔公是也齊桓公曰魯可取乎危亂可知宜乎不成喪也隱於二者何處也曰殆羽父因其攝殺其禮與于貶其君父者云爾或曰羽父弒者也豈肻貶公以章其罪曰不見意如之别昭公于兆域之南者乎故孔子曰章夫子之不臣自記一隱公十年王之不稱天自伐鄭始也據傳周鄭交質交惡王之失柄甚矣不行于畿內之邦朝之卿士而能逺有乎或曰此如朝于王所語勢之順也曰不然不朝于京師不朝于方嶽而朝于盟會之處曰所者失所者也不稱天皆微詞也其曰天王狩于河陽何也曰于其召也尊王而沒其實以互諱于其朝也退王而寓其實以交譏自記年桓公五以實為州公者非也蓋本稱為來朝我而冬先過曹州公之失于禮也故書曰實來實是也冬過曹而春正月實來語勢如所謂西傾因桓是來自記年桓公六凡春秋書事繫日矣其下有不月日而事者則非復蒙此日而蒙上之時月也武父之盟衛侯晉之卒兩事適同日故特兩書日以别之自記二桓公十年上書突奔忽歸此書突入自是以後鄭君屢易忽亹儀突之際春秋無一書者或以為不成君也夫三君相繼多歷年所弒逆大惡也立君大事也春秋悉削之而獨成篡位之突必不然矣蓋魯桓黨弒君者故如宋如鄭必列會興師以定其位當時鄭通赴告突也非忽亹儀也故三君之存亡莫得而書焉自記五桓公十年公穀以為賊不討而書葬仇在外也不責踰國而討于是也夫仇有內外何以謂之不共戴天乎此條義例未必春秋意也自記八桓公十年賵仲子會成風一事也聘桓公錫桓公命一事也皆名冡宰于前王不稱天于後胡氏之説當矣范氏曰天王出居于鄭不可最大使仍叔之子來聘使家父來求車皆不可也三者皆言天王明非義所存舊史有詳略耳夫不幸而有內難播越出居義不可厚非求車求金皆小過也豈得與紊亂三綱之道同日語哉使仍叔之子其過不在于使非其人為聘桓有罪焉耳然而所以無貶者義見前矣范氏之説是未知事同則舉重義明則以常書之法也舊史詳略他當仍而闕也無端而增削王號夫子奚重而不更乎然則伐鄭及朝諸侯於會所二事于出居甚乎曰于瀆三綱則損而于出居甚矣夫交質亂分交惡起戎暨乎害禮傷尊而會覲者皆傷王綱也自齊桓則汲汲乎定王之位于出居奚尤哉冠王于事而不稱天者重因事言王而不稱天者輕自記年莊公元管仲不死程子去就輕之説是胡氏以為徙義事不濟而背之徙義于此時不亦晚乎害義之大者自記九莊公年陳人殺萬不書胡氏以為宋賂而得之宋失賊而陳受賂與魯之共仲同故春秋不與其討賊也其説委曲未必合于經意愚謂閔弒萬不書宋不告也殺萬葬閔不書宋不告魯不會也魯宋連年不睦前有菅之戰而敗宋師後有北杏平宋而魯不與萬嘗獲于魯矣莊公豢而歸之其弒也又以譽魯啓釁吾想其服刑也宋將問魯故焉而因有憾于我也是故宋不告魯不會焉耳共仲之事則又不然季子蓋死之而未以討令也與其鴆叔牙而立後亦同春秋將同叔牙之例而卒之歟何以不沒其弒也將書刺而又未以討令也則有不書其卒以不歿其弒疑于奔而不返者而罪乃章顯故韓子謂孔子之作春秋深其文辭也自記二莊公十年同盟于幽始蓋無王有伯之初也禮樂征伐自諸侯出非小故也我公非諸侯歟則未知斯盟之為是邪非邪故沒之也其或同或不同何也因其舊焉爾存乎載書或曰同或不曰同自記六莊公十年四時無事則書首月今以五月首時何也昏禮之失未有甚于莊公者也娶讎人之女當喪而圖昏親納幣以固之觀社以尸之丹楹刻桷以飾之大夫宗婦覿用幣以侈之禮之失未有甚于莊公者也周禮仲春會男女周之四月夏之二月昏姻之時也昏姻之禮不正義繫月故去月昭公娶同姓義繫時故去時自記十莊公二二年畿內之臣不稱使者皆自來朝聘也祭公祭伯來不言朝朝不可言也祭叔來聘聘可言也尊王朝也自記莊公二十三年曹殺其大夫胡氏曰方其交政中華會盟征伐雖齊晉上卿止録其名至于見殺雖曹莒小國亦書其官愚謂會盟之類總言諸侯之大夫者有之矣見殺者書官之下未嘗不名也此何以不名或曰衆也或曰無命大夫也或曰義繫于殺也專殺大夫非制也無罪而殺尤非義也蓋殺大夫之罪不著名者為上著名者次之稱人殺者又次之削大夫者殺者幾無罪矣自記六莊公二十年如楚乞師乞之得不得未可知之辭也告糴於齊猶曰如其移之于國中云爾知桓公之不遏糴也自記二莊公十八年季子來歸以為旌其賢亦可通然諸侯兄弟有稱字之例以君命出入則名之君前臣名之義也出奔則亦名之絶也非此族也則字之自記年閔公元以仲孫高子為天子之命大夫于理為長蓋是時齊威首行尊王之事故請于天子而命之自記年閔公元以前皆稱荆外之也至伐鄭之役舉國號者將有齊桓膺懲之事不得復舉州也欲有其末先具其本故變州舉國自記年僖公元滅夏陽執虞公晉人必將有辭以告于諸侯故得而書之也滅虢滅虞晉人諱其事而不告故不得而書之也自記年僖公二江黃不與伐楚管仲明知楚必服而又恐其就近蹂躪江黃或不能救以速江黃之禍故姑令勿與此與問包茅南征同一權宜也自記年僖公三虞虢之滅晉人蓋修其祀而不以滅告諸侯也春秋之作其文則史不告滅故不書滅然實則已滅矣故夏陽不應書滅而書滅又書晉人執虞公比于滅國執其君之例則兩國亡之實録也自記年僖公五僖公賢者凡常事會盟概不行告至之禮伐楚代鄭兹兩役也荆舒是懲史克為之作頌公蓋自以為功而魯人大之也故獨書至行告至之禮也自記年僖公六荀息啓伐虞之役不諫申生之殺導君不義陷君不慈區區擁立嬖孽而殉之誠哉其匹夫匹婦之諒孔父仇牧荀息聖人據事書之耳其死之優劣考其事實可見書法不得而異也自記年僖公十先儒言殺里克不以其罪故不去官固是然克自與他弒君之賊不同雖見殺于惠國人猶或哀之也朱子謂克自不當安于奚齊卓之立但不可殺之者庶幾可與權之論乎自記年僖公十春秋之書螽穀梁子謂甚則月不甚則時恐反言之時當甚于月也自記五僖公十年六鷁書是月不止嫌與隕石同日而已如止嫌同日何不更著其日乎或者六鷁退飛不止一日也自記十僖公六年滅項公穀蒙上文以為齊人滅之左氏以為公有諸侯之事未歸而取項則魯人滅之也胡氏例內諱滅曰取此不諱公在外也諱者臣子所以施于君父以納三叛人不諱例之胡氏之説然矣或曰例以城楚丘烏知非齊滅也曰城楚丘義也且有我在焉故使如內詞滅項非義也如齊滅而非我也者使如內詞其可乎自記七僖公十年蔡服屬于楚舊矣齊之盟其非長楚明也班陳蔡于楚上于楚始會盟而正之也然則鄭何以後曰桓公沒鄭首朝楚斯役也其鄭贊之歟鄭畿內之邦非陳蔡鄰楚者比也春秋惡之故仍其下楚而下之曰是甘為服屬者云爾自記九僖公十年梁亡誰以告而春秋書之蓋秦人具其事實以告且避滅國之名也實非秦罪故仍之而書梁亡自記九僖公十年雨不足以沾渥曰不雨純無雨曰大旱猶無麥禾與飢也自記一僖公二十年僖之至自伐齊公蓋自以為功而告至耳危之説不可施于召陵久之説不可施于此故又有罪之説鑿矣自記六僖公二十年圍宋之役楚首序于諸侯之上矣故君在行而人之也不與其長諸侯也公從而會之盟不諱公何也沒楚即諱公自記七僖公二十年晉文入國不見于經曰不告也其定王室為求諸侯動未有不告者矣而不書惡而削之也以求諸侯故迎王受田請隧威取畿內之地功微而過積矣自記二僖公十八年歸不言其所自衛侯鄭言自楚惡其于楚而自乎楚也自記八僖公二十年元咺復歸于衛書自晉惡其所自也倚強國以訟君也自記八僖公二十年曹伯執不名而歸名與衛侯同義皆始疾晉侯之專擅而終乃本二君即楚去夏之非也胡氏又搜貨筮史為義曲矣自記八僖公二十年前年書公朝于王所諸侯遂圍許不以王所致而致圍許猶成十三年如京師會伐秦不以京師致而致伐秦蓋魯人告至原以圍許伐秦耳非夫子特筆自記僖公二十九年殽之敗恐當從左穀作秦師三傳經文同異茍非其義確然不易者則從二人之言耳自記三僖公三十年榕村語録卷十五

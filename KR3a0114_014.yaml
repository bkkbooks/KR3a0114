body:
  text: 榕村語録卷十四大學士李光地撰三禮問周家制度是周公手定孔子却説文王之文何也曰想是文王已有成模所以説倬彼雲漢為章於天丕顯哉文王謨周公守其家學而修之耳故孔子接文王周公算在見知裏周禮一書幸而存必有發用之時漢武帝直謂是戰國黷亂不經之書其後尊信周禮數人皆敗事所以人益不信北魏文帝周武帝唐太宗略倣佛行之如均田府兵之類皆有其意文中子之子福畤記唐太宗欲行周禮魏鄭公曰非君不能行顧臣無素業耳此未必確縱不精熟如考起來何至全無頭緒欲治天下斷非此書不可大學大應讀為太小學小應讀為少周禮小宗伯小司馬之類人皆知讀為少却不知讀大宗伯大司馬等為太冡宰一稱太宰以冡即太也甚且有稱為大冡宰者益可笑周禮在朝效天如妃嬪世婦御妻公卿大夫元士皆用三九在野法地如井牧丘甸皆用八四至國中象人如比閭州黨軍伍師旅皆用伍胡五峯以周禮為劉歆偽作説太宰豈有管米鹽醯醬之事之理不知男女飲食自外言之即治國平天下之要自內言之即格物致知誠意正心修身齊家之要日用間更有何事天者君也官猶司也冡宰所司者君之事故曰天官宰者調和膳羞之名冡大也君德者萬化之本而飲食盡道者又君德之本也冡宰掌王飲食男女之事使皆有節度此體信之道其為宰也大矣君正而推以均四海不過用水火金木飲食必時合男女頒爵位必當年德而萬物自育天地自位是調和膳羞其事至小而實大其義至近而實逺以此名官非喻也深哉知孔子無間於禹之心即得周公立冢宰之意光坡某意卷龍衮冕鷩冕毳冕亦當如今補子之類未必全衣繪之又絺冕或即葛為之大裘即黑羔裘也止可冬至祭天時著若五月大社如何著此鄭康成云絺冕著祀社稷注疏以絺即虞書絺繡之絺言繡粉米於衣也未知是否地者民也司徒所司者民之事故曰地官徒衆也即民也司徒掌又民之食擾民之性所謂盡制度品節之詳極裁成輔相之道也光坡至德以為道本道即藝也是存心以為致知之本敏德以為行本敏即敦敏勤敏之敏在知上説是格致以為誠正修齊之本孝德以知逆惡是修己以為治人之本逆惡注謂指在己者非是蓋知人之逆惡由家以及國與天下也知仁聖義中和中未發之性也和中節之情也四德皆在其中矣故後言中和不復細舉仁義等項小學先言德行而後及藝者如行有餘力則以學文所謂文不過是習其器數耳大學先藝而後德行者如博文約禮文行忠信所謂藝則窮理格物之事也土圭之法一假鄭注恐理之不可通夏至日道入赤道北二十四度北距嵩髙弧背九度餘夏至日道下直衡嶽晷無影從嵩髙至衡嶽夏至日道圜天之弧背以弧矢術求弦得衡嶽距地中弦徑約九度餘從陽城至衡嶽地平鳥道相去約二千五百里夫止二千五百里而一則尺五寸一則無影是百六十餘里景已差一寸矣則鄭注所云千里而差一寸恐未然也又鄭注謂景短者中表之南千里景短一寸景長者中表之北千里景長一寸如此則日下無景當在極南萬五千里之外而衡嶽之逺陽城不能萬五千里昭昭矣又言景夕者東表日昳中表景乃中景朝者西表日未中而中表景已中如此則極東之地日出方及三五尋丈日景已中極西之地日入未及三五尋丈日景方中若果地體方平四際彌天則信如所云矣不然如雞子裹黃之喻地在天中不過成形之大耳彈丸浮寄四際距天至逺四際距天之逺若一也則去日安能有逺近之殊乎雖日之出也極東先見及其入也極西先昏然隨其處各有曉午昏暮安知日東者不以吾為景朝乎日西者不以吾為景夕乎且此尺有五寸東西直比一帶中日景皆如是也何以定其為東西之中乎吾謂日南則景短多暑謂從此中表而南之地則當景短之時盛暑不堪若今廣州夏時炎赫倍於他州蓋景短即夏至非短於尺有五寸之謂也日北則景長多寒者謂從此中表而北之地則當景長之時隆寒不堪若今塞外冬時凛栗亦倍蓋景長即冬至非長於尺有五寸之謂也日東則景夕多風者謂從中表而東之地則景夕之時多風蓋東地多水多水則多風若吾州午後即海風揚也風起於夕故以景夕言之日西則景朝多隂者謂從此中表而西之地則景朝之時多隂蓋西地多山多山則雲氣盛若栁子厚所謂庸蜀之南恆雨少日是也隂霾於朝故以景朝言之如此則寒暑隂風偏而不和是未得其所求天地之所合者地中與天中氣合也合則四時交而無多暑多寒之患合則風雨會而無多風合則隂陽和而無多陰何以定之以驗寒暑陰風於五土而知惟此為不偏也然特就中國九州而奠其四方之中耳若論大地之中當在南戴赤道下之國則未知其何如也然則沖和所會無水旱昆蟲之災無凶飢妖孽之疾兆民之衆含生之類莫不阜安是乃王者之都也日至之景尺有五寸謂之地中者非謂必日景尺有五寸乃為地中是言地中之處其景尺有五寸蓋用以為標識也光坡鄭康成謂立八尺之表惟洛陽陽城影一尺五寸每千里差一寸陽城之北以漸而長南以漸而短短至廣州一萬五千里則表影全無矣今考洛陽出北極二十三度有奇廣州出極三十五度以成數要之只差十一度以今所製營造尺量之每二百里差一度止得二千二百里即以古尺二百五十里差一度算之亦止得二千七百五十里安得一萬五千里耶陳君舉好巧説謂孟子與周禮所説百里與五百里用方算可以約略扭合只是周禮説王畿千里中容得公侯之國多少此數必不能扭合奈何建都四靣必不能勻朱子辨永嘉之説是矣但禹貢分眀説甸侯綏要荒禹都冀州北靣亦不能有如許地看來只好活動説若必要説得的確恐反傷鑿九章二象也數也量法象也算法數也方田少廣商功勾股量法也粟布差分均輸盈朒方程算法也六書二形也聲也指事丨在一上為上丨在一下為下之類象形全圓中有奇為日半缺中有偶為月之類會意人言為信止戈為武之類三者皆形也諧聲如水可為河水工為江之類轉注如長本長短之長轉為長幼之長惡本善惡之惡轉為好惡之惡長本長於吾惡則自可惡之類假借如必乃弓帶之謂因必然聲同遂取為必然之用本非此字而借為此字三者皆聲也鄉遂兵多隱然有強本之意聖人作事多少意思都包在內鄉遂車制蓋一族出一兩為一乘其三卒則卒長為甲士餘為步卒其一卒則似為輜重之車也自記朱子疑周禮中以國服為息一條以為此能幾何而云凡國之財用取具焉此錯會了經書之指取具莫重看即此能幾何之意也不過是國之財用亦有取於此耳友言荆公保甲非如今之五家相保而已蓋五家出一甲兵也所以不能行尤甚均輸亦斷不可行如青苗法令程朱諸君子行之有何不可曰天下事大槩如此不得其人未有不弊之法如周官一書但立王畿千里一州之法他八州置之不問正是此意那時王畿之地有周召畢芮盈於朝寧恁甚詳密之法無不可行至外諸侯若強之行有必不能者但立一榜樣於此有能倣而行者天子未嘗不嘉與之不然亦止五年之間察其土地人民風俗貞淫在位賢否而已這是聖人識大體處若使九州盡如周官雖聖人有所不能春者其氣則天地溫厚之氣其時則陰陽適均之時中和之極也宗伯掌禮以教民中掌樂以教民和故曰春官光坡郊祀天地聖人説得如見維天其右之竟似天來享周禮大司樂一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神七變則天神皆降可得而禮矣八變則地示皆出可得而禮矣九變則人鬼可得而禮矣道理至此就到盡頭處了問人鬼何以居後曰天神地示是現成的鬼者歸也既去了又要追轉來豈不難致天神地示如目見形耳聞聲致人鬼如記念過的書已往的事自有難易向以天神地祗人鬼三祀所用四聲謂即上分祀六樂深得大樂必易之理可謂神合然不用商眀見於經若無射分祀奏之於此去之未有它考竊意宗廟之大簇為徵似復上文天神之訛也請并改大簇為圜鍾何如曰此説殊有理光坡龜象也筮數也求象於兆求數於變其法不同體有百二卦有六四其道亦異蓋卜書之亡久矣學者因莫之見遂謂卜筮皆出於易而援易繫卜筮蓍龜之言以證之考之春秋內外傳先秦古書所舉卜筮之繇其繫於筮者皆今周易文也卜繇别為言語絶無隻句與易相似者豈可溷乎愚則以為卜書五行也筮書陰陽也洪範曰卜五占用二此卜筮之大要也春秋傳晉卜救鄭遇水適火而史趙輩皆舉五行尅勝之義占之卜之略例於此可見光坡三夢舊注亦分三代其説無據且下直云其經運十其别九十不言皆異於前文則知三夢一法致夢者有以致之也如晝所思為夜則成夢是致夢也觭杜讀為奇奇夢亦思為所致而詭異不測樂廣謂夢有想有因致夢觭夢之謂也咸感也陟升也精神感而上通與鬼神合其吉凶以其無心焉故謂之咸也此三者足以盡夢之變矣光坡世説樂廣説夢曰想曰因想即日之所為因雖非日之所為而有所因不必正像其事而因此變幻而成仍應補其一曰兆蓋有全無所因而吉凶禍福之先見者周禮三夢正如此致夢即想也觭夢即因也偏倚不正因其類而有旁曲變幻之狀也曰咸陟咸感也陟通也精神上通而其端先見即兆也其後六夢亦當解歸此三類正與噩咸陟之類也思與寤觭夢之類也喜與懼致夢之類也如鏡然有正靣照見者有側旁照見者有我不見而門外之形影鏡已照見者卜師掌開龜之四兆舊注開出其占書而以占者下占人之事也卜師所掌在於作龜而不在于占龜所謂開龜者蓋若鑿龜之義云耳四兆者鑿龜之四方上篇鄭氏云春灼後左夏灼前左秋灼前右冬灼後右以正此四兆者為得其實光坡揚火以作龜致其墨墨者墨其將灼之處而灼之以致其兆也書曰惟洛食蓋食墨之謂卜有龜焦者有不食墨者皆不待兆成而知其凶也夫墨水也燋契火也火過而陽則焦矣水過而陰則不食矣光坡龜卜之法不傳今以周官書經注疏湊合想之粗可言者大槩龜之體猶筮之卦龜之兆猶筮之爻龜之頌猶筮之詞卦有六卜僅三一五二草五三一百草五五五行也草五五五也一百草五五其草五也內除三同如水水又水火火又火之類則去五行之純者只得一百草也其頌千有二百者如火珠林法每一有甲乙丙丁戊己庚辛壬癸日起故有一千二百也此某臆度之説龜灼視其紋與其煙紋曲者水直者火左斜者木右斜者金橫者土煙之蒙者為木直上者為火交互者為水斷續者為金成片者為土荆乃灼龜之木爰契我龜契應從鍥竟是鐡鑽用明火未開視卜詞而即以為襲吉者蓋方灼而龜即火起謂之焦龜版上有墨塗之墨乾謂之食墨若不乾鑽火而滅謂之不食墨皆陰陽不合大凶也即不卜若三卜總無焦不食墨之狀即謂之襲吉夫易論奇偶隂陽卜論五行生尅至京房則以卜攙入筮而以甲乙等日占之以青龍為木白虎為金朱雀為火元武為水而以勾陳螣蛇為土以合六畫是謂火珠林則古法淆亂矣古人最重筮所謂筮短龜長者筮分陰陽尚渾淪些至卜分五行則細微極矣然五行一陰陽也未可遽分優劣龜卜至漢文帝時尚用之其後遂不見用亦由孔子贊周易後而龜遂詘古者占夢必參以天地陰陽謂人感天地陰陽之氣於是乎有動於機而形於夢夫天地之會陰陽之氣變化於四時不可睹也故察之乎日月星辰而象見矣如春秋傳所載趙簡子事又史記宋元王夢一丈夫延頸而長頭衣玄繡之衣而乘輜車曰我為江使於河而幕網當吾路泉陽豫且得我我不能去王有德義故來告訴召博士衛平問之平乃援式而起仰天而視月之光觀斗所指定日處鄉四維已定八卦相望視其吉凶介蟲先見乃對元王曰今時壬子宿在牽牛河水大會鬼神相謀漢正南北江河固期南風新至江使先來白雲壅漢萬物盡留斗柄指日使者當囚玄服輜車其名為龜王急使人問而求之此皆以日月星辰占夢之法也噩謂所夢可驚愕此六夢者致夢奇夢咸陟皆有焉問王之夢而獻其吉者則凶者在所修省可知光坡周禮墓人為墓祭之尸恐是祭土神非祭墓中之人自記屋誅者所謂纖剸於甸人也蓋公族不刑之於市耳謂是門誅大非尚書伯禹作司空而後契為司徒是唐虞之官也王制司空度地居民而後司徒修禮明教是夏殷之官也洪範四曰司空五曰司徒殷官又其著者帝王皆首司空而周公獨後之何蓋與易以艮成終成始義合也是故冡宰掌天司徒掌地兼總條貫是二官者包乎上下其外春夏秋冬各司一事宗伯以禮樂教而實由司空之冨邦國生萬民而後教化行則自冬而春貞下起元之義也禮以節之樂以和之政以行之刑以防之極其效不過欲老有所終幼有所長黎民不飢不寒矜寡孤獨廢疾者有養而已則春生夏長秋收以至冬藏之義也以此為終而實王道之始以此為始而要其成何以加茲深哉周公之意豈有異於堯舜禹湯之心乎光坡考工記文字最妙豈劉歆所能到人不信周禮遂將此書推與劉歆近如閻百詩黃梨洲輩並將周禮亦推與劉歆卑周禮失其平不覺尊劉歆過其分矣古者做車有輿人有輪人各專其事輪最重古輪最圓外邊皆圓脊行地不滯今不圓而外廓著地之木皆平方又用鐡皆岨峿不平故不穩貼古一車四馬然既云脫驂則三馬亦可又良馬五之則五馬亦可西洋人不可謂之奇技淫巧蓋皆有用之物如儀器佩觽自鳴鐘之類易經自庖犧沒神農作神農沒堯舜作張大其詞卻説及作舟車耒耜杵臼弧矢之類可見工之利用極大周官一本考工記全説車輔人一篇尤要緊定九先生云中庸説九經必言來百工而車尤難工車中唯輪最妙其行地者無多而輕利以上周禮周樂是四節一升歌三終堂上人歌鹿鳴四牡皇皇者華用琴瑟和之無他聲二笙入三終堂下笙南陔白華華黍亦無他聲三間歌三終堂上歌魚麗畢堂下笙由庚又堂上歌嘉魚畢堂下笙崇丘又堂上歌有臺畢堂下笙由儀四合樂三終堂上歌關雎葛覃卷耳堂下笙鵲巢采蘩采蘋衆樂器齊作舞亦在此時而樂終矣書戞擊鳴球一節恰是如此以詠是升歌下管是笙入笙鏞以間是間歌笙笙鐘笙磬也與笙相合者鏞鏞鐘鏞磬也與人聲相合者簫韶九成是合樂簫乃舞者所執與簫同問王方麓尚書日記亦如此説曰正賴此心此理之同某節分原道以為獨見張長史與某同解離騷求女為求賢以為獨見而方靈臯與某同問古樂舞在何時曰其在合樂時乎問合樂時鵲巢采蘩采蘋皆有詞亦可入笙耶曰可但看如今之琴無詞者固多然有詞者何嘗不可彈問作樂時用律否曰不用律以制樂器者所謂王府則有也律和聲亦是推本言之如製鐘要中黃鐘之律即取黃鐘之管以驗其聲十二律皆然問八音要合十二律每音皆有十二器乎抑一音一器即可備十二律之聲乎曰革木二者如何合十二律惟鐘磬備十二律之聲故樂以金石為宗絲即一器中可備十二律竹匏一器中亦略備土便不能革木不過用以節之止之耳問堂上升歌固用金石矣不知亦用鼓否曰用如今之唱曲板也如何不用問升歌之瞽者是幾人曰二人升歌笙入間歌合樂四節皆三終是卿大夫樂不知天子諸侯如何只是以鹿鳴四牡皇華文王大明綿清廟維天維清皆三詩觀之恐亦三終也大都卿大夫笙入用笙天子諸侯則用管故詩曰嘒嘒管聲書曰下管鼗鼓而享禮曰下管象舞燕禮曰下管新宮也升歌只有人聲琴瑟以鐘磬節之而他音皆止笙入只有笙音以鐘磬節之而他音亦止天子諸侯於笙入時用管至間歌合樂則仍用笙不用管問升歌笙入間歌都有詩章名目至合樂時舞不知所舞何詩曰經無明文既云合樂關雎葛覃卷耳鵲巢采蘋采蘩想舞亦應舞此伯叔自期而下便至小功無大功朱子以為開元禮之誤非也喪以期斷父斬衰三年祖期年皆加隆之服惟祖加隆為期故同祖之伯叔亦期若同曽祖之伯叔則本服原止宜五月自祖至髙祖皆直上直上者皆齊衰但月數不同不得稱為緦功伯叔皆旁列旁列者依大功小功緦麻而為服平常人服十五升布次而緦麻次而小功次而大功次而齊斬八十縷為一升以經言也古人衣服吉凶不分顔色而分粗細緦麻與錫衰與常服一樣皆十五升錫衰緦麻練麻漚洗也而不練布常人所用未織布之先練麻既織布之後又練布總欲其熟而白也北首南首死者稱首不稱靣若稱靣是腳對人故不可也自記揖即肅拜春秋傳敢肅使者自記以上儀禮聖人説疑思問如何禮記又説疑事毋質蓋謂必不能知之事如四海之外存而不論者耳舉之以質是有意窮人也客絮羮主人辭不能亨客啜醢主人辭以窶若主人如是為辭豈不是羞客意此二句是解上文恐主人愧不能亨及窶也古人文字簡辭字是解作避字子夏子遊以文學稱其為文簡練琢磨調法俱備子夏儀禮傳髙似公榖有力量公榖皆其門人子遊文雖不可考以子夏度之亦可想見又檀弓篇中多有推尊子遊處以為子遊之徒理或然也檀弓文有姿致子夏比之又覺簡質而徑此便是南北文字分派之始古人尚左兵事喪事始尚右東嚮西嚮以南方為上南嚮北嚮以西方為上此二句難説古人先祭於室則拜者西嚮自以南方為上及祭於堂則拜者北嚮自以西方為上皆尚左也東嚮南嚮並無此行禮之處或者太祖在室東嚮矣而行禮者西嚮則以南方為上太祖在堂南嚮矣而行禮者北嚮則以西方為上或問古人若盡尚左則楚人尚左襟皆左又似單為楚人所尚曰是言軍事應尚右而楚人仍尚左也夫子有姊之喪拱而尚右可見喪事亦尚右朱子謂申生當辨而走申生所處雖未必合於中庸但不害其為孝子此不須論曽子易簀此本小事不過人送一席等間鋪著有人説此是大夫之席曽子即易之臨死時如此可見聖賢學問精密如平時有人説自然亦如此朱子所謂不欲為己甚而黽勉以受其賜至死生之際則又有異者乃因問者支離朱子隨所問必辨到是處耳看書似此類不必多著語言王制當是殷制故其通篇次敘恰與洪範八政相符想禹當年錫洛敘疇之後一切規模制度都從此出所以禹貢中山川田賦數皆用九殷人承之因於夏禮所謂纘禹舊服者也則夏制疑亦倣此直至文王演易畫出後天圖來其後周家六官遂從天地四時起義非復八政四司空五司徒六司寇之序矣然賔師二者洪範次於後而王制居前王制所以定立國規模非洪範立教垂訓之比賔師乃國事之尤大者故先之清植每嘗以為古人四術之教比之今人經史之學工夫較省今思之不然禮樂二者條件正多不學操縵不能安絃先要將正樂學會了又要將九夷八蠻琵琶箜篌之類無所不學然後能安絃不學博依不能安詩先要將正詩學會了又要將秦楚趙代之歌民謡巷謳無所不曉然後能安詩不學雜服不能安禮要先將正禮學過又要將一言一動猥雜瑣碎節目之詳無所不習然後安禮不興其藝不能樂學學固要志道據德依仁能是矣又要遊藝如此條目節次終身固有不能盡者所謂安者不曽經過未免疑惑如人走路已知正道若不將旁路岐徑皆曽走過有人言從某路走又比大路好些心裏未免疑惑唯走過了才知他或險僻或迂曲不若正路之坦易如在道上趕賊正路趕不上就知道他從那一條小路上去了不然不知也日星從天而屬陽四時日星所經也山川從地而屬陰五行山川所主也然五行之氣實上播乎四時之間如雷風雲雨霜露之感遇聚散無非山川所風雨蔡傳皆作比喻言其實此數句班孟堅説得好班云日為寒溫月為風雨人事變於下天道應於上故云日月之行則有冬有夏月之從星則以風雨星有好風好雨亦有好燠好寒者日永星火非燠乎日短星昴非寒乎下文冬夏即燠寒也蔡傳以四有字相配而以月之從星二句另説故差班孟堅以星好風好雨另説而以下文兩則字相配便明白的確寒溫皆日主之風雨從地起故月主之但看潮汐全應月蛤蚌之類皆以月之盈虧為肥瘦海中颶風起定在六月十二却不應節氣只是孟堅尚不細膩有冬有夏如何嵌一月字在內蓋寒燠雖因日之逺近而月亦有分月去人最近如冰輪在頭頂上故日北陸則殺其暑南陸則益其寒所以不單言日行至風雨則全是月主之問人事變於下天道應於上二句何所指曰此本言庶徵也日月之行經歷星之好寒者則為冬倘當寒而燠是必人事之變日月之行經歷星之好燠者則為夏倘當燠而寒又必人事之變月從星鬱五行之精地所載之神氣然皆應天之時與之同流故天雖有春夏秋冬之四時而所以化生萬物者亦不離乎風雨霜露而已夫五行播於四時是天地陰陽之和合也和合故月生焉陰精陽氣會於太虛而成象生之謂也古今説者皆謂月在天星日之下而居地之上其去地也最近是月在天地之中而所以調和斟酌乎陰陽者故曰月以為量也其盈也三五以受陽之施其闕也三五以育陰之孕光坡天秉陽一段是聖人極至之論朱子以和而後月生句為疑謂難道陰陽不和月便不生然考堯典四仲亦只説日星不説月後靣讒説以閏月定四時成歲便是將月另説厯法至近來西洋人愈講得精密但他只講得厯法不知厯理如何比得天地以為本四時以為柄日星以為紀月以為量鬼神以為徒幾句説得精月字亦不與日星同説此皆聖賢實實知道故如此的確説出洪範星有好風星有好雨日月之行則有冬有夏月之從星則以之好風者當風而不風與不當風而風從星之好雨者當雨而不雨與不當雨而雨亦皆人事之變上言雨㿩寒燠風此言冬即寒夏即燠風雨即上風雨不言暘者不風雨則皆暘不必説也月在天地陰陽之間所以説和而後月生説他在天他去地極近全管地下的事説他在地他又與日星為類而名三光説他是陽他却體質全是魄説他是陰他却受日之光亦能久照三五而盈從陽也三五而闕從陰也問如何是月以為量曰以閏月定四時成歲以此為度量日大暑熱他以冷氣節宣之夜至幽他受陽光照臨之亦為之劑量也問如何是鬼神以為徒曰如易中水火山澤雷風皆是天之材料各有職掌然使各各不相照顧豈復成天地惟中間有帝為之主宰便都聮成一箇所以水火相濟山澤通氣屈伸往來變化流行皆鬼神也如國家六曹各有經管總是替人主辦事如耳目鼻口手足都是人之材料然有心在衆皆稟令便聮成一箇去此便不成物事故曰鬼神以為徒天秉陽一段極精以陽屬天日星從之陰屬地曰竅於山川則風雨從之故十里不同雨百里不同雷千里不同風地之為也金木水火土雖皆從地然質具於地而氣行於天故曰播於四時問和而後月生不似先有日星而後有月乎曰却不可如此説特語勢自然如此耳樂記人生而靜一段真是千聖傳心之要典與虞廷十六字同人心道心四字渾含精微天理人欲四字刻畫透露自記七情不如言喜怒哀樂分屬四時整齊細思之亦有理喜木怒金愛火惡水各配一行土有兩欲在季夏懼在季冬水亦有兩惡與哀也自記惟不忍其忽然而散也故祭之明日有繹今人甫祭畢而誠意怠散不知此理故也自記自漢以來相沿説諸侯不得祭始祖大夫不得祭髙祖至程子毅然反之以為此古禮之散失也聖人却不如此走獸知母而不知父飛鳥知父母而不知祖人之所以異於禽獸者此也喪祭一也服制五服而祭不得及四代於情理不順所謂天子七廟諸侯五大夫三適士二官師一者廟數不同耳自大夫以下合併祖考之位於三廟二廟一廟而祭之非一主占一廟而不及祖曽髙及始祖也其等級隆殺以廟制品物分尊卑貴賤耳卑賤亦人也獨禁之不得親其祖此豈所以令民德歸厚之道此語大有識見所以司馬溫公稱其有制禮樂之才不誣也朱子亦如此説若謂大夫便無太祖詩經何以有南仲太祖之稱朱子先依程子行禮後復心歉又止祭四代然細思程子之説可從若庶民之家即茅屋祭其始祖固自無害於禮法也深衣之制上衣下連裳邪幅殺縫蓋省裳也古時衣短不掩裳故朝衣與裳相接處有芾以蔽而聮之朱子曰祭服謂黻朝服謂鞸至明武宗時蔡虛齋為江右提學朝寧王他官皆著芾虛齋獨不芾曰不可與朝天子同也芾即黻與鞸也古人內著衷衣甚長外裳外黼外朝衣甚短顯芾與裳也上己非上已或謂近代有稱地支者不知上丁上辛上已皆是天干取柔日惟為天干故一月之內各有上中下若地支則上中下間有不備者矣禮記陳澔注不如鄭康成逺甚鄭是將全部書讀熟前後有照應陳注後忘前前忘後都相礙禮記注疏最好以上禮記榕村語録卷十四

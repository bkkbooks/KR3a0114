body:
  text: 榕村語録卷十三大學士李光地撰詩詩經道理不出齊家治國平天下二南從齊家起雅則治國平天下頌則天地位萬物育郊焉而天神格廟焉而人鬼享然其理不外於修身齊家大指如此至從來說詩的藩籬有說不通處須與破除不然都成挂礙且如周南召南以為皆被后妃之化之詩若漢有遊女有女懷春之類何以女人都被后妃之化變成貞潔而男人被文王之化尚不免於淫蕩乎黍離變為國風而雅亡難道西周畿內便無風謡東周賢人君子憂時念亂不許有雅不成以頌盡為周公制作禮樂時作將成康顯然名號皆強為之辭豈復可通大約周南召南是分陜時有此篇名後來仍其名而附以西周風詩之醇正者小雅大雅亦如此問是孔子附的抑是舊編如此曰恐舊編便是如此且只如此分剖義例放寬些便不致東擊西撞動成觸礙大雅自卷阿以上文武成康之詩民勞以下厲宣幽平詩衛武公想是厲王時人小雅之賔筵大雅之抑戒恰好皆在厲王時名時問考衛武公立於宣王時卒於平王時史中甚眀恐二詩或是追刺之作曰幽平之際武公恐已不在了不然王室之亂至此全不見他勤王晉鄭焉依衛密邇於鄭漠然不相聞問尚可謂之睿聖耶以理論之恐古史年代多不可信矣雲漢嵩髙蒸民韓奕江漢常武宣王之詩瞻卬召旻眀眀是說幽王世次一些不亂小雅自鹿鳴至菁莪文武成康之詩六月以下則宣王詩節南山至鼓鐘顯然為幽平之詩乃自楚茨至車舝復起頭似文武成康之詩青蠅賔筵魚藻似厲王時詩黍苖眀是宣王詩白華眀是幽王詩又照前世次另叙一編是何緣故前人都不於此致疑看來豳風是周公營洛時作所謂汝往敬哉兹豫其眀農哉自己要教民以養生之道恐成王不知稼穡艱難故作七月之詩道王業之本祖宗之事以告之夫子既存此詩因將居東時詩附焉而皆謂之豳風周禮祈年於田祖吹豳雅以樂田畯祭蠟吹豳頌以息老物朱子疑大田良耜等為豳雅豳頌而未嘗言之詳今觀小雅楚茨信南山甫田大田頌載芟良耜絲衣皆言豳事所謂豳雅豳頌其餘則皆東都之詩如東山破斧之附七月也如此則西京之詩自文武以及幽平東都之詩亦自文武以及幽平有條有理各得其所矣鄭康成好以一二字傅㑹至周禮言豳風豳雅豳頌處字靣都與雅頌合却不將來作證不特迎寒迎暑與豳風寒暑之月合雅中以御田祖田畯至喜恰與迎田祖樂田畯合頌中胡考之寧胡考之休恰與息老物合此數詩周公所作竟令天下用之所謂制禮作樂也詩中顯有證據的自然為某人某事稍涉遊移者便當空之愈空愈好何用實以世系姓名為哉只是要見其大處六經皆是言天人相通之理然猶零碎錯見惟詩全見此意國風所言不過男女飲食之故雅雖賢人君子所作所言亦不過此即三頌中居歆奏假洋溢同流亦總不出此其言情情即性也聖人盡性徹上徹下見到至處我輩此時飲一杯茶㸃一盞燈厮役之侍立偶然之嚬笑得其理便是天道無有間隔原道見得精其法其文其民其衣食云云直至生則得其情死則盡其常郊焉而天神格廟焉而人鬼饗後代作憂患詩其歸多是何以解憂惟有杜康意思便昏冥去詩則曰我日斯邁而月斯征夙興夜寐無忝爾所生又云人之齊聖飲酒溫克彼昏不知一醉日富又云如臨于谷如集于木即女子善懷亦能說出不忮不求何用不臧緑衣之什歸于思古人信是王澤未歇聖人刪詩之意當就論語中求之如素以為絢句某意即在碩人之詩而夫子去之素自素絢自絢如人天資自天資學問自學問豈可說天資髙便不用學問不成正如雖曰未學吾必謂之學又如質而已矣何以文為一般繪事後素亦言繪事必繼素後耳禮後乎亦言禮必繼忠信之後乎皆言絢不可抹殺也推此可以見刪詩之意天地神人以至鳥獸草木總是一箇性情雎鳩之摯而有别麟之仁厚草木之榮落翩反皆天地之性萬古不變月落萬川處處皆圓一𣪚為萬萬各有一原自無兩惟然故詩中比興用之朱子易詩二經解大假是了亦有未細處如易中取象龍馬雞牛之類皆有精理朱子都略將過去詩之比興朱子亦看得無甚關係而興尤甚朱子舉沅有芷兮澧有蘭思公子兮未敢言及山有木兮木有枝心悅君兮君不知云此上下句如何勾連不過是隨便說出一句以興下文耳其實此二處皆有關合湘夫人一章本是托意於舊日僚友故言芷蘭臭味原自相同今乃托根於沅澧幽閒之間以興已之踈逖不得與舊僚為侶也所以接云思公子兮未敢言枝以木為體木以山為根山若不生滋潤則木必枯木若不有滋潤則枝必枯所以接云心悅君兮君不知詩中興體未有無關合者清植詩傳叶韻已好尚不如顧寧人考據精確六經皆可通如外禦其侮蒸也無戎朱傳云戎古皆作汝戎雖小子而式𢎞大戎汝也然於整我六師以修我戎戎亦讀汝顧氏則云戎有二音兵戎之戎仍當讀容是也知子之來之雜佩以贈之來與贈斷不可叶某意能字古多作來音然才能相能之能仍不可讀來蓋亦有二音也此來字應是能字謂相能也因漢人傳經口授訛讀致誤小雅無木不萎叶思我小怨萎與怨亦不可叶古音凡卯字皆讀作慰彼菀者栁菀即蔚也讀慰便與萎叶興字有蒸侵二韻寧莫之懲蒸韻之興也載寢載興秩秩德音侵韻之興也童子入孰讀詩經便當教以古韻韻之所叶假落多在其中兩句一連者自多但三句一連者亦不少申伯畨畨章若兩句一連便全不叶惟畨畨叶嘽嘽翰與憲叶詞義皆順民之未戾章亦三句一連可與歌叶頌多不叶韻大雅近頌亦多不叶韻韓昌黎到底文字結習深其云周詩三百篇雅麗理訓誥又曰詩正而葩孔子說詩却不如此看興觀羣怨正墻靣而立無以言何嘗說到此來近看詩經覺得漢人只逐句解朱子則逐節解某今逐篇解又數篇通部㑹合解便看出許多層次聨絡照應來問國風次第曰二南風化之首邶鄘衛乃與二南反對者周以齊家而興衛以淫亂而亡且衛即紂之汚俗所謂殷鑒不逺也王風衰弱亂由褒姒次於殷之故都鄭乃畿內之國王畿之風化可知王綱頺敗則霸國興故次以齊晉唐魏即晉也霸者再衰則天下之勢歸於秦所以刪詩録秦風刪書録秦誓鄶風之卒章傷天下之無王曹風之卒章傷天下之無霸豳風居末者見變之可復于正也問此果是夫子當日次第否曰如今所行者鄭成康本也以左傳季札觀樂篇觀之依稀似是關雎之詩作太姒思賢自作其說為長內政修治使夫子正位乎外一切賔祭皆無舛失豈是易事太姒有見於此故思所以助君子者未得至有寤寐反側之憂得之則有琴瑟鐘鼓之樂從來惟此為哀不傷樂不淫外此未有不淫傷者蓋螽斯麟趾之本也問樛木篇所云樂只君子朱傳謂指后妃猶言小君內子也竊意君子仍指文王說后妃能逮下如樛木之芘葛藟以致室家和理天下化成則文王膺受多祉矣文王膺祉則后妃之福履可知於禮祝嘏止及主人而不及主婦亦以婦從夫故也若祝后妃而略文王反覺非體如此解君子二字不用分疏意味似尤深長曰此說亦好清植朱子把興義都抹却便多錯了詩意野有死麕篇之言懷春非是如俗下所謂思春周禮仲春㑹男女不是男㑹女女㑹男想是男女各為㑹元鳥至祠髙禖即此時也當春而出則曰懷春耳死麕照吉士白茅照有女首章是疑詞言死麕豈白茅所包乎有女豈為吉士所誘乎二章乃洗刷有女之詞言死鹿原在雜木之中白茅固無恙也末章則申說其如玉而嘆其不可誘又如漢廣之詩全在喬木錯薪著意喬木髙不可攀緊對遊女不可休思緊對不可求至下錯薪緊照上喬木言游女喬木也豈可與尋常雜亂之人一例看待彼翹然雜薪則可得刈其楚刈其蔞矣何不可攀之有此類只好與之子喂馬喂駒耳言無能為役也其立言藴藉曲折方好接漢之廣矣四句若但言欲秣其馬欲秣其駒與下文不相粘合喬木以興游女之持身髙峻詩傳中亦有此意至下錯薪竟說得似實事一般言貪慕之子之甚故刈薪以飼其馬駒庶以求悅於之子看來不是因上文以喬木起興故言喬木乃不可休耳若錯薪則可刈之矣錯薪豈喬木擬哉僅可飼之子之馬駒而已不但不可比之子并不得比之子之馬如纍降之人只堪為僕𨽻後世以龍眼為荔奴正是此意清植何彼穠矣一詩言帝女下嫁之事若是諸侯之女便應先夫後妻如韓侯娶妻之類方是倡隨之常所謂齊侯之子衛侯之妻者乃是叙其閥閲非正言嫁娶之比故不妨先母家而後夫家此詩先說王姬見得不同於諸侯說王姬之車不說下嫁而下嫁顯然矣王姬到底是何世系下嫁到底是何國曰平王之孫齊侯之子先平王於齊侯尊王也所以先著王姬也齊侯侯封也何敢娶於天王㛰姻者人道之常不以勢地而隔絶故曰其釣維何其絲伊緡畢竟地道也妻道也臣道也乃曰齊侯之子平王之孫先子於孫從夫也春秋于天王嫁女先曰築王姬之館于外後曰王姬歸于齊義例即出于此一發五豝自是注疏說好豝雖有五其發則一而已方是解網之仁大易失前禽之意若說一發而中五豝無論無此事亦不見仁愛之心矣邶鄘詩皆衛事而仍繫之邶鄘說者以為詩本得之其地但就中有莊姜詩却說不去或是用邶調鄘調因以其調繫之紂作靡靡之音大抵皆哀怨悽切由之瑟為比鄙殺伐之聲朝歌而北謂之邶南謂之鄘東謂之衛北鄙即邶子路衛人好此故鼓之谷風篇毋逝我梁四句傳作戒新婦言毋居我之處毋行我之事又自解說我身且不見容何暇恤我之後哉亦說得去但小辨卒章亦用此若如此說則與上文君子無易由言耳屬于垣不相連接矣况梁與笱義皆無取閲字尤難說某意此蓋取譬於魚以戒後人也逝字發字皆指魚逝即悠然而逝之逝發即鱣鮪發發之發若曰其夫乃無常之人今雖宴爾將來恐汝亦逝于我梁而發于我笱也前車宜鑒我不是身親閲歷暇為後人憂耶如此說即小辨亦可通貫言我已被讒而逐後人無蹈吾故轍也末章如傳說亦好某謂不如總作御窮說窮冬之時我蓄㫖以御之至家道好時便宴新昏而厭棄我是以我御窮也汝今者驕盈恣肆之狀盡我勞苦所詒也不念昔者我初來汝家之時是何如景況耶如此說與前兩章都有關照問式微篇首章曰故曰中露次章曰躬曰泥中蓋失國之初必有奔走望救之事所謂控于大邦也及乎救斷望絶則與其君相守坐困而已始不辭勞終無二志可不謂忠乎曰看得好清植問采唐諸詩似可不存曰我輩選詩便持此見聖人所見者大存此見衛之所以亡二南之化以刑于寡妻而興衛之末流以子之不淑而亡所謂可以觀也黍離之詩若說宗廟宮室盡為禾黍何以黍總是離離稷則由苖而穗而實難道黍就不苖不穗不實乎此是周既東遷秦逐西戎遂盡有西周之地故詩人過而憂之黍五榖之長喻周也稷五榖之亞喻秦也彼黍離披不支稷則有根苖矣始過之而中心搖搖也秦漸強而大周之不競如故也故黍猶離離稷則不止於苖而穗不止於穗而實矣故過之而心憂不特如醉而且如噎也大凡詩首句不變而次句不同者如有兔爰爰之類皆有義㫖不是換韻而已東萊以為詩無邪焉得有淫風朱子以放鄭聲詰之呂云鄭聲淫非鄭詩淫也朱子曰未有詩淫而聲不淫者本末源流已一句說盡但却亦要知詩自詩聲自聲不然虞書何為說詩言志又說聲依永夫子何為說興於詩又說成於樂不淫詩亦可以淫聲歌之淫詩亦可以不淫聲歌之如旦曲以淨唱淨曲以旦唱只是不合情事耳何以放鄭聲不放鄭詩這却易知醜行惡狀采風者存為鑒戒見得淫風便至亂亡若播之於樂要人感動此心却是何為如商臣陳恆等尋常說話時何妨舉為滅倫亂理之戒若被之管絃摹寫他如何舉動是甚意思聖人之權衡精矣詩傳不從注疏之無情理者極多甚是但其有情理者應存如雞鳴舊注却好謂極昏亂之時而有心中明亮之人如風雨之候早晚皆不可知而雞却至其時而鳴不已也蒹葭篇舊注以蒹葭徑利喻秦俗強悍蒹葭而柔以霜露則可用喻秦俗當澤以周禮伊人即能澤以周禮者其說雖似太迂然倒轉來以蒹葭喻秉禮之君子以霜比秦人之威刑却極貼合恐當時學究相傳未必全是臆說賢者不移於風氣如蒹葭至秋尚蒼然蔚茂而秦之悍暴如霜威摧殘之此非有獨立不懼威武不屈之節者不能此人自在山巔水涯之間所以上下求之而不能舍大凡詩起興者興中即帶比意取譬于霜極象秦之嚴急取譬于風雨極象鄭之淫昏出其東門舊說亦以為淫奔被朱子改正過來鄭俗雖然不好既有雞鳴戒旦之作不許有出其東門之人耶惜乎朱子改之未盡如風雨子矜尚可不以淫解之或疑葛屨蟋蟀信是勤儉若山有樞殊不類曰此正見其儉處衣裳自宜曵婁車馬自宜馳驅惟不肯曳婁馳驅故徹底打算到生死之大故而後決計其吝嗇之意言外可掬鳲鳩四章依舊說不過是每章換韵至第二章尤說不去難道淑人君子之常度只在帶絲辨騏乎此詩須合前後篇觀之候人之詩譏德不稱官賢人在下故曰不稱其服曰季女斯飢下篇冽泉亦是此意推此便得此詩之解鳲鳩飼子朝從上下暮從下上均平如一君子之儀亦然故由其儀之一知其心之如結也下三章都承此章說言君子不是以一例看待為均平如此則賢否不辨反不均平矣鳲鳩在桑其子則在梅梅佳木也淑人君子則於賢者其帶之也伊絲矣帶既絲則辨之也伊騏矣大夫之服也鳲鳩仍在桑而其子則有在棘者矣棘惡木也君子於不良者而法度不肻差忒法度不肻差忒則足以正四國矣鳲鳩仍在桑而其子則有在榛者矣榛比棘差好比梅則不及平等之人也可以善可以惡君子則善其儀法以正之能正是國人胡不更歷萬年以保其家邦乎觀墓門有棘則斧以斯之可知為惡木矣墓門有梅惜其有梟萃止可知為佳木矣凡上句不換次句逐章換者皆有義理得其理字眼皆合意思甚足下泉亦說得未當易云井冽寒泉食冽潔也功足以及物有何不好詩意倒是說稂蕭蓍皆賤草而受冽泉之潤亦不稱其服之意三章俱念周京之盛時其盛時云何即末章也芃芃黍苖非稂蕭類也則有隂雨以膏之四國已被王澤矣又有郇伯以勞之此周京之所以念也黍苖與稂蕭對隂雨與下泉對詞意顯然又侯國取喻于地之下泉王澤取喻于天之膏雨都妙下泉之詩以稂蕭為下泉所浸譬周衰小國受困於物理亦不然泉以潤物為功豈隂雨足以膏物而泉水反以害物之理直以下泉不溉禾黍而浸稂蕭此隂雨之膏黍苖所以可思也稂莠害苖蕭艾離騷以喻小人蓍亦蓬蒿也皆惠及小人之謂若浸黍苖則佳矣使膏雨不潤黍苖何佳之有反照便見七月一篇凡陽月皆稱日隂月皆稱月惟四月秀葽一章本為推寒候所自始故獨稱月見四月雖純陽而一陰已萌也與易經中陽卦稱日隂卦稱月一般文王家學是一線下來的問七月篇兼用夏周正從夏正者以追叙舊俗而豳公夏人也從周正者是詩作於周公也曰或是知此清植大小雅若說是以體製分别看來殊不能分如桑柔召旻若入小雅恐亦無别或小雅乃列國君卿大夫士君子所作大雅則王朝卿士之作衛武公一人之詩其入小雅者或在國時所作入大雅者則為周卿士時作四牡父母也皇華君臣也常棣兄弟也伐木朋友也杕杜夫婦也小雅分明以五倫排起關雎鹿鳴文王清廟都是說文王所謂四始也今看鹿鳴直似文王自作之詩人之好我示我周行視民不恌君子是則是效非文王不能為此語儐爾籩豆兩節某意不欲依朱傳說言不必肆筵設席但有籩豆可列便當飲酒為樂與兄弟共之兄弟之不和吝爾乾餱耳又言必得妻子同心兄弟乃得永好無斁兄弟不相耽樂妻子間之耳朋友相與尚不輕絶何況天性豈反踈薄必有其由今欲宜爾室家在乎樂爾妻孥試自究之圖之豈不誠然乎哉即刑于寡妻及尚書我其試哉之意如朱傳說是究是圖二句殊無力和樂且孺且湛孺字湛字俱下得極妙兄弟在孩孺時未有不相善者只是起居飲食同在一處故彌親厚今儐爾籩豆飲食之飫兄弟既具不惟和樂且如孩孺時之相親矣兄弟所以不和者妻子間之也妻子好合非強合也必也與吾同調如琴瑟之相和吾所敬者彼亦敬之吾所愛者彼亦愛之則兄弟既翕不惟和樂且樂之終身不厭矣如有癖好不能自解一般詩即極淡處都有意思條理不可忽略看過如南山有臺首章說為邦家之基次章說為邦家之光至三章民之父母便承基字說惟為民之父母故為邦家之基也德音不已便承光字說惟德音不已故為邦家之光也四章末章把壽顚向前而曰德音是茂不止于不已也曰保艾爾後所謂保我子孫黎民不止于民之父母也章法結搆都有血脈義理又如蓼蕭首章是說初見時燕語歡洽以其聲望好也二章為龍為光如今時召客云寵臨光降也何以有譽處以其德不爽壽考不忘也三章則燕飲而見其豈弟矣所謂其德不爽壽考不忘者於何驗之以其宜於兄弟友邦而知其令德壽豈也末章則賜以車馬也即露之湑兮瀼瀼泥泥濃濃皆由淺而深一毫不亂古人說恩情未有不歸之德者湛湛露斯言澤之渥也緊貼厭厭夜飲匪陽不晞言時之久也緊貼不醉無歸次章在彼豐草露之所聚也在宗載考飲之所集也三章在彼把棘杞美而棘惡言湛湛之露無不被之澤由顯允君子無不令之德見宴於宗室者實重其德也桐樹惟其有實所以有離離之形君子有豈弟之德所以無不令之儀見不醉無歸者非沈湎而失度也詞義都妙有人問古來田獵詩以何為第一某答之以車攻問者笑云又來說道學了某云叙田獵孰不鋪張熟閙即至結末收歸正論又顯然發露意味便短杜工部觀打魚詩亦只如此此詩乃云蕭蕭馬鳴悠悠斾旌徒御不驚大庖不盈宛然王用三驅失前禽邑人不誡之意即相隨衆人皆有網開三靣之仁至云之子于征有聞無聲說得逼靜聞逺而聲近聞次第而聲囂張聞小而聲大聞安和而聲疾急却不說出仁愛物類終事肅靜字靣而意味深厚玩味不盡凡物力之備射御之精法度之整齊人心之歸向一假虛公有學問之意無不曲曲傳出其實有聞無聲豈惟田獵萬事皆要如此一有聲便僨事問正月卒章詩所云佌佌蓛蓛者小人也方安其居而食其祿獨此下民天乃夭死而椓喪之富者猶可僅存惸獨則可哀甚矣似無祿之民其中猶有富者恐富人即指上文有屋有榖之小人惸獨乃天夭是椓者耳曰如此說好清植問匪舌是出維躬是瘁朱傳解云非但出諸口而適以瘁其躬以下巧言如流俾躬處休例看恐匪舌是出句只是找足不能言意猶巧言如流句只是找足能言意曰是如此清植各敬爾儀天命不又又字妙一去欲他再來便不可得若是修德便源源而來觀保右命之自天申之申錫無疆等可見奕奕寢廟一章從來說未明白說寢廟大猷下忽然說他人有心躍躍毚兔總粘不上此章是承上章屢盟來推原由于君子之心不免於曖昧也以曖昧之心御機變之巧斷不能已亂而堲讒彼此懷疑屢盟何益試看奕奕寢廟君子之所作也何等光明正大秩秩大猷聖人之所定也何等顯易明白你看君子聖人如此似踈濶不能覺察人情世態之變幻究之他人有心皆能忖度得之任如狡兔之跳躍不常而遇犬未有不獲之者以險阻焉能知險阻惟易簡可以知險阻故易曰恆易以知險恆簡以知阻春秋年年盟年年亂正坐此耳凡人遇讒惟心裏對之以光明處事只順著正理慿他如何來我意中似沒有一般便一㸃不足以礙其靈臺莫子荓蜂自求辛螫蜂來到肌膚上切莫動他一動他便一螫非他要螫你怕你害他故螫也虎不咬嬰兒不是慈愛嬰兒知嬰兒不害他耳佛家亦窺見此意一人屢無禮於釋迦釋迦只不應久之其人感悟求釋迦說法釋迦云設若人加禮于我而我不應無禮在人乎在我乎其人曰自然在我釋迦曰設若人無禮于我而我不應無禮在我乎抑在人乎其人曰自然在人佛因告之以當風揚塵適以自糞持梃擊空適以自困最妙空處打他不著徒自困乏而已彼自然歇了胸中若有一絲芥蒂便是機心不盡列子海鷗之說亦然某十四五歲陷賊中見有善拳棒者人與相持應手便倒問其故對曰非我能跌彼彼自為跌耳彼方儘力向前我只躲過輕輕一推他自跕腳不牢矣這還是第二等推之拽之仍是應之以機惟教他打不著他自乏了為第一義所以讒言來時疑他不好信他又不好疑他便是荓蜂自求辛螫信他便是肇允彼桃蟲拚飛惟鳥只胸中消化如太虛一般方好蓼莪如注疏說太粗淺朱傳善矣猶似有未至者莪非以比己美材謂父母也言父母本是莪而我不肖不能為莪也蒿焉而已然則父母亦枉生我耳瓶小罍大瓶罄乃罍之耻猶子之不善貽父母之恥也鮮民非孤寡之民乃寡德之民也使父母而在尚可望其提命今則怙恃俱無惟有銜恤靡至而已父兮生我章思父母之恩難報也南山生物之方今則寒風凄其但見其為山而草木無矣父母既逺而我受害復何望其即于善哉通篇俱作人子自責解似覺深厚些問大東三章所云佻佻公子朱傳謂指諸侯之貴臣亦奔走往來不勝其勞玩佻佻二字乃是輕薄得意之狀恐此章小東大東四句是言東人佻佻公子三句乃指西人勞逸不均如此故曰使我心疚曰是如此清植詩經句讀要知古韻又要知上下搭連不是兩句一斷可為定例如楚茨篇以執㸑踖踖為爼孔碩作一連或燔或炙君婦莫莫作一連為豆孔庶為賔為客作一連下六句作兩讀都錯了燔炙與君婦粘不上為豆與賔客尤難粘執㸑踖踖是頭為爼孔碩或燔或炙是一連爼所以載牲體其中有輕用火燔者有重用火炙者君婦莫莫為豆孔庶是一連豆乃葅醢之屬是君婦辦的為賔為客獻酬交錯禮儀卒度是一連笑語卒獲神保是格是一連報以介福萬壽攸酢是一連笑語如記中思其笑語之笑語所謂愾然如聞其聲者指祖宗不指賔客祭祀時賔客如何笑語惟爼豆具備賔客齊肅故祖考歆享而得其笑語也又如天命降監下民有嚴既不僭亦不濫都說天命是一連不敢逮遑命于下國封建厥福是一連遑字原不叶韻執㸑踖踖章福字若作今韻讀竟是一句一韻但古福音逼還是以下句為韻公劉去禹之時未逺又恰是后稷曽孫故詩曰信彼南山維禹甸之畇畇原隰曽孫田之以此證楚茨以下四詩為豳雅尤明若是作於周世而却推遡禹功未免太濶清植賔筵毛序以為刺幽王朱子從韓詩以為悔過某謂此詩或係悔過至下魚藻明是諷王若是諸侯美天子身在鎬矣而曰王在在鎬何也似是武公居其國而念王言飲酒亦不妨只要得豈樂樂豈耳大武樂章疑不止於武桓賚酌大明之詩曰殷商之旅其㑹如林矢于牧野惟豫侯興上帝臨女無二爾心恰似總干山立之象尚父鷹揚所謂發揚蹈厲太公之志也㑹朝清明則滅商矣鳶飛戾天魚躍于淵朱子不用前人說而以為興無所取義若以象求之本乎天者親上本乎地者親下文王作于上人才興于下亦有意思凡象之所在道理即在其中尚父之鷹卷阿之鳳都不可易思齊之詩條理尤極精細先言生有聖母又言助有賢妃似文王之聖由於二者一般下文遂言文王非徒藉世德也能惠于宗公神罔怨恫非徒資內助也能刑于寡妻至于兄弟以御于家邦惟刑于寡妻以至兄弟故在宮則見其雍雍然惟惠于宗公而無怨恫故在廟則見其肅肅然其雍雍在宫也雖不顯之處常若有臨之者其肅肅在廟也雖無有厭射之事常若有所守焉其純而不已如是至上有昏暴之君下有昆夷之難文王之德望毫無所損雖無所前聞者亦合于法雖不由諫諍者亦入于善上節如戒愼恐懼之中此節如發皆中節之和文王加意作人所以成人小子有德有造都由純德無斁始能譽髦斯士也朱子道理熟說到聖人敬畏修德處倍生精采興㑹都到無然畔援無然歆羡誕先登于岸豫懷明德不大聲以色不長夏以革不識不知順帝之則都說得深微但有一說須與下文帖合方好不然頭腦太大此詩下文是伐密伐崇未應推說到此看來只是說文王為人不與人輕離易合亦不歆羡他人所有所以當紂昏虐之時人皆淪胥及溺而文王獨先登岸登岸既免于溺又可援手以救人溺所以密人侵阮徂共文王不得不救之若以為道岸反覺不甚親切至崇人却與文王有譖害之仇故言文王不加人以聲色不長夏以兵革長於中夏即方伯也如九合諸侯不以兵車之意不識不知一無私意應天而動天討所及文王不能不順之耳非報仇也都與下文一串說來方合孟子之說靈臺乃斷章取義為惠王言耳非詩本㫖也文王之什止此故將敬天造士最大兩事作末篇靈臺所以望雲物之氛祲察歲時之災祥與欽若授時之義同下二章言立學作樂之事古者典樂教胄周禮樂師掌國學之政辟雍與作樂原是一事文王最重是造就人才故綿之詩終以疏附先後禦侮奔奏棫朴云周王壽考遐不作人旱麓云豈弟君子遐不作人思齊亦以譽髦斯士終焉至有聲美武王猶以無思不服屬之鎬京辟雍此義在四書五經中最大聖人率不作第二義下武即上文也言人見武王以兵滅紂而有天下以為武功大矣不知下武者實我周也下字甚竒雅頌一字都有緣故有聲篇文王四章先稱文王者著祖考之尊號實則諸侯而追稱者耳故終曰王后武王四章先稱皇王者著其為天子非追王之比卒乃言此之為武王以别于成康諸王篤公劉詩處處不是居室廬旅亦不是廬其賔旅因初到豳且於此處住下且於此為廬作客居且於此商量行事下方說于京斯依可見其軍三單者諸侯名為三軍其實三鄉三遂則六軍也天子名為六軍其實六鄉六遂則十二軍也謂之單者言少止有三耳度其夕陽亦不是度山西之田以廣之豳西多髙山夕陽少人苦寒故度其有夕陽之處斯人不苦寒豳居遂于是而大也此處若說人家多竝山西而廣之則侵下止旅乃密芮鞫之即地位矣人若遷國便可依此詩營理即移宅亦宜倣佛行之如此讀詩果然使于四方自然能專對授之以政自然能達價人維藩一節注疏決不可從朱子以價人為大德之人大師為大衆是已大邦大宗不難解難在把懷德維寧一句橫在中間下又云宗子維城何不敘宗子於大宗之後更難在獨將城字提唱而結曰無俾城壞無獨斯畏朱子依文解去殊覺參差無倫次其實只宗子維城一句說得合則自懷德維寧以下一氣順接而於價人維藩四句亦呼吸得醒矣宗子不該說作各宗之宗子宗子繼宗即天子也故以城歸之藩垣屏翰皆為城而設價人大師大邦大宗皆所以衛宗子也下字俱妙價人所謂元勳碩輔為國威重如一層籓籬然師即殷之未喪師之師國所與立惟民是賴如城之有牆然城之所以立也大邦諸侯如樹之以為障蔽者故曰維屏大宗強族如垣牆之楨幹然藉之以為羽翼者故曰維翰此四者必懷之以德方可恃之以安蓋宗子如城然無德則雖有藩垣屏翰而衆叛親離其城且壞而宗子亦孤立矣故曰無使自喪其輔致城之壞以致於獨也獨斯可畏矣德即宗子之德懷即懷諸侯之懷文從字順天造地設應如此朋友以譖不胥以榖若照常說下文人亦有言句不甚著力譖人者以為特人受其害耳不知朋友相讒不特被讒者受害連讒人者亦不得善故人亦有言退者固窮即進者亦窮言必至於俱困也你今日只顧譖人豈知將來連自已亦動軃不得乎此須身經之方見此詩有味民之貪亂寧為荼毒不是說他荼毒人言到得民不堪命寧不知亂者必死但忍不過只得拚死去做自非萬不獲已民豈肻輕自犯上作亂以取荼毒乎注疏多不可從然間有好處天生蒸民四句朱子說有耳目便有聰明之則有父子便有慈孝之則是乃民所執之常性故其情無不好此美德者本說得好康成謂物為性謂則為情言天生蒸民其中實在有箇性物如為物不二之物所謂性立天下之有也惟其有此所以感應於外者都有箇則他竟於物指出仁義禮智之名於則指出喜怒哀樂之名惟有物故為民之秉彜惟有則故未有好而不在此懿德者某却從康成說朱子說下四句用況字轉康成却說天亦好德所以監周而生山甫亦覺得更加有味次節說山甫之德業三節說山甫之職掌肅肅王命二句承出納王命邦國若否二句承式是百辟既明且哲四句承王躬是保自已不能保身焉能保王躬明哲保身非如世俗所謂趨利避害也孝經言守富守貴保祿位都說與道德學問是一事何況保身柔茹剛吐節發明邦國若否二句德輶如毛節發明保身事君四句言我亦儀型圖之而莫能舉惟仲山甫舉之山甫能舉德故能補王之闕也下二節說祖送即承賦政于外二句每懷靡及說得妙望其早歸又照應職掌無人說他永懷又見山甫身雖在外乃心罔不在王室暗結王躬是保意極妙結搆常武三事就緒朱傳說是三農某初以農工商說亦不是凡經中常用字都要畫一朱傳解擇三有事謂是三卿於三事大夫又云三公論理都該歸之司空司徒司馬方是國家舉事必須人役是司徒所掌必有政令是司馬所掌用度百須皆出於土地是司空所掌總離不得此三項看牧誓立政周官諸篇可見當時出兵言今日不須再留不須再處凡國家之事職在司徒司馬司空者已俱就緒何須再留處而不行耶冡宰輔養君德統百官宗伯掌禮樂此時用不著故只舉三事常武一詩說盡兵法之要當時徐方罪浮於楚自穆王時首先僭號宣王以其控制江淮逼迫青兖所以謀之者不可草草先命樊侯築城於齊防其北突命召穆公平淮南之夷及于江漢剪其羽翼然後自將以伐之戎陳齊整先聲奪人止令其畏服而止如雷如霆妙甚只是教人怕何必將惡人盡數打殺其疾也如飛翰其衆也如江漢其不可動也如山其不可禦也如川其不可絶也綿綿然其不可亂也翼翼然令人不可知又令人不可勝千古行兵有加于此者否所以五經果讀得精細世間事未有不備者經都是教人學做事的樣子沒有空語思文以上皆大祭祀之詩后稷配天更是大典故在後臣工噫嘻皆祀先農之詩振鷺初立學宮祭瞽宗之詩與豐年有瞽潛三篇皆小祭祀之詩故彚在一處雍載見有客皆助祭詩亦彚在一處大武乃舞之樂故居末篇次一絲不亂大雅中因陳戒而及先公先王者亦為受釐所歌當即歌於舞入之時生民是言后稷亦特居後下燕父兄賔尸贈答之詩都彚在一處公劉不在七廟之內又非配天之祖而其功實大故又存在後泂酌卷阿召公陳戒之詩中未說及先公先王不歌于受釐之時故又在後其篇次亦一毫不亂烈文之詩朱子以為獻助祭諸侯之樂歌以此之辟公與雍之辟公例看也上祀先公以天子之禮先公亦稱公烈文二字豈諸侯所敢當而錫茲祉福惠我無疆子孫保之亦非對諸侯之辭無兢維人四方其訓之不顯維德百辟其刑之諸侯尤不敢當也此為合祭先公先王之樂章太王文武以及成康各有祭之之詩祫尤大祭豈得無詩烈文為祫祭之詩看第二章尤眀先公有邦而已至太王王季文王而其功始崇武王念之因而易侯為王故曰繼序其皇之先公尊於先王故從辟公叙起功德在人前王為盛故結之曰前王不忘於立言之體亦極稱清植天作髙山乃文王祔廟之詩問昊天有成命亦是成王祔廟執競是康王祔廟之詩否曰然只武王祔廟無詩想是易侯而王禮文與他廟異鐘旺詩之語氣不可不體㑹我將我享維羊維牛維天其右之右是上尊之也其字是不敢必之辭惟儀式刑文王之典日靖四方則伊嘏文王既右饗之矣用一既字便有尊天親祖之意文王饗則天亦饗之矣然不敢恃也故下復言畏天之威見得文王亦畏天也文王之詩言上天之載無聲無臭惟取法于文王則萬邦作而信之此處只言畏天之威因彼是歌文王之德此乃配上帝之樂其意理及口氣都妙時邁亦然言天其子我乎哉亦不敢必也既而曰想是天實右序我周為諸侯之長矣但看薄言震之而莫不震曡祭百神而百神享之信乎王之為天下君也今式序諸侯偃武修文信王之可保天命也語氣道理俱足執競篇注疏以為祀武王之詩成康皆不說是成王康王朱子以為祭武王成王康王之詩是已但不及文王何也此是始祔康王之主於廟告於考故及成王祔于祖故及武王孫祔於祖有告祔之禮成王入廟則告文王矣振鷺非二王之後來助祭之詩古者學宮都在西故曰西雍謂之雍自是辟雍此是初立學宮祭樂祖瞽宗之樂章我客來學之士也其容修潔有類於鷺若以為二王之後取象亦不類在彼無惡指客也在此無斁指君也所謂古之人無斁也以永終譽所謂譽髦斯士也韓文公做學宮詩便用振鷺亦一證也樂有四節有瞽一詩不過幾句而四節皆備有瞽升歌之人也諸樂器及簫管笙入之具也肅雍和鳴先祖是聽間歌之聲也到得永觀厥成則合樂時矣何也舞亦入故曰觀緊與上聽字相應成即六成九成之成樂之終也經文周密如此今人多以朱子不用詩序為疑據某看來正恨尚有不盡翻案處耳如文王既勤止何以見得是大封功臣論來却是大賚四海而共明其伐商之意只涵泳白文求其語意通順道理正當不拘舊說方好文王既勤止二句即尚書我文考文王克成厥勳誕膺天命以撫方夏大邦畏其力小邦懷其德惟九年大統未集豫小子其承厥志之意言文王創造艱難已有成規豫自當有以成其志我之為此恐人以為不韙我周遍思量不得不出於此我之往也惟求天下之安定耳所以說無畏寧爾也非敵百姓也此文王之志也時周之命言天命在周豫弗順天厥罪惟鈞於繹思嘆息而謂臣下宜共繹思之然乎不然乎即所謂上帝臨女毋二爾心大槩是初得天下大賚四海而白其意如此一牽住大封功臣便齟齬不順賚與般其名不可忽略賚自是大賚之詩般即遊般之般武王因般遊至洛邑見其道里為天下之中欲都之陟其髙山墮山喬嶽所謂南望三塗北望嶽鄙也允猶翕河所謂顧瞻有河也裒時之對正是四方來朝道里均也自酌至般可以定為東都祭文武廟之詩確不可易文王騂牛一武王騂牛一則東都但有文武二廟可知邪字古多作餘解史記漢書尚如此思無邪恐是言思之周盡而無餘也觀上無疆無期無斁都是說思之深的意思邶之北風亦作餘解古人厯法拙閏月必定在十二月故曰閏者歲之餘虛者朔虛也言冬月將盡而歲餘亦將終比北風雨雪又急矣但思無邪從來都說是邪正之邪故詩所亦姑依之不欲破盡舊解其實他經說道理學問至世事人情容有搜求未盡者惟詩窮盡事物曲折情僞變幻無有遺餘故曰思無邪也春秋因有三傳故抵捂處得失互見詩自齊魯韓氏之說不傳而毛氏孤行則無以見諸家之異同而以序為經矣自記榕村語録卷十三

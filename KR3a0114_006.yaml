body:
  text: 榕村語録卷六大學士李光地撰下孟以通章文勢觀之既竭目力一節對章首離婁之明一節是一反一正文體今有仁心仁聞三節對為高一節俱是見先王之道之當遵耳自記以父子兄弟對君臣朋友則父子兄弟為主恩君臣朋友為主義以父子對兄弟則親親仁也敬長義也仁義智禮者性也事親從兄者道也性在内道在外性之理似乎虚而難見故指其實而可循者實對虛字不對華字只緣後段有樂字人遂不敢以之名性反以仁義智禮樂為道而以事親從兄為性此倒説也豈知禮樂是一件禮可以名性樂獨不可名性乎葢禮之和樂處即是樂也自記仁之實實字注中對華説如仁民愛物仁之華也而其實在事親尊賢敬長義之華也而其實在從兄某却要就理與事上説仁義是理只有愛敬其實事却在事親從兄注特恐人將事親從兄認作性故以仁義為道畢竟仁義禮智樂是天命之性事親從兄是率性之道人因不敢以樂為性故説得支離不知吾性之中即禮吾性之和即樂中和可謂非性乎所為所不為只是一事有兩面耳當其不為便有一面為的在當其為又即有不為的一面在不是兩事亦不是兩時如人走路一脚跕得定便一脚動得有力如坐在館中讀書屏却閒游襍好便分外讀得有精神大要擇之明則守之固守之固則發之果是此節正意人之分量有限材質不齊於理固有之然亦看所不為的分數何如果有天下不顧千駟不視夲領則功業亦何足云若云智識自此可進材猷自此可充則是以不為為但取硜硜之諒者耳却小了擇守夲領也自記自得非獨得之謂言其氣候既足渙然氷釋怡然理順自然而得之耳得是深造之功自得是以道之效自記夫子好觀水正是心源與之一般至誠無息孟子窺見的實處曰原泉混混不舍晝夜盈科而後進放乎四海有夲者如是必有事焉數句正是如此心中不放下這件事正又不好忘又不好助長又不好綿綿不斷火候自到與夫子觀水同意庶物上文禽獸在其内人倫即人之所以異於禽獸者也明於庶物察於人倫便是將人與禽獸所以異所以同處無不知之之明至於由仁義行則所謂一視同仁篤近舉遠而處之當也自記不泄曰敬泄生於玩易也不忘曰誠忘生於間斷也自記文定謂邶鄘以下多春秋時詩也而曰詩亡葢自黍離降為國風天下無復有雅而王者之詩亡矣某謂畿内之地亦有風謡雖西周盛時豈能無風王朝卿士賢人閔時念亂雖既東之後豈盡無雅只可以正變分治亂不可以風雅為盛衰也觀二雅體製不進於頌東遷後猶有魯頌况雅乎然西周不見所謂風東周亦復無雅者意畿内醇美之詩悉附於二南以為正風而衰亂之風則别為王風而為變至雅之無東則序詩者失之也今觀所謂平王之孫齊侯之子赫赫宗周褎姒烕之周宗既滅今也日蹙國百里明是王畿有正風東遷有變雅之證而説詩者穿鑿以就其例此正如成王不敢康噫嘻成王惟彼成康奄有四方明是成王康王緣説者謂皆周公制禮作樂時詩遂以為非二王而别為解釋耳其可信乎此三百一大義不敢附和先儒而不闕所疑也况風詩是王者命太師採陳而行賞罰之典於春秋所取之義尤切奈何專以無雅為詩亡自記上二句三史之所同下一句則裁自聖心故講者多將上二句輕抹豈知夫子垂世立教不寓之他書而必修春秋葢他書為空言春秋則有二百四十餘年之行事因而著其是非褒貶則比之空言者尤為深切著明不是説夫子實行王者之事也書仍舊是空言但書中有許多行事在耳如此則事文兩字固不可輕畧况事是桓文王降而覇史是春秋周禮在魯俱隠隠與王迹事相闗乃義之所由起也自記孟子所謂天子之事猶云天子之史也諸國皆自為史以記一國之事而夫子乃尊周故為天子之事問何言其事則齊桓晉文曰其事春秋之内事也天子之事作春秋之事也河陽之役晉文之事也天王狩于河陽天子之事也所謂義也其義其字亦非指詩亦非指春秋懸空對上兩其字説出是謂春秋中所有之義也畢竟此義是何處取來夫子亦未説破隠然是正王道明大法從三代盛王得來的自記曰侵則掠境未深曰追則歸師不遏故四矢禦亂而足以反命也使斯死黨背公則又何足為端人乎自記起句天下之言性也便隠然有許多智者在其意中葢敢於言性者皆其以智自命者也孟子言性説如此紛紛以我觀之亦但以故言便是了而已矣言不必深求也為其鑿也便是惡其以穿鑿言性雖行水一轉似是以行事言之然惟其見性之差是以行事之謬言行原非二物况禹之行水行所無事正言其深明水性非獨以行説也下節茍求其故求字亦是就知見上説自記以惻隠驗仁是以故言性也但惻隠必以孺子入井自然生心者為據方得其真所謂利也若既參以人偽如納交惡聲之等則非利矣因有納交而惻隠惡聲而惻隠者遂據之以詆人性之仁非鑿而何清植文問千嵗之日至曰説者多指前邊的厯元某意却要指後邊的日至茍求得前邊已然便以後千嵗之日至可坐而致此章不曰吾之言性而曰天下之言性葢謂告子荀子軰也天下人之言性也見不好人多便云性惡見有生來善生來不善者便曰有性善有性不善見人可為善有改而不善者便曰可以為善可以為不善不知故者以自然出之者為夲今夫水順流而下是故矣若過顙在山亦以為故則非矣所惡于智者為其鑿也鑿字對利字説行所無事則利矣世遠曰以此節言之語氣則得矣論通章則末節有茍求其故句仍以朱子説為順曰末節之故即包利字在内以第二節已説明也然難云茍求其利故仍曰故問日至自然是冬至曰不論冬至夏至總是厯法得日至便都定了自反而忠矣而曰於禽獸又何難焉便微有責人之意故章末復引舜以為凖則葢舜終身責已終無是我非人之見曰如舜而已矣則依然自反之初心也張子曰學至於不尤人學之至也便是此意清植齊人餽女樂孔子官亦不小不聞上一諫章出一諍語而借燔肉即行何太恝然却得孟子發揮出來蔡虛齋以為孔子以小故而去自己擔著些不是正是他不欲茍且而去以歸過君上處説得甚有意味如父母之不我愛於我何哉虛齋解云我竭力耕田不過是供我子職之常夲無可以悦親者不得乎親不可為人不順乎親不可為子畢竟父母不愛我我將何以為人為子哉此方於而已矣三字有情説得怨慕意出大凡前軰解書雖不必盡當時有紆折處要是一團忠厚悱惻之心其子之賢不肖皆天也天字似以氣數言天之所廢天字似以天心言然要之皆氣數而天心存乎其中如堯舜之有敗子仲尼之不遇其君氣數之不幸也天心亦不得已而廢之夏商周繼世有人是氣數之幸也天心亦因而不廢之主宰之天與氣化之天是一是二此處要看得活自記以天下為己任自耕野時便如此所謂志伊尹之所志也不可單就應聘上看出自任自記前一豈若後三豈若時講説來竟似伊尹有兩箇舌頭伊尹一片心腸只是以堯舜之道為主初時猶未卜得湯之果可與為堯舜否也則毋寧畎畝而堯舜之道自在及見得確信得過則又何如親見之為愈俱是實情清植吾聞其以堯舜之道要湯未聞以割烹也兩聞字亦是折之以理非據傳記説也自記謂金玉為鎛鐘特磬將作樂而擊鐘以先之樂終則擊磬以止之經中無此語惟注疏有之考虞書戞擊鳴球商頌依我磬聲是磬亦所以始樂某思金玉恐即是編鐘編磬鐘磬有頌鐘頌磬所以綱紀人聲也有笙鐘笙磬所以綱紀笙聲也金石在八音中實為綱紀每一句以鐘聲領頭衆音皆隨之如鐘聲是宫羣音隨之而宫鐘聲長有餘韻韻將歇而磬以止之是謂始終條理鐘磬之鳴相去不遠每字每句皆有始終之義如孔子一言一動皆有始條理終條理如射然每矢皆有中有力無四鍭未發用一巧而四鍭既舍用一力之理問如此説與集大成合否曰八音全用便是集大成註中一音獨奏葢如取瑟而歌擊磬于衛之類然非作樂樂則無一音獨奏之時問或逐字逐句用編鐘編磬起調畢曲用鎛鐘特磬亦未可知曰要有憑據方好鐘鼓奏九夏始用鎛鐘朱子或沿古人成説而用之然不可解大國地方百里積實得一萬里也七十里者積實惟七七四十九得四千九百里是於大國殺十之五而强五十里者積實惟五五二十五得二千五百里是於次國又殺十之五而弱自記交際章前説交際後説行道似不相照應然却有闗通之意聖賢之交際不嫌委曲通融者總是汲汲行道欲以濟世也為之兆朱子説得是是聖人自示以道可行之兆即指獵較既示以兆而不行而後去是以未嘗有所終三年淹也今人都説是見道有可行之兆為之二字都解不去朱子解見行可云見其道之可行解際可云接遇以禮如此是見可行不是見行可可際不是際可見行可是自見行道之可非累世不能殫道大不能容也際可是自見交際之可非絶人逃世不近人情也見行可或可謂之仕至際可公養亦謂之仕者總欲仕也皆是解為之兆公養乃是饑餓於我土地周之亦可受也免死而已然使出公委國以聽夫子即為之正名定分而且為東周矣此二叚皆與前交際相應凡文章未有不前後照應者孟子尤然如養氣章是從行道説起後遂説知言養氣不復顧前至末迤迤邐邐説到得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不為也却收繳起處見行可三字近來都説錯了見者示也示人以吾道之可行此之謂見行可即與上文為之兆是一意為之兆者示人以端使知吾道非迂遠而難行也兆足以行而不行者小試其端吾道果非迂遠難行者矣而人猶不行也自記為之兆為之二字𦂳粘孔子乃是孔子為之兆見行可見字即為之字見行可明朝人都説是視其君可與有為視其臣可與共事因此連上節兆字亦説錯魯定公季桓子何嘗比列國君臣好來為之兆是做出來使人知吾道之非迂濶不可行耳當時抱疑者多以孔子為當年莫能究其藴累世莫能殫其業如晏子之云不知孔子為中都宰為司宼相夾谷之會那一處不見效萬章好論古而大抵博觀襍取未能質之於理以得古人之用心故孟子告之以為湏此等人纔識得此等人今人論古大槩如矮人觀塲莫知其悲笑之所自故惟古人能知古人亦如前之取友云云也作尋常論友便不切自記萬章是好古之人一切稗官野史都記許多却不知其人連大禹伊尹孔子都疑惑一番孟子就他長處引誘他前一節正是起下一節不知古人但觀今人如善盖一鄉始能友善盖一鄉之士善盖一國始能友善盖一國之士善盖天下始能友善盖天下之士非自己身分與之一様焉能知其人然則尚友古人亦湏是有古人身分兩面夾出正意作求友説不是以上節為友盡鄉國天下之士尤不是告子便是佛學故孟子辨告子詳於楊墨以其能推性命之説也諱氏僅知孟子之闢楊墨不知後世釋氏之弊於告子辭而闢之無餘藴矣自記問程子謂孟子言性是極夲窮源之性既是極夲窮源似不應以人物兩兩較量曰然易言繼之者善乃明道所謂人生而靜以上不容説者是極夲窮源之性也言成之者性乃明道所謂纔説性時便已不是性者然後人物異而善不善分焉是則孟子言性正就形生神發以後言之鍾旺孟子所謂性善者單指人性如是統論萬物一原之性則不應云異於禽獸幾希違於禽獸不遠且云犬牛與人異性犬馬與我不同類矣既是單指人性便是以其得氣質之正而為萬物之靈孟子論性又何嘗丢了氣質如以人性未必皆善為疑則正是好參尋孟子夲意處我與堯舜同類不與禽獸同類禽獸做不得我我却做得堯舜便是性善何必十成至善而後謂之善哉自記告子議論許多破綻處孟子不投間抵巇以窮其説而却似隨其言下酬酢然者湏知聖賢夲心是欲救㧞其心術之失非以取勝也我亦欲正人心息邪説距跛行放滛辭以承三聖者豈好辨哉便是其自道處自記把栁諸章要知孟子節節是開之悟之不是辭之闢之得此意然後諸章之詳畧淺深節節有味今人例作折辨口氣反有許多罅漏處自記把栁之性水之性人之性只是一性犬之性牛之性却非人性此孟子善言夭命氣質處自記此章告子言性之蔽在兩決字亦猶前章之蔽在兩為字既有所矯揉安排則非性矣故孟子以戕賊搏激之説曉之自記生之謂性章朱子云以氣言之則知覺運動人與物若不異以理言之則仁義禮智之秉豈物之所得而全哉某看孟子意不如此孟子言你説生就呌作性如白就呌作白麽告子曰然孟子又問凡生都呌做性如白羽猶白雪白雪猶白玉麽告子又曰然孟子方説然則犬之性猶牛牛之性猶人與不分理氣氣亦不同犬之知覺運動亦不同于牛牛之知覺運動亦不同于人程朱分理與氣説性覺得孟子不是這様説孟子却是説氣質而理自在其中若分理氣倒像理自理氣自氣一般氣中便有理氣有偏全理即差矣如人是立生的禽獸是横生的草木是倒生的便大不同孟子只説人性故曰性善人形氣與物不同性自與物不同不是説氣同而理異白之謂白猶云凡生皆性與告子曰然羽雪之問恐其謂生與生還有不同也告子又曰然是凡生皆同矣故折之曰然則犬之性猶牛之性牛之性猶人之性與兩節只是一意不是上節言理氣不同下節言氣與氣亦不同也孔子曰性相近也却與孟子説一様性無不善故曰相近逺者習耳孟子亦云從其大體為大人從其小體為小人其權在人也大約天地之氣夲於天地之理何嘗有不善鼓之以雷霆雷霆是好的潤之以風雨風雨亦是好的只是人物如何稟得全似天地惟人也具體而微到底不能如天地但氣質雖或偏駁而天地之性無不有如銀子之成色雖不等然饒使極低畢竟陶鍊得銀子出告子以凡遇長者便長之見義之外及孟子喻之季子知有敬之説在吾意中也故發伯兄鄉人之辨以見凡長者未必敬及以為皆敬而又以為敬如此轉移無定可見敬原是在外也轉移無定意在弟與鄉人夲不當敬處看出即告子吾長楚長之説而加一層駁難也自記季子初是外長既乃外敬答問間是兩層推究時講總以因時制宜一語混過覺辨者解者都沒把鼻自記告子之學徑似後來逹磨直證無上菩提不立語言文字故孟子於儀衍輩不置一詞於楊墨亦不過以無父無君闢之而已至告子則委曲接引娓娓不倦非徒爭勝好辨也把栁章告子以性原無仁義而可以做出仁義來若然則把栁還可做成棍棒殺人將亦以喻性乎孟子恐如此駁他他竟以為可是反助其説而開其放誕之端所以只將戕賊二字破他為字他亦覺得為湏戕賊説不去因變為湍水之説決東則東決西則西未嘗戕賊夫水也不知為惡可以言決為善不可以言決但若與他辨決字他便硬説為善亦湏決所以孟子只順他東西二字跌出上下二字使他自覺得使東西方在上亦不能決之即流也告子因取譬不切遂直指性體以為生之為性孟子不遽斥其非者仁義禮智亦頼知覺運動而行但是生中有性不可謂即生即性耳故問之云生之謂性猶白之謂白與曰然是告子以為即生即性矣孟子又未知其以為生有異類即性亦有異品耶抑凡有生皆即生是性耶故問之云白羽之白猶白雪之白白雪之白猶白玉之白與曰然是凡有生皆即生是性矣於是以人與犬牛折之而彼乃無辭告子既窮又復變為仁内義外之説者彼以孟子之學總是用外面之義襲取之學以致錯認為性故謂人性雖不同於犬牛以人而論食色可謂非性乎但愛生於心而宜由乎物學者但當求仁不必求義仍是當耑力於内不必分心於外之意蓋佛氏不以仁為非惟不肯認義為内故至今尚有慈悲修善之説孟子折之若直以子今言仁内何以前言以人性為仁義猶以把栁為桮棬彼將何辭以對孟子却不截斷以為彼既以仁為内已屬可喜姑且留下此句只問他何以謂義外也及得他彼長而我長之猶彼白而我白之之説却當指出敬字來提醒他矣孟子恐怕説出敬字他便以長與敬混作一團索性破除槩以為外便鏟絶根源所以又藏過敬字只就長字詰問他長馬不用敬長人用敬意已隠躍在内又就他彼長而我長之句摘出長之字曰長者義乎長之者義乎告子乃以愛與長為有不同而强分内外夫吾弟固當愛何至秦人之弟便不愛假令吾弟飽食無病而秦人之弟饑餓濱死則必輟吾弟之食以食之矣豈有不愛之理孟子亦姑不與理論只就長之一面駁他炙之在外猶長之在外也耆之之心在内猶長之之心在内也耆秦人之炙無以異於耆吾炙猶長楚人之長亦長吾之長也然則耆炙之心亦從外而得與告子言長楚人之長孟子破之却言耆秦人之炙者因彼有不愛秦人之弟之語故用秦人以影切之不但長之非外之理明即秦人之弟之亦當愛其理已隠躍於言中矣孟季子一章尤為要𦂳行吾敬故謂之内公都子之言極是但因此季子遂􅎲住敬字一并破除孟子之駁告子不肯輕易提出敬字正以此耳然季子之意以為所敬在兄而所長在鄉人即將所敬之人放在一邊而别長一人是敬雖可以云内而不能不掩於鄉人之長長之起於鄉人之長而所長者又非所敬則是由外轉移非内可知其病在不以長為敬故孟子復為兩問逼出彼將曰敬弟彼將曰敬叔父跌明兩敬字然後曰庸敬在兄斯湏之敬在鄉人斯湏之敬在鄉人猶斯湏之敬在弟也鄉人斯湏之敬敬也為在内則長鄉人之長亦敬也惡得謂在外乎季子至此尚蠻執前見更欲兜底破除以為敬因位而在則敬亦在外公都子乃以飲食亦在外折之理甚精當直駁到食色性也若以此為在外則食色性也亦在外矣才字當依程子作氣質説孟子非不知有氣質顧以為天性在人非氣質所得而拘其以不善罪氣質者實非氣質之罪何則就其氣質之所至盡其力而果不足焉然後可以歸之罪耳今人原未嘗竭才而曰未嘗有才故曰非才之罪也如近講説才字太影響自記讀書字字挑剔是孔子正派孔子小象與春秋翻來覆去不過幾箇字然無窮道理俱在裏面讀詩亦是此法如説蒸民之詩只添兩箇故字一箇必字一箇也字而語氣已極醒露平常説有物必有則故人秉為常性自然好是懿德是將民之秉彜連下句説却是錯了夫子言有物必有則是乃人之秉彛也所以好是懿德故字顚在下面可知民之秉彜是連有物有則説來語意甚妙天生蒸民二句是命民之秉彜是性好是懿德是情問上故字作何解曰承天生蒸民來言不受命而為人則己既有物必有則是如此口氣犬馬之與我不同類自其耳目口體而分故其心性亦異禮運董子皆察言之故牛山章所云不可以喻言看過自記牛山章於尚書人心道心中庸已發末發大易消長剝復靡不顯闡却只就人心當下指㸃變前文之雅奥躋行路於聖域先儒所謂亞聖之才是也自記張程補出氣質之性其實熟看孟子亦不必補孟子曰非才之罪也不能盡其才者也非天之降才爾殊也才即氣質之性人之才質不同有偏於仁者有偏於義禮智者有不足於仁者有不足於義禮智者要未有全無仁義禮智及仁義禮智之闕一者也如五味調和不鹹是所入之鹽少非全無鹽也不酸是所入之梅少非全無梅也人雖才質稍遜奮勵擴充自不可限故曰非才之罪人一能之已百之人十能之已千之雖愚必明雖柔必强此所謂能盡其才者也舍而不求以至相去之遠何嘗自盡其才而乃以罪才乎孟子所説皆是人性不合物性言故曰人皆有不忍人之心今人乍見孺子人之有是四端也人皆有之其好惡與人相近也者幾希是豈人之情也哉天以一理化生萬物物與无妄雖人物所同然人得五行之秀受天地之中所禀之性獨全與天地一般故曰三才如虎狼則但知父子而不知有君臣蜂蟻則但知君臣而不知有父子惟人雖才質不同皆可反求擴充而得其全故曰聖人與我同類者若犬馬則不與我同類也人性皆善非曰性皆善也人未必盡堯舜然人皆可以為堯舜何也以類同也未有犬馬亦可以為堯舜者聖人先得我心之所同然耳謂之人則理義之心所同然者無不可為堯舜是才質全無權柄何足為累此與孔子性相近習相遠之㫖融洽無間特孔子補出上知下愚為更密耳所息者非氣也仁義之心也平旦又是日夜中氣最清明之頃故所息者至此遂發見耳一念惻隠便是好與人近而為仁之心一念羞惡便是惡與人近而為義之心自記操存舍亡神明不測似乎贊心之神妙而夲意則是發其危㣲自記既云心之官則思則先立兩字似并思字在内蓋必心得其職乃稱立也然注云若能有以立之則事無不思而耳目之欲不能奪之則又似思前更有一叚立之功夫蓋思是窮理以上便是操持操持者窮理之根惟其此心常存是以事至而常能思况心箴有君子存誠克念克敬之語則此説是也自記無有封而不告繫在交鄰之後蓋存亡繼絶如城楚丘之類注所謂專封國邑是也非指夲國臣下自記養氣章是説理告子篇是説性盡心篇是説命合之則窮理盡性以至於命也論語不説出根來大學撮總説中庸㨮底便説出至孟子盡其心者一章説得透徹精到發揮無餘矣周子太極圖説張子西銘皆不過詳細説一番非至周張始發此論也盡心知性則知天存心養性所以事天夭夀不貳修身以俟所以立命説得極平實極精透錫曰此孔子下學而上逹義疏也曰然心是出入無時莫知其鄉的故湏存性是無為的故湏養敬以直内倒是存心義以方外倒是養性養性不是空空守靜之謂大槩寡欲是存心充無穿窬充無欲害人擴充四端却是養性盡心數章是孟子傳曾思之學之丹頭萬物皆備于我句曾思不曾説出註中大則君臣父子小則事物細㣲其當然之理無一不具於性分之内所謂性分即仁也故結出仁字曰求仁莫近焉仁者生理君臣父子事物細㣲何者非此誠是箇虛字只是實實有此即五常信字仁是一箇生意周流滚熱的甚麽道理都離這箇不得注將反身而誠兩節分安勉亦好但以孟子之意求之似不湏如此説反之於身不自欺而自慊仰不媿俯不怍樂莫大焉以心而言也强恕而行求仁莫近焉以事而言也恕夲不容易子貢曰吾亦欲無加諸人程子説無字太自然無字亦與毋通况有欲字子貢原未嘗説他已能非爾所及就是説此强恕之事何容易言故及其問一言即告之以恕若恕是子貢所已能夫子曷為告之克伐怨欲不行朱子謂不行到底有在那裏只是不肯形顯出來所以不是仁仁是根株皆盡固是然只就大分上論之亦得仁之體却是生意周流克伐怨欲固然不行其生意流行安在冷冰冰的不見有仁也夫子不肯與人言仁體只教人用心于内茍心内存便自見得生意周流待文王而後興者凡民也何以不説他人文王終日以作人為事者也清廟之詩説文王之德最明濟濟多士皆秉文王之德所對越者文王在天之神也所駿奔走者文王在廟之主也德慧術知術字是所作的事所謂以四術造士孟子亦説術不可不慎也德字在内邊説術字在外邊説内之德有靈慧外之術有智思如以德業對舉一般安社稷臣只知社稷為重天民却見得百姓要𦂳要匹夫匹婦無不與被堯舜之澤實實見到天之生斯民也使先知覺後知使先覺覺後覺一叚道理問大人亦不過是天民見解不能更高了曰其根夲見識天民與大人一様只是正己而物正是盡其性則能盡人物之性贊化育參天地天民者正己而正物者也大人者正己而物正者也問社稷臣功豈不及于百姓曰如霍子孟與民休息天下富庶豈無恩澤及民只是起念為安社稷耳即事君人者豈無有益社稷之處只起意為容悦耳問容悦不過是鄙夫孟子為何與後三項人竝舉曰容悦之臣不是鄙夫如張安世一輩人他亦有他的德行學問但止知事是君則為容悦耳登東山泰山即孔子登之也截斷孔子二字不得將孔子連下作譬喻亦不得是在借喻作正意斷續其文意觀之耳自記登東山而小魯登泰山而小天下凡人亦是如此因孔子有此事而借之以立言耳注中所處者愈高則視下愈小是説登山不是説孔子鄭重孔子兩字固是然畢竟東山泰山是何人登孔子字逗斷而下方作喻言則文意不順矣以瀾字照字便當夲固非直以為流末而由此以觀夲者亦非也二字乃水與日月之所以不息處必有夲者乃能不息不息乃能放乎四海經乎八紘故觀於湍瀾繼照而其源夲可知而為學者之不可以舍乎晝夜明矣自記觀水有術節注云此言道之有夲也王肯堂曲思成解謂聖人之道之夲不可見觀言足以知道水與日月之夲不可見觀瀾與容光則知其夲是非言道之有夲乃是言道有末始足以見夲也某向來以為觀水其術不一觀其瀾瀾即夲也日月有明是其夲故容光必照焉如此看是觀水之術對容光必照必觀其瀾對日月有明兩必字語氣全不相應近思之方得其説蓋瀾與容光是水與日月中間一叚論水之夲為山澤之氣日月之夲為陽隂之精水之極放乎四海日月之極普照萬方今但觀其湍急不已處看其但可受光無不照入處知非有夲不能如是夲字意在觀水有明内瀾與容光乃對成章意成章非道之夲亦非道之極但非有夲必不能成章不盈科不行正是此意原泉混混不舍晝夜盈科而後進放乎四海有夲者如是可知盈科後行之因有夲矣瀾與照不是大處亦未是夲處蓋所由以觀夲者但觀斷港絶潢之水必無瀠迴急湍而雷電燭影之光不能幾㣲畢照則知瀾與照之可以觀夲矣蓋有原泉必有混混不舍者有積精必有光景常新者此是有夲之驗從此盈科而進便放四海然則光瀾正對成章自記無源之水必無瀾瀾者源頭活水來也自記聖人之應變無窮處即水之瀾也聖人之無㣲不入處即容光之照也觀此非有夲者能如是乎鷄鳴而起説到平旦之氣上去便不是猶言五更頭起來做此事便是舜之徒做彼事便是蹠之徒不單是雞鳴時如此從此時做到晚為善為利直是去做不獨是念頭雞鳴而起孶孶為七箇字都同只善利一箇字不同明人若以為利之精神才力去為善就是舜竝無難處乃是孟子𦂳醒喚人回頭語丑不是欲孟子貶其高美欲孟子使已幾及其高美耳又非以其立教之高而謂如天不可幾及正謂其立教之循循有序而苦於高美者速至之無期如天之不可幾及耳蓋有好高躐等之病故孟子告之云云自記愛字仁字親字湏見得聖賢字眼的實處愛與親夲由仁出此三字如何分别一視而同仁仁亦可説在物上仁親以為寶仁亦可説在親上如何謂愛之弗仁仁之弗親愛是在一節上説仁是全體説孟子説箇物字禽獸草木皆在内無論犬羊雞豚不忍輕殺布帛菽粟不敢妄費就是魚蝦之細以至草木瓦石當其用時亦有不忍糟蹋他的念頭至老吾老以及人之老㓜吾㓜以及人之㓜雖有人已之分而老㓜總是一般竟與我同類所以下箇仁字仁字已極親切親又是仁之發用最初極醇厚處如有子孝弟為行仁之夲之説三字不可説得大相懸遠如時文云愛之而已而仁弗存焉便説不去君子於物非不欲仁也竟待物如民有何不好勢有所不能於民非不欲親也竟待民如親有何不好勢有所不能盡天下之老者而皆為之昬定而晨省冬温而夏清豈非至願其勢能乎不能所惡乎墨氏者為其剏為勢不能行之教及不能待天下之老者盡如其親反薄其親以就之此為可惡耳天生民而立之君若不為民立君何為孟子一言道盡曰得乎丘民而為天子窺見此意覺得湯武之應天順人方有把鼻口之於味章是辨性命之説而所以順性命之理者在其中矣只看兩不謂字可見性也命也之性命是世之所謂性命以氣言者有命焉有性焉之性命是君子所謂性命以理言者有命焉非但貧賤者有定分不可强求即富貴者亦有定分不可踰越此之謂理也性之不與命二命之不與性二是性命之真也以窮其欲者托之性而已非命矣以盡其理者歸之命寧有異性乎要湏看得性命合一則不至惑於嗜慾氣質之説而性命之理明矣自記養心心字是義理之心非但虚靈之心也寡欲是就現成説其所以寡欲則自持敬克己中來自記汝楫問養心莫善於寡欲曰心性情一一分析是宋儒因異端邪説混為一區牽纒支離學術大亂不得不如此分析明白孔孟時無此也大槩孟子説心即是説性如良心仁義之心求放心仁人心也惻隠羞惡辭譲是非之心都是如此説人心得其正便是道心明言自堯舜至湯自湯至文王自文王至孔子中間却添出許多見知來則其致意在見知可知矣側重自是語勢非逆志而為之辭也自記由堯舜至於湯章是説道在天地間無有歇時只寛寛説伊尹在莘野便樂堯舜之道太公一出來便與文王為師友何嘗學於湯文且聞知亦不消借重見知也榕村語録卷六

body:
  text: 榕村語録卷二十六大學士李光地撰理氣大極天之性帝天之心先有理而後有氣有明一代雖極純儒亦不明此理蔡虛齋謂天地間二氣滚作一團其不亂處即是理羅整菴謂理即氣之轉折處如春轉到夏夏轉到秋自古及今何嘗有一毫差錯此便是理某初讀其書只覺得不帖然不知其病在何處及讀薛文清讀書録有性即氣之最好處頗賞其語而未暢至五十一嵗後忽悟得三説之差總是理氣先後不分明耳先有理而後有氣不是今日有了理明日才有氣如形而上者為道形而下者為器豈判然分作兩截只是論等級畢竟道屬上器屬下論層次畢竟理在先氣在後理能生氣氣不能生理大凡道理不明白處即以人身驗之如人之歡欣暴厲者氣也但未有漠然無喜而忽歡欣恬然無怒而忽暴厲之事何以有喜以有仁之理故也何以有怒以有義之理故也喜中乎仁之節則喜得其理矣怒中乎義之節則怒得其理矣是未發之先此理本自充滿堅實於中故及其已發自有條理明乎此則知天地雖氣化遷流萬端雜糅亦有不能自主之時卻有萬古不變的一箇性在惟其如此所以人雖物欲陷溺氣質昏蔽惟狂克念作聖天下雖大而君子以為篤恭可平世雖大亂而聖賢以為反手可治即謂氣滚作一團其不亂者即理到底有所以不亂者在謂氣流行不已其轉折處即理到底有所以轉折者在蔡羅之説但説到發而中節之和不曾見得未發之中誠也中也太極也即性也誠者性之實理中者性之不偏不倚無過不及有未發之不偏不倚而後有已發之無過不及極者造化之樞紐品彚之根柢樞紐自其生物之旋運有主處言如户之闔闢無端而扉柱不移故運行不已而其生不窮也根柢自所生之物歸根復命處言如草木之種入地幹枝華葉而結果如種故物之形千態萬狀而無一不全其天也又曰極者至極之義即樞紐之説標準之名即根柢之説見到此便覺得聖賢儒先所言無一處不合理氣固不可分作兩截然豈得謂無先後如有仁之理一感于事便有溫和之氣有義之理一感于事便有果決之氣虛齋理氣性命説得全不是門人於其身後翻出他自記一篇欲將太極圖説動而陽靜而隂之本體改作全體不知一改全體便鶻突了蓋從頭便有此太極也人物尚有性豈天地之大而無性太極者天地之性也有太極便不能無隂陽一直流出毫無虛假毫無間斷若本原上明白雖虛齋之説亦説得通但須知有太極自有隂陽不可説從隂陽始見太極如説由情見性未始不可但須知有性斯有情斷不可説惟有情乃可從此見性也有太極自有隂陽與因隂陽而見太極是大關頭由彼説竟有以氣為性之病張長史於某極有益長史初登第自言在監中試無欲故靜題他論中有一段言禪定便説靜故無欲此論大妙靜故無欲者勉強要靜也無欲故靜者自然而靜也一日某問之曰理是何物可是萬事萬物有當然而不可易即見得有自然而不容己者否曰看來却須倒轉來有自然而不容己的故有當然而不可易的此言殊有味如人忠孝之心有一段不可解處是自然不容己才有陳善閉邪視無形聽無聲種種當然之事與其從氣上説理於此見不如從理上説氣於此出為是又一日因講為物不二復問之曰為物的是甚麼生物的又是甚麼曰其為物的就是其生物的某曰這不是向日所説有自然而不容己的故有當然而不可易的麼曰便是蔡虛齋分别理氣不清直認氣為理固不是又或離氣以言理謂未有天地之先天地既壞之後理依然在亦不須推説到此鍾旺程子言性即理也今當言理即性也不知性之即理則以習為性而混於善惡以空為性而入於虛無不知理之即性則求髙深之理而差於日用溺泛濫之理而昧於本源性即理也是天命之無妄也理即性也是萬物之皆備也理即性也實實有箇本體在即乾之元而人之性也有此便不得不動不得不靜故朱子解太極曰即隂陽而指其本體不雜乎隂陽而為言極精程朱説來若合符節此外惟真西山有些意思餘不能也汝楫問性即理也理可是條理否曰是條理孔子曰窮理盡性以至於命和順於道德而理於義順性命之理謂之理都是在事物上説君臣父子夫婦昆弟朋友不相紊亂這是理然此理不是到事物上才有性即有仁義禮智不可混矣命即有隂陽五行不可亂矣順性命之理説得最好性命皆理也程子説性即理也是因人把性字説空了故指點此句其實在事物為理人之所秉為性天之所降為命命本以天言性本以人言理本以事物言道亦理也但理以事物條理言道以人所行之路言然又曰形而上者謂之道曰天道曰天理曰天心皆是借用字眼其曰天德亦借用字眼德本以得之於已言故曰行道而有得於心謂之德其曰天命亦借用臣受君之命的命字其實命字仍非本源天有天之性若沒有緣故命箇甚麼程子兄弟一生只把這幾箇字眼想得分明説得確當如曰在物為理處物為義皆至精言理始於孔子言性始於成湯曰惟皇上帝降𠂻於下民若有恆性將命字作賦豫於人之理言始於劉子曰人受天地之中以生謂之命以前言命多作天之厯數言理須活看如陽善隂惡若説陽是生氣隂是殺氣生氣善殺氣惡如此天何為用此殺氣豈有意欲殺乎有陽不能無隂猶之有隂不能無陽也豈有善必須有惡乎蓋天陽也地隂也人之心神陽也形體隂也人心本無不善即形體亦非不善特不善皆起於形體耳從其大體為大人從其小體為小人耳欲姦聲目欲淫色四肢安於惰慢以飢渴之害為心害何者不生於形體若天君泰然百體從令則惟有一善而已不見有不善惟有一陽而已不見有隂也如君豈可無臣父豈可無子夫豈可無妻然若臣不稟君之令子不從父之教妻不受夫之節制便不好若臣能盡職子能承教妻能宜家但見君父及夫之好處而已雖各分些功名而不専其美也此方説得通以上理氣天的大意只是生人如草木的大意只是結子既欲結子繁多勢必先為地步不得不有根株枝幹又必有陪生者不得不有葉至結子時千顆萬顆無不與種子相肖雖其中有秕細不成實者亦無不與種子相肖天要生人不得不闢世界以為之地步又必生物以陪之人生雖至萬億無不與天相肖故皆能心天之心行天之道盡其性以盡人物之性真與天一般何則以天亦只此性而人全得之故也其中即有庸愚昏惡之人如秕細不成之實然其性亦無不與天肖也物雖不能自外此性要不能如人之全以限於氣類之偏蔽故也見得天人同一性自能節節皆通佛家任他虛空粉碎靈光照徹總不離乎氣吾儒平平常常下學上達而所見無非理氣有滅時理無毁時故謂之至誠誠者實也某見得一箇道理頗有關係老子淮南子邵康節都説天地未有以前渾渾沌沌動靜不分及到有動靜才有天地人物即張橫渠亦説坱然太虛升降飛揚清而浮者為陽濁而降者為隂連太極圖説亦不離此意某讀易覺得孔子從不説到天地之先繫傳説天尊地卑然後説到剛柔相摩八卦相蕩又云乾坤毁則無以見易易不可見則乾坤或幾乎息都是從天地説起蓋六合之外存而不論無稽之言無復證據者聖人便不言康節謂過午運後天地日就消滅聖人不復生亦未必然恐天地本無壞時就有大劫數不過一經大亂人物幾乎滅盡便像初開闢一般雖不敢執定此説然如堯舜這樣人忽生出一箇來亦定不得堯舜不過是箇至好的人最平常一點不竒怪再生幾箇好人一幫便是唐虞有何異看天似無心然從事事物物體貼來覺得處處都似算計過一畨如黃道赤道不同極常疑何不同極省得步算多少周折細想若同一極必有百年只見半日半月之處惟略一差互便隱見盈虧都均齊矣呼如春夏便是內外之氣皆充盈也吸如秋冬便是內外之氣皆揫斂也但充盈却是內虛揫斂却是內實耳自記分野之説荒誕無理雖祖沖之約略言之亦大段不的確以左傳中兩處觀之似是分封時以某星賜某人使其國有水旱疾疫得而祭禳之未必以此分疆畫界也某舊以地雖是天之渣滓因天氣旋轉地在中間又為精氣之會今看來精氣之會四字未完確蓋是天之精氣凝實處天凝實在中間故萬物象之凝實俱在中間自記中國不可言地之中惟可言得天地之中氣當黃道下處日直到頂上其熱太劇當赤道下處一嵗兩春夏秋冬立春春分為春夏立夏夏至為秋冬立秋秋分又為春夏立冬冬至又為秋冬惟中國寒暑晝夜適均而不過所以形骸端整文物盛備語云百川東注某嘗疑中國不過居地數十分之一西邊之水西流者甚多如何據此以論大地其實地雖似圓毬亦似有上下一般西北沙漠之外無非髙山曠野即西流之水皆是有岸的不似東南之海無有邊際蓋東南如血脈所注之處古人語終不錯地至圓無有上下周遭人皆戴天履地無有偏側倒置錫曰此蓋地大之故如蟻行於雞卵之下但見其大不見其倒曰固是亦由人與地本相粘聯如蟲行承塵上有時失足墮地不見有人墮向天本乎天者親上本乎地者親下既有形質不能離地矣朱子言自大庾嶺之北水皆北流南髙北下嶺南水皆南流北髙南下故浙江冬寒夏熱向嘗笑其語以為何處不是冬寒夏熱故語類四纂削去此語其實應存蓋冬更寒而夏加熱也有嶺為背夏則南風不到故加熱冬則北風無遮故更寒浙閩相去直算不過四五百里如何浙江大雪而嶺南便少為此故也繹史云天地之精華為四時有四時而後有五行水之精為月火之精為日又云天皇十三個頭地皇十一個頭人皇九個頭大可笑四時乃因日而有日傍近氣溫為春在頭上大熱為夏稍逺便涼為秋大逺便冷為冬據周髀經及西洋人説則半年寒半年暑者有之一年有兩春夏秋冬者有之與中國對過的地方中國的南極是他的北極中國的北極是他的南極中國寒他却暑中國暑他却寒如此倒説先有寒暑後有日月可乎所以聖人萬古之師一切幽渺荒唐之説刪去淨盡説理氣只從天地説起又只説現在的至天地以前天地之終都不説刪書斷自唐虞以前就有文字孔子都不存不似他家從混沌之始懸空揣度以啓後來編通鑑者荒唐幽怪之謬就是天地之初或有神怪事亦不必記只該就有條理處記起問寒暑之節可驗隂陽之消長而論寒暑乃以去日逺近之故則是地形為之與隂陽之氣不相干矣曰君以日與天為二乎日即天之心即天之目心目到處便是神氣流行心目不到處便是神氣休息大浪山之北我之冬至即彼之夏至我之夏至即彼之冬至然彼之冬至猶我之冬至彼之夏至猶我之夏至無二理也問日行南陸便寒行北陸便暑間有一年不寒又有一處獨寒者何故曰人事為之也雨暘寒燠風隨人所偏之氣勝便能感召其中又以為一方之主者所召之氣為多日似有面背一般朝似面相向故色紅而暖既中而昃似面已掉轉故色淡而漸寒不爾夜氣久而日初出應寒何以暖日氣蒸至半日臨晚應暖何以寒且果實東照者先紅西照者尚青向舉以問梅定九梅云想果實受露朝日烘入則滋液浹洽而先紅西日則露乾久矣故有異未知是否以上天地至誠之心無一事可離得如五行都是土土氣流行無有不貫土旺四季之説出於京房耳問何以謂之旺於四季曰以其交際處尤為易見耳天之氣化還難遽曉至存乎人者可以類推如喜樂怒哀是木火金水也土何在思是也喜之過而樂到將樂時思一思便喜不至過分樂之極而怒到將怒時思一思便樂不至過分怒哀亦然發而皆中節謂之和和氣即土氣從來言五行者有三文王後天圖土有艮坤月令吕覽土在中央京房則土旺四季旺四季者是於交際處見在中央者是播五行於四時若不將季夏屬土便止有四行矣至文王之説於理尤長單水如何生得木單火如何生得金畢竟須土若金生水木生火可不須土他如納甲之説五行既不依生之次第又不依行之次第然今星命地形家皆用之納音之説尤無理天地一嵗生生之氣於木驗之水火金土亦自為消息虛盈但不如木之著耳是亦木包四行之證緣此可見五行內木得生氣之全也自記人有問木何以長於五行者朱子以生氣答之極是而未盡蓋具五行之全德者無如木始發生繼暢茂又繼而收斂又繼而閉藏由閉藏又復發生如仁之貫五常元之貫四德也火外明內暗水外暗內明火照人影在外水照人影在內大都外明者必須內暗所謂外精明而內渾厚也外暗者必須內明所謂內文明而外柔順也水在地中有陽氣推蕩他方會敷散潤澤如人身有血陽氣盛方能睟然見於面不爾便血不華色面帶青黃黑氣土氣原流貫於五行之始終而發見却於辰未戌丑到此節一節才度過去以上五行夫子不語怪神不説有亦不説無又説敬而逺之不説正神亦不説邪神到得敬而逺之即鬼神亦都為民用務民之義至於天地位萬物育不特山川社稷各效其職即郵表畷貓虎之類都有職事年豐則祀之否則八蠟不通以罰之一不語一敬而逺竟是煆鍊鬼神之法聖門賢者信是留心一云子不語怪力亂神一云子罕言利與命與仁一云子所雅言詩書執禮嗚呼盡之矣問人感天似比感人較易曰自然是如此天者吾之父母也人者吾之同類相與也問天無心而成化果然無心否曰以為無心連人亦可謂之無心以為有心連天亦可謂之有心人在天地間不過偶然氣聚能蓄多少靈光尚然有知覺何況天地即父慈子孝君仁臣忠兄友弟恭夫倡婦隨亦是感應自然之理不得謂之有心然謂之無心可乎山川之隂氣升而為雲天以陽氣壓下遂成雨亦升降自然之理然便有雲師風伯雷公電母運行於其中既過便都不知歸於何所天地總是一氣塞滿有氣便有象有象便有神天原發微中言鬼神云天地無空處如一窪之水蟲魚生焉糞壤之內蛆蚓生焉以及氷至寒也而有雪蛆雪蟇氷蠶之屬火至熱也而有火鼠之類由此觀之至微者氣也而氣之中有物至寂者虛也而虛之中亦有物氣與虛而鬼神居焉推而論之却有此理人但因其平生之立心行事死而以類相從憑依感觸而有託焉或清明剛正與明神合而為神或幽暗乖戾與鬼怪合而為鬼佛家説人死後看一點亮處行好人亮處入人神道惡人亮處入畜生道亦是此理鬼神嗜好與人一般此理詩中言之最詳禮始於飲食詩從夫婦居室説起便以此事其祖考以此賽其田祖以此而社以此而郊問想因神亦人之遊魂其生時習於此故神魂亦如此曰天豈亦人為之而曰上帝居歆何也不須倒看人飲食之性從何來先天而天不違後天而奉天時天且不違而況於人乎況於鬼神乎分明説鬼神在天地之外安得謂鬼神無職事但鬼神亦須人幫如勾龍配土神后稷配榖神不獨是功德在人亦因他這一件精通便就是這物事之主問有邪曲不正之鬼神否曰有邵子曰幽暗巖崖生鬼魅這一種喜禍惡福喜亂惡治喜暗惡明喜邪惡正一番亂他一番出現如王章亂而盜賊猖獗即平時亦有王法管不到處姦還時作也問離騷言扣帝閽之類想古時便有與神鬼相通之術曰觀尚書乃命重黎絶地天通可見堯舜之前地天相通至堯舜絶之乃不相通佛家説許多荒唐話亦怪他不得他那裏原相通非全掉謊也只是中庸之道乃天地之經此道明一切鬼神皆服故絶他他就不敢通逺他他亦不敢怨鬼神與人不是兩箇我人也吾之祖父則鬼神矣謂不與我一體可乎推而上之則厥初生民非天地所生而何同為天地所生皆是一氣自古忠臣孝子聖賢豪傑之有靈而為神者皆與吾一體矣只是聖人説得妙敬鬼神而逺之不敬不是不逺又不是故為之禮以裁制之應存者存應革者革各以其分則隂陽和而災沴息人總是一心此心與鬼神本是一氣故天地古今無復間隔如今關忠義之神禱祈多應豈果有忠義之奔馳于天下哉忠義之義氣本在天地人心自有其義氣心皆向之則忠義之神所憑也人讀易經若於天地萬物求之都隔只于心求之則伏羲文王周公孔子都是我人有大好事終身不忘有大可愧恥事亦終身不忘其忘者都是平常沒要緊者耳然亦不可謂不存在那裏偶然觸發却又記起天地間無此物無此影象有此物便有此影象況如堯舜禹湯文武周孔之神乃是天地生平得意事如何忘得只是王莽董卓李林甫秦檜之徒亦與天壤同敝是天地大不得意事桓溫乃是别有肺腸遺臭萬年有何好處如今喫一香物惟恐不噯氣誤喫臭物惟恐噯氣臭氣噴出如何過得先時重伍子胥後重朱虛侯今乃重關忠義只因其人當日死時有一段鬱結處人人為之鬱結以人之鬱結合之神之鬱結自然兩相感通至於鬱結之久非祭賽祠廟鼓樂祝祈之盛不足以宣泄其氣故致香火之盛逮鬱結之氣漸平則香火亦漸減理自如此皆人心為之程朱説道理極精至説鬼神猶有未盡處朱子説人形既銷亡還有甚麼存於天地間此却小差即以人心與事驗之當其心與事相合時居然有此事至事過後未嘗想要記此事然已有在心裏到久後偶然題起又記得就是全忘了到底有一影子未事之先心為形事為影既事之後事為形心為影天地既生過這一個形就是過去了亦有此一個影大約以心法觀之極確一念便是萬事旦夕即是百年百年即是千古問草木禽獸亦天地所生也豈既銷化後亦有影乎曰其靈異者尚能為物怪至尋常者如人于沒要緊事隨過便銷銷過亦無矣大概取精多而用物宏者其存為多人有不安於心者此事常記得不忘若做得合理便帖然放下人死為厲此必有不安也聖賢死則與天地泯然同流無不安也非無也其理與天地合天地存則聖賢亦存張子云沒吾寧也寧字見到至處至而伸者為神反而歸者為鬼是解釋鬼神字義人發動於外者為神藏記於內者為鬼統言之只是神别言之却有鬼神之分先儒解何以喚作鬼是反而歸的何以喚作神是至而伸的或疑人死為鬼使古來靈魂都在豈不塞滿世界此却不然如人讀過的書做過的事説過的話雖多年還記得何嘗見塞滿胸腹鬼亦有消去的只是存者自不少又人有已忘的事追思復記起來者如鬼神你不問他似是無的及誠心求之便又有應物類形骸長而神理短人則形骸短而神理長草木如松柏之類有千年者龜鶴亦久而不死人則不能然人雖死而神理常存物類則不能此最易知以尋常日用間驗之如人做一器皿不破毁他他便常在倘一破毁即不復有矣若作一文字雖毁去還可記誦起來神理存也況大而至於道德本於心性萬古常留誰得而滅之雖草木禽獸久暫不同類人之靈蠢亦不同類然大段如此祖考精神便是自家精神上蔡之言盡矣其曰自家要有便有要無便無却説得稍脫了人心上有天地間便是有了故明道説無説有之語最圓活而朱子一言以斷之曰有鍾旺朱子事事體貼過能知鬼神情狀一日論鬼怪事深詆佛法之非有人曰信有之朱子曰公見否其人曰曽見有鬼為祟但聞寺鐘一扣則鬼一伏朱子曰大抵鬼亦公輩所為生時如此信向死後焉得不爾雖似戲言却有名理鬼神不得謂之無但不可與相接見如水火然兩者本相濟然不可見面人或與鬼神夢寐相接尚隔一層若直見之便非佳事人怕鬼自是胸中愧怍多神鬼精怪要分得清天地日星河嶽之神無非生氣以至人之魂皆神也人既死其魄不散則鬼也精則龍精狐精之類是有一物而修練久能變幻出入神鬼之間即人之仙亦是此類至怪則不正之氣所生如山之怪曰夔罔兩水之怪曰龍罔象山魈木魅之屬是也今人一概名之曰鬼則􅀈頇無别矣陳梓言物有有性而無心者先生問曰何謂曰如磚瓦之類先生曰是何言歟有性即有心天地間木石之類久則能成精怪靈者象人蠢者象鳥獸若無心何以成形如管輅卜碓精和尚家破竈公案皆是土石而云無心可乎鬼神是有的佛家説轉生事是偶然有的如雞變為蜃雀變為蛤何嘗個個如是佛家輪回之説最難信五經説鬼神多矣並未嘗説到此偶想在天成象在地成形覺得有些意思象與形總是一氣凡物皆然如水在地其氣升於天便為雲及雲之墮而下則為雨為水如日在天乃象也以地下之陽燧取之則為火人在地下天上亦必有象所以説魂升於天孔子亦謂其氣發揚於上為昭明以此論之則聖賢轉生亦有此理總是天地清明之氣耳想是當其為雲不自知其為水當其為水亦不自知其為雲韓宗伯慕廬病困時某往候之宗伯曰正有一事欲仗大筆傳信某問何事曰病中見得幽冥之故灼然不爽吾初疾原非大症止因衆祟繞榻徹夜呌歡連旬不能合眼以致病勢日臻某日諸鬼忽相約於西河沿赴席甫晡相率而去吾竟得寧寢及旦使人訪問則西河沿人果於是夜普度施食自是後諸鬼復還吾亦遂不寐以至於困某曰今者諸鬼在何處曰見君在坐退處榻後矣此事向不以為信今將記録示後病不能執筆故以相囑此某面得之宗伯者大抵僧家之普度即先王祭厲之義於理所有者即不當斷以為無但不宜如和尚家説得來全是鬼物為政耳清植一友人看佛書公案極多嘗為某言渠曽攜眷歸鄉舟次杭州一女才二嵗許匍匐坐側呼曰汝明日午時死如是者三渠若不聞又呼曰汝不死則我死如是者亦三渠又若不聞至明日卒皆無它其後友人享有多夀女亦出嫁成家當時友人謂某曰若聞言驚愕必致它異凡此皆是看公案方能解得問死生有命豈因驚愕鬼物便能死人乎曰亦有此理如兩軍相當不動便不敗挑戰者只得敵軍一動事便濟矣某當日與海賊相拒時舍弟有妻弟某者使舍弟來告曰賊己遣兵五千取道永春火藥手五百取道安溪兩路並發志在相滅渠從永春來見賊已駐卓埔卓埔距余鄉僅三十里耳彼時若驚愕動足便可禍生蕭墻幸某堅然不動惟令集衆以俟别分遣二人偵之兩路皆不見一賊既還報其人猶敦促余行某乃笑而止之同年沈尚仁曽卧病三年而後起云為前生事與鬼鬭訟自此遂盡見鬼物某登第後與陳友造之談幽冥事陳難之曰溫公言三代以前不聞有地獄轉生事自佛法入中國便逐旋添出何也沈云果然如此如今隂司何嘗不日日添出事與陽世一般又云人於不平事多言豈無鬼神以為鬼神正直殊大不然如嶽瀆正神何嘗間管都是不好的邪鬼多事還不如陽世尚有公道豈惟人死為鬼廟中泥塑吏役皆能為祟嘗於早間變人出來日出便退入廟中陳友笑之某曰亦有此理管輅傳中舊碓乃成大鳥以其啄與翅似也大凡土木之類皆能以其形似化為人物錫曰可見生氣無一不貫曰然閩中有真人元女諸神能行醫方療人疾病往往有驗此雖非人事之正然既有功于人則君子不禁先王八蠟迎貓迎虎貓虎之神何足祭以其有功於人耳年不順成則八蠟不通無益於人則絶之以上鬼神天地如雞卵古人雖有其説而未竟其論唐之淳風一行宋之堯夫元之郭太史許魯齋明之劉伯溫皆聰明絶世而皆不知天地之俱為圓體自西人利瑪竇輩入中國言地原無上下無正面四周人著其上中國人爭笑之豈知自彼國至中國幾於繞地一周此事乃彼所目見並非浪詞至梅定九出始發明周髀經以為原如此説何必西學因為補其闕正其訛于是周髀煥然大明周髀言地如饅首天如上下雨傘合籠日月在腰如在雨傘合縫處人在日月之下不正當傘脊處西人言中國東西南三靣皆有人惟北方尚未開闢盡是林樹鬼魅青磷而已中國不見之星甚多西人都圖將來乃知聖人無所不通周禮中説九州只以景長景短景夕景朝數語盡之至天地全局只以周髀盡之周髀自張平子蔡伯喈皆以為非周公之書後人遂謂其荒誕不經惟唐人趙君卿為之注程朱二子雖頗露其端而未窮其旨至梅定九始大加發明遂至統掠中西之學為厯學不祧之祖其功甚大周髀言北極之下有朝生而暮穫者人指為謾趙氏注之云以北極之下有以半年為晝半年為夜者故也此語忒煞聰明蓋北極下日在天腰其在上半盤繞時全是晝及旋到下半便全是夜此理甚確問其地若彼尚能生物乎曰天地之大德曰生生意無所不到故雪中有雪蛆離雪則殂火山內有火樹火鼠離火則死彼處自有彼處所生之物或非中國五榖耳即如昌平州溫泉其湯中遊魚無數萍草自然鮮緑將魚投之冷水便殭無非此理四遊之説朱子屢述之而不悟其非何也謂地於春夏秋冬相那移三萬里如人在舟中舟移而人不知果爾則看北極髙度當四時不同何以北極出地之度萬古不改耶周髀只周公問商髙一篇為經其餘皆傳間有假托無理之語却有精到處分别觀之可也程子謂日無時而不為精地無處而不為中妙極此分明是説地圓而不指明其故闕於所不見也又云地無窮者如無端也亦極好朱子言天天不宜以恆星為體當立有定之度數記之天乃動物仍當於天外立一太虛不動之天以測之此説即今西厯之宗動天也其言九層之天近人者最和暖故能生人物逺得一層運轉得較緊似一層至第九層則緊不可言與今西厯所云九層一一吻合地平之説是地與天相際也程子以為四邊有空濶則地在天中一彈丸耳極得其理自記朱子語類中論厯不過六七條而已盡理法之微妙今西厯最侈為獨解處不能加也自記三萬里之説無可稽信朱子又謂三萬里者日軌相距之數耳非地只有三萬里也故語類以程子之言為誤然施之於用則千里一寸之法自不可通自陽城至衡嶽又無萬五千里以為二至相距亦沿襲之説耳今新厯却以極度推算凡二百五十里而移一度地之周圍凡九萬里三分取一其徑三萬或古者三萬里之説意正如此而傳者失之故或言四方之逰或言二至之距皆不可曉也自記天圓地方之説蓋以動靜體性言之實則形氣渾淪相周古人卵中裹黃之喻是已厯家又以地平為説亦即目所察天在地之上下隱顯各半而名之爾夫至順極厚非方非平髙下相循渾淪旁薄者地之本體然也其南北兩端以去日逺近為寒暑之差東西以見日早晚為晝夜之度東之夜乃西之晝南之暑乃北之寒也如是則東西南北安有一定之中南北或以極為中或以赤道為中者亦天之中非地之中也此理周髀言之至悉而漢氏以下莫有知者近新厯之家侈為獨得歷詆前説幾數萬言惜乎無以髀蓋之術告之者自記今言嵗十二年填二十八年火二年金水皆一年行一度者舉大約耳實皆有餘分惟金水則一日一度一嵗一周萬古不差毫髮何則金水從陽先後者也使有幾微之差則不能追及日而後先之而與三星無異矣張子正蒙云填星地類而從天故其追日最緩木一嵗一盛衰故嵗歷一辰木者生道天地之中氣故遲疾中也火日質而微故其遲倍日金水從日蓋隂必從陽物感自然精微之理也自記定九言古不知有嵗差後頗有言者李淳風又掃落不講直至一行始援證鑿鑿一行比李博雅其言天自為天嵗自為嵗至精楊某説厯法每髙妙自竒使人無可攀躋梅定九則極低平隨人扣之皆言下即得門户恐即此便是楊不及梅處大凡説道理平處即是髙處張平子造地動儀甚竒各處地震皆知之司儀者報聞及彼處奏到時刻皆應不知何理定九先生云先業師倪先生云地動儀當是極平平之至少有動便傾響何處地震其餘勢所及者必逺人不覺而此器平極遂有聲至其語之過於神竒者或有潤飾也從來厯學須以梅定九為第一曩在京師見某所著厯象本要有未當處許為改訂乃㩦往天津經年不報某作字趣之報書云西説是矣然中厯古有其説者不得槩置使西人専美至古説有得其意而詞未達者須為達之又恐於其本意有所走作故須斟酌非造次可定且尊筆文皆簡明下筆時尤須淘汰取精文氣方稱及後訂訖寄示觀之果如其言此人心虛而厚委曲從容非見到十分的確不肯出口落筆故其書無一字不可信者西人厯算比中國自覺細密但不知天人相通之理如古人説日變修德月變修刑西人便説日月交食五星凌犯乃運行定數無關災異不知天於人君猶父母也父母或有病飲食不進豈不是風寒燥濕所感自然有的但為子孫者自應憂苦求所以然之故必先自反於身或自己有不是處觸怒致然否則亦是我有調理不周而致然因為倣徨求醫斷無有説疾病人所時有不須管他之理無論天子即督撫于一省知府于一郡知縣于一邑皆有社稷人民之責皆當修省即士庶雖至卑賤似不足以召天變然據理亦當修省如父母怒别個兒子時凡為兒子者俱當畏懼父母斷不因其畏懼而謂我本怒他於爾無與而反增其怒者通天地人之謂儒揚雄謂知天而不知人則技西人此等説話直是隂助人無忌憚天變不足畏之説以上厯法榕村語録卷二十六

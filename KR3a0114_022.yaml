body:
  text: 榕村語録卷二十二大學士李光地撰歷代舜葬蒼梧是廣西已入版圗禹㑹塗山是浙東已入版圖不知宣王中興赫聲濯靈何以淮徐即呼為戎夷江南湖廣春秋時皆擯為荆吳非我族類大抵諸侯各君其國天子有道則來朝否則職貢不至聲教遂阻定九先生曰觀武丁朝諸侯有天下可見武丁未出諸侯不可得而朝也總之王畿雖為萬國繫屬而各國卻委其自治聖人公天下之心原是如此武王取商不聞商家有死難之人當時箕子膠鬲以下自然尚有其人因武王處得好大家便相安竝不見膠鬲出為周用周亦不曽强膠高使為己用這便是兩盡其道管仲器小且不須推說到正心修德致主王道上去假令孔子請討陳恆魯從其請斷無奪齊國土之事不過誅其罪人置君而去至義聲滿天下自然四方仰而待命如文王之世矣孟子之以齊王亦是以齊之地行政救民使天下歸心耳斷不是要奪周家天下而有之也古者方伯専征或天子以所征之地賞功則可受又或要荒之外蠢動暴害者取之可也古公初時國甚小後來便大想是多得西戎之地耳斷沒有聖賢利人之有而攘而據之之事管仲便是又滅幾箇小國駁雜不純問使孔子為君為相亦如堯舜周公足矣曰只怕此周公更渾然無跡些孔子乾淨無比事事穩又收得好雖曰危邦不入他卻曽入亂邦不居他卻曽居所謂磨而不磷涅而不緇江漢以濯之秋陽以暴之商鞅開阡陌可見以前阡陌尚存三代田制如何急忙變得盡直至鞅始無遺又人之為兵亦鞅為之信是千古罪人不過要變換新法奪人相位就做出此等事商鞅李斯當不得位時好讀不正之書著不正議論及得志便惡焰滔天所以讀書要正當莫著怪僻之論有此一假怪論便恐有發作時孟子言好善優于天下大學之一個臣便是此二字注腳有此二字無所不有蕭何與高祖同起豐沛良平皆後進高祖任用之何無幾微不平之意自己老老實實的管糧餉又薦一韓信賴以成功故功為諸臣冠人但知焚書者李斯不知蕭何不為無罪何原是吏故從入關止知收圖籍為錢糧兵馬計經書皆置不問至項羽一炬乃盡澌滅秦人所禁禁其行于民間者耳所謂王府則有者固在也韓信之敗就在聞酈生下齊自恥不如遂襲而取之功必欲自己出敗之根也韓信等之善將如蛛之結網蜂之釀蜜他的偏長是天生的亦有學問他學問于這一路偏容易偏在行程朱身分高又見得到直眼大如箕三代下所推者不過幾人董江都諸葛武侯文中子韓文公餘則稱陸敬輿郭汾陽如韓魏公則曰間氣范文正則曰才氣老成某看漢儒中如江都武侯實在做得事來次之便算賈長沙劉更生班孟堅孟堅一部漢書何所不有議論又得要領後人議其品行似屬過苛當日竇憲出征朝廷命固從之豈得不行既與同行憲得功而歸要地做篇文字豈得不作更生峭直忠鯁但略傷急躁長沙不及董葛醇正夾雜霸道漢文以長沙傅梁王以鼂錯傅大子可謂誤于擇師客言王莽未篡時覺得天下無他伶俐既篡位一日呆似一日曰便是古人說得好欺天者天亦欺之罔人者人亦罔之穆穆之天未必做此伎倆鬼神便有許多駁雜的來弄你巨鹿昆陽皆以少勝衆項羽一戰而驕諸侯膝行而前氣焰太露光武一味收斂伯升為更始所殺夜間淚濕枕席平居卻不露聲色便是成事氣量古來高隱人不盡是忘世多是志願極大見不能然遂决意不臣人武侯不立史官他自看得功業不上眼故不屑記如不遇先主自然高隱終身孫曹豈足掛眼嚴子陵便是看得光武未能十分像意所以不肯出即邵康節先生亦是英霸之資耿鄧輩贊光武以𢎞濟艱難不過保全天下之人身子陵高風峻節不汚新莽亦不臣光武乃能激厲天下之人心東漢末宦禍黨錮頻興而赴仁蹈義者視死如歸子陵之力也于易蠱者事也故皆曰幹至上獨曰不事王侯志可則也蓋所幹者更大不可謂非事也定九先生曰孟子答士何事曰尚志正是此義弔嚴子陵詩文以權文公范文正公為絶唱權詩直說到風尚為淳而曰焉用佐天子持此報故人高濶純粹又是實事范記兩邊說得到一邊高一邊大包涵甚遠明太祖著論乃曰子陵若在難乎免于今之世殊缺度量王姚江自以驅馳王事而以荷簣譏之意亦褊淺方正學作子陵詩極可厭古今君臣惟此最飄灑是一假佳話有何放不過定要說得掃興至此況郭后又安知其無可廢之道友云其實麗華卻是糟糠郭后反是後來所立至吕東萊以宋𢎞語為諷郭后事宋𢎞薨于建武六年廢郭后乃十五年事安得預為諷耶古人亦有憒憒時漢宣綜核名實雖小康竟弄成一名法天下至孝明始鋭意興復禮樂雖止皮毛然已能使人尚名節可見禮樂之功大鄧伯道事小學採之其實有過處弟子固要保全己子縱不能兩顧聽他追隨不上萬一得活亦不可知何必縳在樹上使賊戕之郭巨之子必不得已只好聽他饑斃埋之殊屬害理這都是漢晉人好名之弊客氣用事好名作威其人必不可與共事李元禮為司𨽻校尉宦官之弟已避入柱中便當住手乘此以懾羣小足矣何必破柱殺之以致激變武侯事事嚴肅卻又肯放過所以妙漢之高文武宣明章諸帝天分皆不及先主先主遺命幾句語似平常而所見甚高勿以善小而不為勿以惡小而為之是何等胸次識解高文武宣諸君都用不得武侯即唐太宗好自見聰明亦未必用得項羽精采最是沈船破釡能斷而行所以成破秦之功其無用之狀全見于鴻門之宴非謂卿子冠軍與高祖皆宜殺祗于適合機宜與不中機宜處見其大概耳項羽起手殺太守便規模不好昭烈舉事郤有度不輕殺人其于督郵也鞭之而已口不離仁義之言遺詔數言老靠決斷先主不忍東征之舉後來武侯收拾便如人遭瀕死大病雖已痊可元氣終未能復假令當年能忍姑與吳和俟曹操死後以先主之英偉加武侯之幹濟據河渭上流以爭天下必大得志人不能如聖人之大公便須堅忍一能堅忍成就便不可量孟子以太王配勾踐總押在畏天上說銖兩不差帝王總以知人為要昭烈論學問文采智謀勇略俱不及曹操當時陳元龍鄭康成輩皆推重之可見他認得人得王霸之要又名義正得一武侯增多少氣焰後來又肯讀書至遺詔乃己筆在漢詔中為第一大約大英雄未有不學問者孟子言行一不義殺一不辜而得天下不為故曰善戰者服上刑連諸侯者次之辟草萊任土地者次之辟草萊任土地有何妨為其惟導世主以富强勢必至奪民之利而歸之上也其論獨夫直推到天生民而立之君原是為民來都是透頂議論近來讀史將此意一觀覺得三代下不堪著眼曹操之惡不消到暗移神器誅戮忠良只看他報陶謙之讐將徐州雞犬不留一陶謙耳徐州之人何辜這便是賊盜所為昭烈逃至長坂已是臨危尚不忍棄百姓武侯便有孟子家法朱子論其拔三千戶而歸云是皆歸命于漢者不爾恐魏人屠之非因街亭之敗欲以此遮當其罪其論確矣武侯之外如郭令公范文正公司馬溫公皆實有孟子之意但武侯做得來尤一毫不苟能令司馬懿老姦宿猾不敢動手為儒者吐氣不然那一輩盜賊以為儒者竟無用但空言誇大耳曹操挾天子以令諸侯名目甚正當時天下士翕然歸之逆節竝未萌也武侯不往而反南遷靜中已窺見其底裏矣當時形勢人物俱看得了了于中本意拚得終身不出及見先主帝室之胄赤心白意可與共事方肯委身此其出處合于聖賢者三代後武侯是箇小周公朱子是箇小孔子具體而微武侯才大器宏通身絶無火氣雖以伊川之刻核每與周公同舉亦尊之至矣近世惟朱子八面打開光明洞逹無一㸃黑暗處可以起人疑惑武侯亦是如此其求救于吳而曰若事之不濟此乃天也安能復為之下此是實話出于至誠若如戰國策士之掉口舌權亦黠獪豈能受其揶揄法正一飯之恩必酬睚眦之怨必報人以為言武侯曰主公之在公安進退狼跋孝直為之輔翼令翺翔不可復制如何使不得行其意武侯立法甚嚴自律極謹而權于人情又極寬明是為情面即直說無復遮護人說陳壽與武侯有仇故說他竒謀為短不知此句卻是武侯功臣九合諸侯不以兵車管仲即不用竒謀何況武侯武侯行兵竟是太公方叔之遺孫吳一片詭詐成何局面妙在武侯又不迂濶口中亦不說不用竒謀只似引繩墨切事情而所行都是直接三代之事如今尋武侯一㸃黑暗處亦沒有武侯有手段後人以司馬溫公比之溫公是箇好人才具焉能比武侯當時曹操雖死謀臣猛將尚多兵經百鍊三分天下有其二武侯用彈丸之蜀三五年間魏人栗栗應舉者都不應舉以待蜀漢之至是何聲勢觀所以治蜀一事不苟惟取益州一節被人議論朱子到此亦嘆息云便是後代聖賢難做武侯本意倒要先主受劉表之讓當時若受了荆州荆益相連劉璋暗弱聲罪西征何等光明正大後來據荆襲益畢竟虧理只因先主為主武侯未必把持得住如東征之役亦不能止君臣之際難言之矣武侯去既去不得不取益州又無站腳處奈何昭烈之取蜀武侯不設一謀不著一語然隆中之對未嘗不以此為言大概武侯即取蜀亦必有道不肯不光明正大耳朱子謂漢唐來做事密者惟武侯猶未免有疏處不知朱子說他疏處安在豈以荆州單付關侯及用馬謖之類耶關侯與先主如骨肉必不容他人監押荆州之任又非關侯不可馬謖雖敗更見衆整武侯軍見前面敗而不動所以魏人謂之動如風止如山吳臨川言不聞聖人之道雖德行如司馬文正才略如諸葛忠武亦未足以興禮樂此是宋人習氣語錫曰文中子云孔明無死禮樂有興然橫渠有云若不聞性與天道而欲制禮作樂者末矣然則武侯能聞性與天道乎曰禪家有悟而修者有修而悟者湯武反之亦是勉勉不巳功夫純熟透到性天上來武侯不是粗節豪傑看他一言一動毫不苟且安知其不直透上一層若李忠定便疏節濶目饒使才略大極其能事不過做到恢復使天下富强而止禮樂要無私無我至誠大公本之躬行心得之餘薰蒸流溢人人皆信而從之合下便郊焉而格廟焉而饗不是但考核制度頒行天下即算得數禮樂不是濶遠事自日用行習家庭微曖何處不是能興禮樂之人須時時事事無一不合禮樂又須詳考古來因革之變紀數音節源流之故審時度務合于變通損益之宜博學詳說至精至當方可見之設施後世用兵都不能出孫吳之外惟武侯脫去此窠臼管仲伐楚不問僣王之罪而尋摘至小不可考校之事朱子謂是不肯殘民之意樂毅威力本可下齊其不進或亦有此意故文中子許夏侯泰初善發其藴武侯自比管樂必當有見武侯節制之師法令嚴明其兵與渭濱之民雜處而若不知是何等調度文中子云孔明不死禮樂有興今以臆度之若興禮樂恐武侯不及朱子考求得精細然就其設施凡廬舍供饋井竈溷厠皆井然有法巳是禮內外和輯上下安服遠近感動巳是樂即以意為之必不大差武侯同時人無不服身後人無不服雖讐敵如魏吳亦無不服先主目空一世計見武侯時年已四十餘武侯才二十六歲一見便傾倒世謂陳壽與武侯有隙而貶之大謬陳壽進諸葛文集表前說管蕭之亞者漢人眼孔耳後面比之召公又謂以佚道使以生道殺尚有何不足如今想他不及聖人卻不在據荆取益倒是勸進表雖非出其手畢竟武侯為首中間填許多䜟緯若是程朱斷有斟酌又手寫申韓以授後主申韓有何佳處此則聖人不為也豈所謂天民之未粹者亦近之乎立朝與僚屬同事最不可露出我是正人的意思害事最大東吳張溫被罪而死武侯聞之疑訝不得其故久之曰我得之矣清濁太明此便是武侯大處不如此不能用人不能成事時務隨事不同春秋書楚為子假令孔子厄陳蔡時楚子發兵救之圍既解而延見畢竟不得稱他為子孫權稱帝正是漢賊孔明不討而稱賀此類正可參想問程朱自然都做得事當時伊川若交付他西夏朱子交付他恢復未知能如武侯否曰朱子自然做得來只是像武侯不像武侯未可知問伊川畢竟如何曰須是從人主以至宫中府中一切都依他整理一番他才做不然便罷若是從劉先主先主略不依他他自然即回隆中去了武侯既被先主折節下賢從他出來不大差亦便隨分做了聖人中如周公既有聖人之德又通身才藝自是不同若伊吕想其作用亦未必遠過武侯管仲才大又有學問只是較之武侯卻許多不如非是說他必然繼周而王才算功烈不卑只尊攘二字他便做得有限桓公四十年中竝不見朝王一次至以天下諸侯臨楚不過數說他兩件沒要緊事雖朱子替他原情有不肯殘民之說終是不能制楚之命才如此武侯亦賀孫權即位卻是事機當然必如此方好并力于魏魏滅不怕吳不服與管仲不同孔明有巧思木牛流馬亦是想出來的腳用四小輪容易行動棧道路窄車大難行牛馬卻步窄前用一人牽動其後十數俱可牽連而行靜中工夫惟閒時可用孔明自草六歲出來日倥偬于戎馬之間曽無刻暇而曰學須靜也才須學也想他天資高時時將心提起用著實落工夫來朋友要取直諒自己受益不受盡言者始于豫智終于至愚夫子稱舜好問好察不必賢智之言始足聽也耕問奴織問婢他所素習必勝于我武侯天資高曰廣咨詢曰聞過必改而無吝色曰吾心如稱不能為物作輕重故功雖未成而信格神明勢傾天下當時稱服了無異詞後世傳誦久而彌光武侯以區區之蜀能抗衡于吳魏者得人之力也宫中府中須一體不宜內外異法親賢臣遠小人不過淡淡數語實則千古治亂之經故可與伊訓說命相表裏徐元直說俗儒不知世務識時務者為俊傑武侯云劉繇王朗各據州郡論安言議動引聖人今歲不戰明年不征使孫策坐大遂據江東正所謂俗儒也朱子謂陳羣為賊佐命詞嚴而義正荀攸自應入此例彧雖為操謀主至與操謀篡必無其事彧之侍中原是漢官未嘗仕操操建國稱魏則彧死而後操為之彧阻董昭以致殺身一節亦自可取若其㛰于宦官則彧方二歲其父為之耳彧之罪當從末减鍾旺龎士元論人才不肯求全責備這箇心胸便可以稱鳯雛蜀漢雖小年數不多卻有可觀人物之盛亦不止一武侯即如關侯對張遼言吾極知曹公待我厚但吾受劉將軍厚恩誓以共死不可悖之吾終不留吾要當立效以報曹公乃去何等磊落趙子龍不受第宅曰霍去病尚曰胸奴未滅何以家為漢室未復無所用此又謂漢賊曹操非孫權都中義理張翼德釋嚴顔奉之上坐而受教何等風誼受劉子初之侮慢而不怒何等氣度至後尚有蔣公琰費文偉即姜伯約亦有意思朱子以正統歸之允當熒惑守心之說渺茫不可知惟以人道大義為定方為正理魏之人物惟曹子建耳仲逹輩不足道也江東人物惟周公瑾次魯子敬餘不足道也趙雲張嶷不獨有將略其見事明決持重老成實古重臣之選管寧不仕名望甚重果是何如曰其人未免雜些黃老氣本傳中載他一篇文字細撿便見清植司馬懿有功于魏甚大其耐得定處便是他的作用便是高手作事要箇底子如行兵古人有幾句不可易的要言若頓兵堅城之下置之死地而後生窮寇勿追之類至兩軍相抗哀者勝則又片言居要矣鄧艾已至蜀是死兵自宜堅壁清野勿與交鋒諸葛瞻遽與之戰全不知乃翁兵法者知人任人是人君大事取人以身從根本做下來者頗少如苻堅淫昏無比為用王景略便能立國唐武宗任李德裕亦有效只是錯的狠多所以知人是難事唐太宗天資英發若有人引他到正路上便當他不起因為他只學得駕馭人之法雖聳動得外國人聞其崩而𠢐面終不是至誠動物也凡人處事都不消自己暴白只這㸃心萬古人皆知之唐太宗事事料理過又承蘇綽之後所以治效為三代以下所僅見但大根本巳錯了又所謂敷求哲人俾輔于爾後嗣者絶不加意所以再傳而有武氏之禍立言最要端直魏鄭公顔魯公為人忠亮節義如此魯公為文往往雜于浮屠之說鄭公作李密墓志感密舊恩猶之可也更稱贊楊素極其推高豈非失言鍾旺商周之際除夷齊外微箕且就武王之封商容亦受武王之表書録微子易繫明夷詩歌白馬孔子亦曰殷有三仁總量其心之無他而一于仁也是心非可假托而人遂信之也皎日霽月萬夫皆見狄梁公親相武后反唐又身後事而儒者諒其為唐蓋當日無可退休之勢只得委蛇以圖濟又自下位以至為相皆有清惠及民故經世所推者子房梁公而已大抵天生民而立之司牧非徒以榮之將使助天而生養斯民也苟以救民為心雖湯武之放伐大易以為順天應人管仲之事讐聖人以為仁孟子曰民為貴社稷次之所見精矣遇時勢極難處只有一無依傍聽天順理不作主意而已施將軍說飄洋遇風者只有砍倒大桅隨風所吹或得近岸不爾無不覆者郭汾陽善用此法拋置生死于度外倒得身名俱泰當時若欲萬全久無汾陽矣此理周易說盡汾陽純忠無私然才具略短不得臨淮相助恐難成功郭李素不相睦及郭為帥李乃自縛請罪郭驚謝之曰王室多難豈修私怨時耶遂兩相交契此等處實高人數等易傳以孔明與周公並舉而以汾陽次之果非等閒唐人設科有學窺孔顔道侔伊吕等目終唐之世惟張曲江中伊吕科孔顔一科竟為虛設紱問窺字不為十分深造如韓退之還可充得此科否曰退之果能窺見然終是狂不是孔顔底氣象有間又曰若將退之充孔顔科陸忠宣充伊吕科亦還去得忠宣儘有經緯清植易言有親則可久即盛德至善不能忘之意大凡久而不忘者須是德至誠感人才能久而不忘宋時有書生弔仁宗詩云桑麻不擾歲常登邊將無功吏不能四十二年如夢覺春風吹淚過昭陵吏下著不能二字妙寫出含容寬厚與漢武非武健嚴酷惡能勝任者不啻徑庭此亦是有親可久但不能有功可大耳當時賢姦迭進用人無常安能立功如何不受西夏的氣總是明白要緊既有誠心又要明善所以程朱說格致那樣鄭重看來如鳥雙翼缺一不可顔魯公忠義强直至死不變陸子靜推唐有三人顔魯公杜子美陸宣公而韓文公不與焉朱子為王梅溪作序所推剛者五人漢之武侯唐之杜工部魯公宋之范文正公及梅溪其人為朱陸所稱豈偶然哉問文正聲價竟在韓魏公上曰天地間最重是成就人材宋之道學派是文正開的其心量光明廣大歐陽公亦喜汲引後進然近于詞章意思多文正則理學氣節竒才異能無不兼收所以聲光烜赫富鄭公文潞公看來不過是有學問的老實端正一邊人范文正事業不必勝人而為第一流者功在推奬人才故陳止齊謂百年用其餘也王荆舒人品何嘗不高而罪不可赦者以其摧殘人才也要造就當下人才要培養後來人才武侯不得培養工夫且造就當下的忠厚者用其德技勇者用其才所以能建功立事伊尹云匹夫匹婦不獲自盡民主罔與成厥功天地間道理是公共的人說不妥到底有些毛病所以武侯只要人攻其短不是故意如此他高明直見得事理無盡非一人之見便能至當不易裁斷雖是一人衆議必要周盡竟是以能問不能以多問寡有若無實若虛的本領此卻是聖賢窮理治事根本王荆公只為少卻這段意思便萬事瓦裂武侯在草廬見龎德公便拜身為將相見許司徒亦拜此是何等意度王荆公于韓富諸公皆視之若無有日對明道先生猶謂其言如上壁兩目不見人如何成事凡做事與人商量有好處推與衆人即是與人為善之意荆公變科舉之制亦是如何將孔子所定之經竟欲重加去取去儀禮又去春秋至詆為斷爛朝報而自己作三經新義盡廢前人之說幾幾欲奪孔子之席狂妄孰甚焉論理如此其見之事可知程朱雖疵駁前人惟至漢而止然漢人有片言之善何嘗不録如望道而未之見漢儒解作見殷之天命未改賢人尚多望太平而未之見溫公至據以疑孟子此等不辨是護漢儒而疏孔孟矣事有同行而異情者此類是也王介甫若治一郡比東坡强介甫事事留心實欲立事東坡輕財重義清廉高濶文采風流至民生政務不似介甫有實心宋神宗之用荆公明建文之用正學皆非前代所有惜其敗事令儒者短氣建文時本無人神宗對著明道寧宗對著朱子而嘆無人其然豈其然乎神宗升遐時邵伯溫問明道曰時事將如何曰司馬君實吕晦叔相矣曰果相如何曰君實擔當不曉事晦叔曉事不擔當以熙豐之人除熙豐之政以漸則可不然衣冠之禍未艾後一一如其言然朱子謂明道為之則可不然君子小人亦難雜然竝處大約明道卻能如此孫盛稱諸葛威略能撿衛異端撿者知也衛者行也略撿也威衛也惟知仁勇全而至誠者能之李忠定每用輒效次第井然只是略急些竟是一粗武侯武穆歸來時風色已可見入作樞密何如且韜晦自全如王沂公之于丁謂徐文貞之于嚴嵩忍耐以待其變大抵君子欲攻小人則小人之黨必固不如且放鬆其黨必自相攻擊乃可相機而動古今兩大恨秋風五丈原一也金牌十二道二也一天為之一人為之武侯正命猶可武穆直枉死牢獄且並其子戮于市曹然至今三尺童子莫不知尊武侯武穆亦莫不切齒秦檜人心即是天心可知及身之事乃氣數之雜耳敝鄉蔡京子孫都認作忠惠公子孫吕惠卿子孫俱不肯認惠卿為祖有子孫而滅絶然則天之性其可違乎門人問中興將帥還有在嶽侯上者否朱子凝神良久曰次第無人所貴于聖賢者以其言可信使人物事蹟千載下據以得其實耳武穆死時朱子已草餘歲豈有見聞不確者丘瓊山說秦檜有存宋之功武穆不死亦未必能平金人後人錯記或指作朱子語可笑之甚張德逺為宋齊愈劾去李忠定齊愈何人也乃首出張邦昌姓名擁戴邦昌者自是忠定終于不起而宋祚遂終于臨安後又不喜武穆全是私意雖朱子為作行狀不敢謂非徇南軒情面也問此亦可見南軒差處父既官至將相功罪須付之史官與士大夫公論何用粉飾表暴曰然程子于大中朱子于韋齊毫無溢美大中當承平之世不汲汲仕進一見茂叔即知為非常人遣子從學是何等人品韋齊獨先排擊秦檜是何等氣節而其子不多稱焉蓋如此然後人信之若裝㸃些無實之事人便非笑然則非自非笑其父也一間耳禹言四凶舉其三諱父惡也道理不過如是而止是非者天下之公非可以私情移也錫曰此事流弊甚逺馴至于今守身誠身都不講甚至供養俱不周惟于親死之後架空撰為志狀或經營入鄉賢祠便以為孝子尊親之至以致學宫之內儈伍叢雜賢者恥與為列乃知道理一錯其弊有不可言者先生曰然魏公後亦復薦忠定魏公得罪忠定亦救之大抵魏公尚是正經人但糊塗太甚耳張魏公平生只管誤事朱子每多恕詞或以南軒之故吕舜從仕張邦昌則不可訓雖以東萊力為回護亦不得不直其辭鍾旺胡康侯以秦檜為王佐這病就見在春秋傳上論古人不著古人則看今人亦不著今人矣大約知人從虛公窮理上來的便不差亦是天分居多各人眼神不同又單講辦事而不論根本便易錯薦賢育才上聖之美節王荆公見得人皆不己若得位行政總不得賢能之力便是規模器局小規模器局小則才亦小矣先主從不識武侯聽徐元直語就懇切求見屈躬三顧卒收其效荆公聞濂溪名一再相訪而不得見遂忿然不復往胡文定提舉湖北時謝上蔡為應城令文定因行部欲往謁先之以書上蔡不報文定未至其縣即止從人入境徒步往見上蔡見之于公堂坐定文定見兩旁𨽻人如木雕遂禀學焉文定之視荆公其賢逺矣南宋不可與東晉竝論者以有朱子遂增重十倍孔明之在蜀亦然以知聖賢之益人國者在千古其一時之禆助猶淺之乎為見也相傳文文山初中狀元一相者潜至朝堂瞰歸語人曰在某處立者大貴在末座年少大凶在某處立者乃留夢炎末座即文山也後留果為兩朝宰相而文殺死有人薦一日者于陸子靜子靜問曰齊景公有馬千駟算得出不曰算得夷齊餓死首陽算得出不曰算得齊景公卻死之日民無稱夷齊卻民到于今稱之算得出不其人無以答三綱五常整頓起來便天地日月亦覺添許多清明明太祖知得此意故靖難時忠烈之臣極多至亡國猶忠義如林一統太平二百餘年宫闈間極乾淨可見此是天地之心人材之興端由學校太學為四方觀瞻尤屬要緊洪武雖不讀書卻能以此為急務每日下學聽諸生講誦即偶不至亦令畫工暗圖師弟子作何營幹諸生有歸省者必賜之表裏至廩餼居處之細件件理㑹周到迄今勒石學宫者猶可考見惟専一誠切故雖經永樂及魏忠賢之摧殘而節義滚出大率培養之力居多珣元時人多恆舞酣歌不事生産明太祖于中街立高樓令卒偵望其上聞有絃管飲博者即縳至倒懸樓上飲水三日而死雖立法太嚴然所以激厲頽靡處志氣規模果不尋常竟有一人橫行武王恥之之意不然天下已定習俗已久何苦使偷惰者反有故元寬大之思但使聖人處之必當有道不至如此過于苛急耳古君臣相與其善者都是榜樣如留侯與高帝忠武與昭烈鄭公與文皇皆好方正學年方草餘被薦到京太祖命宗伯陪宴于禮部乃白衣據上座以師道自居太祖令畫工暗圖其像曰斯人何傲吾不能用留為子孫光輔太平遂送伴蜀王是皆可為榜樣惜後僨事遂减聲價方正學就所著文字便有許多糊塗處當時皆以為曠世一見之人國家留為伊周者後用起來當靖難時著著都錯這就是他學問有病才高意廣好說大話實用處便少只要自己位置一箇古人便不是但看武侯何嘗有絲毫要做伊周不過當下且做得不至敗亡踏踏實實做一件是一件無暇高自期許後來人卻以伊周許之客有論宋代人材優于他代明卻人材少想因太平年久英華散了所以不生人先生曰亦是靖難時摧殘太甚上帝怒而不生秦始皇把幾箇讀書人坑了直至國亡無一人為死者只有一東陵侯後來亦為蕭相國諸公門客就是新莽隋煬皆有死節人獨秦無之洪武起自農家只教人力田讀書深惡貪汚卻博得士大夫知亷恥嘉靖以前無擕宦資歸家營産者蔡虛齊既登第不求仕惟在開元寺授徒一日為其母畫像母久不出虛齊往請母曰汝成進士十年我尚不得一新布衣不欲出見客也虛齊大傷之即赴選在任心動告歸不久而父逝後又貧不能自給求得南京部司以去鄉近也到任又心動復告歸其母亦不久即逝人以為孝感虛齊提學江西寄四金以周其寡表嫂丁寧告誡萬勿浪費當時人雖窮卻窮得熱閙如春天樹木何嘗盡有花葉覺得有生意冬天何嘗無寒花覺得枯索蓋樹木亦要小草來幫襯便有氣色百姓細民乃士大夫之小草也有明一代學問凡前人說過的話便不屑說卻要另出意解鄭世子韓大司馬楊椒山講樂一無承受直接虞舜王陽明講學便似從孔子後到他方明白孔子像預知後來有這般人所以說述而不作信而好古以此定人之學問百不一失有所承受一路考訂來者便是作而不述不信而好古者便不是季本明德初讀律吕新書不了徹乃扁舟請教于章楓山楓山曰此是絶學吾友程篁墩無書不讀亦不能知明德歸而求之卻明白了著幾篇論極乾淨黃石齊就擒時門人多相隨石齊一再辭之曰我為大臣義宜死諸君無為也猶不去石齊乃曰諸君踐土食毛義亦可死但未食祿亦可以無死今與諸君訣甘殉難者止否則各有父母妻子毋為冒不測也衆乃泣别惟七人願從江西四人福建三人是時遭逢仁恕令前代遺臣梗不服者得請方行刑毋許専殺由是石齊師徒皆下獄以待石齊入獄即絶粒大帥憂其蚤斃也百方進食飲皆不顧乃募漳人之賈于江寧者至獄以鄉情相慰藉猶不食于是邀與游于市扶㩦以出入飯肆强之不可乃入酒肆共酌以獻石齊曰酒以合歡今鄉井相聚小飲可乎但必毋過三爵衆皆喜諾遂飲三爵更一肆則又三爵以此閲數日不至于斃及就義之晨二官入謁拜如儀日為公送喜石齊曰吾國破君亡何喜之有二官曰巳得請許公就義矣石齊笑曰是誠可喜但汝輩安能解此因歷數二官之家世閥閲也而呵其罪二官皆浹背趨去不敢仰視頃之石齊乘小車出七人從中途石齊返顧後車七人者皆無人色石齊笑曰怖乎毋庸忍一刻即千秋矣七人皆應曰然比至西華門石齊忽墜車下一指揮趨進掖之且慰曰毋恐石齊瞋目叱之曰是何言歟天下豈有畏死黃道周哉此地為輦路所經吾不可以乘而過因絶食足弱下而致仆吾何恐哉指揮愕然易容因跪曰此地萬人瞻仰公又困憊即就大事可乎石齊四顧曰善遂命布席南向拜訖一老僕請以數字貽家石齊躊躇曰無可言者固請乃裂衣襟嚙指血書曰綱常萬古節義千秋天地知我家人無憂七人者亦血書一幅云師存與存師亡與亡石齊體故昻藏立而受刑又義風凛凜行刑者手栗刃下不殊行刑者大悸急跪曰公坐石齊頸已中刃血淋漓猶頷之曰可乃坐而受刑焉其時大帥亦閩人也大書牌云僞閣部黃某首巡示沿江一兵以他首易而匣藏之古墓中後數年石齊子至江寧求遺骸有以兵事告者其子詣之兵人欵至浹月乃與到古墓取匣開視面尚如生遂以歸葬石齊雖當時用之恐無益于亂亡救亂須有體有用之人石齊每于晚食後始排書案及漏下雙眸炯炯手不停披服役者令翻書帙給使令皆不得閒至四鼓僕從憊甚乃就枕其夫人善書畫書法甚與石齊類徐偉長中論有一段論行不及知處不為無理若看得透便大概不錯明代士大夫如黃石齊輩煉出一股不怕死風氣名節果厲苐其批鱗捋鬚九死不回者都不能將所爭之事于君國果否有益盤算箇明白大槩都是意見意氣上相競耳行有餘而知不足其病卻大某聞郭蒯菴棻言黃石齊濃眉高􅀈面帶風霜溫體仁方持朝綱開口輒呼溫賊明自正嘉以前程子全書朱子文集語類尚未盛行學者所讀只是大全及性理而已而其時士風質實雖或膚淺卻少背戾嘉靖後一派務高遂釀成明末那樣風氣鍾旺宋家一代風流篤厚臣子表奏率從君身上直詞批糾毫不委婉曽無被誅者韓托胄雖怒諸賢流竄耳沈繼祖請殺朱子朱子得朝報不語而散行庭中既而曰我這頭且暫戴在這裏移時又曰自古聖人不曽被人殺死聖人果無被殺者就是大賢亦只比干一人是路窮了方如此伊川晚年便謝遣生徒曰各尊所聞各行所知足矣不必及吾門也漢之黨錮明之東林多太過便是要以死求名聖賢無此法門東漢之末東林之盛是處士橫議遙執朝權競勝不止故致顛覆孔子當昭公被逐之時韜光斂鍔閉門讀書如不聞也者及老而居衛適當出公拒父此何等事而孔子受其公養住五六年亦置之不論安卿曰于此見聖人之作用曰論作用便差要看出聖人未嘗不在利害上斟酌究歸于中庸不可易的道理又要看出他謹嚴一絲不走處方好虛說卻不得力季氏逐昭公孔子未嘗食君之祿分所不屬何為多事孟子曰鄉鄰有鬬者被髮纓冠而往救之則惑也雖閉户可也以常情論似大決絶然細思之道理卻顛撲不破鄉鄰本非至親往救而不力則詐往救而力則代鄉鄰而與鬬者為讐或致被辱傷生以危父母皆不可知即不然如今律例鬬毆殺人在旁不救者亦有不應問擬就是牽連作人命干證亦屬無謂雖閉户可也的確應如此夫子居衛其初不過住歇店其君知之送些柴米受之可也使出公能委國以聽夫子自有正名一番設施既不見用何為以局外之人為不入耳之計夫子當日不稅冕而行已與魯絶不便自歸至老欲還鄉惟衛與魯近只得居衛彼時地位道理止當如此故曰聖之時孟子說伯夷隘非是說惡人之朝應立惡人應與之言他當殷周之際竝無職守優游西山亦可卒歲乃見得世非黃農便過不得朱子平生不肯出來一過分水嶺便為生往死歸之計直與君相爭執到底及罷而歸便讀書㑹友不問朝政假若看得一片武夷山仍住不得除非是死儘可不必魏忠賢之禍諸賢赴湯蹈火自是忠烈但韜晦些以存此身未始不可易經以杞包瓜道理甚好瓜乃易腐之物豈能耐杞小人凶惡已甚自然敗在眼前及其敗而吾輩在國尚有人直弄得到後來元凶已去無人可用而國之受害酷矣亦伯夷隘之流風也榕村語録卷二十二
